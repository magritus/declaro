wizard_agaci:
  tetikleyici_soru: "6550 sayılı Kanun kapsamında araştırma altyapısı olarak tanınan ve tescilli bir kurum musunuz?"
  info_modal: |
    ## 6550 s.K. Madde 7 — Araştırma Altyapıları Ar-Ge Kazanç İstisnası

    6550 sayılı Araştırma Altyapılarının Desteklenmesine Dair Kanun kapsamında
    **araştırma altyapısı** olarak tanımlanan kuruluşların, Ar-Ge ve yenilik
    faaliyetlerinden elde ettikleri kazançlar **kurumlar vergisinden tamamen istisnadır**.

    ### "Araştırma Altyapısı" Nedir?

    - Yükseköğretim Kalite Kurulu (YÖKAK) tarafından tanınan
    - Bilim Teknoloji Yüksek Kurulu (BTYK) kararıyla belirlenen ve
    - Cumhurbaşkanlığı kararıyla tescil edilen kuruluşlardır.

    Üniversitelere bağlı araştırma merkezleri, ulusal laboratuvarlar ve benzeri
    yapılar bu kapsamda değerlendirilebilir.

    ### İstisnanın Kapsamı

    - **Yalnızca Ar-Ge ve yenilik faaliyetlerinden elde edilen kazançlar** istisna kapsamındadır.
    - Ticari faaliyetler, kira gelirleri veya diğer gelirler istisna kapsamında değildir.
    - Gelir ayrımı (Ar-Ge / diğer) için **ayrı muhasebe tutulması zorunludur**.

    ### TGB (Teknoloji Geliştirme Bölgesi) ile Farkı

    - TGB istisnası (KVK 4691 s.K.): **31.12.2028 tarihine kadar** geçici
    - 6550 s.K. istisnası: **Süresiz** (kanunda bitiş tarihi yoktur)
    - Araştırma altyapısı tescili TGB'den bağımsızdır

    ### YİAKV İlişkisi

    Bu istisna, Yurt İçi Asgari Kurumlar Vergisi (KVK 32/C) matrahından DÜŞÜLÜR.
  kapi_sorulari:
