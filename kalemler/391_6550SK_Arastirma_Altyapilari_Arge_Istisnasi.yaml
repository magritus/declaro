      aciklama: "YÖKAK tanınması, araştırma altyapısı statüsünün ön koşullarından biridir."
    - id: arge_geliri_var_mi
      soru: "Dönemde Ar-Ge ve yenilik faaliyetlerinden kazanç elde edildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Sadece Ar-Ge ve yenilik faaliyetlerinden elde edilen kazançlar istisna kapsamındadır. Diğer gelirlerin ayrıştırılması zorunludur."
    - id: ayri_muhasebe_tutuluyor_mu
      soru: "Ar-Ge faaliyetlerine ilişkin gelir ve giderler ayrı muhasebe hesaplarında izleniyor mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "İstisna kapsamındaki Ar-Ge gelirlerinin diğer gelirlerden ayrıştırılması için ayrı muhasebe tutulması şarttır."

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: arge_geliri_toplam
      etiket: "Ar-Ge ve yenilik faaliyetlerinden elde edilen toplam gelir (TL)"
      tip: para
      zorunlu: true
      yardim: |
        Dönemde Ar-Ge ve yenilik faaliyetlerinden (proje gelirleri, teknoloji transferi, lisans vb.)
        elde edilen toplam gelir. Sadece 6550 s.K. kapsamındaki faaliyetlere ilişkin tutar.
    - id: arge_giderleri
      etiket: "Ar-Ge faaliyetlerine doğrudan atfedilebilen giderler (TL)"
      tip: para
      zorunlu: true
      yardim: "Ar-Ge projelerine doğrudan yüklenen personel gideri, malzeme, amortisman ve diğer giderler. Genel giderlerden paylaştırılan kısım dahil edilmemeli."
    - id: genel_gider_payi
      etiket: "Ar-Ge faaliyetlerine isabet eden genel gider payı (TL)"
      tip: para
      zorunlu: false
      yardim: "Ar-Ge faaliyetlerine atfedilen genel yönetim, idari gider payı. Dağıtım anahtarı belgelenmelidir."
    - id: diger_istisna_geliri
      etiket: "Ar-Ge dışı faaliyetlerden (istisna kapsamı dışı) elde edilen gelir (TL)"
      tip: para
      zorunlu: false
      yardim: "Ticari faaliyet, kira, faiz gibi Ar-Ge dışı gelirler. Bilgi amaçlı girilir; istisna hesabına dahil edilmez."
  formuller:
    toplam_arge_gideri: "arge_giderleri + (genel_gider_payi if genel_gider_payi else 0)"
    arge_kazanci: "arge_geliri_toplam - toplam_arge_gideri"
    istisna_tutari: "max(0, arge_kazanci)"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "arge_geliri_toplam > 0"
      hata: "Ar-Ge faaliyetlerinden elde edilen gelir sıfırdan büyük olmalıdır."
    - kural: "arge_giderleri >= 0"
      hata: "Ar-Ge giderleri negatif olamaz."
    - kural: "arge_geliri_toplam >= toplam_arge_gideri or true"
      hata: "Uyarı: Ar-Ge giderleri Ar-Ge gelirini aşıyor; istisna tutarı sıfır alınacaktır."

denetci_notlari: |
  ## I. 6550 s.K. Md.7 — Araştırma Altyapısı Kazanç İstisnası

  Araştırma altyapısı olarak tescil edilen kuruluşların Ar-Ge ve yenilik
  faaliyetlerinden elde ettikleri kazançların TAMAMI kurumlar vergisinden istisnadır.

  FORMÜL: İstisna = Ar-Ge Gelirleri − Ar-Ge Giderleri (Kazanç pozitif ise tamamı)

  ## II. Tescil Şartı — Kritik Ön Koşul

  Aşağıdaki ÜÇ koşulun TAMAMININ sağlanmış olması zorunludur:
  1. YÖKAK tarafından tanınma
  2. BTYK kararıyla belirleme
  3. Cumhurbaşkanlığı kararıyla tescil

  Tescil belgesi olmadan istisna uygulanamaz. Tescil tarihinden önce elde edilen
  gelirler için geriye dönük istisna uygulanamaz.

  ## III. Gelir Ayrımı — Zorunlu Şart

  İstisna YALNIZCA Ar-Ge ve yenilik faaliyetlerinden elde edilen kazançlara uygulanır.
  Diğer faaliyetlerden (ticari, kira, faiz vb.) elde edilen gelirler istisna dışıdır.

  Gelir ayrımı için muhasebe sistemi yeterli olmuyorsa oranlama yöntemi kabul görebilir;
  ancak bu durumda GİB özelgesi talep edilmesi önerilir.

  ## IV. Ayrı Muhasebe Zorunluluğu

  - Ar-Ge projelerine ilişkin gelir ve giderler ayrı muhasebe hesaplarında izlenmelidir
  - Genel gider dağıtım anahtarı belgelenmelidir (metrekare, personel sayısı, zaman vb.)
  - Ayrı muhasebe bulunmaması durumunda tüm istisna reddedilebilir

  ## V. TGB ve 5746 s.K. Ar-Ge ile Birliktelik

  - Aynı kurum hem TGB'de faaliyet gösterebilir hem de 6550 s.K. kapsamında olabilir
  - Çifte istisna uygulaması için aynı kazancın iki ayrı istisnaya konu edilmemesi gerekir
  - Hangi kazancın hangi istisna kapsamında değerlendirileceği açıkça belirlenmelidir

  ## VI. YİAKV Etkisi

  6550 s.K. kapsamındaki istisna YİAKV (KVK 32/C) matrahından DÜŞÜLÜR.
  YİAKV çalışma kâğıdında A sütununda istisna olarak gösterilir.

