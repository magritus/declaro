  info_modal: |
    KVK Geçici Md.14/3 (Paragraf 3): Altın hesabı dönüşümü (379) sonrası kurulan TL araçtan
    VUK Md.280/281 gereği dönem sonunda (31 Aralık) tahakkuk ettirilen kâr payı ve faiz istisnadır.

    **372 / 376 / 380 Karşılaştırması:**
    372 (P1): Mevduat/altın → TL KKM → dönem sonu tahakkuk
    376 (P2): YP borç → TL araç → dönem sonu tahakkuk
    380 (P3): Altın hesabı → TL araç → dönem sonu tahakkuk

    **380-381 Mükerrerlik:** Net 381 = Vade Toplam − Önceki 380 Tahakkuku

    **YİAKV:** Bu istisna KVK 32/C (YİAKV) matrahından DÜŞÜLEMEZ (E.7).
