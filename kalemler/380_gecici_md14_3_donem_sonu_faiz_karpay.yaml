denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Md.14/3: 379 kapsamındaki altın hesabı dönüşümü sonrası kurulan TL araçtan
  VUK Md.280/281 gereği dönem sonunda tahakkuk ettirilen kâr payı ve faiz istisnadır.

  ## Kritik Noktalar
  - 380, 379 (altın dönüşümü) olmadan oluşamaz — bağlantı zorunludur
  - Tahakkuk mekanizması 372 ve 376 ile aynıdır; fark sadece yasal dayanak ve bağlantılı dönüşümdür
  - 372/376/380 arasında mükerrerlik: Aynı araç için yalnızca biri uygulanabilir
  - 380-381 mükerrerlik kuralı: Net 381 = Vade Toplam − Önceki 380 Tahakkuku
  - 370-380 tamamı (11 kod) YİAKV matrahından DÜŞÜLEMEZ (E.7)

