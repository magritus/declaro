    - id: kullanim_amaci_uygun
      soru: "Ayrılan fon GSVF katılma payı, GSYO hisse senedi veya GSVF kurulması amacına uygun mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Kapsam dışı bir amaç için ayrılan fon KVK Md.10/1-g indirimine konu edilemez."
    - id: iki_yil_kullanim_planli
      soru: "Ayrılan fonun 2 yıl içinde amacına uygun kullanılması planlandı ve belgelendi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "2 yıl içinde kullanılmayan GSF kullanılmayan yılın geliri sayılır. Kullanım planı veya portföy yönetim anlaşması belgede olmalıdır."

parametreler:
  sinir_orani_2024: 10
  sinir_orani_2025_sonrasi: 20
  ozkaynak_tavan_orani: 20

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: fon_ayirma_tutari
      etiket: "Bu dönem ayrılan GSF tutarı (TL) — Pasifte 549 hesabına kaydedilen"
      tip: para
      zorunlu: true
      yardim: "549 hesabına bu dönem eklenen tutar. Pasif hesapta fiilen kayıtlı olmayan tutar indirilemez."
    - id: beyan_edilen_kazanc
      etiket: "Dönem kazancı — GSF öncesi kurum kazancı (TL)"
      tip: para
      zorunlu: true
      yardim: "KVK Md.10/1-g'deki '%10 kazanç' baz tutarı. 413 uygulanmadan önceki kurum kazancı (ticari bilanço kârı + KKEG − uygun istisnalar bazında belirlenir)."
    - id: sinir_orani
      etiket: "Kazanç sınır oranı (%) — 2025 öncesi: 10, 2025 ve sonrası: 20"
      tip: sayi
      zorunlu: true
      varsayilan: 10
      yardim: "Dönem kazancı üzerinden uygulanacak sınır oranı. Vergi dönemine göre doğrulanmalıdır: 2025 öncesi %10, 2025 ve sonrası için güncel mevzuat kontrol edilmeli."
    - id: ozkaynak_toplami
      etiket: "Dönem sonu öz kaynaklar toplamı (TL) — Bilanço pasif"
      tip: para
      zorunlu: true
      yardim: "500+510+520+530+540+549+570 vb. hesapların toplamı. Birikimli GSF tavanı hesabı için gerekli."
    - id: gecmis_yillar_gsf_bakiyesi
      etiket: "Geçmiş yıllardan birikmiş GSF bakiyesi (TL) — 549 dönem başı kalanı"
      tip: para
      zorunlu: false
      varsayilan: 0
      yardim: "Önceki dönemlerden devreden ve henüz kullanılmamış GSF tutarı. 549 hesabının dönem başı kalanı."
  formuller:
    max_kazanc_siniri: "beyan_edilen_kazanc * (sinir_orani / 100)"
    ozkaynak_tavan: "ozkaynak_toplami * 0.20"
    kalan_ozkaynak_tavan: "ozkaynak_tavan - gecmis_yillar_gsf_bakiyesi"
    azami_gsf: "min(max_kazanc_siniri, kalan_ozkaynak_tavan)"
    istisna_tutari: "min(fon_ayirma_tutari, azami_gsf)"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "fon_ayirma_tutari > 0"
      hata: "Ayrılan fon tutarı sıfırdan büyük olmalıdır."
    - kural: "beyan_edilen_kazanc > 0"
      hata: "Dönem kazancı sıfırdan büyük olmalıdır (bu kalem 'kazancın bulunması halinde' uygulanır)."
    - kural: "sinir_orani > 0 and sinir_orani <= 20"
      hata: "Sınır oranı %0 ile %20 arasında olmalıdır."
    - kural: "ozkaynak_toplami > 0"
      hata: "Öz kaynaklar toplamı sıfırdan büyük olmalıdır."
    - kural: "gecmis_yillar_gsf_bakiyesi >= 0"
      hata: "Geçmiş yıllar GSF bakiyesi negatif olamaz."
    - kural: "kalan_ozkaynak_tavan >= 0"
      hata: "Birikimli GSF bakiyesi öz kaynakların %20'sini zaten aşmış durumda. Cari dönem indirim uygulanamaz."

denetci_notlari: |
  ## Yasal Dayanak
  VUK Madde 325/A: Pasifte özel hesapta izlenen Girişim Sermayesi Fonu.
  KVK Madde 10/1-g: Beyan edilen kazancın %10'unu (2025 sonrası %20) ve
  öz kaynakların %20'sini aşmayan GSF tutarı kurumlar vergisi matrahından indirilir.
  GİB KV Beyan Rehberi Mart 2026 (Yayın No:606) esas alınmıştır.

  ## Hesaplama Akışı

  B.1 Dönem Kazancı (GSF öncesi baz tutar)
  B.2 %10 (veya %20) Limit = B.1 × oran (cari yıl azami GSF)
  B.3 Öz Kaynaklar Toplamı (dönem sonu bilançosu)
  B.4 Özkaynak %20 Tavanı = B.3 × %20 (birikimli tavan)
  B.5 Geçmiş yıllar birikmiş GSF bakiyesi (549 dönem başı)
  B.6 Kalan Özkaynak Tavanı = B.4 − B.5
  B.7 Azami GSF = MIN(B.2, B.6)
  B.8 Fiili ayrılan GSF (549 hesabına bu dönem eklenen)
  B.9 BEYANNAME 413 = MIN(B.7, B.8) → İndirime konu tutar

  ## Çift Sınır Kuralı
  Her iki sınır eş zamanlı aktif: %10 kazanç sınırı VE özkaynak %20 birikimli tavan.
  Küçük olan değer azami indirimi belirler.

  ## Kritik Kontroller
  1. 549 hesabının açık ve kayıtlı olması (VUK 325/A zorunluluğu)
  2. Fon kullanım amacı KVK Md.10/1-g kapsamında olmalı
  3. %10/%20 kazanç sınırı aşılmamalı (dönem yılına göre oran doğrulanmalı)
  4. Birikimli GSF özkaynak %20 tavanını aşmamalı
  5. 2 yıl kullanım süresi takip edilmeli — süre aşımı gelir + faiz + ceza

  ## YİAKV Etkisi
  413 Girişim Sermayesi Fonu İndirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEBİLİR.
  YİAKV çalışma kâğıdı D.11 satırına ("Girişim Sermayesi Fonu — KVK Md.10/1-g") yazılır.

  ## 2 Yıl Kullanım Takip Tablosu
  VUK Md.325/A: Ayrılan yılı izleyen 2 yıl içinde amacına uygun kullanılmalı.
  Süre aşımı → Kullanılmayan GSF o yıl GELİR sayılır.
  KV + gecikme faizi + vergi ziyaı cezası riski. Geçmiş dönem GSF bakiyeleri
  her dönem takip tablosu ile izlenmelidir.

  ## YMM Tasdik
  İndirim tutarı ≥500.000 TL ise YMM tasdik raporu zorunludur (49 No.lu KV GT).
  Tam tasdik kapsamındaki mükelleflerde ayrıca rapor düzenlenmez.

  ## Bloke Hesap
  Fon tutarı bloke edilmiş özel hesapta izlenmelidir; 2 yıl süre dolmadan
  serbest kullanıma alınamaz. Hesap hareketi belgelenmelidir.

muhasebe_kayitlari: |
  ## Girişim Sermayesi Fonu Kaydı
  Borç: 590 veya ilgili Dönem Kârı Hesabı
  Alacak: 549 Özel Fonlar — Girişim Sermayesi Fonu
  Açıklama: VUK Md.325/A kapsamında GSF ayrılması.

  ## Fon Kullanım Kaydı (Yatırım Gerçekleşince)
  Borç: 549 Özel Fonlar — Girişim Sermayesi Fonu
  Alacak: 102 Bankalar (veya ilgili yatırım hesabı)
  Açıklama: GSVF katılma payı / GSYO hisse alımı.

  ## Süre Aşımı Kaydı (2 Yıl Kullanılmayan)
  Borç: 549 Özel Fonlar — Girişim Sermayesi Fonu
  Alacak: 679 Diğer Olağandışı Gelir ve Kârlar
  Açıklama: 2 yıl içinde kullanılmayan GSF — o yılın geliri sayılır.

  ## Beyanname
  İndirime konu tutar beyanname 413. satırına aktarılır.
  YİAKV çalışma kâğıdı D.11 satırına da yazılır.

