wizard_agaci:
  tetikleyici_soru: "Girişim sermayesi yatırım fonu, girişim sermayesi yatırım ortaklığı veya girişim sermayesi vakıf fonu için bu dönem pasifte özel bir fon hesabı ayırdınız mı?"
  info_modal: |
    ## Genel Çerçeve

    **VUK Madde 325/A** kapsamında, kurumlar vergisi mükellefleri bilançolarının
    pasifinde **"Girişim Sermayesi Fonu" (GSF)** adıyla özel bir hesapta izledikleri
    tutarları **KVK Madde 10/1-g** uyarınca kurumlar vergisi matrahından indirebilir.

    Bu indirim, girişim ekosistemini desteklemeye yönelik vergisel bir teşviktir.

    ## Fon Kullanım Amacı (KVK Md.10/1-g Kapsamı)

    Ayrılan fon aşağıdaki amaçlardan biri için kullanılmalıdır:
    - Girişim sermayesi yatırım fonu (GSVF) katılma payı alımı
    - Girişim sermayesi yatırım ortaklığı (GSYO) hisse senedi alımı
    - Girişim sermayesi vakıf fonu (GSVF) kurulması (kurucu ortak olarak)

    ## İndirim Sınırları

    İki ayrı sınır **eş zamanlı** uygulanır:

    **1. Dönem Kazancı %10 Sınırı:**
    Cari yıl indirim tutarı, beyan edilen kazancın **%10'unu** (2025 öncesi)
    veya **%20'sini** (2025 ve sonrası için geçerli oran — kullanıcı doğrulamalı)
    aşamaz.

    **2. Öz Kaynak %20 Birikimli Tavanı:**
    Pasifteki toplam GSF bakiyesi (geçmiş yıllardan devreden + cari yıl) öz
    kaynakların **%20'sini** aşamaz.

    **Fiilen indirilebilecek tutar = MIN(Kazanç Sınırı, Özkaynak Tavanı Kalan, Fiili Ayrılan Tutar)**

    ## Kullanım Süresi ve Risk

    **KRITIK:** Ayrılan fon, **ayrıldığı yılı izleyen 2 yıl içinde** amacına uygun
    kullanılmak zorundadır. 2 yıl içinde kullanılmayan GSF:
    - Kullanılmayan yılın geliri sayılır
    - Kurumlar vergisi + gecikme faizi + vergi ziyaı cezasına tabi olur

    ## Bloke Hesap Zorunluluğu

    VUK Md.325/A gereği fon **pasifte ayrı bir hesapta** izlenmelidir.
    Hesap açılmadan 413 indirimi uygulanamaz. (Genellikle 549 nolu hesap kullanılır.)

    ## YİAKV İlişkisi

    **Girişim Sermayesi Fonu İndirimi (413) YİAKV (KVK 32/C) matrahından
    DÜŞÜLEBİLİR.** YİAKV çalışma kâğıdı **D.11** satırına ("Girişim Sermayesi
    Fonu — KVK Md.10/1-g") yazılır.

    ## Pratik Notlar

    - 549 hesabına yapılan kayıt, indirim hakkının doğması için zorunludur.
    - Kullanım planı veya portföy yönetim anlaşması belgelerde bulunmalıdır.
    - **YMM tasdik raporu:** İndirim tutarı ≥500.000 TL ise zorunludur.
  kapi_sorulari:
    - id: pasif_hesap_acildi
      soru: "Bilançonun pasifinde 'Girişim Sermayesi Fonu' için ayrı bir hesap (549 vb.) açıldı mı?"
