  - Sermaye Piyasası Kanunu Madde 54 (Kolektif Yatırım Kuruluşları)
  - 6362 Sayılı Sermaye Piyasası Kanunu
  - VUK Madde 269-270 (Gayrimenkul Değerleme)

beyanname_bolumu: zarar_olsa_dahi
yiakv_etkisi: dusulur
durum: aktif
yururluk_araligi:
  baslangic: "2006-06-21"
  bitis: null
  not: "395 kodu 2025 ve sonraki dönemlerde GSYF portföy işletmeciliği kazancının taşınmaz DAHİL bileşenini ayrıştırarak göstermek için kullanılır. GSYF'lerin taşınmaz yatırımları SPK mevzuatı ile sınırlandırılmıştır; portföy limitine uyum kritik önem taşır."

ana_kategori: portfoy_isletmeciligi

wizard_agaci:
  tetikleyici_soru: "GSYF portföyünde taşınmaz veya taşınmaza dayalı varlık var mı ve bu varlıklardan portföy işletmeciliği kazancı elde edildi mi?"
  info_modal: |
    ## Genel Çerçeve

    KVK Madde 5/1-d kapsamında Türkiye'de SPK çerçevesinde kurulmuş **Girişim Sermayesi
    Yatırım Fonlarının (GSYF)** portföy işletmeciliğinden doğan kazançların tamamı kurumlar
    vergisinden %100 istisnadır. Bu form, söz konusu kazancın **taşınmaz ve taşınmaza dayalı
    varlıklardan** elde edilen bileşenini kapsar.

    ## GSYF'de Taşınmaz Yatırımı

    SPK III-52.4 Tebliği'ne göre GSYF portföyü esas itibarıyla girişim şirketi payları ve
    borçlanma araçlarından oluşur. Taşınmaz yatırımları **ikincil/tamamlayıcı** nitelikte
    olup ciddi limitlerle kısıtlanmıştır:

    - GSYF portföyünün **belirli bir oranını** aşacak biçimde taşınmaza yatırım yapılamaz
      (SPK III-52.4'teki güncel limit için içtüzük ve SPK duyuruları esas alınmalıdır).
    - Taşınmaz yatırımı açıkça içtüzük ve izahnamede düzenlenmiş olmalıdır.
    - SPK portföy limit ihlali durumunda portföy işletmeciliği istisnası tartışmalı hale gelir.

    **Bu durum GSYF'yi GYF'den (Gayrimenkul Yatırım Fonu) özünde ayırır:**
    GYF portföyünün en az %51'i taşınmaz ve taşınmaza dayalı varlıklardan oluşmak
    zorundayken, GSYF'de taşınmaz yatırımı sınırlı tutulur.

    ## Bu Form Neyi Kapsar?

    Beyanname kodu **395** yalnızca GSYF portföyündeki **taşınmaz ve taşınmaza dayalı
    varlıklardan** elde edilen portföy işletmeciliği kazancını içerir:

    - Portföyde kayıtlı taşınmazlardan kira gelirleri
    - Portföydeki taşınmazların satışından doğan kazançlar
    - Taşınmaza dayalı menkul kıymet (örn. kira sertifikası, taşınmaz yatırım ortaklığı payı)
      gelirleri — portföy kapsamında ise
    - Taşınmaz değerleme artışları (dönem sonu VUK/SPK değerlemesi)

    **Taşınmaz dışı gelirler bu forma dahil EDİLMEZ** (→ 394 kodu).

    ## Temel Koşullar

    - **SPK tescili:** Fonun SPK III-52.4 kapsamında tescil edilmiş olması zorunludur.
    - **Portföy limitine uyum:** Taşınmaz yatırımı SPK mevzuatındaki limitler dahilinde
      kalmalıdır. Limit ihlali durumunda portföy dışı sayılan varlıktan elde edilen gelir
      istisna kapsamında değerlendirilemez.
    - **Taşınmaz portföy kaydı:** Portföyde yer alan taşınmazların portföy tescil/kayıt
      belgesiyle belgelenmesi zorunludur.
    - **Gelir ayrıştırması zorunluluğu:** Taşınmazdan elde edilen kazancın (kira, satış,
      değerleme artışı) taşınmaz dışı portföy gelirlerinden muhasebede ayrıştırılması
      hem 394/395 kod ayrımı hem de doğru belgeleme açısından zorunludur.
    - **Portföy dışı ayrım:** Fon yönetim ücreti ve başarı primi portföy işletmeciliği
      geliri değildir; 395'e yazılmamalıdır.

    ## Önemli Sınırlamalar ve Riskler

    - **GSYF'de taşınmaz limiti ihlali:** SPK limitini aşan taşınmaza yatırım yapılmışsa
      limit üzerindeki kısmın portföy içi sayılamayacağı riski doğar; GİB özelgesi veya
      hukuki görüş alınması önerilir.
    - **GYF ile karıştırma:** GYF portföy geliri (taşınmaz dahil) için 397 kodu kullanılır;
      GSYF taşınmaz geliri bu formda (395) gösterilir.
    - **Taşınmaz satış kazancı — KVK 5/1-e ilişkisi:** Portföy taşınmazının satışında
      KVK 5/1-e istisnasının ayrıca uygulanıp uygulanamayacağı değerlendirilmelidir;
      portföy işletmeciliği istisnası (394/395) ile satış kazancı istisnası (5/1-e) birlikte
      uygulanamaz, en avantajlı hüküm tercih edilmelidir.
    - **Değerleme yöntemi:** Portföy taşınmazları VUK Md.269-270 veya SPK değerleme
      esaslarına uygun değerlenmelidir. Yanlış yöntem uygulaması vergi farkı riski yaratır.

    ## YİAKV İlişkisi

    KVK 5/1-d GSYF portföy işletmeciliği kazancı (taşınmaz dahil) YİAKV matrahından
    düşüleceği kabul edilir. Ancak dönem mevzuatı ve GİB açıklamaları her yıl teyit
    edilmelidir; taşınmaz gelir bileşeni için özelge araştırması önerilir.

    ## Pratik Notlar

    - 394 (taşınmaz hariç) + 395 (taşınmaz dahil) toplamı GSYF toplam portföy
      işletmeciliği kazancıyla mutabık olmalıdır.
    - Taşınmaz portföy geliri ile taşınmaz dışı portföy gelirinin ayrı hesaplarda
      izlenmesi hem SPK raporlama hem de vergi ayrıştırması açısından zorunludur.
    - GSYF portföyünde taşınmaz yatırımı yoksa bu form doldurulmaz, 395 satırı boş kalır.
