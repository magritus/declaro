denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-d: Türkiye'de kanunların öngördüğü şekilde kurulan yatırım fon ve
  ortaklıklarının portföy işletmeciliğinden doğan kazançları kurumlar vergisinden istisnadır.
  Bu kalem GSYF'nin taşınmaz DAHİL portföy işletmeciliği kazancını kapsayan 395
  beyanname satırı için düzenlenmiştir.

  SPK III-52.4: GSYF'de taşınmaz yatırımı sınırlıdır. Portföy limitine uyum kritik önem
  taşır; limit ihlali portföy işletmeciliği istisnasını tehlikeye atar.

  ## Kritik Noktalar — Taşınmaz Geliri Ayrıştırması

  PORTFÖY İÇİ — TAŞINMAZ (395 — İstisna):
  - Portföy kaydındaki taşınmazlardan kira gelirleri
  - Portföy taşınmazlarının satışından kazanç
  - Taşınmaza dayalı araç gelirleri (portföy kapsamındaysa)
  - Taşınmaz değerleme artışları (dönem sonu)

  PORTFÖY İÇİ — TAŞINMAZ HARİÇ (394 — Ayrı Kod):
  - Girişim şirketi payları, borçlanma araçları, menkul kıymet ve repo gelirleri

  PORTFÖY DIŞI (Vergiye Tabi — 395'e YAZILMAZ):
  - Fon yönetim ücreti ve başarı primi (taşınmaz işlemine bağlı bile olsa portföy dışı)

  ## GSYF'ye Özgü Taşınmaz Riskleri
  1. SPK portföy limitini aşan taşınmaz yatırımından elde edilen gelirin 395'e dahil
     edilmesi. Limit ihlali durumunda söz konusu gelir portföy dışı sayılır.
  2. GSYF taşınmaz gelirinin GYF (397) koduyla karıştırılması — farklı fon türleri,
     farklı kodlar.
  3. Portföy taşınmazının satışında KVK 5/1-e analizi yapılmadan doğrudan 395 uygulanması.
     5/1-d (portföy işletmeciliği) ile 5/1-e (aktif satış) istisnalarının birlikte
     uygulanamayacağı, en avantajlı hükmün seçilmesi gerektiği unutulmamalıdır.
  4. Portföy taşınmaz değerlemesinde yanlış yöntem (VUK 269-270'e aykırı değerleme).
  5. Taşınmaz gelirinin 394 koduna dahil edilmesi — tüm taşınmaz geliri 395'te olmalı.

  ## YİAKV Etkisi
  GSYF portföy işletmeciliği kazancının (taşınmaz dahil — 395) YİAKV matrahından
  düşüleceği kural olarak kabul edilir. Taşınmaz geliri bileşeni için özelge araştırması
  önerilir. Dönem mevzuatı teyidi zorunludur.

  ## Beyanname Konumu
  "Zarar Olsa Dahi İndirilecek İstisna ve İndirimler" bölümü — 395 kodlu satır.
  394 (taşınmaz hariç) + 395 (taşınmaz dahil) = GSYF toplam portföy işletmeciliği kazancı.

  ## 3 Kademe Uyum Kontrolü
  Muhasebe taşınmaz portföy hesapları (net taşınmaz portföy kazancı) = Çalışma kâğıdı
  395 = Beyanname 395.
  394 + 395 = Toplam GSYF portföy işletmeciliği kazancı (ana mutabakat noktası).

muhasebe_kayitlari: |
  ## Kayıt 1 — GSYF Portföy Taşınmaz Kira Geliri (İstisna Kapsamı)
  Borç: 127 Diğer Ticari Alacaklar ← Portföy taşınmaz kira tahakkuku
  Alacak: 602 Kira Gelirleri ← GSYF portföy taşınmaz kira — KVK 5/1-d (395 satırı)
  Açıklama: Yalnızca portföyde kayıtlı taşınmazların kira gelirleri; portföy dışı taşınmaz
  kira vergiye tabidir.

  ## Kayıt 2 — GSYF Portföy Taşınmaz Satış Kazancı
  Borç: 102 Bankalar ← Satış bedeli
  Alacak: 252/250 Taşınmaz ← VUK değeri (maliyet veya değerlenmiş değer)
  Alacak: 679/649 Taşınmaz Satış Kârı ← Kazanç
  Açıklama: KVK 5/1-d portföy işletmeciliği — 395 satırı; 5/1-e analizi ayrıca yapılmalı

  ## Kayıt 3 — Portföy Taşınmaz Dönem Sonu Değerleme Artışı
  Borç: 252/250 Taşınmazlar ← Değer artışı
  Alacak: 649 Diğer Olağandışı Gelir / 679 ← Değerleme artışı
  Açıklama: SPK/VUK değerleme esaslarına uygun — taşınmaz portföy değerleme artışı (395 satırı)

  ## Beyanname 395 Akışı (Mutabakat)
  Taşınmaz portföy gelirleri (kira + satış + değerleme artışı) net tutarı → Beyanname 395
  Taşınmaz dışı portföy gelirleri net tutarı → Beyanname 394
  Portföy dışı (yönetim ücreti vb.) → Matrahta kalır
  3 KADEME UYUM: Muhasebe taşınmaz portföy hesapları = Çalışma kâğıdı = Beyanname 395
  ANA KONTROL: 394 + 395 = Toplam GSYF portföy işletmeciliği kazancı

