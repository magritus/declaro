denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/3 + ilgili ÇVÖA: Türkiye'nin taraf olduğu ÇVÖ Anlaşmaları kapsamında,
  anlaşma hükümleri gereğince Türkiye'de kurumlar vergisinden istisna edilen kazanç ve
  iratlar beyanname 386. satırında gösterilir.

  ## ÇVÖA İstisna Kapsamı
  ① Yurt dışı daimi işyeri (PE/şube) kazançları: ÇVÖA işyeri maddesi gereğince yalnızca
     kaynak ülkede vergilendirilen PE kazancı → Türkiye'de istisna.
  ② Temettü, faiz, royalti, sermaye kazancı: ÇVÖA hükümleri uyarınca Türkiye'de
     vergiden istisna edilen gelirler.

  ## Kritik Noktalar
  - Anlaşmanın Resmî Gazete'de yayımlanmış ve yürürlüğe girmiş olması zorunludur.
  - Muafiyet yöntemi (exemption) → 386. Mahsup (credit) yöntemi → 386 DEĞİL.
  - KVK Md.5/1-g veya 5/1-h ile çakışma analizi yapılmalı — mükerrer istisna uygulanamaz.
  - Yurt dışı daimi işyeri kazancı için KVK Md.22 koşulları ayrıca sağlanmalıdır.
  - Her ülke ve gelir türü için ayrı satır düzenlenir.
  - Normal muafiyette kısmi istisna oranı 100 olarak uygulanır.

  ## YİAKV Etkisi
  ÇVÖA kapsamı istisnalar, YİAKV matrahını her zaman otomatik olarak azaltmaz.
  Her gelir türü ve anlaşma hükmü için ayrı analiz zorunludur.
  GİB özelgesi ve OECD yorumları referans alınmalıdır.
  Muafiyet yöntemi uygulanan ülkelerdeki PE gelirinin YİAKV matrahında nasıl ele
  alınacağı açıklama gerektirmektedir — "tartismalı" olarak işaretlenmiştir.

  ## YMM Tasdik Notu
  49 No.lu Tebliğ kapsamında: Tek satır ≥500.000 TL veya toplam ≥1.000.000 TL → YMM raporu.
  Tam tasdik sözleşmesi olanlar ayrıca rapor düzenlemez.

muhasebe_kayitlari: |
  ## Kayıt 1 — Yurt Dışı PE Kazancı Tahakkuk
  Borç: 181 Gelir Tahakkukları / 120 Alıcılar — Brüt PE kazancı alacağı
  Alacak: 640 Faiz Gelirleri / 649 Diğer Olağandışı Gelirler — Yurt dışı PE kazancı
  Açıklama: ÇVÖA kapsamı gelir türüne göre uygun hesap kodu seçilmeli.
  Kur: Tahakkuk tarihindeki TCMB döviz alış kuru.

  ## Kayıt 2 — Tahsilat (Transfer)
  Borç: 102 Bankalar
  Alacak: 181 Gelir Tahakkukları / 120 Alıcılar
  Kur farkı: 646 Kambiyo Kârları / 656 Kambiyo Zararları
  Not: Muafiyet yönteminde mahsup gündeme gelmez.

  ## Beyanname Akışı
  1. ÇVÖA kapsamı gelir Türkiye gelir tablosuna yansır.
  2. KV Beyannamesi 386. Satır: "Kazancın Bulunması Halinde" bölümüne istisna tutarı.
  3. Her ülke ve gelir türü için ayrı satır kullanılır.
  4. Muafiyet yönteminde yurt dışı vergi mahsubu (KVK Md.33) uygulanmaz.

