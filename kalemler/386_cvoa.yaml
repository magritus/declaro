wizard_agaci:
  tetikleyici_soru: "Türkiye'nin taraf olduğu bir Çifte Vergilendirmeyi Önleme Anlaşması (ÇVÖA) kapsamında, yurt dışından elde ettiğin ve Türkiye'de vergiden istisna edilen bir kazanç/irat var mı?"
  info_modal: |
    KVK Madde 5/3 + ilgili ÇVÖA uyarınca, Türkiye'nin taraf olduğu Çifte Vergilendirmeyi
    Önleme Anlaşmaları kapsamında Türkiye'de kurumlar vergisinden istisna edilen kazanç
    ve iratlar beyanname 386. satırında gösterilir.

    Başlıca uygulama alanları:
    ① Yurt dışı daimi işyeri (PE/şube) kazançları — ÇVÖA işyeri maddesi uyarınca yalnızca
       kaynak ülkede vergilendirilen kazançlar Türkiye'de istisna.
    ② Anlaşma kapsamında diğer gelirler — Temettü, faiz, gayrimaddi hak bedeli, sermaye
       kazancı vb. ÇVÖA hükümleri gereğince Türkiye'de vergiden muaf tutulan tutarlar.

    **Dikkat:** Muafiyet yöntemi → 386. Mahsup yöntemi → 386 DEĞİL, ayrı satır.
    KVK 5/1-g (yurt dışı şube) veya 5/1-h ile çakışma analizi zorunludur.
  kapi_sorulari:
    - id: cvoa_yururlukte_mi
      soru: "Türkiye ile anlaşma ülkesi arasında Resmî Gazete'de yayımlanmış ve yürürlükte bir ÇVÖA mevcut mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Anlaşma imzalandı ancak henüz yürürlüğe girmedi → İstisna uygulanamaz. Resmî Gazete yayım tarihi ve yürürlük tarihi teyit edilmeli."
    - id: muafiyet_yontemi_mi
      soru: "İlgili ÇVÖA maddesi, Türkiye'ye vergilendirme yetkisi tanımıyor mu? (Muafiyet yöntemi mi uygulanıyor?)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Muafiyet yöntemi → 386 kullanılır. Mahsup (credit) yöntemi → 386 DEĞİL, KVK Md.33 kapsamında mahsup hesabı yapılır. Anlaşma metni incelenmeli."
    - id: kvk_cakisma_analizi
      soru: "Bu gelir için KVK Md.5/1-g (yurt dışı şube) veya Md.5/1-h (yurt dışı inşaat) kapsamında ayrıca istisna uygulanmıyor mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Aynı tutar için mükerrer istisna uygulanamaz. ÇVÖA 386 ile KVK 5/1-g veya 5/1-h arasındaki ilişki analiz edilmeli."
    - id: yiakv_analizi
      soru: "ÇVÖA kapsamı istisnanın YİAKV (KVK Md.32/C) matrahına etkisi analiz edildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "ÇVÖA istisnaları türe ve anlaşmaya göre YİAKV'yi farklı etkiler. Her gelir kalemi için ayrı analiz zorunludur."

