    baslik: ÇVÖA Metni (Resmî Gazete'de Yayımlanmış ve Yürürlükte Olan)
    detay: "Resmî Gazete numarası, yayım tarihi ve yürürlük tarihi ile anlaşma metni. İmzalandı ancak yürürlüğe girmedi → İstisna uygulanamaz."
    temin_yeri: Resmî Gazete / GİB / Hazine ve Maliye Bakanlığı
  - kategori: zorunlu
    "no": 2
    baslik: Uygulanan ÇVÖA Maddesi Analizi (Madde Numarası + Vergilendirme Yöntemi)
    detay: "Hangi anlaşma maddesinin uygulandığı ve muafiyet mi yoksa mahsup yöntemi mi kullanıldığının yazılı analizi. Anlaşma metni referansıyla."
    temin_yeri: ÇVÖA Metni / YMM Analiz Belgesi
  - kategori: zorunlu
    "no": 3
    baslik: Yurt Dışı PE Varlığı veya Gelir Kaynağı Belgesi
    detay: "Daimi işyeri (PE) için yurt dışı kayıt belgesi, sözleşme veya şantiye belgesi. Temettü için iştirak belgesi. Faiz için borç sözleşmesi."
    temin_yeri: Yurt Dışı Kayıt Belgesi / Apostilli Tescil Belgesi
  - kategori: zorunlu
    "no": 4
    baslik: Brüt Gelir Hesaplama Tablosu ve Kur Dönüşüm Belgesi
    detay: "Her ülke ve gelir türü için ayrı tablo: Brüt gelir (döviz), TCMB alış kuru, TL karşılığı. İstisna oranı (normalde %100)."
    temin_yeri: Muhasebe / TCMB Kur Arşivi
  - kategori: zorunlu
    "no": 5
    baslik: KVK Md.5/1-g veya 5/1-h Çakışma Analizi Belgesi
    detay: "Aynı gelir için KVK 5/1-g veya 5/1-h kapsamında ayrı istisna uygulanmadığının yazılı teyidi. Mükerrer istisna önleme."
    temin_yeri: YMM Analiz Belgesi
  - kategori: destekleyici
    "no": 6
    baslik: YİAKV Etkisi Analiz Belgesi
    detay: "ÇVÖA kapsamı istisnanın YİAKV (KVK Md.32/C) matrahına etkisinin kalem bazında analizi. GİB özelgesi mevcutsa eklenir."
    temin_yeri: YMM Analiz Belgesi / GİB Özelgesi

