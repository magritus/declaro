denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Madde 14/3 (Paragraf 3): Altın hesabı dönüşümü (379) sonrası kurulan
  TL araçtan vade sonunda tahsil edilen kâr payı ve faiz istisnası.
  7352 Sayılı Kanun kapsamında yürürlüğe girmiştir.

  ## Zincirleme Bağlantı
  379 (altın dönüşüm kazancı) → 380 (dönem sonu tahakkuk) → 381 (vade sonu tahsilat).
  379+380 olmadan 381 oluşamaz.

  ## 380-381 Mükerrerlik Kuralı (EN KRİTİK)
  Yılı aşan vadeli araçlarda: Net 381 = Vade Toplam − Önceki Yıl 380 Tahakkuku.
  Çapraz kontrol: 380 + 381 = Toplam kâr payı/faiz (banka bildirimi).
  Bu hesap hatasının tarhiyat riski yaratma olasılığı yüksektir.

  ## Muhasebe Mekanizması
  - Vade sonu: Borç 102 Bankalar / Alacak 181 Gelir Tahakkukları (kapatma) + 642 Faiz
  - 373 (P1 KKM araçları), 377 (P2 borç araçları), 381 (P3 altın araçları) — ayrıştırma

  ## YİAKV Etkisi (KVK Md.32/C)
  370–381 (12 kod) tamamı YİAKV matrahından DÜŞÜLEMEZ. YİAKV E.7'de kontrol zorunludur.

  ## Beyanname Bölümü
  "Kazancın Bulunması Halinde İndirilecek" — zarar döneminde uygulanamaz.

muhasebe_kayitlari: |
  ## Kayıt 1 — Vade Sonu: Paragraf 3 TL Araç Kâr Payı/Faiz Tahsilatı
  Borç:    102 Bankalar             [Vade sonu toplam tahsilat]
  Alacak:  181 Gelir Tahakkukları   [Önceki yıl 380 accrual kapatma]
  Alacak:  642 Faiz Gelirleri       [Bu yılın yeni kısmı = Net 381]
  Açıklama: KVK Geçici Md.14/3 → Beyanname 381
  Not: 380 + 381 = Toplam kâr payı/faiz (çapraz kontrol zorunludur).

