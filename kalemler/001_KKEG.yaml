    soru: "KKEG kalemleri KVK Md.11 ve GVK Md.40 kapsamında sınıflandırıldı mı?"
    referans: "KVK Md.11 | GVK Md.40"
  - id: K2
    soru: "KKEG toplamı beyanname 'İlaveler' bölümüyle mutabık mı?"
    referans: "KV Beyannamesi"
