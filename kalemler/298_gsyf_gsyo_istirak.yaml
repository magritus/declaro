denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-a alt bent 3: Tam mükellef girişim sermayesi yatırım fonlarının
  katılma paylarından elde edilen kazançlar ile tam mükellef GSYO hisse senetlerinden
  elde edilen kazançlar kurumlar vergisinden istisnadır.

  KVK Madde 5/1-a alt bent 5: 3 ve 4 numaralı alt bentlerdeki istisna kazançlara
  kaynak oluşturan fon/ortaklıkların bu kazançları da istisna kapsamındadır.
  Dolayısıyla dönem sonu VUK 279 değerleme farkı da istisna kapsamındadır.

  KVK Madde 5/1-a Son Fıkra: Diğer yatırım fonu katılma payları ile yatırım
  ortaklıklarının hisse senetlerinden elde edilen kâr payları bu istisnadan yararlanamaz.
  Sadece GSYF ve GSYO için özel istisna hükmü geçerlidir.

  ## Kritik Noktalar
  - Gelirin hukuki niteliği tevsik belgesiyle kanıtlanmadan istisna uygulanamaz
  - Fon/ortaklık düzeyi KV istisnası ile yatırımcı kurum geliri ayrı değerlendirilmeli
  - Fona iade: KVK 5/1-a (%100, süre ve oran koşulu yok)
  - 3. kişiye satış: KVK 5/1-e (%75, 2 yıl aktif şartı) — farklı beyanname satırı
  - VUK 279 değerleme: Portföy ≥%51 hisse → alış bedeli (değerleme farkı yok)
  - VUK 279 değerleme: Portföy <%51 hisse → borsa rayici / NAD değeri (değerleme farkı = istisna)
  - 7456 s.K. (15.07.2023): Diğer fonlar için 5/1-a-4 kaldırıldı; GSYF/GSYO korundu
  - 7524 s.K. (01.01.2025): GYF/GYO'da kâr dağıtım şartı — bu şartı sağlayan GYF/GYO'dan alınan
    kâr payı 5/1-a'ya konu edilemez, ayrı değerlendirme zorunludur
  - GVK Geçici 67 stopaj rejimi: Iktisap tarihi, araç niteliği ve elde tutma süresine göre değişir

  ## YİAKV Etkisi
  Gelirin hukuki niteliğine göre değişir. Klasik kâr payı niteliğindeki gelirler için
  KVK 5/1-a kapsamında YİAKV matrahından düşülebilir; satış/itfa/değer artışı
  gelirleri için ayrı analiz gerekir. Dönem mevzuatı teyidi zorunludur.

  ## Beyanname Konumu
  "Zarar Olsa Dahi İndirilecek İstisna ve İndirimler" bölümü — 298 kodlu satır.
  Fona iade (5/1-a) ile 3. kişiye satış (5/1-e) karıştırılmamalı; beyanname satırları farklıdır.

  ## Risk Alanları
  1. Fon/ortaklık düzeyi ile yatırımcı kurum ayrımının yapılmaması
  2. Gelir türü netleştirilmeden istisna uygulanması
  3. VUK 279 değerleme yönteminin portföy yapısına uygun belirlenmemesi
  4. Fona iade ile 3. kişiye satış gelirlerinin aynı koda alınması
  5. 01.01.2025 sonrası GYF/GYO kâr payı 5/1-a uygulaması hatası
  6. GVK Geçici 67 stopaj durumunun analiz edilmemesi
  7. Grup içi GSYF'de transfer fiyatlandırması riski (KVK Md. 13)

muhasebe_kayitlari: |
  ## Kayıt 1 — GSYF Katılma Payı Alımı ve Aktife Alma
  Borç: 240/242 İlgili Finansal Yatırım Hesabı ← Maliyet bedeli
  Alacak: 102 Bankalar ← Maliyet bedeli
  Açıklama: Maliyet bedeli ile aktife alınır (VUK 279 → portföy yapısına göre alış bedeli veya NAD)

  ## Kayıt 2 — GSYF Dönem Sonu VUK 279 Değerleme (Portföy <%51 Hisse)
  Borç: 240/242 İlgili Yatırım Hesabı ← Değer artışı
  Alacak: 642/645/649 İlgili Kazanç Hesabı ← Değer artışı
  Açıklama: Dönem sonu NAD değeri − maliyet farkı; KVK 5/1-a/3 kapsamında istisna

  ## Kayıt 3 — GSYF Katılma Payı Fona İade Kazancı
  Borç: 102 Bankalar ← İade bedeli
  Alacak: 240/242 İlgili Yatırım Hesabı ← Maliyet
  Alacak: 645/649 İlgili Kazanç Hesabı ← İade kazancı
  Açıklama: Fona iade kazancı — KVK 5/1-a/3 kapsamında istisna; süre ve oran koşulu yok

  ## Kayıt 4 — GSYF Katılma Payı Kâr Payı Tahsilatı
  Borç: 102 Bankalar (veya 136 Diğer Çeşitli Alacaklar) ← Brüt kâr payı
  Alacak: 640/642/649 İlgili Gelir Hesabı ← Brüt kâr payı
  Açıklama: KVK 5/1-a kapsamında istisna tutarı; stopaj rejimi ayrıca kontrol edilmeli

  ## Kayıt 5 — GSYO Hisse Senedi Kâr Payı (Temettü) Tahsilatı
  Borç: 102 Bankalar ← Brüt temettü
  Alacak: 640/64x İlgili Temettü/Yatırım Geliri Hesabı ← Brüt temettü
  Açıklama: KVK 5/1-a kapsamında istisna edilir; KVK 15/3 stopaj durumu teyit edilmeli

  ## Beyanname Notu — KV Beyannamesi 298 Kodu
  KV beyannamesinde istisna tutarı "Zarar Olsa Dahi İndirilecek İstisna ve İndirimler"
  bölümünde 298 kodu ile gösterilir. Ayrıca muhasebe kaydı yapılmaz.

