# YİAKV etkisi gelirin hukuki niteliğine göre değişir. Klasik kâr payı (KVK 5/1-a)
# için genellikle YİAKV matrahından düşülebilir; satış/itfa/değer artışı gelirleri
# için ayrı analiz gerekir. Dönem mevzuatı ayrıca kontrol edilmelidir.
