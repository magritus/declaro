wizard_agaci:
  tetikleyici_soru: "4122 sayılı Milli Ağaçlandırma ve Erozyon Kontrolü Seferberlik Kanunu kapsamında ormanlarda ağaçlandırma, bakım veya koruma masrafı yaptınız mı?"
  info_modal: |
    ## Genel Çerçeve

    **4122 sayılı Milli Ağaçlandırma ve Erozyon Kontrolü Seferberlik Kanunu**
    kapsamında kurulan ormanlarda kurumun **bizzat yaptığı** ağaçlandırma, bakım
    ve koruma masraflarının **tamamı** kurumlar vergisi matrahından indirilir.

    ## Önemli Ayrım — Bağış Değil, Masraf İndirimi

    476, diğer bağış kodlarından **temel olarak farklıdır**:
    - Kurumun orman idaresine **para bağışı yapması** → 402 (kamu idaresine bağış)
    - Kurumun 4122 s.K. kapsamındaki ormanlarda **bizzat masraf yapması** → 476

    ## Kapsam

    - 4122 s.K. kapsamında kurulan ormanlarda yapılan masraflar
    - Orman Genel Müdürlüğü (OGM) onaylı proje/protokol şarttır
    - Fidan, tohum, dikim işçiliği, ekipman giderleri
    - Sulama, gübreleme, budama masrafları
    - Koruma, yangın önleme, zararlı mücadelesi giderleri

    ## İndirim Oranı

    İndirim oranı **tamamının indirimi**dir. Matrahı aşan kısım sonraki yıllara devredilemez.

    ## YİAKV İlişkisi

    **476 kapsamındaki masraf indirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.**
    YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir ancak matraha etki etmez.
  kapi_sorulari:
    - id: bizzat_masraf
      soru: "Masraflar 4122 s.K. kapsamında ormanlarda bizzat kurum tarafından mı yapıldı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "476 bir bağış değil — kurumun kendi üstlendiği ağaçlandırma/bakım/koruma masrafı. Orman idaresine para transferi → 402. Kurum bizzat masraf yapıyor → 476."
    - id: ogm_protokol
      soru: "Orman Genel Müdürlüğü / Orman İdaresi'nden onaylı proje/protokol var mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "4122 s.K. kapsamında yapılacak ağaçlandırma çalışmaları OGM/Orman İdaresi'nin onayına ve protokolüne dayanmalıdır. Onaysız masraf → 476 kapsamı tartışmalı."
    - id: fiili_masraf
      soru: "Masraflar fiilen gerçekleşti mi? (Fatura/harcama belgeleri mevcut mu?)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Taahhüt edilen ama yapılmayan masraf indirime konu olamaz. Her harcama kalemi için fatura/makbuz/bordro gereklidir."

