denetci_notlari: |
  ## Yasal Dayanak
  4122 sayılı Milli Ağaçlandırma ve Erozyon Kontrolü Seferberlik Kanunu kapsamında
  kurulan ormanlarda kurumun bizzat yaptığı ağaçlandırma, bakım ve koruma
  masraflarının tamamı kurumlar vergisi matrahından indirilir.
  GİB KV Beyan Rehberi Mart 2026 (Yayın No:606) esas alınmıştır.

  ## 402 ile Temel Fark
  402 (KVK Md.10/1-c): Kamu idaresine para bağışı (para çıkıyor).
  476 (4122 s.K.): Kurumun bizzat ormanda yaptığı masraf (mal/hizmet harcaması).
  Kurum orman idaresine para bağışladıysa → 402. Kendi masraf yaptıysa → 476.

  ## İndirim Kuralları
  - Tamamının indirimi — kazanç yüzdesiyle sınırlı değil
  - Matrahı aşan kısım sonraki yıla devredilmez

  ## Kritik Kontroller
  - Masraf 4122 s.K. kapsamındaki ormanda mı yapıldı?
  - OGM/Orman İdaresi onaylı proje/protokol var mı?
  - Masraflar fiilen gerçekleşti mi? (Fatura/makbuz/bordro)
  - Masraflar aktifleştirilmeyip dönem gideri olarak mı kaydedildi?

  ## YİAKV Etkisi
  476 masraf indirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir.

  ## YMM Tasdik
  İndirim tutarı ≥500.000 TL ise YMM tasdik raporu zorunludur (49 No.lu KV GT).
  Tam tasdik kapsamındaki mükelleflerde ayrıca rapor düzenlenmez.

muhasebe_kayitlari: |
  ## Ağaçlandırma Masrafı Kaydı
  Borç: 770/760 Genel Yönetim/Pazarlama Giderleri veya 689 Diğer Olağandışı Gider
  Alacak: 102 Bankalar / 320 Satıcılar / 335 Personele Borçlar
  Açıklama: 4122 s.K. kapsamında ağaçlandırma/bakım/koruma masrafı.

  ## Beyanname
  Hesaplanan toplam masraf tutarı beyanname 476. satırına aktarılır.
  Matrahı aşan kısım devredilemez.

