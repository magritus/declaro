      aciklama: "Faaliyete geçmemiş TGB'nin yönetici şirketi risk alanıdır."
    - id: kapsam_kazanc
      soru: "İstisna uygulanacak kazanç TGB yönetim faaliyetinden (kira, yönetim ücreti,
        altyapı bedeli) mi kaynaklanıyor?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Mevduat faizi, temettü ve TGB dışı ticari faaliyetler kapsam dışıdır."
    - id: kapsam_disi_ayristirma
      soru: "Kapsam dışı gelirler (mevduat faizi, TGB dışı gelirler) muhasebede ayrıştırıldı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
    - id: kazanc_var_mi
      soru: "Bu dönem TGB yönetim faaliyetinden kârda mısınız? (Bu istisna zararda kullanılamaz)"
      tip: evet_hayir
      zorunlu_cevap: evet

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: kapsam_ici_kazanc
      etiket: "TGB yönetim kazancı (kapsam içi gelir − kapsam içi giderler)"
      tip: para
      zorunlu: true
      yardim: |
        Kapsam içi: Girişimci firmalardan kira bedeli, yönetim/işletme ücreti, altyapı hizmet
        bedelleri (elektrik/su/gaz dağıtımı dahil), güvenlik, temizlik, teknik hizmet gelirleri,
        kuluçka/hızlandırma program ücretleri.
        Kapsam dışı (istisna uygulanmaz): Mevduat faizi, repo, temettü, TGB dışı taşınmaz kira
        geliri, TGB dışı ticari faaliyetler.
        Bu alan D.4 = D.1 − D.2 − D.3 formülüne karşılık gelir. Kapsam dışı gelire düşen
        gider payı kazançtan çıkarılmalıdır.
  formuller:
    istisna_tutari: "kapsam_ici_kazanc * oran"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "kapsam_ici_kazanc > 0"
      hata: "TGB yönetim kazancı sıfır veya negatif ise istisna uygulanamaz (Kazancın
        Bulunması Halinde). Yönetim faaliyeti zararında istisna uygulanmaz."

denetci_notlari: |
  ## Bölüm 1 — Yasal Dayanak, Süresizlik ve Yönetici Şirket Statüsü

  4691 SAYILI TEKNOLOJİ GELİŞTİRME BÖLGELERİ KANUNU — MADDE 3:
  Yönetici şirket: Üniversite veya araştırma kurumu ile diğer kuruluşlar tarafından kurulan
  ve Sanayi ve Teknoloji Bakanlığı tarafından onaylanan tüzel kişiliktir.

  İSTİSNA KAPSAMI:
  Yönetici şirketin bu Kanun uygulamasından doğan faaliyetleri dolayısıyla elde ettiği kazançlar
  kurumlar vergisinden müstesnadır.

  SÜRESİZLİK:
  4691 s.K. Geçici Madde 2: Girişimci firmaların (Ar-Ge/yazılım) istisnasına tarih sınırı
  getirmiştir. Ancak Madde 3 kapsamındaki yönetici şirket istisnası kanunun asli maddesine
  dayanmaktadır → SÜRESİZDİR.

  BEYANNAME: 311. Satır | 'Kazancın Bulunması Halinde İndirilecek' | %100

  ## Bölüm 2 — Kapsam İçi / Kapsam Dışı Gelir Ayrımı

  YÖNETİCİ ŞİRKETİN TÜM GELİRLERİ İSTİSNA KAPSAMINDA DEĞİLDİR:

  KAPSAM İÇİ (4691 Kanun uygulamasından doğan):
  ✓ Girişimci firmalardan alınan kira bedeli (ofis/laboratuvar/servis)
  ✓ Yönetim / işletme ücreti
  ✓ Altyapı, güvenlik, temizlik hizmet bedelleri
  ✓ Elektrik/su/gaz dağıtım geliri
  ✓ Kuluçka hizmetleri (tartışmalı — özelge önerilir)
  ✓ Otopark gelirleri (bölge işletme kapsamındaki hizmetler)

  KAPSAM DIŞI (istisna uygulanmaz):
  ✗ Mevduat faizi, repo, menkul kıymet gelirleri (KESİN KAPSAM DIŞI)
  ✗ TGB dışı taşınmaz kira geliri
  ✗ İştirak temettüsü (KVK 5/1-a'dan ayrıca yararlanır)
  ✗ TGB dışında yürütülen ticari faaliyetler

  KOŞULLU ALANLAR (özelge önerilir):
  ⚠ Konferans salonu / eğitim alanı kiralama
  ⚠ Kuluçka firmaların başarı payı (royalty)
  ⚠ Bakanlık destekleri ve hibeler

  UYARI: GİB bazı özelgelerinde yönetici şirketin bir kısım gelirlerini kapsam dışı saymıştır.
  Tartışmalı gelirler için özelge alınması tavsiye edilir.

  ## Bölüm 3 — 311 vs Girişimci İstisnası — Kritik Farklar

  | Kriter               | 311 — Yönetici Şirket              | Girişimci Firma Kazancı            |
  |----------------------|------------------------------------|------------------------------------|
  | Yasal Dayanak        | 4691 s.K. Md.3                     | 4691 s.K. Geçici Md.2              |
  | İstisna Süresi       | SÜRESİZ                            | SINIRLI (kanunda belirtilen tarihe)|
  | Yararlanan Kurum     | TGB'yi yöneten Yönetici Şirket     | TGB içinde Ar-Ge/yazılım yapan     |
  | İstisna Kapsamı      | Bölge yönetim faaliyeti kazançları | Ar-Ge, yazılım, tasarım kazançları |
  | Beyanname Satırı     | 311                                | Farklı satır                       |
  | Bakanlık Onayı       | ZORUNLU                            | Zorunlu değil (kiracılık yeterli)  |
  | Personel GV İstisnası| Yönetici şirket personeline yok   | Ar-Ge personeli ücret istisnası var|

  ## Bölüm 4 — YMM Tasdik Dil Standardı

  KULLANILIN:
  "...[kurum adı] Sanayi ve Teknoloji Bakanlığı tarafından onaylanmış yönetici şirket sıfatıyla
  [TGB adı]'nı işletmekte olup bu faaliyetten elde ettiği kazanç 4691 sayılı Kanun Madde 3
  kapsamında kurumlar vergisinden müstesnadır."

  KULLANILMASIN:
  - "...4691 Geçici Md.2 kapsamında..." (Yönetici Şirket Md.3 kapsamındadır)
  - "...2028 tarihine kadar..." (Yönetici şirket istisnasında tarih sınırı yok)
  - "...TGB içindeki girişimci..." (Yönetici şirket girişimci değil)

  KRİTİK HATALAR:
  (1) Mevduat faizini 311 kapsamında beyan etmek
  (2) Yönetici şirket istisnasını Geçici Md.2 tarihine bağlamak
  (3) Kapsam içi/dışı gelir ayrıştırması yapmadan 311 uygulamak
  (4) Gider paylaştırmasını yapmadan tüm giderleri 311 kapsam içine almak

  KDV BOYUTU UYARISI: 311 kurumlar vergisi istisnası KDV muafiyeti anlamına gelmez.
  Kira bedeli ve yönetim ücretleri KDV'ye tabi olabilir. KDV uygulaması ayrıca incelenmelidir.

muhasebe_kayitlari: |
  ## Kayıt 1 — Kapsam İçi Gelirlerin Tahsilatı (TGB Yönetim Hizmetleri)
  (Kira, yönetim ücreti, altyapı bedeli — Kapsam içi gelirler)
  Borç: 120/121 Alacaklar (Kapsam İçi — TGB Yönetim) — Girişimci firmalardan kira + yönetim ücreti
  Alacak: 640 Hizmet Gelirleri (640.01 — TGB Yönetim Gelirleri / KAPSAMİÇİ) — Beyanname 311

  KAPSAM İÇİ/DIŞI AYRIMI İÇİN ALT HESAP ZORUNLULUĞU:
  640.01 — TGB Yönetim Gelirleri (KAPSAM İÇİ)
  640.02 — TGB Dışı/Finansal Gelirler (KAPSAM DIŞI)

  ## Kayıt 2 — Kapsam Dışı Gelirlerin Kaydı (Mevduat Faizi vb.)
  Borç: 102 Bankalar / 108 Diğer Hazır Değerler — Mevduat faizi tahsilatı
  Alacak: 642 Faiz Gelirleri (KAPSAM DIŞI) — Mevduat faizi geliri — vergiye tabi

  ## Kayıt 3 — Gider Dağıtımı (Kapsam İçi/Dışı Paylaştırma)
  Borç: 760/780/630 İlgili Gider Hesabı (Kapsam İçi Payı) — D.3 formülü
  Borç: 760/780/630 İlgili Gider Hesabı (Kapsam Dışı Payı) — Vergiye tabi kazançtan düşülür
  Alacak: 102 Bankalar / 320 Borçlar — Toplam gider ödemesi
  Dağıtım: Kapsam İçi Gider Payı = Toplam GYG × (C.5 / C.11)

  ## Kayıt 4 — Beyanname 311 Mutabakat Notu
  KV Beyannamesi 311. Satır: 'KAZANCIN BULUNMASI HALİNDE' bölümü
  311 = D.6 = D.4 (Yönetim Kazancı) × %100
  3 Kademe Uyum: Muhasebe alt hesap (640.01) = C.5 = Beyanname 311 (D.6)

