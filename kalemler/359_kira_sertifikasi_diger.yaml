hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: devir_bedeli
      etiket: "VKŞ'ye Hak Devir Bedeli (TL)"
      tip: para
      zorunlu: true
      yardim: "Piyasa değerine uygun devir bedeli. Maddi olmayan varlık değerlemesi özelleşmiş metodoloji gerektirir. Akredite değerleme kuruluşu raporu zorunlu sayılmalıdır."
    - id: net_defter_degeri
      etiket: "Hakkın Net Defter Değeri (TL)"
      tip: para
      zorunlu: true
      yardim: "260 Haklar / 263 Ar-Ge / 267 Diğer Maddi Olmayan Varlık hesabından 268 Birikmiş İtfa Payları düşüldükten sonraki net değer."
    - id: devir_giderleri
      etiket: "Devir Giderleri (TPMK devir harcı, noter, hukuki danışmanlık, SPK harçları vb.) (TL)"
