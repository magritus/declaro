      hata: "Devir kazancı pozitif olmalıdır. Zarar durumunda bu istisna uygulanamaz (Kazancın Bulunması Halinde bölümü)."

denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-k: Her türlü varlık ve hakların, kira sertifikası ihraç etmek amacıyla
  kurulan varlık kiralama şirketlerine satışından doğan kazançlar %100 istisnadır.
  359 kodu: Haklar ve maddi olmayan varlıklar (set içinde 357 taşınır, 358 taşınmazın hak karşılığı).

  ## 359'un Setdeki Yeri — KVK 5/1-k "Her Türlü Varlık ve HAK"
  357 = Taşınır Varlıklar (Makine/Araç/Ekipman)
  358 = Taşınmaz Varlıklar (Bina/Arsa)
  359 = HAKLAR (Patent/Marka/Telif/Yazılım/İmtiyaz/Know-how — tüm maddi olmayan değerler)

  ## Hak Türleri ve 5/1-k Kapsamı
  Tescilli (EVET): Patent, faydalı model, marka, tasarım → TPMK devir tescili zorunlu
  Tescilsiz (EVET): Telif hakkı, know-how → Devir sözleşmesi + Tespit belgesi
  Yazılım Lisansı (EVET): Lisans devir sözleşmesi + Kaynak kodu teslim tutanağı
  İmtiyaz/Ruhsat (KOŞULLU): Kamu kurumu devir izni gerekebilir — özelge zorunlu
  Know-how/Ticari Sır (KOŞULLU): Gizlilik sözleşmesi + Tespit belgesi + Değerleme — özelge zorunlu
  İştirak Hissesi (TARTIŞMALI): 359 değil, 5/1-e (351/352) değerlendirilmeli

  ## 549 Fon Mekanizması
  Devir yılında E.6 tutarı 549'a alınır. Her dönem sukuk vadesine paralel hak getirisi/royalty
  ödemelerine orantılı fon azalır. Sukuk vadesi sonunda 549 sıfır.

  ## Sukuk Türleri — Haklara Özgün
  Haklar için Wakala (vekâlet bazlı) genellikle daha uygun yapıdır. Haktan elde edilen getiri
  VKŞ'ye yönlendirilen hak kullanım bedeli/royalty üzerinden sağlanır.

  ## UYARI — GİB Emsal Durumu
  359, setimizin GİB emsal yoğunluğu en düşük dosyasıdır. Haklara dayalı sukuk yapıları
  yurt içinde çok az uygulanmıştır. Hak türüne ve sukuk yapısına göre GİB özelgesi
  alınması YMM müteselsil sorumluluğu açısından zorunludur.

  ## YMM Tasdik Raporu
  49 No.lu Tebliğ (30.12.2025): Tek satır ≥500.000 TL veya toplam ≥1.000.000 TL → YMM raporu.

muhasebe_kayitlari: |
  ## Kayıt 1a — Tescilli Hak Devir Kaydı (Patent/Marka/Tasarım — TPMK Devir Tescil Tarihi)
  Borç: 102 Bankalar                                   [Devir Bedeli]
  Alacak: 260 Haklar (Patent/Marka/Tasarım)             [Net Defter Değeri]
  Alacak: 268 Birikmiş İtfa Payları                     [Birikim]
  Alacak: 679 Diğer Olağandışı Kâr / 645 Satış Kârı     [Devir Kazancı]
  Açıklama: KVK 5/1-k 359 — TPMK devir tescil tarihi esastır; sözleşme tarihi değil

  ## Kayıt 1b — Tescilsiz Hak Devir Kaydı (Telif Hakkı/Know-how — Devir Sözleşmesi Tarihi)
  Borç: 102 Bankalar                                   [Devir Bedeli]
  Alacak: 267 Diğer Maddi Olmayan Varlıklar             [Net Defter Değeri]
  Alacak: 268 Birikmiş İtfa Payları                     [Birikim]
  Alacak: 679 Diğer Olağandışı Kâr / 645 Satış Kârı     [Devir Kazancı]
  Açıklama: KVK 5/1-k 359 — Devir sözleşmesi imza tarihi veya VKŞ'ye fiili teslim tarihi esas

  ## Kayıt 2 — 549 Özel Fon Hesabına Alma (Devir Yılında)
  Borç: 679 Diğer Olağandışı Kâr / 645 Satış Kârı   [İstisna Tutarı]
  Alacak: 549 Özel Fonlar — KVK 5/1-k 359 İstisnası  [İstisna Tutarı]
  Açıklama: Devir kazancının tamamının 549 hesabına alınması (devir yılı)

  ## Kayıt 3 — Fon Amortizasyonu (Her Dönem — Sukuk Vadesine Paralel Royalty/Getiri Oranı)
  Borç: 549 Özel Fonlar                   [Dönem Fon Azalışı]
  Alacak: 549 Özel Fonlar (alt hesap)     [Dönem Fon Azalışı]
  Açıklama: Fon = Başlangıç Fon × (Dönem Royalty/Getiri / Toplam Royalty/Getiri). Sukuk vadesi sonunda 549 sıfır.

