  info_modal: |
    KVK Geçici Madde 14/2 — Paragraf 2 (Borç/Pasif Tarafı):

    Kurumların 31/12/2021 tarihli bilançolarında kayıtlı YABANCI PARA BORÇLARINI
    ve YÜKÜMLÜLÜKLERİNİ yasal süre (CB Kararı) içinde TL'ye dönüştürmeleri
    halinde bu dönüşüm esnasında oluşan KUR FARKI KAZANCI kurumlar vergisinden istisnadır.

    Kapsam dahili borç türleri: Banka kredileri, tahvil/bonolar, finansal kiralama,
    ticari borçlar ve diğer yabancı para yükümlülükler.

    Hesaplama: Kur Farkı Kazancı = MAX(Bilanço TL − Dönüşüm TL, 0)
    Bilanço kuru (31/12/2021) > Dönüşüm kuru ise kazanç oluşur.

    ★★ YİAKV: Bu istisna YİAKV matrahından DÜŞÜLEMEZ (E.7).
    Paragraf 1 (370–374) aktif taraf; Paragraf 2 (375) pasif/borç tarafıdır.
