denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Madde 14/2 (Paragraf 2): 31/12/2021 tarihli bilançoda kayıtlı yabancı para
  borçların/yükümlülüklerin yasal süre içinde TL'ye dönüştürülmesinden doğan kur farkı
  kazancı istisnası. GİB KV Beyan Rehberi Mart 2026 (No:606), Bölüm 2.2.15.

  ## Paragraf Ayrımı
  - Paragraf 1 (370–374): BİLANÇO AKTİF tarafı — Yabancı para mevduat ve altın hesabı → TL KKM
  - Paragraf 2 (375): BİLANÇO PASİF/BORÇ tarafı — Yabancı para borçlar ve yükümlülükler → TL
  Kur farkı yönü zıttır: Borç tarafında bilanço kuru YÜKSEK, dönüşüm kuru DÜŞÜK → Kazanç.

  ## Hesaplama Yöntemi
  Formül: Kur Farkı Kazancı = MAX(Bilanço TL − Dönüşüm TL, 0)
  = MAX([31/12/2021 TCMB kuru × Döviz miktarı] − [Dönüşüm günü TCMB kuru × Döviz miktarı], 0)
  Her iki tarih için TCMB resmi döviz ALIŞ kuru kullanılır (tcmb.gov.tr).
  Örnek: 31/12/2021 kuru = 14,00 | Dönüşüm kuru = 12,50 | 1M USD borç
  → 14.000.000 − 12.500.000 = 1.500.000 TL → Beyanname 375

  ## Kısmi Dönüşüm
  31/12/2021 bilanço bakiyesinin tamamı dönüştürülmemişse orantılı hesaplama zorunludur.
  İstisna Oranı = Dönüştürülen Miktar / 31/12/2021 Bilanço Bakiyesi.

  ## Kapsam Dahili Borç Türleri
  ① Banka kredileri (yabancı para) | ② Tahvil ve bonolar (dövizle ihraç)
  ③ Finansal kiralama yükümlülükleri | ④ Ticari borçlar (dövizle)
  ⑤ Diğer yabancı para yükümlülükler

  ## ★★ YİAKV ile İlişki
  375 istisnası YİAKV (KVK Md.32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdı E.7'de 370–375 tamamı DÜŞÜLEMEZ listesinde yer almalıdır.
  375'in "pasif taraf" kur farkı niteliği YİAKV muamelesini değiştirmez.
  YMM müteselsil sorumluluk: SM-SMMM-YMM Kanunu Md.12.

  ## Kritik Riskler
  1. Paragraf 1 (aktif/mevduat) ile Paragraf 2 (pasif/borç) karıştırmak.
  2. 375 tutarını YİAKV matrahından düşmek.
  3. Dönüşüm tarihinin yasal süre dışında olduğunu gözden kaçırmak.
  4. 31/12/2021 sonrası doğan yabancı para borçları kapsama almak.
  5. TCMB resmi kuru yerine farklı kur kullanmak.

muhasebe_kayitlari: |
  ## Kayıt 1 — Dönüşüm Günü: Yabancı Para Borç Kapatma ve TL'ye Geçiş
  Borç: 300/320 Banka Kredileri / Finansal Borçlar (Bilanço TL değeri — Bilanço Kuru × Döviz miktarı)
  Alacak: 100/102 Kasa / Bankalar (Ödenen TL — Dönüşüm Günü Kuru × Döviz miktarı)
  Alacak: 646 Kambiyo Kârları / 679 Diğer Olağandışı Kâr (Kur farkı kazancı → Beyanname 375)
  Açıklama: Bilanço TL − Dönüşüm TL = Kur farkı kazancı (TL değer kazanmıştı)

  ## Paragraf 1 (370) ile Muhasebe Karşılaştırması
  Md.14/1 (370): 102 Dr / 121 Döviz Tevdiat Kr / 646 Kr — Aktif kur farkı (Düşük kur → Yüksek kur)
  Md.14/2 (375): 300/320 Dr / 100/102 Kr / 646 Kr — Pasif kur farkı (Yüksek kur → Düşük kur)

  ★★ Beyanname: 375 → "Kazancın Bulunması Halinde İndirilecek" bölümünde.
  YİAKV matrahından DÜŞÜLEMEZ — pasif kur farkı kazancı da E.7 kapsamındadır.

