      tip: metin
      zorunlu: true
      yardim: "10 haneli VKN. Dağıtan kurumun tam mükellefiyetinin teyidi için gereklidir."
    - id: istirak_orani
      etiket: "İştirak oranı (%)"
      tip: sayi
      zorunlu: false
      yardim: "Sermayeye katılım oranı. İstisna için asgari oran şartı yoktur; bilgi amaçlı girilir."
    - id: brut_kar_payi
      etiket: "Brüt kâr payı tutarı (TL) — Stopaj öncesi tutar"
      tip: para
      zorunlu: true
      yardim: |
        Stopaj kesilmeden önceki brüt kâr payı tutarı. Net kâr payı aldıysanız:
        Brüt = Net / 0,90 (stopaj oranı %10 ise)
        İstisna brüt tutar üzerinden hesaplanır.
    - id: tevkifat_tutari
      etiket: "Kesilen stopaj (tevkifat) tutarı (TL)"
      tip: para
      zorunlu: false
      yardim: "Dağıtan kurum tarafından kesilen %10 stopaj tutarı (KVK 15/2). Hesaplanan KV'den mahsup edilebilir. Boş bırakılırsa brüt × %10 olarak hesaplanır."
    - id: kar_dagitim_yili
      etiket: "Kâr dağıtımının ait olduğu dönem"
      tip: metin
      zorunlu: false
      yardim: "Dağıtılan kârın ait olduğu hesap dönemi (örn. 2024). Bilgi amaçlı."
  formuller:
    hesaplanan_tevkifat: "brut_kar_payi * 0.10"
    efektif_tevkifat: "tevkifat_tutari if tevkifat_tutari else hesaplanan_tevkifat"
    istisna_tutari: "brut_kar_payi"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "brut_kar_payi > 0"
      hata: "Brüt kâr payı tutarı sıfırdan büyük olmalıdır."
    - kural: "istirak_orani <= 100 if istirak_orani else true"
      hata: "İştirak oranı %100'ü aşamaz."
    - kural: "tevkifat_tutari <= brut_kar_payi if tevkifat_tutari else true"
      hata: "Stopaj tutarı brüt kâr payını aşamaz."

denetci_notlari: |
  ## I. KVK 5/1-a — İştirak Kazancı İstisnası (Tam Mükellef)

  Tam mükellef kurumların, tam mükellef başka kurumların sermayesine katılmalarından
  elde ettikleri kâr paylarının TAMAMI kurumlar vergisinden istisnadır.

  FORMÜL: İstisna Tutarı = Brüt Kâr Payı (Tevkifat Öncesi)

  ## II. KVK 5/1-b ile Temel Farklar

  - KVK 5/1-a → Yurt içi tam mükellef kurumlardan kâr payı — asgari oran veya süre YOKTUR
  - KVK 5/1-b → Yurt dışı iştirakten kâr payı — en az %10 iştirak + 1 yıl elde tutma şartları
  - İki kalem karıştırılmamalıdır.

  ## III. Stopaj (Tevkifat) Mahsubu

  - Dağıtan kurum %10 stopaj keser (KVK 15/2, GVK 94/6-b)
  - Elde eden kurumun eline geçen kâr payı BRÜT tutardır; stopaj mükellefi adına mahsup hakkı doğurur
  - Brüt tutarın tamamı hem gelir hem istisna olarak beyannamede yer alır
  - Kesilen stopaj KV'den mahsup edilir, iade veya nakden mahsup hakkı doğabilir

  ## IV. Dağıtan Kurumun Kurumlar Vergisi Ödeme Şartı

  - Dağıtılan kârın daha önce kurumlar vergisine tabi tutulmuş olması gerekir
  - Kurumlar vergisinden muaf olan veya istisna kapsamında kalan kârların dağıtımı bu istisnadan yararlanamaz (GİB görüşleri incelenmeli)
  - Özelge ile net olmayan durumlarda mukteza talep edilmesi önerilir

  ## V. YİAKV Etkisi

  - KVK 5/1-a istisnası YİAKV (KVK 32/C) matrahından DÜŞÜLÜR
  - YİAKV çalışma kâğıdında A sütununda gösterilir (istisna/indirim olarak)

  ## VI. Birden Fazla İştirak

  - Her iştirak için ayrı çalışma kâğıdı (coklu_instance: true)
  - Tüm iştirakler toplamı beyanname 297. satırına aktarılır

