wizard_agaci:
  tetikleyici_soru: "Tam mükellefiyete tabi başka bir kurumun sermayesine katılmadan kâr payı (iştirak kazancı) elde ettiniz mi?"
  info_modal: |
    ## KVK 5/1-a — Tam Mükellef Kurumlardan Elde Edilen İştirak Kazancı İstisnası

    Tam mükellefiyete tabi kurumların, yine tam mükellefiyete tabi başka bir kurumun
    sermayesine katılmalarından (iştirakten) elde ettikleri kâr payları **%100 oranında**
    kurumlar vergisinden istisnadır.

    ### Temel Özellikler

    - **Asgari hisse oranı şartı yoktur.** %1 hisse ile de tam istisnadan yararlanılır.
    - **Asgari elde tutma süresi şartı yoktur.** (KVK 5/1-b'den farklı olarak)
    - Her iki taraf da **tam mükellef kurum** olmalıdır.
    - Dağıtımı yapan kurumun dağıttığı kârı üzerinden **kurumlar vergisi ödemiş olması** gerekir.
    - AŞ ve Ltd.Şti. kâr paylarının tamamı bu kapsamda değerlendirilebilir.

    ### Stopaj (Tevkifat) Mekanizması

    - Dağıtımı yapan kurum **%10 stopaj** keser (KVK 15/2, GVK 94/6-b).
    - Elde eden kurumun hesaplarına geçen tutar **brüt (stopaj öncesi) tutardır**.
    - Kesilen stopaj, kurumun hesaplanacak kurumlar vergisinden **mahsup edilebilir**.
    - İstisna brüt kâr payı tutarına uygulanır — net tutar değil.

    ### YİAKV İlişkisi

    İştirak kazancı istisnasına konu kâr payları, Yurt İçi Asgari Kurumlar Vergisi (KVK 32/C)
    matrahından düşülür. İstisnadan yararlanan tutar YİAKV hesaplamasında dikkate alınmaz.

    ### KVK 5/1-b ile Fark

    Bu kalem **yurt içi** tam mükellef kurumlardan elde edilen kâr payları içindir.
    Yurt dışı iştiraklerden elde edilen kazançlar KVK 5/1-b kapsamında ayrı değerlendirilir.
