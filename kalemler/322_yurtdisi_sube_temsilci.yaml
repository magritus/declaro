wizard_agaci:
  tetikleyici_soru: "Yurt dışında işyeri (şube) veya daimi temsilci aracılığıyla kazanç elde ettin mi?"
  info_modal: |
    ## Genel Çerçeve

    KVK Madde 5/1-g kapsamındaki istisna, Türk kurumlarının yurt dışında **işyeri (şube)** veya
    **daimi temsilci** aracılığıyla elde ettiği kazançları kurumlar vergisinden muaf tutar. İstisna
    oranı **%100** olup "Zarar Olsa Dahi İndirilecek" bölümünde (322. satır) gösterilir; kazanç
    bulunmasa da istisnadan yararlanılabilir.

    Bu istisna, aynı amaca hizmet eden **KVK 5/1-h (yurt dışı inşaat/montaj/teknik hizmet —
    304. satır)** ile sıklıkla karıştırılır. İki hüküm arasındaki en kritik fark şudur: 5/1-g'de
    Türkiye'ye **transfer zorunludur**; 5/1-h'de transfer şartı aranmaz. Ayrıca 5/1-g'de **en
    az %15 vergi yükü** şartı aranırken 5/1-h'de böyle bir şart bulunmaz.

    ## Temel Koşullar

    Üç şartın **tamamının eş zamanlı** sağlanması zorunludur:

    **1. İşyeri veya Daimi Temsilci Varlığı:** Kazancın yurt dışında **şube veya işyeri** ya da
    **daimi temsilci** aracılığıyla elde edilmesi gerekir. Yurt dışı bağlı ortaklık (ayrı tüzel
    kişilik) kazançları bu madde kapsamında değil; KVK 5/1-b (tam istisna) veya 5/1-c (hisse
    satışı) kapsamında değerlendirilir. Yurt dışı inşaat ve montaj faaliyetleri ise 5/1-h'e tabidir.

    **2. Türkiye'ye Transfer:** Kazancın, Türkiye'de kurumlar vergisi beyannamesinin verildiği
    tarihe kadar (normal dönemde 30 Nisan) **fiilen transfer edilmiş** olması zorunludur. Transfer
    gerçekleşmemişse istisna **hiçbir koşulda uygulanamaz**. Transfer kanıtı olarak banka SWIFT
    çıktısı veya havale dekontu dosyaya eklenmelidir.

    **3. Yurt Dışında %15 Vergi Yükü:** Şubenin/işyerinin bulunduğu ülkede ödenen verginin
    vergiden önceki kazanca oranı en az **%15** olmalıdır. Hesaplama: Ödenen Yurt Dışı Vergi /
    Vergiden Önceki Şube Kazancı. Yüksek vergili ülkeler için alternatif eşik: (KV oranı + En
    Yüksek GV Dilimi) / 2 × %75 (2025 için yaklaşık %24,375). Bu eşiğin altındaki ülkelerdeki
    şube kazançları istisna kapsamına giremez.

    ## Önemli Sınırlamalar ve Riskler

    **Transfer Şartının Katılığı:** Beyanname tarihine kadar transfer gerçekleşmemişse o yıl için
    istisna tamamen kaybedilir; ertesi yıla sarkamaz. Nakit yönetimi ve hazine planlaması bu
    şartı dikkate alarak yapılmalıdır.

    **Vergi Yükü Hesaplama Güçlüğü:** Yurt dışı vergilerin hesaplanmasında kur farkları, vergi
    iadesi, peşin vergi, stopaj gibi unsurların dahil edilip edilmeyeceği ülke mevzuatına göre
    değişir. Yanlış hesaplama, eşiğin altında kalan ülkelerde istisna uygulanmasına yol açabilir.

    **5/1-h ile Sınır Belirsizliği:** Yurt dışında hem sürekli işyeri hem de inşaat faaliyeti
    olan Türk şirketlerinde, hangi kazancın 5/1-g, hangisinin 5/1-h kapsamına girdiği özellikle
    ayırt edilmelidir. Karıştırılması transfer şartı açısından kritik hata yaratır.

    **KVK 33 Mahsup İmkanı:** KVK 5/1-g istisnasından yararlanılırken yurt dışında ödenen
    verginin mahsup mekanizması (KVK Madde 33) genellikle kullanılmaz; ancak istisnadan
    vazgeçilip mahsup tercih edilmesi seçeneği analiz edilmelidir.

    ## YİAKV İlişkisi

    KVK 5/1-g istisnasının **YİAKV (KVK Madde 32/C) matrahına etkisi tartışmalıdır.** 322. satırda
    gösterilen yurt dışı şube/daimi temsilci kazancı istisnasının YİAKV matrahından indirilip
    indirilemeyeceği GİB tarafından net biçimde açıklanmamıştır.

    Uygulamada bazı vergi danışmanları bu istisnayı "zarar olsa dahi" bölümünde yer alması
    nedeniyle YİAKV matrahıyla ilişkilendirmemekte; diğerleri KVK 32/C'nin genel indirim
    listesinden hareketle düşülebilir saymaktadır. Yüksek tutarlı işlemlerde GİB özelgesi
    alınması ve YİAKV etkisinin finansal modele dahil edilmesi önerilir.

    ## Pratik Notlar

    - İşyerinin yurt dışında tescilini gösteren belge (ticaret sicili kaydı, vergi numarası vb.)
      dosyaya eklenmelidir.
    - Beyanname tarihi itibarıyla gerçekleşen transferi kanıtlayan banka belgesi zorunludur.
    - Yurt dışı vergi yükü hesabını destekleyen vergi ödeme makbuzu ve mahalli vergi beyannamesi
      kopyası saklanmalıdır.
    - Vergi yükü hesabı için yurt dışındaki muhasebe kayıtlarının (yerel GAAP) dökümü alınmalıdır.
    - 49 No.lu KV GT kapsamında YMM tasdik raporu eşiği kontrol edilmelidir.
  kapi_sorulari:
    - id: isyeri_daimi_temsilci_mi
      soru: "Kazanç yurt dışında işyeri (şube) veya daimi temsilci aracılığıyla mı elde edildi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Yurt dışı iştirak (ayrı tüzel kişilik) kazançları → 5/1-b/c kapsamındadır. Yurt dışı inşaat/montaj → 5/1-h kapsamındadır."
    - id: genel_sonuc_hesaplari
      soru: "Kazanç Türkiye'de genel sonuç hesaplarına intikal ettirildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Yurt dışında bırakılan kazanç istisna kapsamına GİREMEZ. Türkiye gelir tablosuna yansıtılması zorunludur."
    - id: kv_beyan_tarihine_kadar_transfer
      soru: "Kazanç KV beyanname tarihine kadar (normal dönem: 30 Nisan) Türkiye'ye TRANSFER EDİLDİ mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "KRİTİK — 5/1-h'dan AYRILAN ŞART: Transfer gerçekleşmemişse istisna UYGULANAMAZ. Banka transfer dekontu zorunludur."
    - id: vergi_yuku_yuzde15
      soru: "Yurt dışında en az %15 vergi yükü şartı sağlandı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Vergi Yükü = Ödenen Yurt Dışı Vergi / Vergiden Önceki Şube Kazancı. Yüksek vergili ülkelerde: (KV + En Yüksek GV) / 2 × %75 eşiği esas alınır (2025: %24,375)."

parametreler:
  oran: 1.0
  min_vergi_yuku_standart: 0.15
  yuksek_ulke_esigi_2025: 0.24375

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: sube_brut_gelirleri_tl
      etiket: "Yurt dışı şube brüt gelirleri (TL — TCMB alış kuru ile)"
      tip: para
      zorunlu: true
      yardim: "Şube gelir tablosundan TCMB alış kuru ile TL'ye çevrilmiş brüt gelir."
    - id: sube_dogrudan_giderleri_tl
      etiket: "Yurt dışı şube doğrudan giderleri (TL)"
      tip: para
      zorunlu: true
      yardim: "Şubede fiilen oluşan tüm giderler (personel, kira, vergi vb.)."
    - id: merkez_gider_payi_tl
      etiket: "Türkiye merkezinden dağıtılan genel gider payı (TL)"
      tip: para
      zorunlu: false
      yardim: "Dağıtım anahtarı (ciro/personel/gider oranı) ile belirlenen merkez gider payı. Dağıtım yöntemi belgelenmeli."
    - id: yurtdisi_odenen_vergi_tl
      etiket: "Yurt dışında ödenen gelir/KV benzeri vergi (TL)"
      tip: para
      zorunlu: true
      yardim: "TCMB alış kuru ile TL'ye çevrilmiş. Vergi iadesi varsa net ödenen vergi esas alınır."
  formuller:
    net_sube_kazanci: "sube_brut_gelirleri_tl - sube_dogrudan_giderleri_tl - merkez_gider_payi_tl"
    fiili_vergi_yuku_oran: "yurtdisi_odenen_vergi_tl / sube_brut_gelirleri_tl"
    istisna_tutari: "max(net_sube_kazanci, 0) * oran"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "net_sube_kazanci > 0"
      hata: "Şube kazancı negatif (zarar) — istisna tutarı sıfır olur."
    - kural: "fiili_vergi_yuku_oran >= 0.15"
      hata: "Yurt dışı vergi yükü %15 eşiğinin altında — istisna uygulanamaz. KVK Madde 33 mahsubunu değerlendirin."

denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-g kapsamında yurt dışında işyeri (şube) veya daimi temsilci aracılığıyla elde
  edilen kazançlar 3 şartın birlikte sağlanması halinde %100 tam istisna.
  Beyanname 322. satırı — "Zarar Olsa Dahi İndirilecek" bölümü.

  ## 3 Temel Şart (Kümülatif)
  ① Kazancın Türkiye'de genel sonuç hesaplarına intikal ettirilmesi
  ② Kazancın yıllık KV beyannamesinin verilmesi gereken tarihe kadar Türkiye'ye transfer edilmesi
     (2025 için genellikle 30 Nisan 2026)
  ③ Şube kazancının faaliyet ülkesinde en az %15 vergi yüküne tabi tutulmuş olması

  ## 5/1-g ve 5/1-h Karşılaştırması
  5/1-g (322): Yurt dışı şube/daimi temsilci genel faaliyet — Transfer ZORUNLU — Vergi yükü %15 ZORUNLU
  5/1-h: Yurt dışı inşaat/montaj/teknik hizmet — Transfer zorunlu DEĞİL — Vergi yükü şartı YOK
  Aynı şubenin karma faaliyeti varsa faaliyet bazında ayrım zorunludur.

  ## %15 Vergi Yükü Eşiği ve İki Formül
  Standart ülkeler: Vergi Yükü = Ödenen Vergi / Brüt Kazanç ≥ %15
  Yüksek vergili ülkeler: (KV Oranı + En Yüksek GV Oranı) / 2 × %75
  2025 için yüksek ülke eşiği: (25 + 40) / 2 × 0,75 = %24,375

  ## Transfer Şartı — Kritik
  Kazancın TAMAMININ KV beyanname tarihine kadar Türkiye'ye fiilen transfer edilmesi zorunludur.
  Kısmi transfer durumunda yalnızca transfer edilen tutara isabet eden kazanç istisnaya girer
  (ihtiyatlı yaklaşım — tartışmalı alan, özelge alınması tavsiye edilir).

  ## Zarar Durumu
  322 "Zarar Olsa Dahi İndirilecek" bölümündedir: Türkiye ana şirketinin zarar etmesi istisnayı engellemez.
  Şube kazancı negatif (zarar) ise istisna = 0.

  ## YİAKV Etkisi
  KVK 5/1-g istisnasının YİAKV (KVK 32/C) matrahına etkisi tartışmalıdır.
  Güncel GİB açıklamaları ve dönem mevzuatı esas alınarak ayrıca analiz edilmelidir.

  ## 5/1-g ile KVK Madde 33 Mahsup
  İki alternatif birlikte kullanılamaz — tercih yapılmalıdır.
  Yüksek yurt dışı vergi oranında mahsup daha avantajlı olabilir.

  ## Gider Dağıtımı
  Her şube için ayrı gelir-gider takibi veya tutarlı dağıtım anahtarı zorunludur.
  Merkez gider payı dağıtım yöntemi yazılı belgelenmelidir.

  ## ÇVÖA Etkisi
  İşyeri oluşumu ÇVÖA'ya göre teyit edilmelidir.
  İşyeri oluşmuyorsa kazanç Türkiye'de vergilenir → KVK Md.33 mahsup değerlendirin.

muhasebe_kayitlari: |
  ## Kayıt 1 — Şube Gelirlerinin Türkiye Gelir Tablosuna İntikali
  Borç: 131 Ortaklardan Alacaklar / 241 Bağlı Ortaklıklar (Şube)
  Alacak: 600/640/649 Gelir Hesapları — Şube gelirleri (TCMB alış kuru ile TL)
  NOT: "Genel sonuç hesaplarına intikal" şartının yerine getirilmesi için zorunludur.

  ## Kayıt 2 — Türkiye'ye Transfer Tahsilatı
  Borç: 102 Bankalar — Transfer tutarı (transfer günü TCMB alış kuru ile TL)
  Alacak: 131 Ortaklardan Alacaklar / 241 (Şube) — Alacak kapatma
  Kur farkı varsa: 646 Kambiyo Kârları / 656 Kambiyo Zararları
  NOT: Transfer dekontu (EFT/havale tarih ve tutarı) zorunlu belgedir.

  ## Kayıt 3 — Yurt Dışında Ödenen Vergi
  Borç: 193 Peşin Ödenen Vergiler — Yurt dışı vergi
  Alacak: 131 / 241 (Şube)
  NOT: 5/1-g ile istisna seçilmişse KVK Md.33 mahsup YAPILAMAZ.

  ## Beyanname Akışı
  1. Şube gelirleri Türkiye gelir tablosuna yansır → Ticari kâra dahil.
  2. KV Beyannamesi 322. Satır: "Zarar Olsa Dahi İndirilecek" bölümünde net şube kazancı.
  3. Vergi yükü şartı sağlanmıyorsa 322 kullanılamaz.

belge_listesi:
  - kategori: zorunlu
    "no": 1
    baslik: "★ Türkiye'ye Transfer Belgesi — Banka EFT/Havale Dekontu"
    detay: "Gönderici (yurt dışı şube hesabı), alıcı (Türkiye ana şirket hesabı), transfer tarihi (KV beyan tarihinden önce olmalı), tutar ve döviz türü. Bu belge olmadan transfer şartı kanıtlanamaz."
    temin_yeri: Banka EFT/Havale dekontu (tarih + tutar + hesap bilgisi)
  - kategori: zorunlu
    "no": 2
    baslik: "★ Yurt Dışı Vergi Makbuzu / Vergi Beyannamesi Kopyası (%15 Şartı İçin)"
    detay: "Şube kazancı üzerinden faaliyet ülkesinde ödenen gelir/KV benzeri vergiyi gösteren makbuz. Türkçe tercümesi ile birlikte dosyaya eklenmelidir. Vergi yükü hesabının dayanağıdır."
    temin_yeri: Yurt dışı vergi makbuzu / Ülke vergi beyannamesi (onaylı kopya + tercüme)
  - kategori: zorunlu
    "no": 3
    baslik: Türkiye Gelir Tablosu — Şube Gelirlerinin İntikal Teyidi
    detay: "Şube gelirlerinin Türkiye'deki 600/640/649 hesaplarına yansıdığını gösteren ekstreler. Beyanname başlangıç ticari kârı ile uyumlu olmalıdır."
    temin_yeri: Muhasebe programı — Gelir hesabı ekstresi
  - kategori: zorunlu
    "no": 4
    baslik: Vergi Yükü Hesap Tablosu (%15 Eşik Kontrolü)
    detay: "Fiili vergi yükü (%) hesabını gösteren tablo. Standart eşik ≥%15 veya yüksek ülke eşiği ≥%24,375 (2025). Şart sağlanmıyorsa istisna uygulanamaz."
    temin_yeri: Hesaplama tablosu + Vergi makbuzu çapraz teyidi
  - kategori: zorunlu
    "no": 5
    baslik: Yurt Dışı Şube Tescil / Faaliyet Belgesi
    detay: "Şubenin yurt dışında tescilini gösteren ticaret sicil belgesi. Şube adresi, faaliyet konusu ve kuruluş tarihi görünmeli. Daimi temsilcide: Temsilcilik yetki belgesi (sözleşme veya vekaletname)."
    temin_yeri: Yurt dışı ticaret sicil belgesi (onaylı kopya + Türkçe tercüme)
  - kategori: zorunlu
    "no": 6
    baslik: KV Beyannamesi Taslağı — 322. Satır
    detay: "322. satırındaki tutarın hesaplama sonucu ile birebir uyumlu olduğu kontrol edilmeli. 'Zarar Olsa Dahi İndirilecek' bölümünde doğru konumlandırıldığı teyit edilmeli ('Kazancın Bulunması Halinde' bölümünde DEĞİL)."
    temin_yeri: GİB e-Beyanname sistemi
  - kategori: destekleyici
    "no": 7
    baslik: Şube Gelir-Gider Tablosu / Muhasebe Ekstreleri (Yerel Muhasebe)
    detay: "Yurt dışı şubenin yerel muhasebe sistemindeki dönem gelir-gider tablosu. TCMB alış kuru ile TL'ye çevrim tablosu da eklenmelidir."
    temin_yeri: Şube yerel muhasebe raporu (onaylı + tercüme)
  - kategori: destekleyici
    "no": 8
    baslik: Türkiye Merkezi Gider Dağıtım Anahtarı Belgesi
    detay: "Türkiye merkez genel giderlerinden şubeye düşen payın nasıl hesaplandığını gösteren belge. Dağıtım yöntemi (ciro/personel/gider oranı) yazılı ve tutarlı uygulanmalıdır."
    temin_yeri: Dağıtım anahtarı tablosu + Dönem muhasebe ekstresi
  - kategori: destekleyici
    "no": 9
    baslik: ÇVÖA Analiz Notu — İşyeri Maddesine Göre Değerlendirme
    detay: "Faaliyet ülkesiyle Türkiye arasındaki ÇVÖA'nın işyeri maddesine göre analiz. İşyeri oluşup oluşmadığı, vergilendirme yetkisi ve yürürlükteki ÇVÖA hükümleri."
    temin_yeri: ÇVÖA metni (ilgili maddeler) + YMM analiz notu
  - kategori: destekleyici
    "no": 10
    baslik: Birden Fazla Şube Varsa Her Şube İçin Ayrı Vergi Yükü Hesabı
    detay: "Her şube farklı ülkede farklı vergi yüküne tabi olabilir. Bazı şubelerin %15 şartını karşılamayabileceği unutulmamalıdır."
    temin_yeri: Her şube için ayrı vergi yükü hesap tablosu
  - kategori: destekleyici
    "no": 11
    baslik: YİAKV Matrah Hesaplama Tablosu (322 Etkisi)
    detay: "KVK 5/1-g istisnasının YİAKV (KVK 32/C) matrahına etkisi tartışmalıdır. Güncel GİB açıklamaları ve dönem mevzuatı esas alınarak analiz edilmelidir."
    temin_yeri: YİAKV çalışma kâğıdı / KVK 32/C

