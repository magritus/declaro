wizard_agaci:
  tetikleyici_soru: "Bir taşınmazı (arsa, bina, fabrika) münhasıran kira sertifikası ihracını mümkün kılmak amacıyla SPK lisanslı Varlık Kiralama Şirketine (VKŞ) tapu devrediyle sattınız mı?"
  info_modal: |
    ## Genel Çerçeve

    **KVK Madde 5/1-k** kapsamında, kurumların **taşınmazlarını** (arsa, arazi, bina, fabrika,
    depo) kira sertifikası ihracını mümkün kılmak amacıyla **SPK lisanslı Varlık Kiralama
    Şirketine (VKŞ) tapu devriyle** satmalarından doğan kazançlar **%100 istisnadır.** 358,
    setimizin en çok karışıklığa yol açan dosyasıdır; 355 (5/1-j — BDDK FK/banka — geri devir
    ZORUNLU) ile 358 (5/1-k — SPK VKŞ — geri devir OPSİYONEL) arasındaki ayrım kritiktir;
    **her iki bent için de tapu devri zorunludur** ancak alıcı kurum türü ve geri devir şartı
    farklılaşmaktadır.

    ## Temel Koşullar

    - Devredilen varlık **taşınmaz** (arsa, arazi, bina, fabrika, depo) olmalıdır; taşınır/hak
      devirleri için 357 kodu kullanılmalıdır.
    - Alıcı kurum **6362 s.K. kapsamında SPK lisanslı VKŞ** olmalıdır; BDDK lisanslı FK/banka
      ise 355 veya 356 kodu kullanılmalıdır.
    - Devrin amacı **münhasıran kira sertifikası ihracını mümkün kılmak** olmalıdır; bu amaç
      SPK onaylı izahname/ihraç belgesiyle belgelenmelidir.
    - **Tapunun VKŞ adına tescil edilmesi** zorunludur; taşınmaz satışı tapuya tescil olmaksızın
      hukuken tamamlanmış sayılmaz ve tapu senedi zorunlu belgedir.
    - Devir kazancının tamamı **tapu devir yılında 549 Özel Fonlar hesabına** alınmalıdır; sukuk
      vadesine paralel kira/getiri payına orantılı amortizasyon yapılır.

    ## Önemli Sınırlamalar ve Riskler

    - **355 ile sıkça karıştırılır — 4'lü karşılaştırma:** 355 (5/1-j): BDDK FK/Banka alıcı,
      geri devir ZORUNLU; 356 (5/1-j VKŞ): SPK VKŞ alıcı, geri devir ZORUNLU; 358 (5/1-k):
      SPK VKŞ alıcı, geri devir OPSİYONEL; 357 (5/1-k taşınır/hak): tapu yok. Yanlış satır
      seçimi tarhiyat riskine yol açar.
    - **Geri devir taahhütlüyse bent değişimi riski:** Sözleşmede tapu geri devri taahhüdü varsa
      işlem 5/1-j (355/356) kapsamına girebilir; bent seçimi gerekçesi belgelenmeli, şüpheli
      durumlarda GİB özelgesi alınmalıdır.
    - **Tapu harcı:** Devir aşamasında VKŞ adına tescilden ve opsiyonel geri devirde kurum
      adına tescilden olmak üzere tapu harcı iki kez doğabilir; önceden maliyet analizi yapılmalıdır.
    - **KDV Md.17/4-r muafiyeti:** Taşınmaz devri ile ilgili KDV muafiyetinin 5/1-k işlemine
      uygulanabilirliği ayrıca incelenmelidir.
    - **Değerleme zorunluluğu:** SPK ihraç bağlamında SPK lisanslı gayrimenkul değerleme raporu
      kritiktir; emsal değerden uzak satış KVK Md.13 ve SPK riskini beraberinde getirir.

    ## YİAKV İlişkisi

    **KVK 5/1-k (358) istisnasının YİAKV (KVK 32/C) matrahına etkisi tartışmalıdır.** Dönem
    mevzuatı ve GİB açıklamaları takip edilerek her dönem ayrıca değerlendirilmelidir; özellikle
    geri devir opsiyonelliği konusunda GİB özelgesi alınması hem YİAKV hem de bent seçimi
    açısından koruyucu bir adımdır.

    ## Pratik Notlar

    - **Bent seçim kararı yazılı belgelenmelidir:** 5/1-j (355/356) mi 5/1-k (358) mi
      sorusunun yanıtı; alıcı kurumun lisans türü (BDDK/SPK) ve geri devir şartının varlığına
      göre belirlenmeli; bu gerekçe YMM çalışma kağıdında yer almalıdır.
    - **GİB özelgesi şiddetle tavsiye edilir:** 5/1-k uygulamaları 5/1-j'ye kıyasla daha az
      GİB emsaline sahiptir; özellikle geri devir opsiyonelliği ve KDV/tapu harcı konularında
      özelge alınması kritiktir.
    - **SPK lisanslı gayrimenkul değerleme:** Değerleme raporu olmadan gerçekleştirilen tapu
      devirlerinde değer farkı KVK Md.13 ve SPK mevzuatı açısından risk oluşturur.
    - **549 fon amortizasyonu:** Devir yılında 549'a alınan tutarın sukuk vadesine paralel
      kira/getiri payına orantılı azaltılması ve vade sonunda sıfırlanması takip edilmelidir.
    - **YMM tasdik raporu:** 49 No.lu Tebliğ kapsamında tek satırda ≥500.000 TL veya toplamda
      ≥1.000.000 TL olması halinde YMM tasdik raporu zorunludur.
  kapi_sorulari:
    - id: varlik_tasinmaz_mi
      soru: "Devredilen varlık taşınmaz mı? (Arsa, arazi, bina, fabrika, depo — taşınır/hak değil)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Taşınır (makine/araç) veya hak (patent/marka) için 357 kodu kullanılmalıdır. Bu istisna yalnızca taşınmazlar içindir."
    - id: alici_vks_mi
      soru: "Alıcı kurum, 6362 sayılı SPK Kanunu kapsamında SPK lisanslı Varlık Kiralama Şirketi (VKŞ) mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "BDDK lisanslı FK şirketi/banka ise → 355 (geri devir zorunluysa) veya 356 (5/1-j VKŞ kanalı) kullanılmalıdır."
    - id: ihrac_amaci_var_mi
      soru: "Devrin amacı münhasıran kira sertifikası ihracını mümkün kılmak mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Bu 5/1-k'nın özgün koşuludur. İhraç amacı SPK onaylı izahname/ihraç belgesiyle belgelenmelidir."
    - id: tapu_devri_gerceklesti_mi
      soru: "Taşınmazın tapusu VKŞ adına tapuya tescil edildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Taşınmaz satışı tapuya tescil olmadan hukuken tamamlanmış sayılmaz. Tapu senedi zorunlu belgedir."

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: tapu_devir_bedeli
      etiket: "VKŞ'ye Tapu Devir Bedeli (TL)"
      tip: para
      zorunlu: true
      yardim: "Tapudaki satış bedeli. Gerçek satış bedeli ile uyumlu olmalıdır. SPK bağlamında değerleme raporu önerilir."
    - id: net_defter_degeri
      etiket: "Taşınmazın Net Defter Değeri (TL)"
      tip: para
      zorunlu: true
      yardim: "Birikmiş amortisman düşüldükten sonraki net aktif değeri (250/252/258 hesap kartı ile uyumlu)."
    - id: satis_giderleri
      etiket: "Satış Giderleri (Tapu harcı, komisyon, SPK harçları, ihraç giderleri vb.) (TL)"
      tip: para
      zorunlu: false
      yardim: "Tapu harcı satıcı payı, SPK harçları, hukuki danışmanlık ve değerleme giderleri."
  formuller:
    satis_kazanci: "tapu_devir_bedeli - net_defter_degeri - satis_giderleri"
    istisna_tutari: "max(satis_kazanci * oran, 0)"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "satis_kazanci > 0"
      hata: "Satış kazancı pozitif olmalıdır. Zarar durumunda bu istisna uygulanamaz (Kazancın Bulunması Halinde bölümü)."

denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-k: Her türlü varlık ve hakların, kira sertifikası ihraç etmek amacıyla
  kurulan varlık kiralama şirketlerine satışından doğan kazançlar %100 istisnadır.
  358 kodu: Taşınmaz varlıklar (arsa/arazi/bina/fabrika/depo).

  ## 358'in 4'lü Karşılaştırması — En Çok Karıştırılan Dosya
  355 (5/1-j): Alıcı BDDK FK/Banka | Geri devir ZORUNLU | Leaseback ZORUNLU
  356 (5/1-j VKŞ): Alıcı SPK VKŞ | Geri devir ZORUNLU (5/1-j) | Leaseback ZORUNLU
  358 (5/1-k): Alıcı SPK VKŞ | Geri devir OPSİYONEL | Leaseback ZORUNLU DEĞİL
  357 (5/1-k): Alıcı SPK VKŞ | Taşınır/Hak | Tapu yok

  ## 358'e Özgün Tapu Boyutu
  - TAPU DEVRİ zorunlu (355 ile aynı) — VKŞ adına tapuya tescil
  - Geri devir OPSİYONEL (355'ten fark) — istisna geri devir olmadan da korunur
  - KDV Md.17/4-r muafiyeti değerlendirilmeli
  - Tapu harcı: Devir aşamasında kesin, geri devir opsiyonel ise belirsiz
  - Geri devir taahhütlü ise dikkat: 5/1-j (355/356) kapsamına dönebilir — bent seçimine dikkat

  ## 549 Fon Mekanizması
  Tapu devir yılında F.6 tutarı 549'a alınır. Her dönem sukuk vadesine paralel
  kira/getiri ödemelerine orantılı fon azalır. Sukuk vadesi sonunda 549 sıfır.

  ## GİB Özelgesi
  5/1-k (358) uygulaması için özelge alınması şiddetle tavsiye edilir. Özellikle geri
  devir opsiyonelliği ve KDV/tapu harcı konularında özelge kritiktir.

  ## YMM Tasdik Raporu
  49 No.lu Tebliğ (30.12.2025): Tek satır ≥500.000 TL veya toplam ≥1.000.000 TL → YMM raporu.

muhasebe_kayitlari: |
  ## Kayıt 1 — Tapu Devir Kaydı (VKŞ'ye Tapu Tesciliyle Satış — Sukuk İhracı Amacıyla)
  Borç: 102 Bankalar / 120 Alacaklar              [Tapu Devir Bedeli]
  Alacak: 250/252 İlgili Taşınmaz Aktif Hesabı    [Brüt Defter Değeri]
  Alacak: 258 Birikmiş Amortismanlar              [Birikim]
  Alacak: 679 Diğer Olağandışı Kâr                [Satış Kazancı]
  Açıklama: KVK 5/1-k 358 — Kira sertifikası ihraç amacıyla taşınmaz tapu devri

  ## Kayıt 2 — 549 Özel Fon Hesabına Alma (Tapu Devir Yılında)
  Borç: 679 Diğer Olağandışı Kâr / 645 Satış Kârı   [İstisna Tutarı]
  Alacak: 549 Özel Fonlar — KVK 5/1-k 358 İstisnası  [İstisna Tutarı]
  Açıklama: Satış kazancının tamamının 549 hesabına alınması (tapu devir yılı)

  ## Kayıt 3 — Fon Amortizasyonu (Her Dönem — Sukuk Vadesine Orantılı)
  Borç: 549 Özel Fonlar                   [Dönem Fon Azalışı]
  Alacak: 549 Özel Fonlar (alt hesap)     [Dönem Fon Azalışı]
  Açıklama: Fon = Başlangıç Fon × (Dönem Kira/Getiri / Toplam Kira/Getiri). Sukuk vadesi sonunda 549 sıfır.

