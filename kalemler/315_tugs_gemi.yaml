wizard_agaci:
  tetikleyici_soru: "Türk Uluslararası Gemi Siciline (TUGS) kayıtlı gemi işletiyor veya devrediyor musunuz?"
  info_modal: |
    ## Genel Çerçeve

    4490 Sayılı Türk Uluslararası Gemi Sicili Kanunu kapsamında TUGS'a kayıtlı gemilerin **(1) işletilmesinden** ve **(2) devrinden** elde edilen kazançlar **süresiz olarak** kurumlar vergisinden istisnadır. İstisna beyannamede **"Kazancın Bulunması Halinde İndirilecek"** bölümünde 315 numaralı satırda gösterilir; gemi işletme veya devir faaliyetinin zararda olması halinde istisna uygulanamaz. İstisna oranı %100'dür ve herhangi bir tarih sınırı bulunmamaktadır.

    ## Temel Koşullar

    - **TUGS'a kayıt zorunluluğu:** Gemi Türk Uluslararası Gemi Sicili'ne tescil edilmiş olmalıdır; Ulusal Gemi Sicili veya başka bir sicile kayıtlı gemi kapsam dışıdır. TUGS tescil şahadetnamesi tasdik dosyasının birincil belgesidir.
    - **Hesap dönemi boyunca sicil aktifliği:** Kazancın elde edildiği tarihte TUGS kaydının aktif olması şarttır; askıya alınmış veya terkin edilmiş dönem kazancı kapsam dışıdır. Kısmen askıya alınan dönemler için orantılı ayrıştırma yapılmalıdır.
    - **İki kazanç türü kapsamı:** Gemi işletme kazancı (navlun, zaman kiralama, çıplak tekne kiralama, yolcu taşıma, kurtarma, sürastarya) ve gemi devir kazancı (satış bedeli − net defter değeri − satış giderleri) ayrı hesaplanarak 315 satırında toplanır.
    - **Kapsam dışı gelirlerin ayrıştırılması:** Mevduat faizi ve finansal gelirler kesin biçimde kapsam dışıdır; TUGS dışı gemi/araç gelirleri de kapsama girmez.
    - **"Kazancın Bulunması Halinde" bölümü:** Gemi işletme ve devir kazancı toplamı sıfır veya negatif ise istisna uygulanamaz; bu durum "Zarar Olsa Dahi İndirilecek" (310, 322 gibi) bölümlerinden temel farkı oluşturur.

    ## Önemli Sınırlamalar ve Riskler

    - **Mevduat faizinin 315 kapsamında beyan edilmesi** en sık yapılan ve cezalı tarhiyata yol açan hatadır.
    - **Sicil askıya alınmış dönem kazancına istisna uygulamak** ciddi risk taşır; her dönem için sicil aktifliği teyit belgesi alınmalıdır.
    - **Gemi işletme zararını "Zarar Olsa Dahi" bölümüne yazmak** hatalıdır; 315 "Kazancın Bulunması Halinde" bölümündedir.
    - **Devir kazancında TUGS kaydının devir tarihinde aktif olması** zorunludur; sicil transferinden önce gerçekleşen kazanç kapsam dışında kalabilir.
    - **Çoklu gemi durumunda** her gemi için ayrı gelir-gider analizi yapılmalıdır; toplu hesap yanıltıcı sonuç verebilir.

    ## YİAKV İlişkisi

    4490 sayılı Kanun TUGS gemi istisnası (315) YİAKV (KVK Madde 32/C) matrahından **indirilemeyen** istisnalar kapsamında değerlendirilmelidir; bu nedenle YİAKV çalışma kâğıdında 315 tutarının durumu güncel mevzuat çerçevesinde ayrıca analiz edilmelidir.

    ## Pratik Notlar

    - 3 kademe uyum: Muhasebe alt hesabı (600.01 TUGS Gemi İşletme) = çalışma kâğıdı C bölümü = KV beyannamesi 315 satırı. Muhasebede alt hesap ayrımı yapılmadan bu uyum sağlanamaz.
    - Navlun/charter sözleşmeleri kapsam içi işletme gelirinin birincil dayanağıdır; her sözleşme dosyada bulunmalıdır.
    - Gemi devri için TUGS Sicil Müdürlüğü devir tescil belgesi ve 253 hesap kartı (net defter değeri) zorunludur.
    - TUGS çalışanlarının GV ücret istisnası KV tasdikinin dışında ayrıca analiz edilmelidir.
    - 49 No.lu KV Genel Tebliği kapsamında tek satır ≥500.000 TL ise YMM tasdik raporu eşiği kontrol edilmelidir.
  kapi_sorulari:
    - id: tugs_kayitli
      soru: "Gemi Türk Uluslararası Gemi Sicili'ne (TUGS) kayıtlı mı? Tescil şahadetnamesi var mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Ulusal Gemi Sicili veya başka bir sicile kayıtlı gemi kapsam dışıdır.
        TUGS tescil şahadetnamesi tasdik dosyasının birincil belgesidir."
    - id: sicil_aktif
      soru: "Hesap dönemi boyunca TUGS sicil kaydı aktif mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Sicili kısmen askıya alınmış dönemler için orantılı ayrıştırma yapılmalıdır."
    - id: kapsam_kazanc
      soru: "Kazanç türü nedir? (Gemi işletme, gemi devir veya her ikisi)"
      tip: secenek_coklu
      aciklama: "Her iki kazanç türü de 315 kapsamındadır. İşletme (D bölümü) ve devir (E bölümü)
        ayrı hesaplanır, 315 beyanname satırında toplanır."
    - id: kapsam_disi_ayristirma
      soru: "Kapsam dışı gelirler (mevduat faizi, TUGS dışı gemi gelirleri) ayrıştırıldı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
    - id: kazanc_var_mi
      soru: "Bu dönem gemi işletme/devir faaliyetinden kârda mısınız? (Bu istisna zararda
        kullanılamaz)"
      tip: evet_hayir
      zorunlu_cevap: evet

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: gemi_isletme_kazanci
      etiket: "Gemi işletme kazancı (kapsam içi gelir − doğrudan gider − GYG payı)"
      tip: para
      zorunlu: false
      yardim: |
        Kapsam içi gemi işletme gelirleri: Navlun gelirleri, zaman kiralama (time charter),
        çıplak tekne kiralama (bare boat), yolcu taşıma, kurtarma/yardım (salvage),
        sürastarya (demurrage) gelirleri.
        Kapsam dışı (istisna uygulanmaz): Mevduat faizi, TUGS dışı gemi/araç gelirleri.
        D.4 = Kapsam İçi Toplam İşletme Geliri − Doğrudan Gemi Giderleri − GYG Payı.
    - id: gemi_devir_kazanci
      etiket: "Gemi devir kazancı (satış bedeli − net defter değeri − satış giderleri)"
      tip: para
      zorunlu: false
      yardim: |
        TUGS'a kayıtlı geminin satışından doğan kazanç. Devir tarihinde TUGS kaydı aktif
        olmalıdır. E.4 = Satış Bedeli − Net Defter Değeri (253 hesap) − Satış Giderleri.
        Devir yoksa bu alan boş bırakılır.
  formuller:
    istisna_tutari: "(gemi_isletme_kazanci + gemi_devir_kazanci) * oran"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "gemi_isletme_kazanci >= 0 or gemi_devir_kazanci >= 0"
      hata: "En az bir kazanç türü (işletme veya devir) girilmelidir."
    - kural: "(gemi_isletme_kazanci + gemi_devir_kazanci) > 0"
      hata: "Toplam gemi kazancı sıfır veya negatif ise istisna uygulanamaz (Kazancın
        Bulunması Halinde). Gemi işletme zararında istisna uygulanmaz."

denetci_notlari: |
  ## N1. 4490 s.K. TUGS İstisnası — Yasal Çerçeve

  4490 SAYILI TÜRK ULUSLARARASI GEMİ SİCİLİ KANUNU (1999):

  İSTİSNA KAPSAMI — İKİ AYAK:
  ① GEMİ İŞLETME: TUGS kayıtlı geminin işletilmesinden elde edilen kazançlar KV'den müstesna.
  ② GEMİ DEVİR: TUGS kayıtlı geminin devrinden sağlanan kazançlar da istisna kapsamında.
  (311 TGB Yönetici Şirket'ten farkı: 311'de devir kazancı istisnası yoktur.)

  SÜRESİZLİK: 4490 s.K. istisnası için tarih sınırı yoktur — süresizdir.

  SİCİL AKTİFLİĞİ: Kazancın elde edildiği tarihte TUGS kaydı aktif olmalıdır.
  Askıya alınmış veya terkin edilmiş gemi → Kapsam dışı.

  BEYANNAME: 315. Satır | 'Kazancın Bulunması Halinde' | %100

  ## N2. Kapsam İçi/Dışı ve YMM Tasdik Standardı

  KAPSAM İÇİ:
  - Navlun gelirleri (yük/kargo taşıma)
  - Zaman kiralama (time charter) gelirleri
  - Çıplak tekne kiralama (bare boat) gelirleri
  - Yolcu taşıma gelirleri
  - Kurtarma/yardım (salvage) gelirleri
  - Sürastarya (demurrage) gelirleri

  KAPSAM DIŞI:
  - Mevduat faizi ve finansal gelirler (KESİN KAPSAM DIŞI)
  - TUGS dışı gemi/araç gelirleri

  YMM KULLANISIN:
  "...TUGS Tescil Şahadetnamesi No:[...] ile kayıtlı [gemi adı/IMO] işletmesinden elde
  edilen kazanç 4490 s.K. kapsamında kurumlar vergisinden müstesnadır."
  "...sicil kaydı tüm hesap dönemi boyunca aktif olduğu teyit edilmiştir."

  KRİTİK HATALAR:
  (1) Mevduat faizini 315 kapsamında beyan etmek.
  (2) Sicil askıya alınmış dönem kazancına istisna uygulamak.
  (3) Gemi işletme zararını "Zarar Olsa Dahi" bölümüne yazmak.
  (4) İstisna için tarih sınırı uygulamak (315 süresizdir).

  KDV NOTU: 315 KV istisnası KDV muafiyeti sağlamaz — uluslararası deniz taşımacılığı
  KDV'si KDVK kapsamında ayrıca incelenmelidir.

  ## 315 vs 311 Özet Karşılaştırma

  | Kriter             | 315 — TUGS Gemi              | 311 — TGB Yönetici Şirket      |
  |--------------------|------------------------------|--------------------------------|
  | Yasal Dayanak      | 4490 s.K. TUGS Kanunu        | 4691 s.K. TGB Kanunu           |
  | Statü Şartı        | TUGS'a kayıtlı gemi          | Bakanlık onaylı yönetici şirket|
  | İstisna Konusu     | Gemi işletme + devir kazancı | TGB yönetim faaliyeti kazancı  |
  | Devir Kazancı      | EVET — TUGS gemisinin satışı | HAYIR                          |
  | Kapsam İçi Gelir   | Navlun/kira/kurtarma/taşıma  | Kira/yönetim ücreti/altyapı    |
  | Kapsam Dışı        | Mevduat faizi, gemi dışı     | Mevduat faizi, TGB dışı        |
  | İstisna Oranı      | %100                         | %100                           |
  | Süre               | SÜRESİZ                      | SÜRESİZ                        |
  | Beyanname          | 315 (Kazancın Bulunması)     | 311 (Kazancın Bulunması)       |

muhasebe_kayitlari: |
  ## Kayıt 1 — Gemi İşletme Geliri (Navlun/Charter — Kapsam İçi)
  Borç: 120/121 Alacaklar (600.01 Kapsam İçi) — Navlun/charter alacağı [Tutar]
  Alacak: 600 Hizmet Gelirleri (600.01 — GEMİ İŞL.) — 315 istisna / Beyanname 315

  ALT HESAP ZORUNLULUĞU:
  600.01 — TUGS Gemi İşletme (Kapsam İçi)
  600.02 — Kapsam Dışı (Mevduat faizi vb.)
  Muhasebe ayrımı yapılmadan C bölümü belgelenemiyor.

  ## Kayıt 2 — Gemi Devir Kazancı (TUGS Kayıtlı Geminin Satışı)
  Borç: 102 Bankalar — Satış bedeli tahsilatı [Satış Bedeli]
  Alacak: 253 Taşıtlar — Net defter değeriyle aktiften çıkış [Net Defter]
  Alacak: 257 Birikmiş Amortismanlar — Amortisman kapatma [Amortisman]
  Alacak: 679 Diğer Olağandışı Kâr — Devir kazancı (4490 s.K. 315 — TUGS aktif şart)

  Not: 315 (TUGS GEMİ) vs 311 (TGB): 311'de devir kazancı istisnası yoktur. 315'te hem
  işletme hem devir kazancı kapsam içindedir. Gemi devri Türk Gemi Sicili tesciliyle
  tamamlanır.

