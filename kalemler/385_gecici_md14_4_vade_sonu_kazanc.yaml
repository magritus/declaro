denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Madde 14/4 (Paragraf 4): Paragraf 4 kapsamındaki araçların vade sonunda
  oluşan, 383 ve 384 kapsamı dışındaki kazançlar istisnası.
  7352 Sayılı Kanun kapsamında yürürlüğe girmiştir.
  385, Paragraf 4 paketinin son kodudur (383-384-385 tamamlandı).

  ## Kapsam (385 = 383/384 Dışı)
  - Değer artışı kazancı (anaparaya ek artış, enflasyon etkisi)
  - Sermaye kazancı (kâr payı/faiz niteliği taşımayan)
  - Prim / teşvik ödemesi (384'teki kâr payı/faiz niteliği taşımayan kısım)
  - Enflasyon farkı kazancı
  - Diğer: 383/384 kapsamına girmeyen her türlü Paragraf 4 vade sonu kazancı

  ## 383/384 ile Mükerrerlik
  Net 385 = Brüt 385 − Mükerrer Tutarlar. Mükerrer olanlar (383/384'te zaten gösterilen)
  385'e yazılmaz. 374 (P1), 378 (P2), 382 (P3) ile de ayrıştırma: Paragraf 4 araçları → 385.

  ## Muhasebe
  Borç: 102 Bankalar / Çeşitli
  Alacak: 646 Kambiyo Kârları / 679 Diğer Kâr / 648 Diğer Gelirler
  (Kazanç türüne göre seçilir — 374/378/382 ile aynı muhasebe mekanizması)

  ## YİAKV Etkisi (KVK Md.32/C)
  KVK Geçici Md.14 tüm kodları YİAKV matrahından DÜŞÜLEMEZ.
  Paragraf 4 paketi (383-384-385) tamamlanmış olup YİAKV E.7'de üç satır da kontrol edilmelidir.

  ## Beyanname Bölümü
  "Kazancın Bulunması Halinde İndirilecek" — zarar döneminde uygulanamaz.

muhasebe_kayitlari: |
  ## Kayıt 1 — Vade Sonu: Paragraf 4 Kazancı (383/384 Dışında)
  Borç:    102 Bankalar / Çeşitli          [Vade sonu kazanç tutarı]
  Alacak:  646 Kambiyo Kârları / 679 Diğer Kâr [Kazanç türüne göre seçilir]
             / 648 Diğer Gelirler
  Açıklama: KVK Geçici Md.14/4 P4 vade sonu kazancı (kâr payı/faiz dışı) → Beyanname 385

  ## Paragraf 4 Tam Paket (383-384-385) Muhasebe
  383 (Dönem sonu): 31.12 / 181/642    — P4: Dönem sonu tahakkuk (accrual)
  384 (Kâr payı/faiz): Tahsilat / 102/(181+642) — P4: Kâr payı/faiz genel
  385 (Vade sonu): Vade / 646/648/679   — P4: Vade sonu kazanç-diğer (BU)

  ## 374/378/382/385 Dört Paragraf Karşılaştırması
  374 (P1): P1 AKT: TL KKM vade diğer kazançlar → 374
  378 (P2): P2 PAS: Borç dönüşümü TL araç vade diğer → 378
  382 (P3): P3 ALT: Altın dönüşümü TL araç vade diğer → 382
  385 (P4): P4 ÖZL: Paragraf 4 kapsamı vade diğer (BU) → 385

