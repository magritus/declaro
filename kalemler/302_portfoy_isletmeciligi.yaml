denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-d: Türkiye'de kurulu ve kanunların öngördüğü şekilde kurulan
  yatırım fon ve ortaklıklarının portföy işletmeciliğinden doğan kazançları
  kurumlar vergisinden istisnadır. %100 tam istisna.
  Kapsam dahili kurumlar: MKYO, GYO, GSYO, Altyapı YO, BYF, EYF, GYF, GSYF,
  Altyapı YF, Konut Finansmanı Fonu, Varlık Finansmanı Fonu, Serbest Yatırım Fonu.

  ## Kritik Noktalar — Portföy İçi / Dışı Ayrımı
  İstisna YALNIZCA portföy işletmeciliğinden doğan kazançlara uygulanır.

  PORTFÖY İÇİ (İstisna — 302):
  - Portföydeki varlıklardan elde edilen faiz, temettü, kira
  - Portföy varlıklarının satışından doğan kazanç
  - Portföy varlıklarının dönem sonu değerleme artışları

  PORTFÖY DIŞI (Vergiye Tabi):
  - Yönetim ücreti, performans/başarı primi, danışmanlık komisyonu
  - Portföyde kayıtlı olmayan varlıklardan gelir
  - Faaliyetle ilgili olmayan finansman gelirleri

  ## Kurum Türü Özel Durumları
  GYO Özel (En tartışmalı alan):
  - Portföydeki taşınmazdan kira → İstisna
  - Portföyde OLMAYAN taşınmazdan kira → Vergiye tabi
  - İnşaat/kat karşılığı projelerde geliştirme kazancı: Tartışmalı — güncel özelge zorunlu

  GSYO/GSYF Özel:
  - Portföy girişim şirketi kâr payı ve satış kazancı → İstisna (302)
  - Yönetim ücreti, danışmanlık, başarı/performans primi → Vergiye tabi (302'ye YAZILMAZ)

  EYF Özel:
  - Portföy faiz, temettü, değerleme artışı → İstisna
  - Emeklilik sözleşme yönetim ücreti, sigorta komisyonu → Vergiye tabi

  MKYO Özel:
  - Hisse faiz, temettü, repo, değerleme artışı, MKTS satış kazancı → İstisna
  - Portföy dışı varlık gelirleri → Vergiye tabi

  ## YİAKV Etkisi
  KVK 5/1-d portföy işletmeciliği kazancının YİAKV (KVK 32/C) matrahına etkisi
  GİB açıklamalarıyla analiz edilmelidir. Dönem mevzuatı ve tebliğler esas alınmalıdır.

  ## Beyanname Konumu
  "Zarar Olsa Dahi İndirilecek İstisna ve İndirimler" bölümü — 302 kodlu satır.
  Portföy işletmeciliği zararı da bu bölümde gösterileceğinden matrahı azaltır.

  ## Risk Alanları
  1. Portföy dışı gelirin 302'ye dahil edilmesi
  2. Muhasebe portföy içi/dışı ayrımının yokluğu
  3. GYO inşaat/geliştirme gelirlerinin yanlış sınıflaması
  4. GSYO/GSYF yönetim ücretinin portföy kazancına dahil edilmesi
  5. EYF emeklilik sözleşme ücretinin portföy geliri sayılması
  6. Portföy satış kazancında maliyet yöntemi tutarsızlığı

muhasebe_kayitlari: |
  ## Kayıt 1 — Portföy Faiz ve Temettü Geliri Tahakkuku (İstisna Kapsamı)
  Borç: 241 Bağlı Ortaklıklar / 122 Alacaklar ← Portföy MK faiz/temettü alacağı
  Alacak: 642 İştirak Kazançları / 641 Faiz Gelirleri ← Portföy işletmeciliği geliri
  Açıklama: Portföy işletmeciliği geliri — KVK 5/1-d istisna kapsamı (302 satırı)

  ## Kayıt 2 — Portföy Dışı Gelir (Yönetim Ücreti / Danışmanlık — Vergiye Tabi)
  Borç: 221 Alacaklar / 180 Peşin Öd. Giderler ← Yönetim/performans ücreti alacağı
  Alacak: 649 Diğer Olağandışı Gelir / 600 Yurt İçi Satışlar ← Portföy dışı gelir
  Açıklama: PORTFÖY DIŞI — 302 satırına YAZILMAZ — Matrahta kalır

  ## Kayıt 3 — GYO Özel: Portföy Taşınmaz Kira Geliri
  Borç: 127 Diğer Ticari Alacaklar ← Portföydeki taşınmazdan kira geliri tahakkuku
  Alacak: 602 Kira Gelirleri ← GYO portföy taşınmaz kira — 5/1-d istisna (302 satırı)
  Açıklama: Yalnızca portföyde kayıtlı taşınmazların kira gelirleri istisna kapsamındadır.
  Portföy dışı taşınmaz kira gelirleri vergiye tabidir.

  ## Kayıt 4 — Portföy Menkul Kıymet Değerleme (Dönem Sonu)
  Borç: 111-118 Menkul Kıymetler ← Portföy MK borsa rayici değerleme artışı
  Alacak: 644/649 Değerleme Gelirleri ← Portföy değerleme artışı — 5/1-d istisna (302 satırı)
  Açıklama: SPK değerleme esaslarına uygun; değerleme artışları C tablosuna alınır.

  ## Beyanname 302 Akışı (Mutabakat)
  1. Portföy içi gelirler (642, 641, 602 portföy kısmı vb.) → Net portföy kazancı
  2. Portföy dışı gelirler (yönetim ücreti vb.) → Matrahta kalır
  3. KV Beyannamesi 302. Satır: C tablosu net tutarı → "Zarar Olsa Dahi İndirilecek"
  3 KADEME UYUM: Muhasebe portföy hesapları = VERİ GİRİŞİ C toplamı = Beyanname 302
  KRİTİK: Portföy içi/dışı ayrımı doğru kurulmadan 302 güvenilir şekilde hesaplanamaz.

