wizard_agaci:
  tetikleyici_soru: "Bir taşınmazı (arsa, bina, fabrika, depo) finansal kiralama şirketine veya katılım bankasına tapuyla devredip geri kiralayarak kullanıyorsunuz?"
  info_modal: |
    ## Genel Çerçeve

    **KVK Madde 5/1-j** kapsamında, kurumların taşınmazlarını (arsa, bina, fabrika, depo)
    **sat-kirala-geri al** işlemi çerçevesinde **6361 Sayılı Kanun kapsamında BDDK lisanslı
    finansal kiralama şirketine** ya da **katılım bankasına / kalkınma-yatırım bankasına tapu
    devriyle** satmaları ve finansal kiralama sözleşmesiyle geri kiralamaları durumunda doğan
    satış kazancı **%100 istisnadır.** 354 (taşınır) ile temel mekanizma aynı olmakla birlikte
    **tapu devri ve tapu geri devri** bu koda özgün ek koşullar getirmektedir.

    ## Temel Koşullar

    - Satılan varlık **taşınmaz** olmalıdır (arsa, arazi, bina, fabrika, depo); taşınır varlıklar
      için 354 kodu kullanılmalıdır.
    - Alıcı kurum; **6361 s.K. kapsamında BDDK lisanslı finansal kiralama şirketi**, katılım
      bankası veya kalkınma/yatırım bankası olmalıdır; **mevduat bankası kapsam dışıdır.**
    - **Tapunun alıcı adına tescil edilmesi** zorunludur; taşınmaz satışı tapuya tescil
      olmaksızın hukuken tamamlanmış sayılmaz ve tapu senedi zorunlu belgedir.
    - **Kira süresi sonunda tapu geri devir taahhüdü/opsiyonu** finansal kiralama sözleşmesinde
      açıkça yazılı olmalıdır; şifahi taahhüt geçersizdir.
    - Satış kazancının tamamı **tapu devir yılında 549 Özel Fonlar hesabına** alınmalıdır; her
      dönem kira payına orantılı amortizasyon yapılır, kira süresi sonunda 549 sıfırlanır.

    ## Önemli Sınırlamalar ve Riskler

    - **Tapu geri devri gerçekleşmezse istisna iptal riski:** Kira süresi sonunda tapu kuruma
      geri devredilmezse 549 hesabındaki kalan bakiye vergiye tabi hale gelir; geri devir planı
      sözleşmede hukuki güvenceye alınmalıdır.
    - **Tapu harcı iki aşamada doğabilir:** Satış aşamasında alıcı adına tescil ve olası geri
      devir aşamasında kurum adına tescil olmak üzere tapu harcı iki kez gündeme gelebilir; bu
      maliyet baştan hesaba katılmalıdır.
    - **KDV Madde 17/4-r ile etkileşim:** Taşınmaz satışında KDV muafiyeti ile 5/1-j istisnasının
      etkileşimi ayrıca analiz edilmelidir; KDV beyannamesiyle uyum kontrol edilmelidir.
    - **Piyasa değerinden uzak tapu devri:** SPK lisanslı gayrimenkul değerleme raporu olmadan
      gerçekleştirilen tapu devirlerinde emsal bedel farkı KVK Md.13 riskini tetikler.
    - **Alıcı kurum türü karışıklığı:** SPK lisanslı VKŞ'ye yapılan taşınmaz devri bu satıra
      (355) değil **356 veya 358 satırına** girilmesi gerekebilir; alıcı kurumun statüsü (BDDK
      lisanslı mı yoksa SPK lisanslı mı) beyanname kodu seçimini belirler.
    - **2 yıl aktifinde bulundurma şartı aranmaz:** 351 (KVK 5/1-e) ile karıştırılmamalıdır;
      bu istisna için süre şartı yoktur.

    ## YİAKV İlişkisi

    **KVK 5/1-j (355) istisnasının YİAKV (KVK 32/C) matrahına etkisi tartışmalıdır.** Dönem
    mevzuatı ve GİB açıklamaları düzenli takip edilerek her dönem ayrıca analiz edilmelidir;
    kesin pozisyon alınmadan önce güncel rehber ve özelgeler incelenmelidir.

    ## Pratik Notlar

    - **354 ile temel fark:** 354'te teslim tutanağı yeterliyken 355'te tapuya tescil zorunludur;
      tapu senedi olmadan 355 istisnası savunulamaz.
    - **Tapu üzerinde kiralama şerhi:** Kiracı kurumun geri devir güvencesi açısından tapu
      üzerine kiralama şerhi konulması değerlendirilmelidir; şerh kaldırılamaz güvence sağlar.
    - **Sözleşme paketi bir bütün olarak değerlendirilmelidir:** Satış sözleşmesi ile finansal
      kiralama sözleşmesi eş zamanlı veya birbirine bağlı biçimde düzenlenmeli; ayrı bağımsız
      işlemler olarak sunulan yapılar tartışmalı kabul edilir.
    - **YMM tasdik raporu:** 49 No.lu Tebliğ kapsamında tek satırda ≥500.000 TL veya toplamda
      ≥1.000.000 TL olması halinde YMM tasdik raporu zorunludur.
  kapi_sorulari:
    - id: varlik_tasinmaz_mi
      soru: "Satılan varlık taşınmaz mı? (Arsa, arazi, bina, fabrika, depo — taşınır/makine değil)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Taşınır (makine, araç, ekipman) için 354 kodu kullanılmalıdır. Bu istisna yalnızca taşınmazlar içindir."
    - id: alici_lisansli_mi
      soru: "Alıcı kurum; 6361 s.K. kapsamında BDDK lisanslı finansal kiralama şirketi, katılım bankası veya kalkınma/yatırım bankası mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Mevduat bankası kapsam dışıdır. KVK 5/1-j yalnızca bu kurumlara yapılan işlemler için geçerlidir."
    - id: tapu_devri_gerceklesti_mi
      soru: "Taşınmazın tapusu alıcı kurum adına tapuya tescil edildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Taşınmaz satışı tapuya tescil olmadan hukuken tamamlanmış sayılmaz. Tapu senedi zorunlu belgedir."
    - id: geri_devir_taahhut_var_mi
      soru: "Kira süresi sonunda tapunun geri devir taahhüdü/opsiyonu finansal kiralama sözleşmesinde yazılı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Tapu geri devri 355 istisnasının devamlılığı için zorunludur. Geri devir gerçekleşmezse istisna iptal riski doğar."

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: tapu_devir_bedeli
      etiket: "Tapu Devir (Satış) Bedeli (TL)"
      tip: para
      zorunlu: true
      yardim: "Tapuda belirtilen satış bedeli. Gerçek satış bedeli ile uyumlu olmalıdır. Emsal değere uygunluk için değerleme raporu önerilir."
    - id: net_defter_degeri
      etiket: "Taşınmazın Net Defter Değeri (TL)"
      tip: para
      zorunlu: true
      yardim: "Birikmiş amortisman düşüldükten sonraki net aktif değeri (250/252/258 hesap kartı ile uyumlu)."
    - id: satis_giderleri
      etiket: "Satış Giderleri (Tapu harcı satıcı payı, ekspertiz, komisyon vb.) (TL)"
      tip: para
      zorunlu: false
      yardim: "Tapu harcı satıcı payı (%2), döner sermaye, ekspertiz ve komisyon giderleri. KDV dahil/hariç ayrımı yapılmalıdır."
  formuller:
    satis_kazanci: "tapu_devir_bedeli - net_defter_degeri - satis_giderleri"
    istisna_tutari: "max(satis_kazanci * oran, 0)"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "satis_kazanci > 0"
      hata: "Satış kazancı pozitif olmalıdır. Zarar durumunda bu istisna uygulanamaz (Kazancın Bulunması Halinde bölümü)."

denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-j: Finansal kiralama ya da finansman şirketleri, katılım bankaları ile kalkınma
  ve yatırım bankalarına satılıp geri kiralanan taşınmazlardan doğan satış kazançları %100 istisnadır.

  ## Mekanizma — 3 Aşamalı Döngüsel İşlem (Taşınmaza Özgün: Tapu Boyutu)
  AŞAMA 1 — TAPU DEVRİ: Kurum taşınmazını FK/Bankaya tapu tesciliyle satar → Satış kazancı
  %100 istisna → 549 Özel Fon Hesabına alınır.
  AŞAMA 2 — GERİ KİRALAMA: FK/Banka aynı taşınmazı finansal kiralamaya verir → Kira ödemeleri
  gider olarak indirilebilir → 549 Fon her dönem kira payına orantılı azaltılır.
  AŞAMA 3 — TAPU GERİ DEVRİ: Kira süresi sonunda tapu satıcı/kiracı adına tescil edilir →
  Geri alım bedeli yeni aktif değer → 549 Fon sıfırlanır → İstisna korundu.

  ## 354 (Taşınır) ile Karşılaştırma — 355'e Özgün Koşullar
  - TAPU DEVRİ zorunlu (354'te teslim tutanağı yeterli)
  - Kira süresi sonunda TAPU GERİ DEVRİ taahhüdü sözleşmede yazılı olmalı
  - SPK lisanslı gayrimenkul değerleme raporu güçlü belge olarak önerilir
  - KDV Md.17/4-r (taşınmaz) muafiyeti ile 5/1-j etkileşimi analiz edilmeli
  - Tapu harcı hem satışta hem geri devirde olmak üzere iki kez doğabilir
  - Tapu üzerinde kiralama şerhi konulabilir (kiracı koruma güvencesi)

  ## Kritik Noktalar
  - 355 sadece tapu devir yılında beyannamede gösterilir; sonraki yıllarda 355 satırına yazılmaz
  - Fon amortizasyonu: Her dönem = Fon × (Dönem Kira / Toplam Kira)
  - Geri devir olmadan 549'daki kalan bakiye vergiye tabi hale gelir
  - 2 yıl aktif şartı (351/5/1-e) bu istisna için aranmaz
  - Taşınmaz ticareti yasağı (351/5/1-e) bu istisna için geçerli değildir

  ## YİAKV Etkisi
  KVK 5/1-j (355) istisnasının YİAKV (KVK 32/C) matrahına etkisi tartışmalıdır; dönem mevzuatı
  ve GİB açıklamalarıyla ayrıca analiz edilmelidir.

  ## YMM Tasdik Raporu
  49 No.lu Tebliğ (30.12.2025): Tek satır ≥500.000 TL veya toplam ≥1.000.000 TL → YMM raporu
  zorunludur. Tam tasdik sözleşmesi olanlar ayrıca rapor düzenlemez.

muhasebe_kayitlari: |
  ## Kayıt 1 — Tapu Devir Kaydı (Taşınmazın FK Şirketine/Bankaya Tapu Tesciliyle Satışı)
  Borç: 102 Bankalar / 120 Alacaklar              [Tapu Devir Bedeli]
  Alacak: 250/252 İlgili Taşınmaz Aktif Hesabı    [Brüt Defter Değeri]
  Alacak: 258 Birikmiş Amortismanlar              [Birikim]
  Alacak: 679 Diğer Olağandışı Kâr                [Satış Kazancı]
  Açıklama: Taşınmazın FK şirketine/bankaya sat-kirala-geri al kapsamında tapu tesciliyle satışı

  ## Kayıt 2 — 549 Özel Fon Hesabına Alma (Tapu Devir Yılında)
  Borç: 679 Diğer Olağandışı Kâr / 645 Satış Kârı   [İstisna Tutarı]
  Alacak: 549 Özel Fonlar — KVK 5/1-j 355 İstisnası  [İstisna Tutarı]
  Açıklama: Satış kazancının tamamının KVK 5/1-j kapsamında 549 hesabına alınması

  ## Kayıt 3 — Dönemsel Kira Gideri Kaydı (Her Dönem — Finansal Kiralama)
  Borç: 770 Genel Yönetim Giderleri               [Kira Bedeli + KDV]
  Alacak: 102 Bankalar                             [Kira Bedeli + KDV]
  Açıklama: FK şirketine ödenen finansal kiralama kira bedeli — gider kabul edilir

  ## Kayıt 4 — Fon Amortizasyonu (Her Dönem — Kira Payına Orantılı)
  Borç: 549 Özel Fonlar                   [Dönem Fon Azalışı]
  Alacak: 549 Özel Fonlar (alt hesap)     [Dönem Fon Azalışı]
  Açıklama: Fon = Başlangıç Fon × (Dönem Kira / Toplam Kira)
  Not: Kira süresi sonunda 549 hesabı sıfırlanmış ve tapu geri devri tamamlanmış olmalıdır.

