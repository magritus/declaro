      zorunlu_cevap: evet
      aciklama: "KRİTİK: 387 istisnası YİAKV matrahından DÜŞÜLEMEZ. Yurt dışı kaynaklı gelir olduğu için YİAKV hesabında çıkarılmamalıdır."

parametreler:
