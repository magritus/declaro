      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "387 ikinci seçenektir. 317 şartlarının tamamı sağlanıyorsa 317 kullanılmalıdır — %100 istisna %50'den daha avantajlıdır."
    - id: istirak_as_ltd_mi
      soru: "Yurt dışı iştirak AŞ veya Ltd niteliğinde mi? (Kanuni VE iş merkezi yurt dışında mı?)"
