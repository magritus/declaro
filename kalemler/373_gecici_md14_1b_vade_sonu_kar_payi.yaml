denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Md.14/1-b (7352 sayılı Kanun, 24/12/2021): 370 kapsamındaki KKM hesabının
  vade sonunda bankadan fiilen tahsil edilen kâr payı ve faiz geliri istisna kapsamındadır.

  ## 372–373 Mükerrerlik Önleme Kuralı — KRİTİK
  Yılı aşan vadeli hesaplarda her iki dönemde de istisna uygulanmasını önlemek için:
    Net 373 İstisnası = Toplam Vade Sonu Kâr Payı/Faiz − Önceki Dönem 372 Tahakkuku
  Örnek: Vade toplamı 1.000.000 TL, önceki yıl 372 = 400.000 TL → Net 373 = 600.000 TL
  Bu kural uygulanmazsa → mükerrer istisna → tarhiyat + vergi ziyaı cezası + gecikme faizi riski.
  373 çalışma kâğıdı ile 372 çalışma kâğıdı çapraz referans zorunludur.

  ## Nakit Esası
  373, nakit/tahsil esaslıdır: Hesap vadeye ulaştığında bankadan fiilen tahsil edilen tutar.
  Hesap hâlâ açıksa (vade dolmamışsa) → 372 (tahakkuk/accrual esaslı) uygulanır.
  Aynı hesap için aynı dönemde hem 372 hem 373 uygulanamaz.

  ## Muhasebe Kaydı Mantığı (Vade Sonu)
  Senaryo A (Önceki yıl 372 tahakkuku YOK — aynı yılda vade):
    102 Bankalar Dr / 642 Faiz Gelirleri Kr (Net 373 tutarı)
  Senaryo B (Önceki yıl 372 tahakkuku VAR — yılı aşan vade):
    102 Bankalar Dr / 181 Gelir Tahakkukları Kr (önceki yıl 372 kapatma)
    102 Bankalar Dr / 642 Faiz Gelirleri Kr (bu yıla ait yeni kısım)
  Her iki muhasebe kalemi de 373 istisna kapsamındadır.

  ## 370-371-372-373 Tam Uyum (5 Kod Mutabakatı)
  KKM çalışma dosyasında tüm kodlar arası mutabakat yapılmalıdır:
  370 (Md.14/1-a): Dönüşüm anı değerleme kazancı — TEK SEFERLİK
  371 (Md.14/1-b): Bankadan dönemsel kur farkı tazminatı — NAKIT
  372 (Md.14/1-b): Dönem sonu faiz/kâr payı tahakkuku — TAHAKKUK (hesap hâlâ açık)
  373 (Md.14/1-b): Vade sonu faiz/kâr payı tahsilatı — NAKİT (hesap vadeye ulaştı) ← BU KALEM
  Toplam istisna = 370 + 371 + (Net 372) + (Net 373); mükerrerlik çıkarılmış.

  ## YİAKV Etkisi — KRİTİK
  370+371+372+373 tamamı YİAKV (KVK Md.32/C) matrahından DÜŞÜLEMEZ (E.7 DÜŞÜLEMEZ listesi).
  YİAKV çalışma kâğıdında E.7'deki dört satır da kontrol edilmelidir.
  Hatalı uygulama → YİAKV tarhiyatı + vergi ziyaı cezası + gecikme faizi riski.

  ## YMM Tasdik
  49 No.lu KV Genel Tebliği: Net 373 istisna tutarı ≥ 500.000 TL ise YMM tasdik raporu zorunludur.
  Aynı KKM hesabına ilişkin 370/371/372 tasdik raporları ile bütüncül değerlendirme önerilir.

muhasebe_kayitlari: |
  ## Kayıt 1A — Vade Sonu Kâr Payı/Faiz Tahsilatı (Senaryo A: Önceki Yıl 372 YOK)
  Borç: 102 Bankalar (TL)
  Alacak: 642 Faiz Gelirleri
  Açıklama: KKM vade sonu tek dönem — tüm kâr payı/faiz bu yıla ait; 373 istisna kapsamı

  ## Kayıt 1B — Vade Sonu Kâr Payı/Faiz Tahsilatı (Senaryo B: Önceki Yıl 372 VAR)
  Borç: 102 Bankalar (TL)
  Alacak: 181 Gelir Tahakkukları (önceki yıl 372 accrual kapatma)
  Alacak: 642 Faiz Gelirleri (bu yıla ait yeni kısım)
  Açıklama: KKM vade sonu yılı aşan — Net 373 = Toplam − Önceki 372; her iki alacak 373 kapsamı

