wizard_agaci:
  tetikleyici_soru: "370/372 kapsamındaki KKM hesabı dönem içinde vadeye ulaşarak kâr payı/faiz tahsil edildi mi?"
  info_modal: |
    KVK Geçici Md.14/1-b kapsamında, 370 (dönüşüm kazancı) kapsamındaki KKM hesabı
    vadeye ulaştığında bankadan fiilen alınan kâr payı ve faiz kurumlar vergisinden istisnadır.

    **KRİTİK — 372-373 Mükerrerlik:**
    Yılı aşan vadeli hesaplarda: Net 373 = Vade Toplam − Önceki Yıl 372 Tahakkuku
    Bu kural uygulanmazsa mükerrer istisna → tarhiyat riski.

    **KRİTİK — YİAKV:** Bu istisna KVK 32/C (YİAKV) matrahından DÜŞÜLEMEZ (E.7).
    370+371+372+373 tamamı E.7 DÜŞÜLEMEZ listesindedir.
  kapi_sorulari:
    - id: vade_geldi_mi
      soru: "Dönem içinde (01.01–31.12) KKM hesabı vadeye ulaştı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "373, vade sonu tahsilatı kapsar. Hesap hâlâ açıksa → 372 (tahakkuk) uygulanır."
    - id: mukerrerlik_analiz
      soru: "Önceki yıl 372 tahakkuku yapılmış hesap için mükerrerlik analizi yapıldı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Net 373 = Vade Toplam − Önceki Yıl 372. Bu kural uygulanmazsa çifte istisna riski doğar."
    - id: yiakv_dusulemez
      soru: "370-373 arası tüm tutarların YİAKV matrahından DÜŞÜLMEYECEĞI teyit edildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "KVK Geçici Md.14 kapsamındaki 370+371+372+373 tamamı YİAKV matrahından DÜŞÜLEMEZ (E.7)."

