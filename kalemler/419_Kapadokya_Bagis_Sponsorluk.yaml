wizard_agaci:
  tetikleyici_soru: "Kapadokya Alanı Başkanlığına bağış/yardım yaptınız veya Başkanlıkça hazırlanan projelere sponsorluk harcaması gerçekleştirdiniz mi?"
  info_modal: |
    ## Genel Çerçeve

    **7174 Sayılı Kapadokya Alanı Hakkında Kanun** kapsamında iki ayrı indirim türü
    beyanname 419 altında bir arada değerlendirilir:

    ① **BAĞIŞ VE YARDIMLAR:** Kapadokya Alanı Başkanlığı'na yapılan nakdi ve ayni
    bağış ve yardımların **tamamı** kurumlar vergisi matrahından indirilir.

    ② **SPONSORLUK HARCAMALARI:** Başkanlıkça hazırlanan projelere katılım amacıyla
    yapılan sponsorluk harcamalarının belirlenen **oranı** matrahtan indirilir.

    ## Bileşik Yapı

    Beyanname 419 hem bağış/yardım hem sponsorluk bileşenini kapsar:
    - **B Tablosu:** Bağış/Yardım — Tamamının indirimi
    - **C Tablosu:** Sponsorluk — Oran uygulaması (YMM teyidi gerekli)

    ## İndirim Koşulları

    - **Bağış/Yardım:** Alıcı Kapadokya Alanı Başkanlığı olmalı; fiilen gerçekleşmiş olmalı
    - **Sponsorluk:** Başkanlıkça hazırlanan proje kapsamında, proje onayı/sözleşmesi zorunlu
    - Her iki türde de matrahı aşan kısım sonraki yıllara **devredilemez**

    ## Bağış/Yardım ile Sponsorluk Ayrımı

    - **Bağış/Yardım:** Karşılıksız aktarım → B Tablosu → Tamamının indirimi
    - **Sponsorluk:** Karşılıklı ilişki (proje katılımı) → C Tablosu → Oran uygulaması
    - Bu ayrım hatalı yapılırsa yanlış tutar beyannamede yer alır

    ## Önemli Sınırlamalar ve Riskler

    - **Fiili ödeme/teslim zorunluluğu:** Taahhüt edilen ancak gerçekleşmemiş bağış
      veya sponsorluk indirime konu edilemez
    - **Sponsorluk oran teyidi:** Sponsorluk indirim oranı 7174 s.K. ve GİB Rehberi
      No:606 kapsamında YMM tarafından teyit edilmelidir
    - **Devir yasağı:** Matrahı aşan kısım sonraki yıllara devredilmez
    - **YMM tasdik:** İndirim tutarı ≥500.000 TL ise 49 No.lu KV GT kapsamında
      YMM tasdik raporu zorunludur

    ## YİAKV İlişkisi

    **419 kapsamındaki indirim YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.**
    YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir ancak matraha etki etmez.
  kapi_sorulari:
    - id: alici_kapadokya_baskanligi
      soru: "Bağış/yardım veya sponsorluk alıcısı Kapadokya Alanı Başkanlığı veya Başkanlıkça hazırlanan bir proje mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Alıcı: 7174 s.K. ile kurulan Kapadokya Alanı Başkanlığı. Başkanlığa doğrudan bağış veya Başkanlıkça hazırlanan proje sponsorluğu olmalı. Başkanlık dışındaki alıcılar bu kod kapsamında değerlendirilemez."
    - id: islem_turu
      soru: "İşlem türünü belirlediniz mi? (Bağış/Yardım mı — Sponsorluk mu — Her ikisi mi?)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Bağış/Yardım: Karşılıksız aktarım → B Tablosu → Tamamının indirimi. Sponsorluk: Proje katılımlı karşılıklı ilişki → C Tablosu → Oran uygulaması. Her ikisi aynı anda mümkündür."
    - id: fiili_odeme_yapildi
      soru: "Bağış/yardım veya sponsorluk harcaması fiilen gerçekleşti mi? (Nakdi: Banka dekontu — Ayni: Teslim belgesi)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Taahhüt aşamasındaki işlem indirime konu edilemez. Nakdi: Banka EFT/havale dekontu. Ayni: İmzalı teslim tutanağı. Sponsorluk: Banka kaydıyla teyit."
    - id: sponsorluk_proje_onayi
      soru: "Sponsorluk söz konusuysa Başkanlık proje onayı veya sözleşmesi mevcut mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Sponsorluk harcamalarında Kapadokya Alanı Başkanlığı'nın proje belgesi veya sözleşmesi zorunludur. Proje onayı olmaksızın sponsorluk indirimi uygulanamaz."

parametreler:
  bagis_oran: 1.0
  sponsorluk_oran: null  # YMM tarafından 7174 s.K. kapsamında teyit edilmeli

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: nakdi_bagis_tutari
      etiket: "Nakdi bağış/yardım tutarı (TL) — Banka yoluyla yapılan ödemeler"
      tip: para
      zorunlu: false
      yardim: "Kapadokya Alanı Başkanlığı'na banka EFT/havale ile yapılan nakdi bağış ve yardımların toplamı. Ödeme kanalı banka olmalı."
    - id: ayni_bagis_degeri
      etiket: "Ayni bağış/yardım değeri (TL) — Teslim edilen mal/hizmetin maliyet/net defter değeri"
      tip: para
      zorunlu: false
      yardim: "Kapadokya Alanı Başkanlığı'na yapılan ayni bağışların maliyet veya net defter değeri. Piyasa değeri değil maliyet esas."
    - id: sponsorluk_tutari
      etiket: "Net sponsorluk harcaması (TL) — Başkanlık projeleri için yapılan sponsorluk"
      tip: para
      zorunlu: false
      yardim: "Kapadokya Alanı Başkanlığı'nca hazırlanan projelere katılım amacıyla yapılan sponsorluk harcamaları. Reklam bedeli ayrıştırılmış net tutar. İndirim oranı YMM tarafından 7174 s.K. kapsamında teyit edilmeli."
  formuller:
    bagis_toplam: "nakdi_bagis_tutari + ayni_bagis_degeri"
    bagis_indirimi: "nakdi_bagis_tutari + ayni_bagis_degeri"
    sponsorluk_indirimi: "sponsorluk_tutari * sponsorluk_oran  # YMM oran teyidi zorunlu"
    istisna_tutari: "nakdi_bagis_tutari + ayni_bagis_degeri + sponsorluk_indirimi"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "nakdi_bagis_tutari >= 0 and ayni_bagis_degeri >= 0 and sponsorluk_tutari >= 0"
      hata: "Tutarlar negatif olamaz."
    - kural: "nakdi_bagis_tutari + ayni_bagis_degeri + sponsorluk_tutari > 0"
      hata: "En az bir işlem türü (bağış, ayni bağış veya sponsorluk) girilmelidir."

denetci_notlari: |
  ## Yasal Dayanak
  7174 Sayılı Kapadokya Alanı Hakkında Kanun kapsamında:
  - Kapadokya Alanı Başkanlığı'na yapılan nakdi ve ayni bağış/yardımların tamamı indirilir
  - Başkanlıkça hazırlanan projelere sponsorluk harcamalarının belirlenen oranı indirilir
  GİB KV Beyan Rehberi Mart 2026 (Yayın No:606) esas alınmıştır.

  ## Bileşik Yapı — B ve C Tabloları

  B TABLOSU (Bağış/Yardım):
  - Alıcı: Kapadokya Alanı Başkanlığı
  - İndirim: Nakdi + Ayni bağışın tamamı
  - Belge: Banka dekontu (nakdi) / Teslim tutanağı (ayni) / Alındı makbuzu

  C TABLOSU (Sponsorluk):
  - Konu: Başkanlıkça hazırlanan projelere katılım
  - İndirim oranı: 7174 s.K. ve GİB Rehberi No:606 kapsamında YMM teyidi zorunlu
  - Belge: Proje onayı veya sözleşme + ödeme kaydı

  ## İndirim Kuralları
  - Bağış/Yardım: Tamamının indirimi — kazanç yüzdesiyle sınırlı değil
  - Sponsorluk: Oran uygulaması — YMM teyidi gerekli
  - Matrahı aşan kısım sonraki yıllara devredilmez

  ## Kritik Kontroller
  - Alıcı/proje Kapadokya Alanı Başkanlığı kapsamında mı?
  - Bağış/Yardım ile Sponsorluk ayrımı doğru yapıldı mı?
  - Fiili ödeme/teslim belgesi mevcut mu?
  - Sponsorluk için proje onayı/sözleşmesi temin edildi mi?
  - Sponsorluk indirim oranı YMM tarafından teyit edildi mi?

  ## 479 (6546 s.K. Gelibolu) ile Yapısal Benzerlik
  Her ikisi de bağış + sponsorluk bileşenli kanun kapsamı içerir.
  Ancak 419 yalnızca Kapadokya Alanı Başkanlığı'na özgüdür — 7174 s.K. kapsamında.

  ## YİAKV Etkisi
  419 bağış/sponsorluk indirimi YİAKV (KVK Md.32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir.

  ## YMM Tasdik
  İndirim tutarı ≥500.000 TL ise YMM tasdik raporu zorunludur (49 No.lu KV GT).
  Sponsorluk oranı için ayrıca YMM oran teyidi gereklidir.

muhasebe_kayitlari: |
  ## Nakdi Bağış/Yardım Kaydı
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Bağış gideri)
  Alacak: 102 Bankalar
  Açıklama: 7174 s.K. kapsamında Kapadokya Alanı Başkanlığı'na nakdi bağış.

  ## Ayni Bağış Kaydı (Stoktan)
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Maliyet bedeli)
  Alacak: 150/153 İlk Madde ve Malzeme / Ticari Mallar
  Açıklama: 7174 s.K. kapsamında ayni bağış (stoktan teslim).

  ## Sponsorluk Harcaması Kaydı
  Borç: 760/780 Pazarlama/Genel Yönetim Giderleri (veya 689)
  Alacak: 102 Bankalar
  Açıklama: 7174 s.K. Kapadokya projesi sponsorluğu — önce gider, KKEG'e alınır, sonra 419 ile indirilir.

  ## Beyanname
  B Tablosu bağış/yardım toplamı + C Tablosu sponsorluk indirimi = Beyanname 419. satır.
  Matrahı aşan kısım devredilemez.

