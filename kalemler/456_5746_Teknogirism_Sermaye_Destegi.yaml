wizard_agaci:
  tetikleyici_soru: "Sanayi ve Teknoloji Bakanlığı'ndan 5746 s.K. Md.3/5 kapsamında Teknogirişim Sermaye Desteği (hibe) aldınız mı?"
  info_modal: |
    ## Genel Çerçeve

    **5746 sayılı Kanun Madde 3/5** kapsamında Sanayi ve Teknoloji Bakanlığı (STB)
    tarafından bireysel girişimcilere ve Ar-Ge/inovasyon odaklı teknoloji şirketlerine
    sağlanan sermaye/hibe desteğidir.

    ## Muhasebe-Beyanname Mekanizması

    Teknogirişim Sermaye Desteği indirimi iki adımlı bir mekanizma ile çalışır:

    **①** Destek alındığında → **GELİR kaydedilir** (679/649 hesabı) → KV matrahına girer.
    **②** Beyanname 456 → Alınan destek tutarı matrahtan **DÜŞÜLÜR** → Net vergi yükü sıfırlanır.

    **SONUÇ:** Teknogirişim desteği üzerinden kurumlar vergisi ödenmez.

    ## Kapsam — Alıcı Niteliği

    Aşağıdaki kişi/kurumlar bu desteği alabilir:
    - Bireysel girişimciler (teknoloji/Ar-Ge odaklı)
    - Kuluçka merkezi bünyesindeki girişimler
    - STB tarafından onaylanan Ar-Ge/inovasyon odaklı teknoloji şirketleri

    ## Önemli Ön Koşullar

    - **STB Karar/Protokolü:** Sanayi ve Teknoloji Bakanlığı tarafından imzalanmış destek kararı
      veya protokol belgesi zorunludur. KOSGEB, TÜBİTAK vb. kurumlardan alınan destekler bu
      kod kapsamında değildir.
    - **Fiili tahsilat:** İndirim, yalnızca fiilen tahsil edilen tutar için uygulanır.
      Protokol/sözleşme tutarı değil, banka havalesiyle alınan kısım esastır.
    - **Gelir kaydı zorunluluğu:** Destek alındığında **önce gelir hesabına alınmalı**
      (679/649). Gelir kaydedilmemişse beyanname 456 ile matrahtan çıkarılamaz.
    - **Amaca uygun kullanım:** STB protokolüne uygun Ar-Ge/teknoloji harcaması yapılmış olmalıdır.

    ## YİAKV İlişkisi

    **5746 Md.3/5 kapsamındaki Teknogirişim Sermaye Desteği İndirimi YİAKV (KVK 32/C)
    matrahından DÜŞÜLEMEZ.** YİAKV çalışma kâğıdı E.13 bilgi satırında gösterilir ancak
    matrahı etkilemez.

    ## 456 ile 457 Farkı

    - **456 (5746 Md.3/5):** STB tarafından TGB dışındaki girişimcilere sağlanan Teknogirişim desteği.
    - **457 (4691 Geç.Md.4):** 4691 s.K. kapsamında TGB/Teknokent bünyesindeki firmalar için.
    Mekanizma aynı; yasal dayanak ve kapsam farklı.
  kapi_sorulari:
    - id: stb_destek_alindi
      soru: "Sanayi ve Teknoloji Bakanlığı'ndan 5746 s.K. Md.3/5 kapsamında Teknogirişim Sermaye Desteği alındı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "5746 Md.3/5 kapsamında STB tarafından verilmiş destek kararı/protokolü zorunludur. KOSGEB, TÜBİTAK, TGB Yönetici Şirketi vb. başka kurumlardan alınan destekler bu kod kapsamında değildir."
    - id: fiilen_tahsil_edildi
      soru: "Destek tutarı dönem içinde fiilen tahsil edildi mi? (Banka yoluyla)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "İndirim yalnızca fiilen tahsil edilen kısım için uygulanır. Protokol/sözleşme tutarı değil, banka havalesiyle alınan kısım esastır."
    - id: gelir_kaydedildi
      soru: "Tahsil edilen destek tutarı gelir olarak kaydedildi mi? (679/649 hesabı)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "ZORUNLU ADIM: Destek alındığında önce gelir hesabına (679 Diğer Olağandışı Gelirler veya 649 Diğer Gelirler) alınmalı ve KV matrahına girmeli. Gelir kaydedilmemişse beyanname 456 ile matrahtan çıkarılamaz — hatalı beyan riski doğar."
    - id: stb_belge_mevcut
      soru: "STB Destek Kararı / Protokolü ve ilgili belgeler mevcut mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "STB tarafından imzalanmış destek kararı veya protokol belgesi zorunludur. Özel kaynaklardan veya belediyeden alınan destekler bu kapsamda değildir."

