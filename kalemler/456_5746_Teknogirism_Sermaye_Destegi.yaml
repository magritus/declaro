denetci_notlari: |
  ## Yasal Dayanak
  5746 sayılı Araştırma, Geliştirme ve Tasarım Faaliyetlerinin Desteklenmesi Hakkında
  Kanun Madde 3/5: STB tarafından sağlanan Teknogirişim Sermaye Desteği hibe geliri,
  kurumlar vergisi matrahından indirilir.
  GİB KV Beyan Rehberi Mart 2026 (Yayın No:606) esas alınmıştır.

  ## İndirim Mekanizması

  Teknogirişim desteği iki adımlı mekanizma ile beyannamede yer alır:
  - ADIM 1: Destek alındığında → Gelir kaydedilir (679/649) → KV matrahına girer
  - ADIM 2: Beyanname 456 → Destek tutarı matrahtan DÜŞÜLÜR → Net vergi yükü = 0

  ## Kritik Ön Koşullar

  A0.1 ★ STB desteği: 5746 Md.3/5 kapsamında STB tarafından verilmiş olmalı
  A0.2 ★ Fiili tahsilat: Banka yoluyla fiilen alınmış kısım esas
  A0.3 ★ Gelir kaydı: 679/649 gelir kaydı olmadan 456 uygulanamaz
  A0.4 STB destek kararı/protokolü belgesi mevcut olmalı

  ## 456 ile 457 Ayrımı
  456 (5746 Md.3/5): Teknogirişim desteği — TGB dışı, STB kaynaklı
  457 (4691 Geç.Md.4): Teknokent/TGB desteği — 4691 s.K. kapsamında TGB bünyesi
  Mekanizma aynıdır; yasal dayanak ve kapsam farklıdır. Çift sayım yapılmamalıdır.

  ## YİAKV Etkisi
  456 Teknogirişim Sermaye Desteği İndirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdı E.13 bilgi satırında gösterilir — matrahı etkilemez.
  Hem 456 hem 457 varsa E.13'e toplam yazılır.

  ## YMM Tasdik
  İndirim tutarı ≥500.000 TL ise YMM tasdik raporu zorunludur.
  Tam tasdik kapsamındaki mükelleflerde ayrıca rapor düzenlenmez.

muhasebe_kayitlari: |
  ## Destek Tahsilat Kaydı
  Borç: 102 Bankalar
  Alacak: 679 Diğer Olağandışı Gelirler (veya 649 Diğer Gelirler)
  Açıklama: 5746 s.K. Md.3/5 kapsamında alınan Teknogirişim Sermaye Desteği.

  NOT: Bu gelir kaydı olmadan beyanname 456 uygulanamaz.
  Tahsil edilen destek önce gelir hesabına alınır, ardından beyanname 456 ile matrahtan düşülür.

  ## Beyanname
  Fiilen tahsil edilen destek tutarı beyanname 456. satırına aktarılır.
  İndirim tutarı = Tahsil edilen hibe tutarı (gelir kaydı şartıyla).

