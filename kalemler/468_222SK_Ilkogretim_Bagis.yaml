wizard_agaci:
  tetikleyici_soru: "222 sayılı İlköğretim ve Eğitim Kanunu kapsamında bir ilköğretim kurumuna bağış yaptınız mı?"
  info_modal: |
    ## Genel Çerçeve

    **222 sayılı İlköğretim ve Eğitim Kanunu** kapsamında gerçek ve tüzel kişilerin
    ilköğretim okulları (ilkokul ve ortaokullar) ile bağlı tesislerin yapımı, onarımı,
    donanımı ve faaliyetleri için kamu idarelerine, Okul Aile Birliklerine veya yetkili
    diğer kurumlara yaptıkları bağış ve yardımların **tamamı** kurumlar vergisi
    matrahından indirilir.

    ## Kapsam

    - Okul binası ve derslik inşaatı
    - Laboratuvar, kütüphane, spor salonu yapımı
    - Öğretmenevi ve yardımcı tesis inşaatı
    - Eğitim araç-gereçleri ve bilişim altyapısı
    - Mevcut okul tesislerinin onarımı ve donanımı

    ## Alıcı Niteliği

    - İlköğretim okul yönetimi (devlet/kamu okulu)
    - İl/İlçe Millî Eğitim Müdürlüğü
    - Okul Aile Birliği (kamu okulu adına)
    - Köy/mahalle muhtarlığı (okul yararına)
    - İl Özel İdaresi (okul yatırımı için)

    **Kapsam dışı:** Özel okul, vakıf okulu, özel dershane için bağışlar bu koda girmez.

    ## İndirim Oranı

    İndirim oranı **tamamının indirimi**dir. Matrahı aşan kısım sonraki yıllara devredilemez.

    ## YİAKV İlişkisi

    **468 kapsamındaki bağış indirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.**
    YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir ancak matraha etki etmez.
  kapi_sorulari:
    - id: kapsam_ilkogretim
      soru: "Bağış 222 s.K. kapsamında bir ilköğretim okuluyla (ilkokul/ortaokul) ilgili mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "222 sayılı Kanun ilköğretimi (ilkokul ve ortaokul) kapsar. Lise ve üniversite bağışları farklı kodlara girer. Özel okul/vakıf okulu bağışları bu kapsama girmez — devlet/kamu okulu olmalı."
    - id: alici_yetkili
      soru: "Bağış alıcısı yetkili bir kurum mu? (Kamu okulu yönetimi, MEB Müdürlüğü, OAB, muhtarlık vb.)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Yetkili alıcılar: İlköğretim okulu yönetimi / İl-İlçe Millî Eğitim Müdürlüğü / Okul Aile Birliği (kamu okulu adına) / Köy/mahalle muhtarlığı (okul yararına) / İl Özel İdaresi (okul yatırımı için)."
    - id: fiili_odeme_yapildi
      soru: "Bağış fiilen gerçekleşti mi? (Nakdi: Banka dekontu — Ayni: Teslim belgesi)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Taahhüt aşamasındaki bağış indirime konu edilemez. Nakdi bağışta banka EFT/havale dekontu; ayni bağışta imzalı teslim tutanağı zorunludur."
    - id: makbuz_alindi
      soru: "Bağış kabul belgesi / makbuz yetkili kurumdan alındı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Okul, MEB Müdürlüğü veya OAB'tan resmi makbuz/kabul yazısı. Belge olmadan 468 indirimi belgelenemez."

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: nakdi_bagis_tutari
      etiket: "Nakdi bağış tutarı (TL) — Banka yoluyla yapılan ödemeler"
      tip: para
      zorunlu: false
      yardim: "Banka EFT/havale ile yapılan nakdi bağışların toplamı. Ödeme kanalı banka olmalı."
    - id: ayni_bagis_degeri
      etiket: "Ayni bağış değeri (TL) — Teslim edilen mal/malzemenin maliyet/net defter değeri"
      tip: para
      zorunlu: false
      yardim: "Eğitim araç-gereci, mobilya, bilişim ekipmanı gibi ayni bağışların maliyet veya net defter değeri. Piyasa değeri değil maliyet esas."
  formuller:
    toplam_bagis: "nakdi_bagis_tutari + ayni_bagis_degeri"
    istisna_tutari: "nakdi_bagis_tutari + ayni_bagis_degeri"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "nakdi_bagis_tutari >= 0 and ayni_bagis_degeri >= 0"
      hata: "Bağış tutarları negatif olamaz."
    - kural: "nakdi_bagis_tutari + ayni_bagis_degeri > 0"
      hata: "En az bir bağış türü (nakdi veya ayni) girilmelidir."

denetci_notlari: |
  ## Yasal Dayanak
  222 sayılı İlköğretim ve Eğitim Kanunu kapsamında devlet ilköğretim
  okullarına (ilkokul ve ortaokul) yapılan bağış ve yardımların tamamı
  kurumlar vergisi matrahından indirilir.
  GİB KV Beyan Rehberi Mart 2026 (Yayın No:606) esas alınmıştır.

  ## Kapsam Tablosu

  OKUL TÜRÜ:
  - Devlet ilköğretim okulu (ilkokul/ortaokul) → Onaylıdır
  - Lise → Kapsam dışı (farklı kod)
  - Üniversite → Kapsam dışı (farklı kod — 470)
  - Özel okul / Vakıf okulu → Kapsam dışı

  ALİCI TÜRÜ:
  - Okul yönetimi (devlet/kamu) → Onaylıdır
  - İl/İlçe MEB Müdürlüğü → Onaylıdır
  - Okul Aile Birliği (kamu okulu adına) → Onaylıdır
  - Köy/mahalle muhtarlığı (okul yararına) → Onaylıdır
  - İl Özel İdaresi (okul yatırımı) → Onaylıdır

  ## İndirim Kuralları
  - Tamamının indirimi — kazanç yüzdesiyle sınırlı değil
  - Matrahı aşan kısım sonraki yıla devredilmez

  ## Kritik Kontroller
  - Alıcı devlet/kamu ilköğretim okulu kapsamında mı?
  - Bağışın amacı 222 s.K. kapsamında mı?
  - Fiili ödeme/teslim (taahhüt değil, gerçekleşmiş bağış)
  - Yetkili kurumdan makbuz/kabul yazısı

  ## YİAKV Etkisi
  468 bağış indirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir.

  ## YMM Tasdik
  İndirim tutarı ≥500.000 TL ise YMM tasdik raporu zorunludur (49 No.lu KV GT).
  Tam tasdik kapsamındaki mükelleflerde ayrıca rapor düzenlenmez.

muhasebe_kayitlari: |
  ## Nakdi Bağış Kaydı
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Bağış gideri)
  Alacak: 102 Bankalar
  Açıklama: 222 s.K. kapsamında ilköğretim kurumuna nakdi bağış.

  ## Ayni Bağış Kaydı (Stoktan)
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Maliyet bedeli)
  Alacak: 150/153 İlk Madde ve Malzeme / Ticari Mallar
  Açıklama: 222 s.K. kapsamında ilköğretim kurumuna ayni bağış (stoktan teslim).

  ## Beyanname
  Hesaplanan toplam bağış tutarı beyanname 468. satırına aktarılır.
  Matrahı aşan kısım devredilemez.

