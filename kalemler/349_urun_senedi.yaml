      hata: "Ürün senedi elden çıkarma işlemi zararla sonuçlanmış — bu istisna uygulanamaz (Kazancın Bulunması Halinde bölümüdür)."

denetci_notlari: |
  ## Yasal Dayanak
  GVK Geçici Madde 76 kapsamında, 5300 sayılı Tarım Ürünleri Lisanslı Depoculuk Kanunu
  çerçevesinde düzenlenen ürün senetlerinin elden çıkarılmasından doğan kazançlar %100
  istisna olarak beyanname 349. satırında "Kazancın Bulunması Halinde" bölümüne girilir.

  ## Kapsam
  - ELÜS (Elektronik Ürün Senedi): MKK/BİAŞ Emtia Piyasası altyapısı.
  - Kağıt Ürün Senedi: Lisanslı depo tarafından fiziken düzenlenen kıymetli evrak, ciro ile devredilebilir.
  - Kapsam içi ürünler: Buğday, arpa, mısır, pamuk, zeytinyağı, fındık ve diğer tarım ürünleri.

  ## Kritik Noktalar
  - 5300 s.K. kapsamında Bakanlık LİSANSLI depo şartı temel şarttır.
  - Kazancın elden çıkarma (satış/devir/temlik) kaynaklanması zorunludur; depolama hizmet geliri kapsam dışıdır.
  - Maliyet bedeli (C.2) belgelenmeden kazanç hesabı yapılamaz — en yüksek risk kalemidir.
  - GVK Geçici Madde statüsü nedeniyle her dönem yürürlük kontrolü zorunludur.
  - Beyanname bölümü: Kazancın Bulunması Halinde — zarar döneminde uygulanamaz.

  ## YİAKV Etkisi
  GVK Geçici Md.76 ürün senedi istisnasının YİAKV matrahına etkisi bulunmamaktadır.

  ## YMM Tasdik Notu
  49 No.lu Tebliğ kapsamında: Tek satır ≥500.000 TL veya toplam ≥1.000.000 TL → YMM raporu.
  Tam tasdik sözleşmesi olanlar ayrıca rapor düzenlemez.

muhasebe_kayitlari: |
  ## Kayıt 1 — Ürün Senedi Alımı (Maliyet Kaydı)
  Borç: 110 Hisse Senetleri / 111 Özel Kesim Tahvil/Senet veya İlgili Finansal Varlık Hesabı
  Alacak: 102 Bankalar
  Açıklama: ELÜS veya kağıt ürün senedi edinimi — BİAŞ alış kaydı / fatura ile belgelenmiş maliyet

  ## Kayıt 2 — Ürün Senedi Satışı/Devri
  Borç: 102 Bankalar (veya 120 Alıcılar)
  Alacak: 110/111 İlgili Finansal Varlık Hesabı (Maliyet)
  Alacak: 645 Menkul Kıymet Satış Kârları (veya ilgili gelir hesabı) — Satış Kazancı
  Açıklama: BİAŞ işlem kaydı veya satış sözleşmesi dayanağıyla

  ## Beyanname Akışı
  1. Elden çıkarma kazancı (satış bedeli − maliyet − giderler) gelir tablosuna yansır.
  2. KV Beyannamesi 349. Satır: "Kazancın Bulunması Halinde" bölümüne istisna tutarı.
  3. İstisna tutarı = Kazanç × %100 (tam istisna).

