wizard_agaci:
  tetikleyici_soru: "Hesap döneminde tarım ürünü ürün senedi (ELÜS veya kağıt) sattın/devretttin mi?"
  info_modal: |
    GVK Geçici Madde 76 kapsamında, 5300 Sayılı Tarım Ürünleri Lisanslı Depoculuk Kanunu
    çerçevesinde düzenlenen ürün senetlerinin (ELÜS veya kağıt ürün senedi) elden
    çıkarılmasından doğan kazançlar **%100 tam istisna** olarak uygulanır.
    Beyannamede "Kazancın Bulunması Halinde" bölümünde 349. satırda gösterilir.
    ÖNEMLİ: Geçici Madde statüsünde olup yürürlük tarihinin dönem için geçerli
    olduğu güncel mevzuatla teyit edilmelidir.
  kapi_sorulari:
    - id: lisansli_depo_mu
      soru: "Ürün senedi, Tarım ve Orman Bakanlığı lisanslı depo işletmecisi tarafından düzenlendi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Temel şart. Lisanssız depo → kapsam dışı. Lisanslı depo belgesi zorunludur."
    - id: elden_cikarma_mi
      soru: "Kazanç, ürün senedinin satış/devir/temlik yoluyla elden çıkarılmasından mı kaynaklanıyor?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Depolama hizmet geliri veya başka gelir türleri kapsam dışıdır. Yalnızca elden çıkarma kazancı istisna kapsamındadır."
    - id: maliyet_belgelendi_mi
      soru: "Ürün senedinin maliyet bedeli belgelendi mi? (BİAŞ alış kaydı / fatura / müstahsil makbuzu)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Belgesiz maliyet → GİB tarafından tüm satış bedeli kazanç sayılabilir. En yüksek risk kalemidir."
    - id: donem_karda_mi
      soru: "Bu istisna 'Kazancın Bulunması Halinde' bölümündedir — dönem kârlı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Geçici Madde 76 istisnası zarar döneminde uygulanamaz."
    - id: yururluk_kontrolu
      soru: "GVK Geçici Md.76'nın cari hesap dönemi için yürürlükte olduğu güncel mevzuatla teyit edildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Geçici Madde statüsü nedeniyle her dönem yürürlük kontrolü zorunludur."

