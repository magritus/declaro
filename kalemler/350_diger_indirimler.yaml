denetci_notlari: |
  ## Yasal Dayanak
  Beyanname 350. satırı, 302–349 özel satırlarına dahil edilemeyen tüm istisna ve
  indirimlerin toplandığı kümülatif satırdır. Her kalem kendi yasal dayanağına göre
  ayrı ayrı hesaplanır ve belgelenir.

  ## Temel Kural
  - Özel satır varsa 350 KULLANILMAZ.
  - Her kalem için ayrı yasal dayanak + ayrı belge paketi zorunludur.
  - Toplu tutar yazımı kabul edilemez — GİB her kalemi tek tek açıklatabilir.
  - Matrah hesabında sıralama: Önce KVK 5 istisnaları, sonra KVK 10 indirimleri.

  ## En Sık Kullanılan 350 Kalemleri
  1. Serbest Bölge Kazancı İstisnası — 3218 s.K. Geçici Md.3 — KB Halinde
  2. Teknokent Girişimci Ar-Ge/Yazılım Kazancı — 4691 s.K. GVM Md.2 — KB Halinde
  3. Ar-Ge ve Tasarım İndirimi — 5746 s.K. Md.3 — Zarar Olsa Dahi (devreden takip)
  4. Girişim Sermayesi Fonu İndirimi — KVK Md.10/1-g — KB Halinde (%10/%20 sınır)
  5. Sponsorluk Harcamaları — KVK Md.10/1-b — KB Halinde (amatör %100, profesyonel %50)
  6. Bağış ve Yardımlar — KVK Md.10/1-c,d,e,f — KB Halinde (kazancın %5 veya %10)
  7. Diğer Özel Kanun İstisnaları — Her biri için ayrı yasal dayanak

  ## YİAKV Etkisi
  350 kapsamındaki kalemlerin YİAKV matrahına etkisi kalem bazında farklılık gösterir.
  Her kalem için ayrı analiz zorunludur. Yurt dışı kaynaklı kalemler YİAKV'yi
  etkilemeyebilir; yurt içi kalemler etkileyebilir.

  ## YMM Tasdik Notu
  49 No.lu Tebliğ kapsamında: Tek satır ≥500.000 TL veya toplam ≥1.000.000 TL → YMM raporu.
  Tam tasdik sözleşmesi olanlar ayrıca rapor düzenlemez. 350 setten en riskli satırdır.

muhasebe_kayitlari: |
  ## Genel Not
  350. satırı kapsayan her istisna/indirim kalemi kendi muhasebe kaydı sistemine göre izlenir.
  Aşağıda sık kullanılan kalemlerin temel kayıtları özetlenmiştir.

  ## Serbest Bölge Kazancı (3218 s.K.)
  Borç: 120/102 Alıcılar / Bankalar
  Alacak: 600 Yurt İçi Satışlar (Serbest Bölge geliri ayrı hesapta izlenmeli)
  Beyanname: 350 — 3218 s.K. kapsamı olarak belgelenir.

  ## Teknokent Girişimci Kazancı (4691 s.K.)
  Borç: 120/102 Alıcılar / Bankalar
  Alacak: 600 Yurt İçi Satışlar (TGB içi Ar-Ge/Yazılım geliri ayrı hesap)
  Beyanname: 350 — 4691 s.K. GVM Md.2 kapsamı.

  ## Ar-Ge İndirimi (5746 s.K.)
  Borç: 750 Ar-Ge Giderleri / 760 Pazarlama Giderleri (tasarım)
  Alacak: 102/320 ilgili hesaplar
  Beyanname: 350 — 5746 s.K. Md.3 kapsamı. Zarar döneminde devreder.

  ## Sponsorluk / Bağış (KVK Md.10)
  Borç: 689 Diğer Olağandışı Gider — Sponsorluk/Bağış
  Alacak: 102 Bankalar
  Beyanname: 350 — KVK Md.10/1-b veya c,d kapsamı. Sınır: Kazancın %5 veya %10.

belge_listesi:
  - kategori: zorunlu
    "no": 1
    baslik: Her Kalem İçin Ayrı Yasal Dayanak Belgesi
    detay: "Her istisna/indirim kalemi için kanun maddesi, tebliğ veya özelge referansı yazılı olarak dosyada bulunmalı. Toplu tutar kabul edilmez."
    temin_yeri: Mevzuat / GİB
  - kategori: zorunlu
    "no": 2
    baslik: Serbest Bölge Faaliyet Belgesi (varsa)
    detay: "3218 s.K. kapsamı: Üretim lisansı ve serbest bölge faaliyet/üretim belgesi. AB üyelik tarihi güncelliği kontrol edilmeli."
    temin_yeri: Serbest Bölge Müdürlüğü
  - kategori: zorunlu
    "no": 3
    baslik: TGB Kiracılık Belgesi + Kazanç Ayrıştırma Tablosu (varsa)
    detay: "4691 s.K. kapsamı: TGB içi kiracı firma belgesi ve TGB içi/dışı kazanç ayrımı. Yönetici şirket (311 satırı) için değil."
    temin_yeri: Teknoloji Geliştirme Bölgesi Yönetici Şirketi
  - kategori: zorunlu
    "no": 4
    baslik: Ar-Ge Merkezi Belgesi + Harcama Listesi (varsa)
    detay: "5746 s.K. kapsamı: Bakanlık onaylı Ar-Ge/Tasarım Merkezi belgesi ve nitelikli harcama listesi."
    temin_yeri: Sanayi ve Teknoloji Bakanlığı
  - kategori: zorunlu
    "no": 5
    baslik: Bağış/Sponsorluk Sözleşmesi ve Makbuzlar (varsa)
    detay: "KVK Md.10/1-b,c,d kapsamı: Sözleşme + banka dekontu/makbuz. Sınır hesabı (kazancın %5 veya %10) belgeli olmalı."
    temin_yeri: İlgili Kurum / Banka Dekontu
  - kategori: destekleyici
    "no": 6
    baslik: Kalem Bazında 350 Detay Tablosu (YMM Çalışma Kağıdı)
    detay: "Her kalem: Adı, yasal dayanağı, tutarı, beyanname bölümü (KB Halinde / Zarar Olsa Dahi), belge türü ve YMM durumu."
    temin_yeri: YMM Ofisi / Muhasebe

