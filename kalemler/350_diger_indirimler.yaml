wizard_agaci:
  tetikleyici_soru: "302–349 arasındaki özel satırlara girmeyen bir istisna veya indirim kalemin var mı?"
  info_modal: |
    Beyanname 350. satırı, KV beyannamesindeki 302–349 arasındaki özel satırlara
    dahil edilemeyen tüm istisna ve indirimlerin toplamını içerir.
    **Her kalem için AYRI yasal dayanak ve AYRI belge paketi zorunludur.**
    Toplu tutar yazımı GİB tarafından kabul edilmez — tarhiyat riski taşır.

    Sık kullanılan 350 kalemleri:
    - Serbest Bölge Kazancı İstisnası (3218 s.K.)
    - Teknokent Girişimci/Yazılım Kazancı (4691 s.K.)
    - Ar-Ge ve Tasarım İndirimi (5746 s.K.)
    - Girişim Sermayesi Fonu İndirimi (KVK Md.10/1-g)
    - Bağış ve Sponsorluk İndirimleri (KVK Md.10/1-b,c,d)
    - Diğer Özel Kanun İstisnaları
  kapi_sorulari:
    - id: ozel_satir_kontrolu
      soru: "Beyan etmek istediğin istisna/indirim için 302–349 arasında özel bir satır olmadığı teyit edildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Özel satır varsa 350 değil, o satır kullanılır. Örnek: TGB Yönetici Şirket → 311 | TUGS Gemi → 315 | Ürün Senedi → 349."
    - id: ayri_yasal_dayanak
      soru: "Her kalem için ayrı yasal dayanak ve belge mevcut mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Toplu tutar kabul edilemez — her kalem bağımsız belgelenmeli. GİB her kalemi tek tek açıklatabilir."
    - id: beyanname_bolumu_dogru_mu
      soru: "Her kalemin beyanname bölümü (Kazancın Bulunması Halinde / Zarar Olsa Dahi) doğru mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Ar-Ge indirimi zarar döneminde de uygulanır (Zarar Olsa Dahi). Diğer kalemlerin çoğu Kazancın Bulunması Halinde bölümündedir."

