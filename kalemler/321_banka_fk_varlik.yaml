wizard_agaci:
  tetikleyici_soru: "Banka, finansal kiralama şirketi, finansal şirket veya TMSF'ye olan borçların ödenmesi amacıyla varlık sattınız mı?"
  info_modal: |
    ## Genel Çerçeve

    KVK Madde 5/1-f kapsamındaki istisna, **banka, finansal kiralama şirketi, finansal şirket
    veya TMSF'ye borçlu** olan kurumların bu borçların ödenmesine yönelik gerçekleştirdikleri
    varlık satışlarından elde ettikleri kazançların tamamını (%100) kurumlar vergisinden muaf
    tutar. İstisnanın özü, finansal sıkıntı içindeki kurumları borç yükünden kurtarmak için
    yapılan zoraki varlık satışlarını vergisel açıdan desteklemektir.

    Bu istisna, çoğu zaman karıştırılan **KVK 5/1-e istisnasından (351/352/353 satırları)
    köklü biçimde ayrışır:** 2 yıl aktifinde bulundurma şartı yoktur, 549 Özel Fonlar hesabına
    alma zorunluluğu yoktur, taşınmaz ticareti yapan şirketler de yararlanabilir ve taşınır
    varlıklar da kapsam dahilindedir.

    ## Temel Koşullar

    **1. Alacaklı Kurum Türü:** Satışın amacı aşağıdaki kurumlara olan borcu ödemek olmalıdır:
    - **Banka:** 5411 sayılı Bankacılık Kanunu kapsamında faaliyet gösteren mevduat, katılım,
      kalkınma veya yatırım bankası
    - **Finansal Kiralama Şirketi:** 6361 sayılı Finansal Kiralama, Faktoring ve Finansman
      Şirketleri Kanunu kapsamında BDDK lisansına sahip şirket
    - **Finansal Şirket:** 6361 s.K. kapsamında faktoring, finansman veya varlık yönetim şirketi
    - **TMSF:** Tasarruf Mevduatı Sigorta Fonu (5411 s.K. Ek Madde 1)

    **2. Borç İlişkisinin Varlığı:** Satış tarihi itibarıyla kredi sözleşmesi, leasing sözleşmesi
    veya faktoring sözleşmesiyle belgelenmiş gerçek bir borç ilişkisi zorunludur. Belgesiz
    borç iddiası vergi incelemesinde reddedilir.

    **3. Satışın Amacı:** Varlık satışının **doğrudan ve açıkça** bu borcun ödenmesine yönelik
    yapılması şarttır. Satış hasılatının alacaklı kuruma aktarıldığına dair banka transfer
    dekontu veya ödeme belgesi zorunludur.

    **4. Satışın Tamamlanması:** Mülkiyetin/tasarruf hakkının alıcıya fiilen geçmiş olması
    gerekir. Taşınmaz için tapu devri, hisse için tescil, taşınır için teslim belgesi esas alınır.
    Satış vaadi veya ön sözleşme yeterli değildir.

    ## Önemli Sınırlamalar ve Riskler

    **Emsal Bedel Zorunluluğu:** Alacaklı kuruma doğrudan satış (borç yerine ifa / dation in
    payment) veya ilişkili kişiye satış halinde KVK Madde 13 kapsamında transfer fiyatlandırması
    analizi zorunludur. Emsal fiyatı belirlenmeden yapılan satışlarda değer farkı üzerinden
    tarhiyat yapılabilir; bağımsız değerleme raporu alınması önerilir.

    **Satış Amacının Sınırlılığı:** Satış hasılatının tamamının (veya borcun karşılanan kısmının)
    borç ödemesine tahsis edilmesi gerekir. Hasılatın bir bölümünün başka amaçlarla kullanılması,
    istisnanın orantılı olarak uygulanıp uygulanamayacağını tartışmalı hale getirir.

    **Alacaklı Kurum Kapsamı Dışı:** Leasing şirketi olmayan satıcı kurumlar, sermaye şirketleri
    veya gerçek kişilere yapılan borç ödeme amaçlı satışlar 5/1-f kapsamı dışındadır; yalnızca
    yukarıda sayılan düzenlenmiş finans kurumlarına olan borçlar için geçerlidir.

    **351/352/353 ile Karıştırma Riski:** 2 yıl şartı ve 549 fon şartı KVK 5/1-f'de
    UYGULANMAMALIDIR. Bu farkın beyannamede net biçimde yansıtılması gerekir.

    ## YİAKV İlişkisi

    KVK 5/1-f istisnasının **YİAKV (KVK Madde 32/C) matrahına etkisi tartışmalıdır.** GİB'in
    resmi açıklaması henüz netlik kazanmamış olmakla birlikte, 321. satırdaki istisna tutarının
    YİAKV matrahından indirilip indirilemeyeceği dönem mevzuatı ve özelge gelişmeleri ışığında
    ayrıca analiz edilmelidir.

    Yüksek tutarlı işlemlerde YİAKV etkisinin finansal modele dahil edilmesi ve gerektiğinde
    GİB'den özelge talep edilmesi önerilir.

    ## Pratik Notlar

    - Alacaklı kurumun BDDK/SPK/TMSF statüsünü gösteren resmi belge dosyaya eklenmelidir.
    - Borç ilişkisini gösteren sözleşme ve temerrüt/icra belgesi (veya yeniden yapılandırma
      anlaşması) zorunludur.
    - Banka transfer dekontu veya ödeme belgesi ile hasılatın alacaklıya aktarıldığı kanıtlanmalıdır.
    - Taşınmaz satışında tapu devir senedi, hisse satışında tescil belgesi, taşınır satışında
      fatura ve teslim belgesi gereklidir.
    - 49 No.lu KV GT kapsamında YMM tasdik raporu eşiği kontrol edilmelidir.
  kapi_sorulari:
    - id: alacakli_kurum_turu
      soru: "Alacaklı kurum türü nedir? (Banka, finansal kiralama şirketi, finansal şirket veya TMSF)"
      tip: secenek
      secenekler: [banka_5411, finansal_kiralama_6361, finansal_sirket_6361, tmsf]
      zorunlu: true
      aciklama: "Banka: 5411 s.K. kapsamında. Finansal kiralama/faktoring/finansman: 6361 s.K. kapsamında lisanslı. TMSF: Tasarruf Mevduatı Sigorta Fonu."
    - id: borc_belgesi
      soru: "Borcun varlığı yazılı sözleşme veya belgeyle kanıtlanıyor mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Kredi sözleşmesi, leasing sözleşmesi veya faktoring sözleşmesi + temerrüt/icra belgesi zorunludur. Belgesiz istisna uygulaması vergi incelemesinde reddedilir."
    - id: satis_amaci
      soru: "Satışın amacı borcu ödemek mi? (Satış hasılatı alacaklıya aktarıldı/aktarılacak mı?)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Satıştan elde edilen hasılat borç ödemesine tahsis edilmelidir. Hasılatın alacaklı kuruma aktarıldığına dair banka dekontu/ödeme belgesi zorunludur."
    - id: satis_tamamlandi
      soru: "Satış fiilen tamamlandı mı? (Mülkiyet/tapu/tescil devri gerçekleşti mi?)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Satış vaadi yeterli değildir. Taşınmaz: Tapu devri. Hisse: Devir sözleşmesi + tescil. Taşınır: Teslim belgesi / fatura."

parametreler:
  istisna_orani: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: varlik_turu
      etiket: "Satılan varlık türü"
      tip: secenek
      secenekler: [tasinmaz, istirak_hissesi, tasinir_varlik, kurucu_intifa_senedi, ruchan_hakki]
      zorunlu: true
      yardim: "KVK 5/1-f taşınmaz ve hisse dışında taşınır varlıkları da kapsar. Bu özelliği 351/352/353'ten ayırır."
    - id: satis_bedeli
      etiket: "Satış bedeli (TL)"
      tip: para
      zorunlu: true
      yardim: "Sözleşmedeki satış fiyatı. Alacaklıya veya ilişkili kişiye satışta KVK Md.13 emsal bedel analizi zorunludur."
    - id: defter_degeri
      etiket: "Varlığın muhasebe defter değeri / maliyet (TL)"
      tip: para
      zorunlu: true
      yardim: "Aktif kayıtlı maliyet veya net değer (amortismandan sonra). Maliyet belgesi + amortisman tablosu eklenecek."
    - id: satis_giderleri
      etiket: "Satış giderleri (tapu harcı, komisyon, noter, ekspertiz vb.) (TL)"
      tip: para
      zorunlu: false
      yardim: "Belgelenmiş satış giderleri kazanç hesabında düşülür."
  formuller:
    satis_kazanci: "max(satis_bedeli - defter_degeri - satis_giderleri, 0)"
    istisna_tutari: "satis_kazanci * 1.0"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "satis_bedeli > 0"
      hata: "Satış bedeli pozitif olmalıdır"
    - kural: "defter_degeri >= 0"
      hata: "Defter değeri negatif olamaz"
    - kural: "satis_kazanci > 0"
      hata: "Satış kazancı yoksa (zarar veya başabaş) istisna uygulanamaz"

denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-f: Banka, finansal kiralama şirketi, finansal şirket veya TMSF'ye borçlu
  kurumların bu borçların ödenmesine yönelik yaptıkları varlık satışlarından elde edilen
  kazançların tamamı KV'den istisnadır.

  ## 351/352/353 ile Kritik Farklar
  ① 2 yıl aktifinde bulundurma şartı YOKTUR
  ② 549 Özel Fonlar hesabına alma zorunluluğu YOKTUR
  ③ Taşınmaz ticareti yapan şirketler de yararlanabilir
  ④ %100 tam istisna — kısmi oran yok
  ⑤ Taşınır varlıklar da kapsam içindedir (taşınmaz + hisse + taşınır + kurucu/intifa senedi + rüçhan hakkı)

  ## En Kritik Şart — Borçluluk ve Satış Amacı
  - Kurumun banka/FK/finansal şirket/TMSF'ye GERÇEKten BORÇLU olması zorunlu
  - Satışın bu borcun ödenmesine yönelik yapılması zorunlu
  - Borç ilişkisi: Kredi sözleşmesi + temerrüt/icra belgesi
  - Satış hasılatının alacaklıya aktarıldığına dair banka dekontu

  ## Alacaklı Kurum Türü
  - Banka: 5411 sayılı Kanun kapsamındaki mevduat/katılım/kalkınma/yatırım bankaları
  - Finansal kiralama: 6361 s.K. kapsamında lisanslı FK şirketleri
  - Finansal şirket: 6361 s.K. kapsamında faktoring, finansman, varlık yönetim şirketleri
  - TMSF: 5411 s.K. Ek Madde 1 kapsamında

  ## Emsal Bedel Zorunluluğu
  Alacaklıya doğrudan satış (dation in payment / borç yerine ifa) veya ilişkili kişiye satışta
  KVK Md.13 emsal bedel analizi zorunludur. Bağımsız değerleme raporu önerilir.

  ## YİAKV Etkisi
  KVK 5/1-f istisnasının YİAKV (KVK 32/C) matrahına etkisi dönem mevzuatı ve GİB
  açıklamalarıyla ayrıca analiz edilmelidir.

  ## YMM Tasdik
  49 No.lu Tebliğ (30.12.2025): ≥500.000 TL veya ≥1.000.000 TL → YMM raporu.
  Tam tasdik sözleşmesi olanlar ayrıca rapor düzenlemez.

muhasebe_kayitlari: |
  ## Taşınmaz Satış Kaydı
  Borç: 102 Bankalar (satış hasılatı)
  Alacak: 250/252 Arazi-Arsalar / Binalar (defter değeri)
  Alacak: 679 Diğer Olağandışı Gelir (satış kazancı)
  Açıklama: Satış kazancı — KVK 5/1-f kapsamında %100 istisna, 321 satırına yazılır

  ## İştirak Hissesi Satış Kaydı
  Borç: 102 Bankalar
  Alacak: 242 İştirakler (maliyet)
  Alacak: 645 Menkul Kıymet Satış Kârları (kazanç)
  Açıklama: İştirak satış kazancı — 321 satırında istisna

  ## Banka Transferi (Borç Ödeme)
  Borç: 300/400 Banka Kredileri (kalan borç)
  Alacak: 102 Bankalar
  Açıklama: Satış hasılatının alacaklı bankaya aktarılması

