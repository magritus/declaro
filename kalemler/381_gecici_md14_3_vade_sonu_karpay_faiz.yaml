wizard_agaci:
  tetikleyici_soru: "379/380 kapsamındaki Paragraf 3 TL araç dönem içinde vadeye ulaşarak kâr payı/faiz tahsil edildi mi?"
  info_modal: |
    KVK Geçici Md.14/3 (Paragraf 3): Altın dönüşümü (379) sonrası kurulan TL araç vadeye
    ulaştığında bankadan fiilen alınan kâr payı ve faiz istisnadır.

    **373 / 377 / 381 Karşılaştırması:**
    373 (P1): TL KKM vade sonu kâr payı/faiz | 372-373 mükerrerlik
    377 (P2): Borç → TL araç vade sonu kâr payı/faiz | 376-377 mükerrerlik
    381 (P3): Altın → TL araç vade sonu kâr payı/faiz | 380-381 mükerrerlik

    **KRİTİK — 380-381 Mükerrerlik:**
    Net 381 = Vade Toplam − Önceki Yıl 380 Tahakkuku

    **YİAKV:** Bu istisna KVK 32/C (YİAKV) matrahından DÜŞÜLEMEZ (E.7).
    370-381 tamamı (12 kod) E.7 listesindedir.
  kapi_sorulari:
    - id: altin_donusum_379
      soru: "KVK Geçici Md.14/3 kapsamında altın dönüşümü (379) ve dönem sonu tahakkuku (380) mevcut mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
    - id: vade_geldi
      soru: "Dönem içinde Paragraf 3 TL araç vadeye ulaştı mı? Kâr payı/faiz tahsil edildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
    - id: mukerrerlik_380
      soru: "Önceki yıl 380 tahakkuku yapılmış araç için Net 381 = Vade − Önceki 380 kuralı uygulandı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
    - id: yiakv_dusulemez
      soru: "381 tutarının YİAKV matrahından DÜŞÜLMEYECEĞI teyit edildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet

