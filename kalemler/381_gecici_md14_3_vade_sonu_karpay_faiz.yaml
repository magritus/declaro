denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Md.14/3: 379 kapsamındaki altın dönüşümü sonrası kurulan TL araç vadeye
  ulaştığında fiilen tahsil edilen kâr payı ve faiz istisnadır.

  ## 380-381 Mükerrerlik Kuralı
  Yılı aşan vadeli Paragraf 3 araçlarında:
  Net 381 = Vade Toplam − Önceki 380 Tahakkuku
  Bu kural 372-373 ve 376-377 kurallarının Paragraf 3 karşılığıdır.

  ## Kritik Noktalar
  - 381, Paragraf 3 zincirinin son halkasıdır: 379 → 380 → 381
  - Paragraf 1 araçları → 373. Paragraf 2 araçları → 377. Paragraf 3 araçları → 381.
  - 370-381 tamamı (12 kod) YİAKV matrahından DÜŞÜLEMEZ (E.7)

muhasebe_kayitlari: |
  ## Kayıt — Vade Sonu Tahsilat (Paragraf 3 — Altın Dönüşümü Sonrası)
  Borç: 102 Bankalar (TL)
  Alacak: 181 Gelir Tahakkukları (önceki yıl 380 kapatma)
  Alacak: 642 Faiz Gelirleri (bu yılın yeni kısmı)
  Açıklama: Paragraf 3 altın dönüşümü TL araç vade sonu — 381 istisna (Net: Toplam − Önceki 380)

