wizard_agaci:
  tetikleyici_soru: "Serbest bölgede faaliyet gösteriyor musunuz?"
  info_modal: |
    ## Genel Çerçeve

    3218 Sayılı Serbest Bölgeler Kanunu Geçici Madde 3 kapsamında serbest bölgede yürütülen uygun faaliyetlerden elde edilen kazançlar kurumlar vergisinden istisnadır. **Ruhsat tarihine göre iki farklı rejim** mevcuttur: 06.02.2004 öncesi ruhsat sahipleri Rejim 1 (ruhsat süresi boyunca tüm kapsam içi faaliyetler), 06.02.2004 sonrası ruhsat sahipleri ise Rejim 2 (imalat faaliyetleri) kapsamındadır. **01.01.2025 itibarıyla 7524 sayılı Kanun değişikliğiyle** Rejim 2 kapsamında yalnızca münhasıran yurt dışına yapılan satışlardan elde edilen kazançlar istisna kapsamındadır. İstisna beyannamede **"Zarar Olsa Dahi İndirilecek"** bölümünde 308 numaralı satırda gösterilir.

    ## Temel Koşullar

    - **Geçerli faaliyet ruhsatı:** 3218 sayılı Kanun kapsamında serbest bölge faaliyet ruhsatının geçerli olması zorunludur; süresi dolmuş, iptal edilmiş veya devir sonrası yenilenmemiş ruhsat istisna hakkını ortadan kaldırır.
    - **Rejim tespiti:** Ruhsat tarihi 06.02.2004 öncesiyse Rejim 1 (ruhsatta belirtilen süre boyunca kapsam içi tüm faaliyetler); sonrasıysa Rejim 2 (sadece imalat + münhasıran yurt dışı satış).
    - **İmalat şartı (Rejim 2):** Ticaret, alım-satım veya hizmet faaliyeti Rejim 2 kapsamı dışındadır.
    - **Münhasıran yurt dışı satış (01.01.2025 sonrası Rejim 2):** Yurt içine satış ve SB içi firmaya ihraç kaydı olmaksızın yapılan satış artık istisna kapsamı dışındadır. İhraç kayıtlı teslimde 3 aylık ihracat gerçekleşme şartı takip edilmelidir.
    - **Ayrı muhasebe zorunluluğu (VUK):** SB ve SB dışı kazançlar ayrı hesaplarda izlenmek zorundadır; ayrı muhasebe yoksa istisna vergi incelemesinde reddedilebilir.

    ## Önemli Sınırlamalar ve Riskler

    - **Kapsam dışı gelirler:** Faiz, repo, mevduat, vade farkı ve kira gelirleri kapsam dışıdır. Kur farkı gelirleri için ayrı değerlendirme notu hazırlanmalıdır.
    - **Beyanname 308 satırına brüt hasılat değil net kazanç yazılır:** Maliyet ve giderler düşüldükten sonraki net istisna kazanç tutarı beyannamede gösterilmelidir.
    - **İhraç kayıtlı teslim kuralı:** Alıcının SB'de bulunması ve teslim tarihinden itibaren 3 ay içinde fiilen ihracat gerçekleşmesi şarttır; gerçekleşmezse istisna uygulanamaz.
    - **SB istisnası kâr payı stopajını kaldırmaz:** Kâr dağıtımında %15 stopaj uygulanmaya devam eder.
    - **Ortak gider dağıtımı:** Makul ve belgelenebilir bir anahtara (hasılat oranı, personel, m²) dayanmalıdır.
    - **FOB %85 ücret stopaj terkini** ayrı bir avantaj olup beyanname 308 satırından bağımsız değerlendirilmelidir.

    ## YİAKV İlişkisi

    3218 sayılı Kanun Geçici Madde 3 kapsamındaki serbest bölge kazanç istisnası KVK Madde 32/C (g) bendi gereğince **YİAKV matrahından düşülebilir**. Bu durum 4691 sayılı Kanun TGB istisnasından (düşülemeyen) kritik biçimde farklıdır; YİAKV çalışma kâğıdında bu fark açıkça gösterilmelidir.

    ## Pratik Notlar

    - İhracat belgeleri (gümrük çıkış beyannamesi + fatura), ruhsat belgesi ve satış hasılatı özeti (yurt içi/yurt dışı/SB içi ayrımı) tasdik dosyasının temel belgeleridir.
    - Özel hesap dönemli mükelleflerde 01.01.2025 değişikliği için dönem içi kazanç ayrıştırması yapılmalıdır.
    - 49 No.lu KV Genel Tebliği kapsamında tek satır ≥500.000 TL ise YMM tasdik raporu eşiği kontrol edilmelidir.
  kapi_sorulari:
    - id: sb_ruhsat
      soru: "Geçerli 3218 s.K. kapsamında serbest bölge faaliyet ruhsatınız var mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Süresi dolmuş, iptal edilmiş veya devir sonrası yenilenmemiş ruhsat istisna hakkını ortadan kaldırır."
    - id: rejim_turu
      soru: "Ruhsat tarihiniz 06.02.2004 öncesi mi?"
      tip: evet_hayir
      aciklama: "Evet = Rejim 1: Ruhsat süresi boyunca tüm faaliyetlerden istisna. Hayır = Rejim 2: Yalnızca imalat + münhasıran yurt dışı satış (01.01.2025+)."
    - id: faaliyet_imalaymi
      soru: "Serbest bölgedeki faaliyetiniz imalat (üretim) mı? (Rejim 2 için zorunlu)"
      tip: evet_hayir
      aciklama: "Ticaret, alım-satım veya hizmet faaliyeti Rejim 2 kapsamı dışındadır."
    - id: satis_yurtdisi
      soru: "01.01.2025 ve sonrası için: Satışlarınız münhasıran yurt dışına mı?"
      tip: evet_hayir
      aciklama: "7524 s.K. değişikliği: Yurt içi satış ve SB içi firmaya ihraç kaydı olmaksızın satış artık istisna kapsamı dışındadır."
    - id: kazanc_var_mi
      soru: "Serbest bölge kapsam içi faaliyetinden pozitif kazanç elde edildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Kapsam içi faaliyet kazancı sıfır veya negatif ise istisna tutarı sıfırdır."

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: rejim
      etiket: "Ruhsat rejimi"
      tip: secenek
      secenekler: ["rejim_1_2004_oncesi", "rejim_2_2004_sonrasi"]
      zorunlu: true
      yardim: |
        Rejim 1 (06.02.2004 öncesi ruhsat): Ruhsatta belirtilen süre boyunca tüm faaliyetlerden elde edilen
        kazançlar istisna kapsamında (imalat+ticaret+hizmet; taşınmaz geliri hariç).
        Rejim 2 (06.02.2004 sonrası ruhsat): 01.01.2025 itibarıyla yalnızca imalat faaliyetinden ve
        münhasıran yurt dışına yapılan satışlardan elde edilen kazançlar istisna kapsamında.
    - id: kapsam_ici_kazanc
      etiket: "Kapsam içi (net istisna) kazanç tutarı"
      tip: para
      zorunlu: true
      yardim: |
        Serbest bölge gelir ayrıştırma tablosundan (C bölümü) türetilen ve üretim maliyeti ile
        kapsama düşen gider payı düşüldükten sonraki net istisna kazanç tutarı (D.7 karşılığı).
        Kapsam dışı gelirler (faiz, kur farkı, vade farkı, yurt içi satış — 01.01.2025+) dahil edilmez.
  formuller:
    istisna_tutari: "kapsam_ici_kazanc * oran"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "kapsam_ici_kazanc >= 0"
      hata: "Kapsam içi kazanç negatif olamaz. Serbest bölge kapsam içi faaliyeti zararda ise istisna tutarı sıfırdır."

denetci_notlari: |
  ## I. Yasal Dayanak ve Rejim Tespiti

  3218 s.K. Geçici Md. 3/1 (REJİM 1 — 06.02.2004 VE ÖNCESİ RUHSAT):
  Bu bölgelerde faaliyette bulunmak üzere ruhsat almış mükelleflerin, ruhsatlarında belirtilen
  süre ve faaliyet konularına uygun faaliyetlerinden elde ettikleri kazançlar kurumlar vergisinden
  istisnadır.

  3218 s.K. Geçici Md. 3/2 (REJİM 2 — 06.02.2004 SONRASI RUHSAT):
  Serbest bölgelerde imalat faaliyetinde bulunan mükelleflerin bu bölgelerde imal ettikleri
  ürünlerin satışından elde ettikleri kazançlar Avrupa Birliği'ne tam üyeliğin gerçekleştiği
  yılın vergilendirme döneminin sonuna kadar kurumlar vergisinden istisnadır.

  7524 s.K. Md. 24 Değişikliği (01.01.2025 yürürlük):
  Rejim 2 kapsamında istisna, 01.01.2025 tarihinden itibaren yalnızca MÜNHASIRAN YURT DIŞINA
  yapılan satışlardan elde edilen kazançlara uygulanır.

  ## II. 01.01.2025 Kırılım Tablosu

  | Satış Türü                                  | 2024 ve Öncesi | 01.01.2025 Sonrası |
  |---------------------------------------------|----------------|--------------------|
  | Yurt dışı ihracat (Rejim 2 / imalat)        | İstisna        | İstisna (devam)    |
  | İhraç kayıtlı teslim (SB ihracatçısına)     | İstisna        | İstisna (3 ay şartı)|
  | Yurt içine satış (Rejim 2 / imalat)         | İstisna        | İSTİSNA YOK        |
  | SB içi satış (ihraç kaydı olmaksızın)       | İstisna        | İSTİSNA YOK        |
  | Ticaret/alım-satım faaliyeti (Rejim 2)      | İstisna yok    | İSTİSNA YOK        |
  | Rejim 1 — Tüm faaliyetler (ruhsat süresi)  | İstisna        | İstisna (devam)    |

  Özelge (Ocak 2026): SB içi alıcının sonradan ihraç etmesi üreticiyi kurtarmaz.

  ## III. Aracı İhracatçı Kuralı ve 3 Aylık Şart (23 Seri No.lu KV GT)

  İHRAÇ KAYITLI TESLİM (İstisna Kapsamında):
  - Aynı veya başka SB'deki ihracatçıya ihraç kayıtlı teslim → İstisna uygulanır.
  - 3 aylık şart: Teslim tarihini takip eden ay başından itibaren 3 ay içinde fiilen ihracat
    gerçekleşmeli. Gerçekleşmezse istisna uygulanamaz.

  İSTİSNA KAPSAMINDA OLMAYAN:
  - Türkiye içindeki firmaya (SB dışı) ihraç kayıtlı satış → İstisna yok.
  - SB içi firmaya ihraç kaydı olmaksızın satış → İstisna yok.

  ## IV. YİAKV, Stopaj ve Muhasebe Kuralları

  YİAKV (KVK Md. 32/C):
  3218 s.K. Geçici Md. 3 kapsamındaki serbest bölge kazanç istisnası YİAKV matrahından
  DÜŞÜLEBİLİR (KVK 32/C (g) bendi). Bu durum 4691 s.K. istisnasından (düşülemeyen)
  kritik şekilde farklıdır. YİAKV matrahı ayrı tabloda hesaplanmalı.

  STOPAJ: SB kazanç istisnası kâr payı stopajını (GVK Md. 94/6-b, KVK Md. 15/30) KALDIRMAZ.
  Kâr payı dağıtımında %15 stopaj uygulanır.

  MUHASEBE ZORUNLULUĞU (VUK): SB ve SB dışı kazançlar ayrı ayrı tespit edilebilecek şekilde
  kaydedilmek zorundadır. Ayrı muhasebe kaydı olmaksızın istisna tutarı vergi incelemesinde
  reddedilebilir.

  FOB %85 ÜCRET STOPAJ TERKİNİ: 3218 s.K. Geçici Md. 3/2-b — İmalat ürünlerinin FOB bedelinin
  ≥%85'ini yurt dışına ihraç eden mükelleflerin çalışanlarına ödenen ücretler üzerinden
  hesaplanan gelir vergisi muhtasar beyanname üzerinden terkin edilir. Bu beyan 308 satırından
  bağımsızdır.

  ## V. Kritik Metodolojik Uyarılar

  - UYARI 1: "Şirket SB'de faaliyet gösteriyor" demek tüm kazancın istisna kapsamında olduğu
    anlamına gelmez. Yalnızca ruhsatta belirtilen faaliyet konusundan doğan kazanç kapsam içidir.
  - UYARI 2: Faiz, repo, mevduat, vade farkı ve kira gelirleri kapsam dışıdır. Kur farkı
    gelirleri için YMM yazılı değerlendirme notu hazırlanmalıdır.
  - UYARI 3: Ortak gider dağıtımı makul ve belgelenebilir bir anahtara (hasılat oranı, personel,
    m²) dayanmalıdır.
  - UYARI 4: Beyanname 308 satırına brüt kapsam içi hasılat değil, maliyet ve gider
    düşüldükten sonraki net istisna kazanç yazılmalıdır.
  - UYARI 5: 308 kodu "Zarar Olsa Dahi İndirilecek" bölümündedir — genel dönem zararından
    bağımsız olarak, kapsam içi faaliyet kazancı pozitif olduğu sürece uygulanır.

muhasebe_kayitlari: |
  ## Kayıt 1 — Yurt Dışı Satış Geliri ve Maliyet (01.01.2025+ İstisna Kapsamı — Rejim 2)
  Borç: 121 Alacak Senetleri / 102 Bankalar — İhracat bedeli (FOB, TCMB alış kuru)
  Alacak: 601 Yurt Dışı Satışlar (SB Bağımsız Hesap) — SB kaydında yurt dışı satış ayrı hesapta
  Borç: 620 Satılan Mamulün Maliyeti (SB) — SB'de üretilen ürünün maliyeti
  Alacak: 152 Mamuller / 151 Yarı Mamuller (SB) — SB stok çıkışı

  ## Kayıt 2 — İhraç Kayıtlı Teslim (Aynı/Başka SB İhracatçısına) ve 3 Aylık Takip
  Borç: 121 Alacak Senetleri / 102 — İhraç kayıtlı teslim bedeli
  Alacak: 601 YD Satışlar (İhraç Kayıtlı — SB) — İhraç kayıtlı satış, SB ayrı hesap
  Not: 3 ay içinde ihracat gerçekleşti ise → 620 Satılan Mamul Maliyeti borç ile kapatılır.

  ## Kayıt 3 — Personel Ücret İstisnası: FOB ≥%85 GV Stopaj Terkini (Muhtasar Beyanname)
  Borç: 360 Ödenecek Vergi ve Fonlar (GV Stopaj) — Ücret üzerinden hesaplanan GV stopajı
  Alacak: 360 Ödenecek Vergi — Muhtasar beyanname üzerinden terkin

  Not: VUK zorunluluğu — SB ve SB dışı kazançlar ayrı hesaplarda izlenmeli (örn. 601.01
  Yurt Dışı Satışlar / SB, 601.02 Yurt İçi Satışlar / SB Dışı).

