wizard_agaci:
  tetikleyici_soru: "31/12/2021 bilançosunda yabancı para mevcudu var mıydı ve bu para TL KKM hesabına dönüştürüldü mü?"
  info_modal: |
    KVK Geçici Md.14/1-a kapsamında, 31/12/2021 tarihli bilançoda yer alan yabancı para
    (döviz tevdiat hesabı dahil) bakiyelerinin Kur Korumalı Mevduat (KKM) hesabına
    dönüştürülmesi sırasında oluşan tek seferlik kur farkı değerleme kazancı istisnadır.

    **KRİTİK — YİAKV:** Bu istisna KVK 32/C (YİAKV) matrahından DÜŞÜLEMEZ.
    YİAKV E.7 listesinde yer almaktadır.
  kapi_sorulari:
    - id: bilanco_doviz_bakiyesi
      soru: "31/12/2021 tarihli bilançonuzda yabancı para mevduatı veya döviz tevdiat hesabı bakiyesi var mıydı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Yalnızca 31/12/2021 bilançosundaki bakiyeler kapsam dahilindedir. Sonraki dönemde edinilen dövizler kapsam dışıdır."
    - id: kkm_donusum_yapildi
      soru: "Bu dövizler yasal süre içinde TL KKM (Kur Korumalı Mevduat) hesabına dönüştürüldü mü?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "KKM hesabı TL cinsinden ve korumalı (garantili) olmalıdır. Dönüşüm tarihi banka belgesiyle teyit edilmelidir."
    - id: kur_farki_kazanc_olustu
      soru: "Dönüşüm anında bilanço tarihi kuru ile dönüşüm günü kuru arasında pozitif kur farkı kazancı oluştu mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Olumsuz kur farkı (TL değer kaybı döneminde) varsa 370 tutarı sıfır olacaktır."
    - id: yiakv_dusulemez_onaylandi
      soru: "370 tutarının YİAKV (KVK Md.32/C) matrahından DÜŞÜLMEYECEĞI teyit edildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "KVK Geçici Md.14 kapsamı kazançlar YİAKV matrahından DÜŞÜLEMEZ (E.7). Hatalı uygulama YİAKV tarhiyatı riskine yol açar."

parametreler:
  oran: 1.0
  ymm_tasdik_esigi_tl: 500000

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: bilanco_doviz_tutari_tl
      etiket: "31/12/2021 bilanço tarihindeki yabancı para bakiyesi (TL karşılığı)"
      tip: para
      zorunlu: true
      yardim: "Bilanço tarihi TCMB döviz alış kuru üzerinden TL'ye çevrilen tutar"
    - id: donusum_gun_kuru_tl
      etiket: "Dönüşüm günü TCMB döviz alış kuru (1 birim yabancı para = ? TL)"
      tip: sayi
      zorunlu: true
    - id: bilanco_gun_kuru_tl
      etiket: "31/12/2021 bilanço günü TCMB döviz alış kuru"
      tip: sayi
      zorunlu: true
    - id: doviz_miktari
      etiket: "Dönüştürülen yabancı para miktarı (yabancı para birimi)"
      tip: sayi
      zorunlu: true
    - id: beyan_edilen_istisna
      etiket: "Beyan edilen 370 istisna tutarı (doğrudan giriş)"
      tip: para
      zorunlu: false
      yardim: "Formül yerine doğrudan beyan tutarı girilecekse kullanın"
  formuller:
    kur_farki_kazanci: "(donusum_gun_kuru_tl - bilanco_gun_kuru_tl) * doviz_miktari"
    istisna_tutari: "max(kur_farki_kazanci, 0)"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "kur_farki_kazanci >= 0"
      hata: "Kur farkı negatif — değerleme kazancı oluşmamış. 370 istisnası uygulanamaz."

denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Md.14/1-a: 31/12/2021 tarihli bilançoda yer alan yabancı paralar ile
  altın hesaplarının Türk lirası mevduat veya katılım hesabına (KKM) dönüştürülmesi
  sırasında oluşan değerleme kazançları istisna kapsamındadır.

  ## Kritik Noktalar
  - Kapsam YALNIZCA 31/12/2021 bilanço yabancı para bakiyelerini kapsar
  - Dönüşüm tarihi Cumhurbaşkanı kararlarıyla belirlenen yasal süre içinde olmalıdır
  - KKM hesabı TL cinsinden açılmış, garantili/korumalı hesap olmalıdır
  - 370 (değerleme kazancı) ile 371 (faiz/kâr payı) AYRI beyanname satırlarıdır — karıştırılmamalıdır
  - Banka döviz dönüşüm dekontu + KKM hesap açılış belgesi zorunludur

  ## YİAKV Etkisi — KRİTİK
  370 kapsamındaki değerleme kazancı istisnası YİAKV (KVK Md.32/C) matrahından
  DÜŞÜLEMEZ (E.7 DÜŞÜLEMEZ listesi). Asgari vergide matrahta kalır.
  Hatalı uygulama → YİAKV tarhiyatı + vergi ziyaı cezası + gecikme faizi riski.

  ## 370 vs 371 Ayrımı
  370: Dönüşüm anındaki tek seferlik kur farkı kazancı (Md.14/1-a)
  371: KKM hesabı boyunca bankadan alınan kur farkı tazminat ödemeleri (Md.14/1-b)
  Her ikisi için ayrı çalışma kâğıdı düzenlenmelidir.

muhasebe_kayitlari: |
  ## Kayıt 1 — Dönüşüm Anında Kur Farkı Kazancı
  Borç: 102 Bankalar (KKM Hesabı — TL)
  Alacak: 100/101 Kasa/Bankalar (Döviz Hesabı)
  Alacak: 646 Kambiyo Kârları (Kur Farkı Kazancı — 370 İstisna Tutarı)
  Açıklama: 31/12/2021 döviz bakiyesi TL KKM'ye dönüşümü — kur farkı kazancı

  ## Kayıt 2 — KV Beyannamesi Dönemi — İstisna Kaydı
  Not: 646 hesabına alınan kur farkı kazancı beyannamede 370 satırında indirilir.
  YİAKV matrahında bu tutar DÜŞÜLEMEZ; YİAKV hesabında ayrıca gösterilmeli.

