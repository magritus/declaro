denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Madde 14/4 (Paragraf 4): KVK Geçici Md.14'e sonradan eklenen Paragraf 4
  kapsamındaki araçlardan dönem sonu VUK değerlemesiyle tahakkuk eden faiz ve kâr payı
  istisnası. 7352 Sayılı Kanun kapsamında yürürlüğe girmiştir.
  GİB KV Beyan Rehberi Mart 2026 (No:606) referans alınmalıdır.

  ## Paragraf 4 Kapsam Analizi (KRİTİK)
  Paragraf 4, Paragraf 1-3'ten farklı bir kapsama sahiptir. Olası kapsam alanları:
  - Özel TL araçlar (tahvil, sertifika vb.)
  - Belirli tarih aralıklarında açılan TL hesaplar
  - Kurumsal yatırımcı hesapları
  - Genişletilmiş KKM penceresi araçları
  - Diğer Paragraf 1-3 dışı TL dönüşüm enstrümanları
  YMM, GİB KV Beyan Rehberi Mart 2026 (No:606) ve ilgili CB Kararları çerçevesinde
  müşteriye özgü Paragraf 4 kapsamı analizi yapmalı ve belgelemelidir.

  ## 372/376/380 ile Mükerrerlik
  Aynı araç için yalnızca bir paragraf kodu uygulanabilir. Paragraf 4 araçlarının
  1-3 paragraflarından ayrıştırılması zorunludur.

  ## Muhasebe Mekanizması
  - Dönem sonu (31.12): Borç 181 Gelir Tahakkukları / Alacak 642 Faiz Gelirleri
  - 372 (P1), 376 (P2), 380 (P3) ile aynı muhasebe mekanizması
  - Tahsil döneminde 181 kapatılır; bu dönem tekrar 383 uygulanmaz

  ## YİAKV Etkisi (KVK Md.32/C)
  KVK Geçici Md.14 kapsamındaki tüm istisnalar YİAKV matrahından DÜŞÜLEMEZ.
  YİAKV E.7'de 383 de kontrol edilmelidir.

  ## Beyanname Bölümü
  "Kazancın Bulunması Halinde İndirilecek" — zarar döneminde uygulanamaz.

muhasebe_kayitlari: |
  ## Kayıt 1 — Dönem Sonu (31 Aralık): Paragraf 4 Araç Faiz/Kâr Payı Tahakkuku
  Borç:    181 Gelir Tahakkukları           [Tahakkuk eden faiz/kâr payı tutarı]
  Alacak:  642 Faiz Gelirleri / 644 Kâr Payları [Aynı tutar]
  Açıklama: KVK Geçici Md.14/4 kapsamı TL araç → Beyanname 383
  Kaynak: Banka dönem sonu bildirimi — VUK Md.280/281
  Not: 372 (P1) / 376 (P2) / 380 (P3) ile aynı muhasebe mekanizması (181/642).
  Fark: yasal dayanak Paragraf 4 (Md.14/4).

  ## Kayıt 2 — Tahsil (İzleyen Dönem): 181 Kapatma
  Borç:    102 Bankalar             [Faiz/kâr payı tahsilatı]
  Alacak:  181 Gelir Tahakkukları   [Önceki dönem 383 tahakkuku kapatma]
  Not: 383-384 mükerrerlik kuralı — önceki yıl 383 mahsubu izleyen dönem 384'te yapılır.

