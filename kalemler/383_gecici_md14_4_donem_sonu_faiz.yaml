    **GİB özelgesi:** Paragraf 4 kapsamı belirsiz veya tartışmalıysa GİB özelgesi
    alınması zorunludur.

    **Muhasebe:** Borç 181 Gelir Tahakkukları / Alacak 642 Faiz Gelirleri

    **YİAKV uyarısı:** Bu istisna YİAKV matrahından DÜŞÜLEMEZ (YİAKV E.7 listesi).
