      aciklama: "382 = 379+380+381 DIŞINDA kalan Paragraf 3 vade sonu kazançları. Üç kodun kapsamını önce kontrol edin."
    - id: vade_tarih
      soru: "Vade tarihi dönem içinde (01.01-31.12) mi?"
      tip: evet_hayir
      zorunlu_cevap: evet

