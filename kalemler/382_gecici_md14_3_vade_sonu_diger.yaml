denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Madde 14/3 (Paragraf 3): Altın hesabı dönüşümü (379) sonrası kurulan TL
  araçtan vade sonunda oluşan, 379/380/381 kapsamı dışındaki diğer kazançlar istisnası.
  7352 Sayılı Kanun kapsamında yürürlüğe girmiştir.
  382, KVK Geçici Md.14 paketinin son kodu (13. kod) olup 370-382 paketi tamamlanmıştır.

  ## Kapsam (382 = "Diğer")
  - Altın fiyat farkı ek kazancı (vade süresindeki ek fiyat hareketleri)
  - Prim / teşvik ödemesi (faiz/kâr payı niteliğinde olmayan banka ödemesi)
  - Özel TL araç getirisi (faiz/kâr payı dışındaki ek getiri)
  - Diğer: 379/380/381 kapsamına girmediği açık olan her türlü Paragraf 3 vade sonu kazancı

  ## 379/380/381 ile Mükerrerlik
  Net 382 = Brüt 382 − Mükerrer Tutarlar. Mükerrer olanlar (379/380/381'de zaten gösterilen)
  382'ye yazılmaz. 374 (P1) ve 378 (P2) ile de ayrıştırma: Altın araçları → 382.

  ## YİAKV Etkisi (KVK Md.32/C)
  370-382 (13 kod) tamamı YİAKV matrahından DÜŞÜLEMEZ. Bu kod paketin son kodu olup
  YİAKV E.7 son güncellemesinde 13 kodun tamamı eksiksiz yer almalıdır.

  ## Beyanname Bölümü
  "Kazancın Bulunması Halinde İndirilecek" — zarar döneminde uygulanamaz.

muhasebe_kayitlari: |
  ## Kayıt 1 — Vade Sonu: Paragraf 3 Diğer Kazanç Tahsilatı
  Borç:    102 Bankalar / Çeşitli Hesap         [Vade sonu diğer kazanç tutarı]
  Alacak:  646 Kambiyo Kârları / 679 Diğer Kâr  [Kazanç türüne göre seçilir]
             / 648 Diğer Gelirler
  Açıklama: KVK Geçici Md.14/3 Paragraf 3 vade sonu diğer kazanç → Beyanname 382

  Not: 374 (P1: TL KKM vade diğer), 378 (P2: Borç TL araç vade diğer), 382 (P3: Altın
  TL araç vade diğer) — aynı muhasebe mekanizması, farklı yasal dayanak.

