wizard_agaci:
  tetikleyici_soru: "KVK Geçici Md.14/3 kapsamında altın hesabı dönüşümü (379) sonrası vade sonu kazancı oluştu mu ve bu kazanç 379/380/381 kapsamına girmiyor mu?"
  info_modal: |
    ## Genel Çerçeve

    KVK Geçici Madde 14, 7352 Sayılı Kanun ile 24/12/2021 tarihinde yürürlüğe girmiştir.
    382, KVK Geçici Madde 14'ün tüm üç Paragrafını kapsayan on üç kodun (370–382) sonuncusudur.
    Paragraf 3 (379–382) altın zincirinin "diğer kazançlar" kodu olarak paketin kapanışını
    oluşturur.

    ## Bu Satırın Kapsamı

    Beyanname **382**, 379 (altın dönüşüm kazancı) kapsamındaki dönüşüm sonrasında kurulan TL
    araçtan vade sonunda elde edilen kazançların 379 (dönüşüm kazancı), 380 (dönem sonu
    tahakkuk) ve 381 (vade sonu kâr payı/faiz) dışında kalan kısmını kapsar. Paragraf 1'deki
    374 ve Paragraf 2'deki 378 ile aynı "diğer kazançlar" mantığını taşır; fark bağlantılı
    dönüşüm kodudur. Başlıca 382 kalemleri: vade süresindeki ek altın fiyat hareketlerinden
    kaynaklanan getiri (dönüşüm anı dışında oluşan), faiz/kâr payı niteliği taşımayan prim
    veya teşvik ödemeleri ve TL araçtan faiz dışında elde edilen diğer getiriler.

    ## Temel Koşullar

    - 379/380/381 çalışma kâğıtları hazır olmalıdır (382, Paragraf 3 zincirinin
      tamamlayıcısıdır; zincir olmadan kapsamı belirlenemez)
    - Kazanç türü 379, 380 veya 381 kapsamına **girmemelidir**; önce üç kodun kapsamı
      test edilmeli, sonra 382 uygulanmalıdır
    - Vade tarihi dönem içinde (01.01–31.12) gerçekleşmiş olmalıdır
    - 374 (Paragraf 1) ve 378 (Paragraf 2) ile paragraf ayrımı yapılmış olmalıdır

    ## Önemli Uyarılar

    - **379/380/381 ile mükerrerlik:** 382 tutarının önceki üç koddaki tutarlarla çakışmadığı
      belgelenmelidir. Aynı altın fiyat farkı kazancı hem 379 hem 382'ye yazılmamalıdır
    - **Özelge önceliği:** 382'nin "diğer" niteliği tartışmalı olabilir. Vade süresindeki ek
      altın fiyat hareketi kazancının nasıl hesaplanacağı veya prim/bonusun faiz sayılıp
      sayılmayacağı belirsizse GİB özelgesi tavsiye edilir
    - **YİAKV E.7 son kod:** 382, on üç kodun sonuncusudur. YİAKV E.7 listesinin 382 dahil
      güncel olduğu teyit edilmelidir; eski şablonlar eksik olabilir
    - **YMM tasdik eşiği:** 49 No.lu KV Genel Tebliği uyarınca ≥ 500.000 TL ise YMM raporu
      zorunludur

    ## YİAKV İlişkisi

    Bu istisna YİAKV matrahından **DÜŞÜLEMEZ** — beyanname E.7 bölümünde gösterilir.
    370–382 arası on üç kodun tamamı E.7 listesinde yer almalıdır. 382, KVK Geçici Madde 14
    paketinin son kodu olduğundan E.7'nin güncel tutulması özellikle önemlidir.

    ## Pratik Notlar

    - **On üç kod tamamlandı:** 370 (P1a) + 371–374 (P1b) + 375–378 (P2) + 379–382 (P3) =
      13 kod. 382 bu paketin kapanış kodudur; tüm Paragraflar eksiksiz tamamlanmıştır
    - **374 ve 378 ile kıyaslama:** 374 (Paragraf 1 mevduat-altın araçları), 378 (Paragraf 2
      borç araçları), 382 (Paragraf 3 altın zinciri araçları) — üçü aynı "diğer" mantığını
      paylaşır. Her araç yalnızca kendi Paragraf'ının koduna yazılır
    - **Muhasebe kodu:** 382 kapsamındaki kazançlar 646, 648 veya 679 hesabına alınır; 642
      Faiz Gelirleri hesabıyla karıştırılmamalıdır
