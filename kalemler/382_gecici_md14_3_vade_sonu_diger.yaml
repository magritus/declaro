  info_modal: |
    KVK Geçici Madde 14/3 (Paragraf 3) kapsamında altın hesabı TL'ye dönüştürüldükten
    (379) sonra kurulan TL araçtan vade sonunda oluşan, **379/380/381 kapsamına girmeyen**
    diğer kazançlar kurumlar vergisinden istisnadır (Beyanname 382).

    382, 370-382 KVK Geçici Md.14 paketinin son kodudur (13 kodun tamamı tamamlanmıştır).

    **Başlıca 382 kalemleri:**
    - Altın fiyat farkı ek kazancı (379 dönüşüm anı dışında vade süresindeki ek fiyat hareketleri)
    - Prim / teşvik ödemesi (faiz/kâr payı niteliğinde olmayan)
    - Özel TL araç getirisi (faiz/kâr payı dışındaki ek getiri)
    - Diğer (379/380/381 kapsamına girmediği açık olan Paragraf 3 vade sonu kazançları)

    **YİAKV uyarısı:** Bu istisna YİAKV matrahından DÜŞÜLEMEZ (YİAKV E.7 listesi).
