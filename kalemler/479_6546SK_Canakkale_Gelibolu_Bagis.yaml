wizard_agaci:
  tetikleyici_soru: "6546 sayılı Kanun kapsamında Çanakkale Savaşları Gelibolu Tarihi Alanı Başkanlığı'na bağış, yardım veya sponsorluk harcaması yaptınız mı?"
  info_modal: |
    ## Genel Çerçeve

    **6546 sayılı Kanun** kapsamında Çanakkale Savaşları Gelibolu Tarihi Alanı
    Başkanlığı'na yapılan **bağış ve yardımların** tamamı ile alan bünyesindeki
    etkinlik ve faaliyetlere yönelik **sponsorluk harcamalarının** tamamı kurumlar
    vergisi matrahından indirilir.

    ## İki Kategori — Aynı Beyanname Satırı

    479, iki farklı harcama türünü tek beyanname satırında birleştirir:

    1. **Bağış ve Yardımlar** — Gelibolu Tarihi Alanı Başkanlığı'na yapılan nakdi
       veya ayni bağışların tamamı
    2. **Sponsorluk Harcamaları** — Alan bünyesindeki etkinlik/faaliyetlere yönelik
       sponsorluk harcamalarının tamamı

    **Not:** KVK 10/1-b'deki %50/%100 ayrımı geçerli değildir — 6546 Md. kapsamında
    her iki kategori de tamamının indiriminden yararlanır.

    ## Alıcı Niteliği

    Yalnızca **Çanakkale Savaşları Gelibolu Tarihi Alanı Başkanlığı** alıcı olabilir.
    Çanakkale bölgesindeki başka kamu kurumu veya vakıf → Kapsam dışı.

    ## YİAKV İlişkisi

    **479 kapsamındaki bağış/sponsorluk YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.**
    YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir ancak matraha etki etmez.
  kapi_sorulari:
    - id: alici_gelibolu_baskanligi
      soru: "Ödeme/harcama Çanakkale Savaşları Gelibolu Tarihi Alanı Başkanlığı'na mı yapıldı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "6546 s.K. kapsamında yalnızca Gelibolu Tarihi Alanı Başkanlığı alıcı olabilir. Çanakkale bölgesindeki başka kamu kurumu veya vakıf → Kapsam dışı."
    - id: islem_niteligi
      soru: "İşlemin niteliği bağış/yardım mı, sponsorluk harcaması mı, yoksa her ikisi mi?"
      tip: secim
      secenekler:
        - deger: bagis_yardim
          etiket: "Bağış/Yardım (Tamamı indirilir)"
        - deger: sponsorluk
          etiket: "Sponsorluk Harcaması (Tamamı indirilir)"
        - deger: her_ikisi
          etiket: "Her ikisi"
      aciklama: "Bağış ve sponsorluk aynı beyanname satırında toplanır ancak tutarlar ayrı girilir. KVK 10/1-b %50/%100 ayrımı burada geçerli değil."
    - id: fiili_gerceklesti
      soru: "İşlem fiilen gerçekleşti mi? (Nakdi: Banka — Ayni/Sponsorluk: Sözleşme + ödeme belgesi)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Nakdi: Banka dekontu. Ayni: Teslim tutanağı. Sponsorluk: Yazılı sözleşme + fiili ödeme belgesi."
    - id: makbuz_protokol
      soru: "Alan Başkanlığı'ndan resmi makbuz / protokol alındı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Bağış için resmi makbuz veya kabul yazısı. Sponsorluk için yazılı sözleşme."

