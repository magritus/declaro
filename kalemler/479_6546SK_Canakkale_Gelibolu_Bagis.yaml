hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: nakdi_bagis_tutari
      etiket: "Nakdi bağış tutarı (TL) — Banka yoluyla yapılan ödemeler"
      tip: para
      zorunlu: false
      yardim: "Banka EFT/havale ile Gelibolu Tarihi Alanı Başkanlığı'na yapılan nakdi bağışların toplamı."
    - id: ayni_bagis_degeri
      etiket: "Ayni bağış değeri (TL) — Teslim edilen malın maliyet/net defter değeri"
      tip: para
      zorunlu: false
      yardim: "Ayni bağış varsa maliyet veya net defter değeri. Piyasa değeri değil maliyet esas."
    - id: sponsorluk_tutari
      etiket: "Sponsorluk harcaması tutarı (TL) — Etkinlik/faaliyet sponsorluğu"
      tip: para
      zorunlu: false
      yardim: "Alan Başkanlığı bünyesindeki etkinlik ve faaliyetlere yönelik sponsorluk harcamalarının toplamı. Yazılı sözleşme şarttır."
  formuller:
    toplam_bagis: "nakdi_bagis_tutari + ayni_bagis_degeri"
    istisna_tutari: "nakdi_bagis_tutari + ayni_bagis_degeri + sponsorluk_tutari"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "nakdi_bagis_tutari >= 0 and ayni_bagis_degeri >= 0 and sponsorluk_tutari >= 0"
      hata: "Tutarlar negatif olamaz."
    - kural: "nakdi_bagis_tutari + ayni_bagis_degeri + sponsorluk_tutari > 0"
      hata: "En az bir bağış/sponsorluk tutarı girilmelidir."

denetci_notlari: |
  ## Yasal Dayanak
  6546 sayılı Çanakkale Savaşları Gelibolu Tarihi Alanı Hakkında Kanun kapsamında
  Gelibolu Tarihi Alanı Başkanlığı'na yapılan bağış/yardımların tamamı ve
  sponsorluk harcamalarının tamamı kurumlar vergisi matrahından indirilir.
  GİB KV Beyan Rehberi Mart 2026 (Yayın No:606) esas alınmıştır.

  ## Bileşik Yapı
  479 = Bağış/Yardım + Sponsorluk (her ikisi de tamamının indirimi)
  KVK 10/1-b kapsamındaki %50/%100 ayrımı 479 için geçerli değil.

  ## İndirim Kuralları
  - Tamamının indirimi — kazanç yüzdesiyle sınırlı değil
  - Matrahı aşan kısım sonraki yıla devredilmez

  ## Kritik Kontroller
  - Alıcı yalnızca Gelibolu Tarihi Alanı Başkanlığı olabilir
  - Bağış ve sponsorluk tutarları ayrı belgelenmeli (ayrı tablolar)
  - Sponsorlukta yazılı sözleşme + fiili ödeme şartı
  - Nakdi bağışta banka dekontu, ayni bağışta teslim tutanağı

  ## YİAKV Etkisi
  479 bağış/sponsorluk YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir.

  ## YMM Tasdik
  İndirim tutarı ≥500.000 TL ise YMM tasdik raporu zorunludur (49 No.lu KV GT).
  Tam tasdik kapsamındaki mükelleflerde ayrıca rapor düzenlenmez.

muhasebe_kayitlari: |
  ## Nakdi Bağış Kaydı
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Bağış gideri)
  Alacak: 102 Bankalar
  Açıklama: 6546 s.K. kapsamında Gelibolu Tarihi Alanı Başkanlığı'na nakdi bağış.

  ## Sponsorluk Harcaması Kaydı
  Borç: 760/770 Pazarlama/Genel Yönetim Giderleri (Sponsorluk gideri)
  Alacak: 102 Bankalar
  Açıklama: 6546 s.K. kapsamında Gelibolu Tarihi Alanı etkinlik sponsorluğu.

  ## Beyanname
  Bağış + Sponsorluk toplamı beyanname 479. satırına aktarılır.
  Matrahı aşan kısım devredilemez.

