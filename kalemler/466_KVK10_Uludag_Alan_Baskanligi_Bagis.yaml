wizard_agaci:
  tetikleyici_soru: "Uludağ Alan Başkanlığına bağış, yardım veya sponsorluk harcaması yaptınız mı?"
  info_modal: |
    ## Genel Çerçeve

    **7432 sayılı Kanun Madde 8** kapsamında, **Uludağ Alan Başkanlığına**
    yapılan bağış/yardımlar ve sponsorluk harcamalarının **tamamı** kurumlar
    vergisi matrahından indirilir.

    ## İki Kategori — Aynı Beyanname Kodu

    **1. Bağış ve Yardımlar:**
    Uludağ Alan Başkanlığına yapılan nakdi veya ayni bağış ve yardımların
    tamamı indirilir.

    **2. Sponsorluk Harcamaları:**
    Uludağ Alan Başkanlığı bünyesindeki etkinlik ve faaliyetlere yönelik
    sponsorluk harcamalarının tamamı indirilir.

    Her iki kategori de **beyanname 466 kodunda** yer alır ancak
    çalışma kâğıdında ayrı satırlarda gösterilmelidir.

    ## Sponsorluk Farkı — KVK Md.10/1-b ile Karıştırılmamalı

    KVK Md.10/1-b kapsamındaki genel sponsorlukta %50/%100 oranı ayrımı vardır.
    **7432 Md.8 kapsamında Uludağ sponsorluğunda bu ayrım geçerli değildir —
    sponsorluk harcamalarının tamamı indirilir.**

    ## Alıcı — Yalnızca Uludağ Alan Başkanlığı

    Bu indirim **yalnızca 7432 sayılı Kanunla kurulan Uludağ Alan Başkanlığına**
    yapılan bağış/yardım ve sponsorluk harcamaları için geçerlidir. Uludağ
    bölgesindeki başka kurumlara yapılan ödemeler bu kod kapsamında değildir.

    ## İndirim Oranı

    Her iki kategori için de **tamamının indirimi**. Matrahı aşan kısım sonraki
    yıllara **devredilemez**.

    ## YİAKV İlişkisi

    **7432 s.K. Md.8 kapsamındaki bağış ve sponsorluk indirimi YİAKV (KVK 32/C)
    matrahından DÜŞÜLEMEZ.** YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir.
  kapi_sorulari:
    - id: uab_alici
      soru: "Ödeme/harcama Uludağ Alan Başkanlığına mı yapıldı? (7432 s.K.)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "7432 s.K. Md.8, yalnızca Uludağ Alan Başkanlığına yapılan bağış/yardım ve sponsorluk harcamalarını kapsar. Uludağ bölgesindeki başka kurumlara yapılan ödemeler bu kod kapsamında değildir."
    - id: islem_turu
      soru: "İşlemin niteliği nedir? (Bağış/Yardım ve/veya Sponsorluk)"
      tip: secim
      secenekler:
        - deger: bagis_yardim
          etiket: "Bağış/Yardım (Nakdi ve/veya Ayni)"
        - deger: sponsorluk
          etiket: "Sponsorluk Harcaması (Yazılı sözleşme ile)"
        - deger: her_ikisi
          etiket: "Her İkisi (Bağış + Sponsorluk)"
      aciklama: "İki kategori aynı beyanname kodunda (466). Bağış = karşılıksız. Sponsorluk = yazılı sözleşmeli. Her ikisi de tamamı indirilebilir."
    - id: fiili_islem
      soru: "İşlem fiilen gerçekleşti mi? (Nakdi: Banka — Ayni/Sponsorluk: Teslim/Sözleşme belgesi)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Nakdi işlemlerde banka EFT/havale. Ayni bağışta teslim tutanağı. Sponsorlukta yazılı anlaşma + fiili ödeme/hizmet."
    - id: makbuz_protokol
      soru: "Uludağ Alan Başkanlığından resmi makbuz veya protokol alındı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Bağış için resmi makbuz veya kabul yazısı. Sponsorluk için yazılı sponsorluk sözleşmesi ve/veya protokol."

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: nakdi_bagis_tutari
      etiket: "Nakdi bağış tutarı (TL) — Banka yoluyla Uludağ Alan Başkanlığına yapılan ödeme"
      tip: para
      zorunlu: false
      yardim: "Banka EFT/havale ile Uludağ Alan Başkanlığına yapılan nakdi bağışların toplamı."
    - id: ayni_bagis_degeri
      etiket: "Ayni bağış değeri (TL) — Teslim edilen mal/hizmetin maliyet/net defter değeri"
      tip: para
      zorunlu: false
      yardim: "Ayni bağış varsa maliyet veya net defter değeri (piyasa değeri değil)."
    - id: sponsorluk_tutari
      etiket: "Sponsorluk harcaması tutarı (TL) — Yazılı sözleşmeli UAB sponsorluğu"
      tip: para
      zorunlu: false
      yardim: "Uludağ Alan Başkanlığı bünyesindeki etkinlik/faaliyetler için yazılı sözleşmeli sponsorluk harcamaları. Tamamı indirilir. Not: KVK Md.10/1-b'deki %50/%100 ayrımı geçerli değil."
  formuller:
    toplam_bagis: "nakdi_bagis_tutari + ayni_bagis_degeri"
    toplam_sponsorluk: "sponsorluk_tutari"
    istisna_tutari: "nakdi_bagis_tutari + ayni_bagis_degeri + sponsorluk_tutari"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "nakdi_bagis_tutari >= 0 and ayni_bagis_degeri >= 0 and sponsorluk_tutari >= 0"
      hata: "Tutarlar negatif olamaz."
    - kural: "nakdi_bagis_tutari + ayni_bagis_degeri + sponsorluk_tutari > 0"
      hata: "En az bir tutar (bağış veya sponsorluk) girilmelidir."

denetci_notlari: |
  ## Yasal Dayanak
  7432 Sayılı Kanun Madde 8: Uludağ Alan Başkanlığına yapılan bağış/yardımlar ve
  sponsorluk harcamalarının tamamı kurumlar vergisi matrahından indirilir.
  GİB KV Beyan Rehberi Mart 2026 (Yayın No:606) esas alınmıştır.

  ## İki Kategori — Aynı Beyanname Kodu
  1. Bağış ve Yardımlar: Nakdi + Ayni bağışların tamamı
  2. Sponsorluk Harcamaları: Yazılı sözleşmeli sponsorluğun tamamı
  Her ikisi beyanname 466'ya dahil edilir ancak çalışma kâğıdında ayrı gösterilmeli.

  ## Sponsorluk Özel Notu
  KVK Md.10/1-b kapsamındaki genel sponsorlukta %50/%100 oran ayrımı vardır.
  7432 Md.8 kapsamındaki Uludağ sponsorluğunda bu ayrım UYGULANMAZ —
  sponsorluk harcamalarının tamamı indirilir.

  ## Alıcı Koşulu
  Yalnızca Uludağ Alan Başkanlığı (7432 s.K. ile kurulan) alıcı olabilir.
  Uludağ bölgesindeki başka kurumlar → Kapsam dışı.

  ## İndirim Kuralları
  - Her iki kategori için tamamının indirimi
  - Matrahı aşan kısım sonraki yıla devredilmez

  ## Kritik Kontroller
  - Alıcının Uludağ Alan Başkanlığı olduğu teyit edilmeli
  - Bağış ve sponsorluk tutarları çalışma kâğıdında ayrı satırlarda gösterilmeli
  - Sponsorluk için yazılı sözleşme zorunlu
  - Fiili ödeme/teslim/hizmet (taahhüt değil)
  - UAB'dan resmi makbuz veya protokol alınmalı

  ## YİAKV Etkisi
  466 bağış ve sponsorluk indirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir.
  402/460/461/464/465 ile aynı E.11 kategorisi.

  ## YMM Tasdik
  İndirim tutarı ≥500.000 TL ise YMM tasdik raporu zorunludur (49 No.lu KV GT).

muhasebe_kayitlari: |
  ## Nakdi Bağış Kaydı
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Bağış gideri)
  Alacak: 102 Bankalar
  Açıklama: 7432 s.K. Md.8 kapsamında Uludağ Alan Başkanlığı nakdi bağış.

  ## Ayni Bağış Kaydı (Stoktan)
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Maliyet bedeli)
  Alacak: 150/153 İlk Madde ve Malzeme / Ticari Mallar
  Açıklama: 7432 s.K. Md.8 kapsamında Uludağ Alan Başkanlığı ayni bağış.

  ## Sponsorluk Harcaması Kaydı
  Borç: 770 Genel Yönetim Giderleri / 760 Pazarlama Satış Giderleri
  Alacak: 102 Bankalar
  Açıklama: 7432 s.K. Md.8 kapsamında Uludağ Alan Başkanlığı sponsorluk harcaması.

  ## Beyanname
  Toplam (bağış + sponsorluk) beyanname 466. satırına aktarılır.
  Matrahı aşan kısım devredilemez.

