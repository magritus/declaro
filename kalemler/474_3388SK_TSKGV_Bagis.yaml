wizard_agaci:
  tetikleyici_soru: "3388 sayılı Kanun kapsamında Türk Silahlı Kuvvetlerini Güçlendirme Vakfı'na (TSKGV) bağış yaptınız mı?"
  info_modal: |
    ## Genel Çerçeve

    **3388 sayılı Türk Silahlı Kuvvetlerini Güçlendirme Vakfı Kanunu** kapsamında
    TSKGV'ye yapılan bağış ve yardımların **tamamı** kurumlar vergisi matrahından
    indirilir.

    TSKGV, Türk Silahlı Kuvvetleri'nin savunma kapasitesini ve mensuplarının refahını
    desteklemek amacıyla 1987 yılında 3388 sayılı Kanunla kurulmuş vakıftır.

    ## Alıcı Niteliği

    - TSKGV (doğrudan)
    - TSKGV bünyesindeki fon veya program

    **Kapsam dışı:** TSK adını taşıyan başka vakıf, dernek veya kuruluş.

    ## İndirim Oranı

    İndirim oranı **tamamının indirimi**dir. Matrahı aşan kısım sonraki yıllara devredilemez.

    ## YİAKV İlişkisi

    **474 kapsamındaki bağış indirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.**
    YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir ancak matraha etki etmez.
  kapi_sorulari:
    - id: alici_tskgv
      soru: "Bağış 3388 s.K. kapsamında TSKGV'ye mi yapıldı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Türk Silahlı Kuvvetlerini Güçlendirme Vakfı — resmi kurum. TSK adını taşıyan başka vakıf/dernek/kuruluş → Kapsam dışı."
    - id: fiili_odeme_yapildi
      soru: "Bağış fiilen gerçekleşti mi? (Nakdi: Banka dekontu — Ayni: Teslim belgesi)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Taahhüt aşamasındaki bağış indirime konu edilemez. Nakdi bağışta banka EFT/havale dekontu; ayni bağışta imzalı teslim tutanağı zorunludur."
    - id: makbuz_alindi
      soru: "TSKGV'den resmi bağış makbuzu / kabul belgesi alındı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "TSKGV tarafından düzenlenen resmi makbuz veya bağış kabul yazısı zorunludur."

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: nakdi_bagis_tutari
      etiket: "Nakdi bağış tutarı (TL) — Banka yoluyla TSKGV'ye yapılan ödemeler"
      tip: para
      zorunlu: false
      yardim: "Banka EFT/havale ile TSKGV'ye yapılan nakdi bağışların toplamı."
    - id: ayni_bagis_degeri
      etiket: "Ayni bağış değeri (TL) — Malzeme/ekipmanın maliyet/net defter değeri"
      tip: para
      zorunlu: false
      yardim: "Malzeme veya ekipman gibi ayni bağışların maliyet veya net defter değeri. Piyasa değeri değil maliyet esas."
  formuller:
    toplam_bagis: "nakdi_bagis_tutari + ayni_bagis_degeri"
    istisna_tutari: "nakdi_bagis_tutari + ayni_bagis_degeri"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "nakdi_bagis_tutari >= 0 and ayni_bagis_degeri >= 0"
      hata: "Bağış tutarları negatif olamaz."
    - kural: "nakdi_bagis_tutari + ayni_bagis_degeri > 0"
      hata: "En az bir bağış türü (nakdi veya ayni) girilmelidir."

denetci_notlari: |
  ## Yasal Dayanak
  3388 sayılı Türk Silahlı Kuvvetlerini Güçlendirme Vakfı Kanunu kapsamında
  TSKGV'ye yapılan bağış ve yardımların tamamı kurumlar vergisi matrahından
  indirilir.
  GİB KV Beyan Rehberi Mart 2026 (Yayın No:606) esas alınmıştır.

  ## İndirim Kuralları
  - Tamamının indirimi — kazanç yüzdesiyle sınırlı değil
  - Matrahı aşan kısım sonraki yıla devredilmez

  ## Kritik Kontroller
  - Alıcı TSKGV (3388 s.K.) olduğu teyit edilmeli
  - TSK adını taşıyan başka kuruluş olmadığı doğrulanmalı
  - Fiili ödeme/teslim (taahhüt değil, gerçekleşmiş bağış)
  - TSKGV'den resmi makbuz/kabul yazısı

  ## YİAKV Etkisi
  474 bağış indirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir.

  ## YMM Tasdik
  İndirim tutarı ≥500.000 TL ise YMM tasdik raporu zorunludur (49 No.lu KV GT).
  Tam tasdik kapsamındaki mükelleflerde ayrıca rapor düzenlenmez.

muhasebe_kayitlari: |
  ## Nakdi Bağış Kaydı
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Bağış gideri)
  Alacak: 102 Bankalar
  Açıklama: 3388 s.K. kapsamında TSKGV'ye nakdi bağış.

  ## Ayni Bağış Kaydı (Stoktan)
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Maliyet bedeli)
  Alacak: 150/153 İlk Madde ve Malzeme / Ticari Mallar
  Açıklama: 3388 s.K. kapsamında TSKGV'ye ayni bağış.

  ## Beyanname
  Hesaplanan toplam bağış tutarı beyanname 474. satırına aktarılır.
  Matrahı aşan kısım devredilemez.

