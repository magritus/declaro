wizard_agaci:
  tetikleyici_soru: "3294 sayılı Kanun kapsamında Sosyal Yardımlaşma ve Dayanışma Vakfı'na (SYDV) veya SYDGM'ye bağış yaptınız mı?"
  info_modal: |
    ## Genel Çerçeve

    **3294 sayılı Sosyal Yardımlaşma ve Dayanışmayı Teşvik Kanunu** kapsamında
    faaliyet gösteren Sosyal Yardımlaşma ve Dayanışma Genel Müdürlüğü (SYDGM) veya
    il/ilçe düzeyindeki Sosyal Yardımlaşma ve Dayanışma Vakıflarına (SYDV) yapılan
    bağış ve yardımların **tamamı** kurumlar vergisi matrahından indirilir.

    ## Alıcı Niteliği

    - Sosyal Yardımlaşma ve Dayanışma Genel Müdürlüğü (SYDGM)
    - İl düzeyindeki Sosyal Yardımlaşma ve Dayanışma Vakıfları (İl SYDV)
    - İlçe düzeyindeki Sosyal Yardımlaşma ve Dayanışma Vakıfları (İlçe SYDV)

    **Kapsam dışı:** Benzer isimli özel dernek veya vakıf.

    ## İndirim Oranı

    İndirim oranı **tamamının indirimi**dir. Matrahı aşan kısım sonraki yıllara devredilemez.

    ## YİAKV İlişkisi

    **473 kapsamındaki bağış indirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.**
    YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir ancak matraha etki etmez.
  kapi_sorulari:
    - id: alici_sydv
      soru: "Bağış 3294 s.K. kapsamında SYDGM veya SYDV'ye mi yapıldı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Sosyal Yardımlaşma ve Dayanışma Genel Müdürlüğü veya il/ilçe düzeyindeki Sosyal Yardımlaşma ve Dayanışma Vakıfları. Benzer isimli özel dernek/vakıf → Kapsam dışı."
    - id: fiili_odeme_yapildi
      soru: "Bağış fiilen gerçekleşti mi? (Nakdi: Banka dekontu — Ayni: Teslim belgesi)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Taahhüt aşamasındaki bağış indirime konu edilemez. Nakdi bağışta banka EFT/havale dekontu; ayni bağışta imzalı teslim tutanağı zorunludur."
    - id: makbuz_alindi
      soru: "SYDGM / SYDV'den resmi bağış makbuzu / kabul belgesi alındı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "SYDGM veya ilgili il/ilçe SYDV'den düzenlenen resmi makbuz veya bağış kabul yazısı zorunludur."

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: nakdi_bagis_tutari
      etiket: "Nakdi bağış tutarı (TL) — Banka yoluyla yapılan ödemeler"
      tip: para
      zorunlu: false
      yardim: "Banka EFT/havale ile SYDV/SYDGM'ye yapılan nakdi bağışların toplamı."
    - id: ayni_bagis_degeri
      etiket: "Ayni bağış değeri (TL) — Gıda/yakıt/giyim/malzemenin maliyet/net defter değeri"
      tip: para
      zorunlu: false
      yardim: "Gıda, yakıt, giyim, malzeme gibi ayni bağışların maliyet veya net defter değeri. Piyasa değeri değil maliyet esas."
  formuller:
    toplam_bagis: "nakdi_bagis_tutari + ayni_bagis_degeri"
    istisna_tutari: "nakdi_bagis_tutari + ayni_bagis_degeri"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "nakdi_bagis_tutari >= 0 and ayni_bagis_degeri >= 0"
      hata: "Bağış tutarları negatif olamaz."
    - kural: "nakdi_bagis_tutari + ayni_bagis_degeri > 0"
      hata: "En az bir bağış türü (nakdi veya ayni) girilmelidir."

denetci_notlari: |
  ## Yasal Dayanak
  3294 sayılı Sosyal Yardımlaşma ve Dayanışmayı Teşvik Kanunu kapsamında SYDGM
  veya il/ilçe SYDV'ye yapılan bağış ve yardımların tamamı kurumlar vergisi
  matrahından indirilir.
  GİB KV Beyan Rehberi Mart 2026 (Yayın No:606) esas alınmıştır.

  ## İndirim Kuralları
  - Tamamının indirimi — kazanç yüzdesiyle sınırlı değil
  - Matrahı aşan kısım sonraki yıla devredilmez

  ## Kritik Kontroller
  - Alıcı SYDGM veya resmi il/ilçe SYDV mi?
  - Benzer isimli özel kuruluş olmadığı teyit edilmeli
  - Fiili ödeme/teslim (taahhüt değil, gerçekleşmiş bağış)
  - SYDGM/SYDV'den resmi makbuz/kabul yazısı

  ## YİAKV Etkisi
  473 bağış indirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir.

  ## YMM Tasdik
  İndirim tutarı ≥500.000 TL ise YMM tasdik raporu zorunludur (49 No.lu KV GT).
  Tam tasdik kapsamındaki mükelleflerde ayrıca rapor düzenlenmez.

muhasebe_kayitlari: |
  ## Nakdi Bağış Kaydı
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Bağış gideri)
  Alacak: 102 Bankalar
  Açıklama: 3294 s.K. kapsamında SYDV/SYDGM'ye nakdi bağış.

  ## Ayni Bağış Kaydı (Stoktan)
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Maliyet bedeli)
  Alacak: 150/153 İlk Madde ve Malzeme / Ticari Mallar
  Açıklama: 3294 s.K. kapsamında SYDV'ye ayni bağış (gıda/yakıt/giyim/malzeme).

  ## Beyanname
  Hesaplanan toplam bağış tutarı beyanname 473. satırına aktarılır.
  Matrahı aşan kısım devredilemez.

