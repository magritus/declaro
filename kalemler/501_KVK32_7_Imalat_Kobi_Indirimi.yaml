    detay: "İmalat faaliyetine atfedilen vergi matrahının toplam dönem matrahından nasıl ayrıştırıldığını gösteren hesaplama tablosu. Diğer faaliyet matrahları ile toplamın beyannamedeki toplam matrahla uyumunu göstermelidir."
    temin_yeri: Muhasebe / YMM Çalışma Dosyası
  - kategori: destekleyici
