    detay: "İmalat faaliyetinden elde edilen gelir ve bu faaliyete ilişkin giderlerin diğer faaliyet gelir/giderlerinden ayrıştırıldığını gösteren ayrıntılı gelir tablosu veya maliyet muhasebesi çıktısı. İmalat matrahının dayandığı muhasebe kaydı zincirini oluşturur."
    temin_yeri: Muhasebe / Mali Müşavirlik
  - kategori: zorunlu
    "no": 3
