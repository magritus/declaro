    baslik: KVK 32/A veya 32/8 Konsolidasyon Notu (varsa)
    detay: "KVK Md.32/A (indirimli KV) veya Md.32/8 (ihracat indirimi) ile eş zamanlı uygulama varsa, matrahların çakışmadığını ve her indirim için ayrı matrah dilimi kullanıldığını açıklayan konsolidasyon notu veya hesaplama özeti."
    temin_yeri: YMM / Mali Müşavirlik Çalışma Dosyası

