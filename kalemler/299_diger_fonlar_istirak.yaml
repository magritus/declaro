denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-a alt bent 4: Diğer yatırım fonu katılma paylarından elde edilen
  kâr payı, fon iadesi kazancı ve VUK 279 değerleme farkı kazançları istisnadır.
  7394 s.K. (15.04.2022) ile tanınan bu istisna, 7456 s.K. (15.07.2023) ile mülga
  edilmiştir. Geçiş uygulaması: 15.07.2023 öncesi iktisap edilen paylar için istisna
  devam etmektedir.

  ## Kritik Noktalar
  - İktisap tarihi 15.07.2023'ten önce olmalı — kesin sınır, belgelenmesi zorunlu
  - Portföyde döviz/altın/kıymetli maden araçları olmamalı (TL esaslı fon şartı)
  - GSYF/GSYO için bu form DEĞİL — 298 kodu kullanılır
  - VUK 279: Portföy ≥%51 BIST hisse senedi → alış bedeli (değerleme farkı oluşmaz)
  - VUK 279: Portföy <%51 hisse senedi → borsa rayici → değerleme farkı = istisna
  - Karma tarihli alım: Pay adedi bazında ayrıştırma zorunludur (FIFO veya ağırlıklı ortalama)
  - 3 kademe uyum: Muhasebe (640+645+649 VUK kısmı) = VERİ GİRİŞİ = Beyanname 299

  ## YİAKV Etkisi
  KVK 5/1-a-4 (299) istisnası YİAKV matrahından DÜŞÜLEBİLİR. Bu kural önemlidir:
  - 5/1-a kapsamı (299) → YİAKV matrahından düşülebilir
  - 5/1-c kapsamı (318) → YİAKV matrahından düşülemez
  - 5/1-e kapsamı (361) → ayrıca analiz gerekli
  YİAKV çalışma kâğıdında 299 tutarı matrahtan doğru düşülmelidir.

  ## Beyanname Konumu
  "Zarar Olsa Dahi İndirilecek İstisna ve İndirimler" bölümü — 299 kodlu satır.
  300 kodu (VUK 279 değerleme farkı istisnası) ile karıştırılmamalıdır.

  ## Risk Alanları
  1. İktisap tarihi belgesi eksikliği — en büyük tarhiyat riski
  2. Portföy bileşimi teyidi yapılmaması (döviz/altın kontrolü)
  3. 298/299/300 kod karışıklığı — fon türü bazında ayrıştırma zorunlu
  4. VUK 279 %51 kriteri yanlış uygulaması
  5. Karma tarihli alım ayrıştırması eksikliği
  6. Değerleme düşüşünün KKEG olup olmadığının analiz edilmemesi

muhasebe_kayitlari: |
  ## Kayıt 1 — Yatırım Fonu Satın Alım (İktisap Tarihi Kritik)
  Borç: 118 Diğer Menkul Kıymetler ← Alış bedeli (iktisap tarihi notla belgelenmeli)
  Alacak: 102 Bankalar ← Alış bedeli
  Açıklama: İktisap tarihi 15.07.2023'ten ÖNCE olduğu banka/MKK dekontuyla belgelenmeli

  ## Kayıt 2 — Kâr Payı Geliri (Fon Dağıtımı)
  Borç: 102 Bankalar ← Kâr payı (Stopaj %0 — brüt = net)
  Alacak: 640 İştiraklerden Temettü Gelirleri ← Kâr payı
  Açıklama: KVK 5/1-a-4 istisnası; 640 hesabı ile Beyanname 299 uyumlu olmalı

  ## Kayıt 3 — Fon İadesi / Satış Kazancı
  Borç: 102 Bankalar ← Net iade bedeli
  Alacak: 118 Diğer Menkul Kıymetler ← Maliyet (VUK 279 değerleme sonrası bilanço değeri)
  Alacak: 645 Menkul Kıymet Satış Kârı ← Fon iadesi kazancı
  Açıklama: İade kazancı (İade Bedeli − Maliyet) 645 hesabına gelir kaydedilir; KVK 5/1-a-4 istisnası

  ## Kayıt 4 — Dönem Sonu VUK 279 Değerleme (Portföy <%51 Hisse)
  Borç: 118 Diğer Menkul Kıymetler ← Değer artışı
  Alacak: 649 Diğer Olağandışı Gelir ← Değer artışı
  Açıklama: 649 → KKEG tablosuna eklenir → Beyanname 299'da istisna düşülür. Portföy ≥%51 hisse ise bu kayıt YAPILMAZ.

  ## Beyanname Akışı (299 Mutabakat)
  1. B Tablosu (Kâr Payı + Fon İadesi): 640 + 645 hesap toplamı → Beyanname 299 B kısmı
  2. C Tablosu (VUK 279): 649 hesap (VUK kısmı) → Beyanname 299 C kısmı
  3. Toplam 299 = B + C → "Zarar Olsa Dahi İndirilecek" bölümü 299. satır
  3 KADEME UYUM: Muhasebe = Çalışma Kâğıdı E.3 = Beyanname 299

