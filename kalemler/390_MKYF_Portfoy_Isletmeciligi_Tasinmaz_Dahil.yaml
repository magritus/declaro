    "no": 2
    baslik: Portföy Taşınmaz Listesi — Tapu Senedi ve Portföy Kayıt Belgesi
    detay: "Portföyde kayıtlı her taşınmaz için tapu senedi ve portföy kayıt belgesi zorunludur. Portföyde kayıtlı olmayan taşınmazlardan kira/satış geliri 390 istisna kapsamı dışındadır. Bu belge 390 satırının kullanımının temel dayanağıdır."
    temin_yeri: "Tapu Müdürlüğü tapu senedi / Portföy saklama kuruluşu kayıt belgesi"
  - kategori: zorunlu
    "no": 3
    baslik: Portföy Taşınmaz Bağımsız Değerleme Raporu (Dönem Sonu)
    detay: "SPK onaylı bağımsız değerleme kuruluşu tarafından hazırlanan dönem sonu taşınmaz değerleme raporu. Taşınmaz değerleme artışlarının hesaplanması için zorunludur. Değerleme tarihi dönem sonuyla uyumlu olmalı."
    temin_yeri: "SPK lisanslı bağımsız değerleme kuruluşu"
  - kategori: zorunlu
    "no": 4
    baslik: Portföy Taşınmaz Kira Gelirleri — Kira Sözleşmeleri ve Dekontlar
    detay: "Portföydeki taşınmazların kira sözleşmeleri, kira tahsilat dekontları ve dönem kira geliri toplamı. KVK Md. 15/1 kapsamındaki stopaj kesintisi teyit edilmeli."
    temin_yeri: "Kira sözleşmeleri / Banka hesap dekontları / Muhasebe 602 hesap kartı"
  - kategori: zorunlu
    "no": 5
    baslik: Portföy Menkul Kıymet Varlık Listesi (Saklama Kuruluşu Raporu)
    detay: "Dönem boyunca portföyde yer alan tüm menkul kıymet varlıklarının saklama kuruluşu onaylı listesi. Her varlığın kodu, türü, adedi ve değeri. MK portföy gelirlerinin dayandığı belgedir."
    temin_yeri: "MKK (Merkezi Kayıt Kuruluşu) portföy raporu / Saklama kuruluşu"
  - kategori: zorunlu
    "no": 6
    baslik: Portföy İçi / Dışı Gelir ve Taşınmaz / MK Geliri Muhasebe Ayrım Belgesi
    detay: "Portföy işletmeciliği gelirlerinin portföy dışı gelirlerden ayrıştırıldığını gösteren belge. Ayrıca taşınmaz kaynaklı ve MK kaynaklı portföy gelirlerinin muhasebede ayrı hesaplarda izlendiğini gösteren hesap planı veya dağıtım anahtarı. Bu ayrım stopaj rejimi analizi için de kritiktir."
    temin_yeri: "Muhasebe politikası belgesi / Hesap planı / Dağıtım anahtarı tablosu"
  - kategori: zorunlu
    "no": 7
    baslik: Portföy Dönem Sonu Değerleme Tablosu (Hem Taşınmaz Hem MK)
    detay: "Portföydeki tüm varlıkların (taşınmaz + MK) dönem sonu değerleme hesabı. Taşınmaz → Bağımsız değerleme raporu. MK → Borsa rayici / gerçeğe uygun değer. SPK/VUK esaslarına uygunluk."
    temin_yeri: "Bağımsız değerleme raporu (taşınmaz) / Saklama kuruluşu değerleme özeti (MK)"
  - kategori: zorunlu
    "no": 8
    baslik: KV Beyannamesi Taslağı — 390. Satır
    detay: "Beyanname 390. satırındaki tutarın çalışma kâğıdı tutarıyla birebir uyumlu olduğu teyit edilmeli. 389 ve 390'ın aynı anda kullanılmadığı kontrol edilmeli."
    temin_yeri: "GİB e-Beyanname sistemi / İnternet Vergi Dairesi"
  - kategori: destekleyici
    "no": 9
    baslik: KVK Md. 15/1 Taşınmaz Kira Stopajı Analizi
    detay: "MKYF portföy taşınmazından elde edilen kira gelirleri üzerinden KVK Md. 15/1 kapsamında stopaj kesintisi yapılıp yapılmadığının analizi. Bu stopaj GVK Geçici 67'den farklıdır. Muhtasar beyanname kaydıyla uyum kontrol edilmeli."
    temin_yeri: "Muhtasar ve prim hizmet beyannamesi / Vergi dairesi kaydı / YMM analiz notu"
  - kategori: destekleyici
    "no": 10
    baslik: GVK Geçici Madde 67 Stopaj Belgesi (MK Gelirleri — Fon Düzeyi)
    detay: "MKYF'nin GVK Geçici Md. 67 kapsamında menkul kıymet gelirleri için ödediği stopaj. Taşınmaz stopajından ayrı muhasebeleştirilmeli ve beyanname 390 ile ilişkisi açıklanmalıdır."
    temin_yeri: "Muhtasar beyannamesi / Vergi dairesi kayıtları"
  - kategori: destekleyici
    "no": 11
    baslik: YİAKV Matrah Hesaplama Tablosu (390 Tutarının Düşümü)
    detay: "KVK 32/C kapsamındaki YİAKV hesabında 390 istisnasının (taşınmaz dahil toplam portföy kazancı) matrahtan düşüldüğünü gösteren çalışma tablosu."
    temin_yeri: "YİAKV çalışma kâğıdı / KVK 32/C Tebliğleri"
  - kategori: destekleyici
    "no": 12
    baslik: Önceki Dönem Beyannamesi Karşılaştırma Notu (302 → 390 Geçiş)
    detay: "2024 ve önceki dönemlerde bu gelir türünün hangi satırda (302) beyan edildiğinin açıklandığı not. 2025'ten itibaren 390 ayrı satırına geçişin belgelenmesi."
    temin_yeri: "Geçmiş dönem KV beyannameleri / YMM çalışma notu"

