# KVK 5/1-d (390) MKYF taşınmaz dahil portföy işletmeciliği kazancı
# YİAKV matrahından DÜŞÜLEBİLİR. Bu satır hem menkul kıymet hem de taşınmazdan
# elde edilen portföy gelirlerini kapsar. Taşınmaz kaynaklı gelirlerin stopaj
# rejimi GVK Geçici Md. 67'den farklı olduğundan ayrı takip zorunludur.
durum: aktif
yururluk_araligi:
  baslangic: "2006-06-21"
  bitis: null
  not: "2025 beyanname döneminden itibaren ayrı satır kodu (390) ile gösterilmektedir. Önceki dönemlerde 302 kodlu genel portföy işletmeciliği satırı kullanılıyordu. 390, portföyünde taşınmaz varlık bulunduran ve taşınmazdan gelir elde eden MKYF'ler için kullanılır."

ana_kategori: portfoy_isletmeciligi

wizard_agaci:
  tetikleyici_soru: "Kurum bir Menkul Kıymetler Yatırım Fonu (MKYF) mu ve portföyünde taşınmaz varlık bulunduruyor ve bu taşınmazdan kira veya satış kazancı elde etti mi?"
  info_modal: |
    ## Genel Çerçeve

    KVK Madde 5/1-d kapsamında Türkiye'de kanunların öngördüğü şekilde kurulan **Menkul Kıymetler Yatırım Fonlarının (MKYF)** portföy işletmeciliğinden doğan kazançların tamamı kurumlar vergisinden **%100 tam istisna** olarak muaftır. Beyanname **"Zarar Olsa Dahi İndirilecek"** bölümünde **390** numaralı satırda gösterilir.

    Bu kalem (390), **taşınmaz dahil** tüm portföy gelirlerini kapsar: portföyde kayıtlı taşınmazlardan elde edilen kira gelirleri ve taşınmaz satış kazançları ile menkul kıymet gelirleri. Portföyünde taşınmaz bulunmayan ya da taşınmazdan gelir elde etmeyen MKYF'ler için **389** kodlu satır kullanılır.

    ## Temel Koşullar

    - **SPK Lisansı ve portföyde taşınmaz yetkisi:** Fonun SPK tarafından kuruluşuna izin verilmiş MKYF statüsünde olması ve izahnamesinde taşınmaz yatırımına izin verilmiş olması zorunludur. SPK III-52.1 Tebliği kapsamında taşınmaz yatırım oranı sınırlarına uygunluk kontrol edilmelidir.
    - **Portföy taşınmaz listesi:** Portföyde kayıtlı taşınmazların tapu senedi ve portföy kayıt belgesiyle belgelenmesi zorunludur. Portföyde kayıtlı olmayan taşınmazlardan elde edilen gelirler istisna kapsamında değerlendirilemez.
    - **Portföy içi/dışı ayrımı:** İstisna YALNIZCA portföy kapsamındaki varlıklardan (hem menkul kıymet hem taşınmaz) elde edilen gelirlere uygulanır. Yönetim ücreti, performans/başarı primi, portföyde kayıtlı olmayan varlıklardan gelirler vergiye tabidir.
    - **Taşınmaz ve menkul kıymet gelirlerinin ayrı takibi:** Stopaj rejimleri farklı olduğundan (GVK Geçici Md. 67 — menkul kıymet; KVK Md. 15 — taşınmaz kira stopajı) iki gelir türünün muhasebede ayrı hesaplarda izlenmesi zorunludur.
    - **Muhasebede ayrı hesap:** Portföy içi ve portföy dışı gelirlerin, ayrıca taşınmaz ve menkul kıymet gelirlerinin muhasebede ayrı hesap veya belgelenmiş dağıtım anahtarıyla izlenmesi zorunludur.

    ## Portföy İçi Gelir Ayrımı — Taşınmaz Kaynaklı

    **PORTFÖY İÇİ TAŞINMAZ GELİRİ (İstisna — 390):**
    - Portföydeki taşınmazlardan elde edilen kira gelirleri
    - Portföy taşınmazlarının satışından doğan kazançlar
    - Portföy taşınmazlarının dönem sonu değerleme artışları (VUK/SPK esasları)

    **PORTFÖY İÇİ MENKUL KIYMETTen GELİR (İstisna — 390):**
    - Portföydeki tahvil, bono, eurobond faiz gelirleri
    - Portföydeki hisse senedi temettü gelirleri
    - Portföy menkul kıymet satış kazançları
    - Portföy dönem sonu menkul kıymet değerleme artışları
    - Repo, ters repo faiz gelirleri

    **PORTFÖY DIŞI (Vergiye Tabi):**
    - Yönetim ücreti, performans/başarı primi, danışmanlık komisyonu
    - Portföyde kayıtlı olmayan varlıklardan gelirler

    ## Taşınmaz Stopaj Rejimi — Kritik Fark

    MKYF'nin portföy taşınmazından elde ettiği kira geliri KVK Madde 15/1 kapsamında stopaja tabi olabilir. Bu stopaj, GVK Geçici Madde 67 kapsamındaki menkul kıymet stopajından farklı bir rejimdir. Taşınmaz kira stopajının doğru uygulanıp uygulanmadığı ve beyanname 390 istisnasıyla ilişkisi dönem mevzuatı çerçevesinde ayrıca analiz edilmelidir.

    ## 389 / 390 Ayrımı

    - **389**: Portföyde taşınmaz geliri YOKSA veya taşınmaz yatırımı yapılmıyorsa
    - **390**: Portföyde taşınmaz bulunuyor ve taşınmazdan gelir elde edildiyse
    - Her iki satır aynı anda kullanılamaz; fon ya 389 ya da 390 kullanır

    ## YİAKV İlişkisi

    KVK 5/1-d (390) portföy işletmeciliği kazancı (taşınmaz dahil tüm portföy) **YİAKV matrahından düşülebilir**. YİAKV çalışma kâğıdında 390 tutarının tamamı matrahtan doğru biçimde düşülmelidir.

    ## Pratik Notlar

    - Portföy yöneticisi tarafından hazırlanan dönem sonu portföy değerleme raporu hem taşınmaz hem menkul kıymet varlıklarını kapsamalı ve dosyaya eklenmelidir.
    - Tapu senetleri ve portföy kayıt belgeleri dosyada bulunmalıdır; taşınmazların portföy kaydı yalnızca belgeyle kanıtlanabilir.
    - 49 No.lu KV Genel Tebliği kapsamında tek satır ≥500.000 TL ise YMM tasdik raporu eşiği kontrol edilmelidir.
