denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-d: Türkiye'de kanunların öngördüğü şekilde kurulan menkul kıymetler
  yatırım fonlarının portföy işletmeciliğinden doğan kazançları kurumlar vergisinden
  istisnadır. %100 tam istisna. 2025 beyanname döneminden itibaren portföyünde taşınmaz
  bulunduran MKYF'ler için ayrı satır kodu (390) kullanılmaktadır.

  ## Bu Satırın Kapsamı — Taşınmaz Dahil Ayrımı
  390 satırı hem taşınmaz hem menkul kıymet portföy gelirlerini kapsar.
  YALNIZCA portföyde kayıtlı taşınmazların gelirleri istisna kapsamındadır.

  PORTFÖY TAŞINMAZ GELİRİ (İstisna — 390):
  - Portföyde kayıtlı taşınmazlardan kira gelirleri
  - Portföy taşınmaz satış kazançları
  - Portföy taşınmazı dönem sonu değerleme artışları

  PORTFÖY MENKUL KIYMET GELİRİ (İstisna — 390):
  - Tahvil, bono, eurobond faiz/kupon gelirleri
  - Hisse senedi temettü gelirleri
  - Menkul kıymet satış kazançları ve değerleme artışları
  - Repo, ters repo faiz gelirleri

  PORTFÖY DIŞI (Vergiye Tabi):
  - Yönetim ücreti, performans/başarı primi, danışmanlık komisyonu
  - Portföyde kayıtlı olmayan varlıklardan gelirler

  ## 389 / 390 Ayrımı — Kritik Karar Noktası
  - Portföyde taşınmaz geliri YOK → 389
  - Portföyde taşınmaz geliri VAR → 390
  - Her iki satır aynı anda kullanılamaz
  - 2024 ve öncesi dönemlerde her ikisi de 302 genel satırına alınıyordu

  ## Taşınmaz Stopaj Rejimi Farkı
  - Menkul kıymet gelirleri → GVK Geçici Md. 67 stopajı (fon düzeyinde)
  - Taşınmaz kira gelirleri → KVK Md. 15/1 kapsamında stopaj rejimi
  Bu iki rejim birbirinden farklıdır ve muhasebede ayrı hesaplarda izlenmelidir.
  KV beyannamesi 390 istisnası her iki türü kapsamakla birlikte stopaj
  boyutu ayrıca analiz edilmelidir.

  ## Portföy Taşınmaz Kaydı — Kritik Belge Şartı
  Portföyde kayıtlı taşınmazın tapu senedi ve portföy kayıt belgesiyle
  kanıtlanması zorunludur. Belgesi olmayan taşınmaz geliri istisna dışıdır.
  Bu, GYO inşaat/geliştirme tartışmasından farklı bir noktadır; MKYF
  portföy taşınmazının varlığı ve kaydı somut belgelerle ispat edilmeli.

  ## YİAKV Etkisi
  KVK 5/1-d (390) portföy işletmeciliği kazancı YİAKV matrahından
  DÜŞÜLEBİLİR. Hem taşınmaz hem menkul kıymet kaynaklı portföy gelirleri
  toplam 390 tutarı olarak matrahtan düşülmelidir.

  ## Beyanname Konumu
  "Zarar Olsa Dahi İndirilecek İstisna ve İndirimler" bölümü — 390 kodlu satır.
  389 (taşınmaz hariç) ile karıştırılmamalı; aynı fon için her ikisi birden kullanılamaz.

  ## Risk Alanları
  1. Portföyde kayıtlı olmayan taşınmaz gelirinin 390'a dahil edilmesi
  2. Portföy dışı gelirin (yönetim ücreti vb.) 390'a yazılması
  3. Muhasebede taşınmaz / menkul kıymet geliri ayrımının kurulmamış olması
  4. Taşınmaz kira stopajı ile GVK Geçici 67 stopajının karıştırılması
  5. Portföy taşınmaz değerleme raporunun bağımsız değerleme kuruluşundan alınmamış olması
  6. 389 ve 390'ın aynı anda kullanılması (sadece biri kullanılabilir)
  7. Portföy satış kazancında maliyet yöntemi tutarsızlığı

muhasebe_kayitlari: |
  ## Kayıt 1 — Portföy Taşınmaz Kira Geliri Tahakkuku
  Borç: 127 Diğer Ticari Alacaklar ← Portföy taşınmaz kira alacağı
  Alacak: 602 Kira Gelirleri ← Portföy taşınmaz kira geliri
  Açıklama: YALNIZCA portföyde kayıtlı taşınmazların kira geliri — KVK 5/1-d istisna (390).
  Portföy kaydı tapu senedi ve portföy belgesiyle desteklenmeli. KVK Md. 15/1 stopajı ayrıca kontrol edilmeli.

  ## Kayıt 2 — Portföy Taşınmaz Satış Kazancı
  Borç: 102 Bankalar ← Satış bedeli
  Alacak: 250/252 Taşınmazlar ← Maliyet değeri
  Alacak: 679 Diğer Olağandışı Kâr/Zarar ← Satış kazancı
  Açıklama: KVK 5/1-d istisna — portföy taşınmaz satış kazancı; 390 satırına alınır.

  ## Kayıt 3 — Portföy Taşınmaz Dönem Sonu Değerleme Artışı
  Borç: 250/252 Taşınmazlar ← Değerleme artışı
  Alacak: 679 Diğer Olağandışı Kâr ← Taşınmaz değerleme artışı
  Açıklama: SPK onaylı bağımsız değerleme kuruluşu raporu esas — KVK 5/1-d istisna (390 satırı).

  ## Kayıt 4 — Portföy Menkul Kıymet Faiz / Temettü Geliri
  Borç: 127 Diğer Ticari Alacaklar ← Portföy MK faiz/temettü alacağı
  Alacak: 642 Faiz Gelirleri / 640 Temettü Gelirleri ← Portföy MK geliri
  Açıklama: KVK 5/1-d istisna — portföy MK faiz/temettü; GVK Geçici 67 stopajı ayrı kaydedilir.

  ## Kayıt 5 — Portföy Menkul Kıymet Satış Kazancı
  Borç: 102 Bankalar ← Satış bedeli
  Alacak: 111-118 Menkul Kıymetler ← Maliyet
  Alacak: 645 Menkul Kıymet Satış Kârı ← Satış kazancı
  Açıklama: KVK 5/1-d istisna — portföy MK satış kazancı; 390 satırına alınır.

  ## Kayıt 6 — Portföy Dışı Gelir (Yönetim Ücreti — Vergiye Tabi)
  Borç: 136 Diğer Çeşitli Alacaklar ← Yönetim ücreti alacağı
  Alacak: 649 Diğer Olağandışı Gelir ← Yönetim/performans ücreti
  Açıklama: PORTFÖY DIŞI — 390 satırına YAZILMAZ. Matrahta kalır; ayrı hesapta izlenmeli.

  ## Beyanname 390 Akışı (Mutabakat)
  1. Portföy taşınmaz gelirleri (602, 679 taşınmaz kısmı) → Taşınmaz portföy toplamı
  2. Portföy MK gelirleri (640, 642, 645, 649 MK kısmı) → MK portföy toplamı
  3. KV Beyannamesi 390 Satırı: Toplam net portföy kazancı → "Zarar Olsa Dahi İndirilecek"
  3 KADEME UYUM: Muhasebe portföy hesapları = VERİ GİRİŞİ toplamı = Beyanname 390
  KRİTİK: Taşınmaz geliri bulunduğundan 389 değil 390 kullanılır; her ikisi aynı anda kullanılamaz.

