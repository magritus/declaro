    - id: mkyf_statüsü
      soru: "Kurum SPK lisanslı Menkul Kıymetler Yatırım Fonu (MKYF) mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "KVK 5/1-d: MKYF statüsü SPK kuruluş izni ve KAP kaydıyla belgelenmeli."
    - id: portfoy_tasinmaz_geliri_var
      soru: "Portföyde kayıtlı taşınmazdan (kira geliri veya satış kazancı) GELİR VAR mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "KRİTİK: 390 satırı YALNIZCA portföyde taşınmaz geliri OLAN MKYF'ler içindir. Taşınmaz geliri yoksa 389 satırı kullanılmalıdır. Her ikisi birden kullanılamaz."
    - id: portfoy_tasinmaz_kaydi
      soru: "Taşınmazın portföy kaydı (tapu senedi + portföy kayıt belgesi) mevcut mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Yalnızca portföyde kayıtlı taşınmazlardan elde edilen gelirler istisna kapsamındadır. Portföyde kayıtlı olmayan taşınmazlardan gelir istisna dışıdır ve 390'a yazılamaz."
    - id: portfoy_ici_disi_ayrim
      soru: "Portföy işletmeciliği kazancı (hem menkul kıymet hem taşınmaz), portföy DIŞI gelirlerden ayrıştırıldı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "İstisna YALNIZCA portföy kapsamındaki varlıklardan elde edilen gelirler için geçerlidir. Yönetim ücreti ve benzeri portföy dışı gelirler vergiye tabidir."
    - id: tasinmaz_stopaj_analizi
      soru: "Portföy taşınmaz kira gelirinin stopaj rejimi (KVK Md. 15/1) analiz edildi mi?"
      tip: evet_hayir
      aciklama: "Taşınmaz kira stopajı, GVK Geçici Md. 67 menkul kıymet stopajından farklıdır. Dönem mevzuatı çerçevesinde ayrıca analiz gereklidir."

