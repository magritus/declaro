    detay: "TGB faaliyetlerine özgü 600/601 hesap hareketleri, proje bazında ayrıştırılmış
      giderler. Kapsam dışı gelirlerin (faiz/kur farkı) ayrı hesaplarda olduğu kontrol edilir."
    temin_yeri: Muhasebe / ERP
  - kategori: zorunlu
