  - kategori: zorunlu
    "no": 6
    baslik: TGB Faaliyet Yeri Belgesi (Bölge İçi Faaliyet Teyidi)
    detay: "TGB yönetici şirketi onayı veya katılımcı belgesi. Faaliyetin münhasıran bölge
      içinde yürütüldüğünü belgeler. Bölge içi/dışı çalışma süreleri ve proje kayıtları
      ayrıca kontrol edilmelidir."
    temin_yeri: TGB yönetici şirketi
  - kategori: destekleyici
    "no": 7
    baslik: Patent / Fonksiyonel Eşdeğer Belge (GMH Satışı Varsa)
    detay: "CBK kapsamında GMH satışından istisna uygulanıyorsa patent veya eşdeğer belge
      zorunludur. Belge tarihi ve proje ile ilişkisi kontrol edilmelidir."
    temin_yeri: TPE / USPTO / EPO
  - kategori: destekleyici
    "no": 8
    baslik: NHO (Nitelikli Harcama Oranı) Hesaplama Tablosu
    detay: "Toplam harcamalar, nitelikli harcamalar, yurt dışı ilişkili kişi harcamaları
      ≤%30 sınırı kontrol edilmelidir."
    temin_yeri: Proje finans kayıtları
