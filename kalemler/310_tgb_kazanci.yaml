  - 4691 Sayılı Teknoloji Geliştirme Bölgeleri Kanunu Geçici Madde 2
  - 4691 Sayılı Kanun Ek Madde 3 (7263 s.K. ile eklendi; 7953/10803 No.lu CBK ile güncellendi)
  - 1 Seri No.lu Kurumlar Vergisi Genel Tebliği Bölüm 10.4
  - 7953 No.lu Cumhurbaşkanı Kararı (16.12.2023, 32401 sayılı RG — fon %3, 2M alt sınır)
  - 10803 No.lu Cumhurbaşkanı Kararı (31.12.2025, 33124 sayılı RG — fon alt sınırı 5M TL)
