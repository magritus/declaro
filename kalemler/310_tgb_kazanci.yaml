beyanname_bolumu: zarar_olsa_dahi
yiakv_etkisi: dusulmez
durum: aktif
yururluk_araligi:
  baslangic: "1985-01-01"
  bitis: "2028-12-31"

ana_kategori: serbest_bolge_tgb_istisnalari

wizard_agaci:
  tetikleyici_soru: "Teknoloji Geliştirme Bölgesi'nde (TGB/Teknokent) faaliyet gösteriyor musunuz?"
  info_modal: |
    4691 Sayılı Kanun Geçici Md. 2 kapsamında Teknoloji Geliştirme Bölgelerinde münhasıran
    yazılım, tasarım ve Ar-Ge faaliyetlerinden elde edilen kazançlar 31.12.2028 tarihine kadar
    (dönem mevzuatı ayrıca kontrol edilmelidir) kurumlar vergisinden istisnadır.
    Kapsam dışı gelirler (faiz, kur farkı, ATİK satışı) ayrıştırılmalıdır.
    NOT: Bu istisna YİAKV (KVK Md. 32/C) matrahından indirilemeyen istisnalar kapsamındadır —
    4691 istisnası uygulayan kurumlar için YİAKV yükü doğabilir.
  kapi_sorulari:
    - id: tgb_faaliyet
      soru: "Faaliyet TGB içinde yürütülüyor mu? (TGB dışı faaliyetler kapsam dışıdır)"
      tip: evet_hayir
      zorunlu_cevap: evet
    - id: faaliyet_turu
      soru: "Kazanç türü yazılım, tasarım veya Ar-Ge faaliyetinden mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Yalnızca bu üç faaliyet türü istisna kapsamındadır. Ticari satış, destek,
        danışmanlık (Ar-Ge dışı) kapsam dışıdır."
    - id: yiakv_analiz
      soru: "YİAKV etkisi ayrıca test edildi mi? (4691 istisnası YİAKV'den indirilemeyen
        istisnalar kapsamındadır)"
      tip: evet_hayir
      zorunlu_cevap: evet

parametreler:
  oran: 1.0
  fon_oran: 0.03
  fon_alt_sinir_tl: 5000000
  fon_ust_sinir_tl: 100000000

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: proje_bazli_istisna
      etiket: "Proje bazlı istisna kazanç toplamı (Yazılım/Tasarım/Ar-Ge)"
      tip: para
      zorunlu: true
      yardim: |
        TGB içinde yürütülen yazılım, tasarım veya Ar-Ge projelerinin her biri için ayrı
        hasılat, gider ve bölge içi gider payı hesaplanarak bulunan net istisna kazanç toplamı.
        Kapsam dışı gelirler (faiz, kur farkı, ATİK satışı) dahil edilmez.
    - id: gmh_satis_istisna
      etiket: "Gayri maddi hak satışı istisna kısmı (Cumhurbaşkanı Kararı kapsamı — varsa)"
      tip: para
      zorunlu: false
      yardim: |
        Patent veya fonksiyonel eşdeğer belgeye sahip gayri maddi hakkın satış/devir/kiralama
        kazancının NHO (Nitelikli Harcama Oranı = Nitelikli Harcamalar / Toplam Harcamalar)
        oranında istisna kapsamındaki kısmı. Yurt dışı ilişkili kişi payı ≤%30 sınırı.
        Patent belgesi yoksa bu alan doldurulmamalıdır.
  formuller:
    istisna_tutari: "(proje_bazli_istisna + gmh_satis_istisna) * oran"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "proje_bazli_istisna >= 0"
      hata: "Proje bazlı istisna kazanç negatif olamaz. TGB kapsam içi faaliyet zararda ise
        zarar diğer faaliyetlere yüklenemez (zarar ring-fence)."
    - kural: "gmh_satis_istisna >= 0"
      hata: "GMH satışı istisna kısmı negatif olamaz."

denetci_notlari: |
  ## A. Yasal Dayanak Metni

  4691 s.K. Geçici Madde 2 (Yürürlük: 31.12.2028'e kadar — dönem mevzuatı kontrol edilmelidir):
  "Yönetici şirketlerin bu Kanun uygulaması kapsamında elde ettikleri kazançlar ile Bölgede
  faaliyet gösteren gelir ve kurumlar vergisi mükelleflerinin, münhasıran bu Bölgedeki
  yazılım, tasarım ve AR-GE faaliyetlerinden elde ettikleri kazançları ilgili süre tarihine
  kadar gelir ve kurumlar vergisinden müstesnadır."

  Ek Madde 3 — Girişim Sermayesi Fon Yükümlülüğü:
  Yıllık beyanname üzerinden istisna edilen kazanç tutarı 5.000.000 TL ve üzerinde olan
  mükellefler bu tutarın %3'ünü pasifte geçici bir hesaba aktarır.
  Azami: 100.000.000 TL | Süre: Hesap döneminin son günü | Yaptırım: İstisnanın %20'si iptal.

  ## B. Kritik Risk Tablosu

  RİSK 1 — YİAKV ÇARPAN ETKİSİ:
  4691 s.K. kapsamındaki istisna YİAKV matrahından indirilemeyen istisnalar arasındadır
  (KVK 32/C-2 fıkrası). TGB istisnası uygulayan kurumlar için YİAKV yükü doğabilir.
  Normal KV ve YİAKV hesapları ayrı çalışma kağıtlarıyla test edilmelidir.
  Bu durum 3218 s.K. SB istisnasından (düşülebilen — KVK 32/C (g)) farklıdır.

  RİSK 2 — BÖLGE DIŞI FAALİYET:
  Faaliyetin bölge dışında yürütülen kısmı için özel düzenleme yoksa istisna riski doğar.
  Bölge dışı çalışma süreleri ve proje kayıtları ayrıca kontrol edilmelidir.

  RİSK 3 — KAPSAM DIŞI GELİRLERİN İSTİSNAYA DAHİL EDİLMESİ:
  Faiz, kur farkı, ATİK satış kazancı ve TGB dışı ticari faaliyetlerden elde edilen gelirler
  istisna kapsamı dışındadır. Bu gelirlerin 310 satırına yazılması vergi incelemesinde
  ceza riskidir.

  RİSK 4 — FON YÜKÜMLÜLÜĞÜNÜN YAPILMAMASI:
  İstisna ≥ 5.000.000 TL iken fon yapılmazsa → İstisnanın %20'si iptal, vergi ziyaısız tarh.
  Hesap döneminin son günü itibarıyla GSYF payı, GSYO sermayesi veya kuluçka merkezi
  girişimcisine sermaye konulması şarttır.

  RİSK 5 — GMH SATIŞINDA PATENT VE NHO:
  CBK kapsamındaki GMH satışında patent zorunludur. NHO = Nitelikli harcamalar / Toplam
  harcamalar. Yurt dışı ilişkili kişi payı ≤%30 sınırını aşan kısım NHO'ya dahil edilmez.

  RİSK 6 — İSTİSNA KAPSAMINDAKİ ZARARIN AKTARILMASI:
  TGB istisna kapsamı faaliyetin zararla sonuçlanması halinde bu zarar diğer kazançlardan
  indirilemez. "Zarar ring-fence" prensibi.

  ## C. Önemli Mevzuat Kaynakları

  - 4691 sayılı Kanun Geçici Md.2, Ek Md.3
  - 1 Seri No.lu KV GT Bölüm 10.4
  - 7953 No.lu CBK (16.12.2023) — fon %2→%3, 1M→2M alt sınır
  - 10803 No.lu CBK (31.12.2025) — fon alt sınırı 2M→5M TL (01.01.2026+)
  - CBK 2017/10821 ve 54 No.lu CBK — NHO hesaplama esasları
  - GİB Özelge, 26.11.2025 — Kuluçka merkezi sermaye şartı
  - KVK Md. 32/C (7524 s.K. ile 02.08.2024) — YİAKV (01.01.2025+)

muhasebe_kayitlari: |
  ## Kayıt 1 — Ar-Ge / Yazılım / Tasarım Geliri Tahakkuku (Dönem İçi)
  Borç: 120 Alıcılar / uygun alacak hesabı — Proje hizmet bedeli hakediş
  Alacak: 600 Yurt İçi Satışlar (TGB Bağımsız Hesap) — Bölge içi yazılım/tasarım/Ar-Ge gelirleri
  Not: 642 (faiz) ve 646 (kur farkı) hesaplarıyla karıştırılmamalıdır.

  ## Kayıt 2 — Fonun Pasifde İzlenmesi (İstisna ≥ 5.000.000 TL ise)
  Borç: 590 Dönem Net Kârı (veya 689 Diğer Gider) — Fon aktarımı (İstisna × %3)
  Alacak: 549 Özel Fonlar — Girişim sermayesi fon hesabı
  Not: Fon tutarı pasifte geçici bir hesapta izlenmeli; hesap döneminin sonuna kadar uygun
  yatırım araçlarına (GSYF/GSYO/Kuluçka merkezi) yönlendirilmelidir.

  ## Kayıt 3 — Fon Yatırıldığında (GSYF Fonu Satın Alımı Örneği)
  Borç: 242 İştirakler / 110 Hisse Senetleri — GSYF payı alımı
  Alacak: 549 Özel Fonlar — Fon hesabı kapatma

  ## Kayıt 4 — Dönem Sonu: İstisna Nazım Kaydı (İsteğe Bağlı Takip)
  Borç: 950 Nazım Hesaplar — İstisna kazanç takibi (İstisna tutarı)
  Alacak: 951 Karşılıklı Nazım Hesabı (İstisna tutarı)
  Not: Muhasebe kârı değişmez — istisna beyanname üzerinde uygulanır.

