  - kategori: zorunlu
    "no": 5
    baslik: Fon Yükümlülük Hesaplaması ve Aktarım Belgesi (≥5M TL ise)
    detay: "İstisna ≥ 5M TL ise: %3 fon hesaplaması, 549 Özel Fonlar hesabı dökümü,
      GSYF/GSYO/Kuluçka merkezi yatırım belgesi (hesap döneminin sonuna kadar)."
