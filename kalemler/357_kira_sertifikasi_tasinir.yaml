parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: devir_bedeli
      etiket: "VKŞ'ye Devir Bedeli (TL)"
      tip: para
      zorunlu: true
      yardim: "Piyasa değerine uygun devir bedeli. SPK ihraç bağlamında değerleme raporu ile desteklenmeli."
    - id: net_defter_degeri
      etiket: "Taşınır/Hakkın Net Defter Değeri (TL)"
      tip: para
      zorunlu: true
      yardim: "Taşınır için 253/254 hesap kartı (amortisman düşülmüş). Hak için 260/263 hesap kartı (itfa sonrası net değer)."
    - id: devir_giderleri
      etiket: "Devir Giderleri (Komisyon, tescil, noter, SPK harçları, hukuki danışmanlık vb.) (TL)"
      tip: para
      zorunlu: false
      yardim: "Hak devirlerinde TPMK devir harcı, noter giderleri ve SPK harçları dahildir."
  formuller:
    satis_kazanci: "devir_bedeli - net_defter_degeri - devir_giderleri"
    istisna_tutari: "max(satis_kazanci * oran, 0)"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "satis_kazanci > 0"
      hata: "Devir kazancı pozitif olmalıdır. Zarar durumunda bu istisna uygulanamaz (Kazancın Bulunması Halinde bölümü)."

denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-k: Her türlü varlık ve hakların, kira sertifikası ihraç etmek amacıyla
  kurulan varlık kiralama şirketlerine satışından doğan kazançlar %100 istisnadır.

  ## Mekanizma — Kira Sertifikası İhraç Zinciri
  1. Kurucu (Satıcı) taşınır varlığını veya hakkını VKŞ'ye devreder
  2. VKŞ bu varlık/hak karşılığında kira sertifikası ihraç eder
  3. Yatırımcılar kira sertifikası satın alır
  4. VKŞ ihraç hasılatını kurucuya iletir
  5. Sukuk vadesi boyunca yatırımcılara kira/getiri geliri ödenir
  6. Devir kazancı → %100 İstisna (357) → 549 Fon → Sukuk vadesinde amortize

  ## 5/1-j (354/356) ile Kritik Farklar
  5/1-j (Sat-Kirala-Geri Al): Geri alım taahhüdü ZORUNLU — aksi 5/1-j kapsamı dışında
  5/1-k (357): Geri alım OPSİYONEL — ihraç amacı yeterli koşuldur
  5/1-k Kapsamı: Taşınır + HAKLAR (patent/lisans/marka/telif — maddi olmayan varlıklar)
  Sukuk Türleri: İcara + Murabaha + Wakala + Muşaraka

  ## Haklar Kapsamı (5/1-j'den Geniş)
  - Tescilli: Patent, faydalı model, tasarım → TPMK belgesi zorunlu
  - Tescilsiz: Telif hakkı, know-how → Devir sözleşmesi + Tespit belgesi
  - Yazılım lisansı / kaynak kodu hakkı → Lisans devir sözleşmesi
  - Kamu kaynaklı: İmtiyaz/ruhsat → Özel izin gerekebilir (özelge alın)

  ## 549 Fon Mekanizması
  Devir yılında E.6 tutarı 549'a alınır. Her dönem sukuk vadesine paralel kira/getiri
  ödemelerine orantılı fon azalır. Sukuk vadesi sonunda 549 sıfır.

  ## GİB Özelgesi
  5/1-k uygulaması için özelge alınması şiddetle tavsiye edilir. GİB emsal yoğunluğu
  5/1-j'ye kıyasla daha düşüktür.

  ## YMM Tasdik Raporu
  49 No.lu Tebliğ (30.12.2025): Tek satır ≥500.000 TL veya toplam ≥1.000.000 TL → YMM raporu.

muhasebe_kayitlari: |
  ## Kayıt 1a — Taşınır Varlık Devir Kaydı (VKŞ'ye Sukuk İhracı Amacıyla)
  Borç: 102 Bankalar / 121 Alacaklar                [Devir Bedeli]
  Alacak: 253/254 İlgili Taşınır Aktif Hesabı        [Net Defter Değeri]
  Alacak: 258 Birikmiş Amortismanlar                 [Birikim]
  Alacak: 679 Diğer Olağandışı Kâr / 645 Satış Kârı  [Devir Kazancı]
  Açıklama: KVK 5/1-k 357 — Kira sertifikası ihraç amacıyla taşınır devri

  ## Kayıt 1b — Hak Devir Kaydı (Tescilli: Patent/Marka — TPMK Devir Tescil Tarihi)
  Borç: 102 Bankalar                                 [Devir Bedeli]
  Alacak: 260 Haklar (Patent/Marka/Tasarım)          [Net Defter Değeri]
  Alacak: 268 Birikmiş İtfa Payları                  [Birikim]
  Alacak: 679 Diğer Olağandışı Kâr                   [Devir Kazancı]
  Açıklama: KVK 5/1-k 357 — Kira sertifikası ihraç amacıyla hak devri

  ## Kayıt 2 — 549 Özel Fon Hesabına Alma (Devir Yılında)
  Borç: 679 Diğer Olağandışı Kâr / 645 Satış Kârı   [İstisna Tutarı]
  Alacak: 549 Özel Fonlar — KVK 5/1-k 357 İstisnası  [İstisna Tutarı]
  Açıklama: Devir kazancının tamamının 549 hesabına alınması (devir yılı)

  ## Kayıt 3 — Fon Amortizasyonu (Her Dönem — Sukuk Vadesine Orantılı)
  Borç: 549 Özel Fonlar                   [Dönem Fon Azalışı]
  Alacak: 549 Özel Fonlar (alt hesap)     [Dönem Fon Azalışı]
  Açıklama: Fon = Başlangıç Fon × (Dönem Kira/Getiri / Toplam Kira/Getiri). Sukuk vadesi sonunda 549 sıfır.

