  bitis: null

ana_kategori: doviz_alacak_istisnalari

wizard_agaci:
  tetikleyici_soru: "370/372 kapsamındaki KKM hesabı dönem içinde vadeye ulaşarak kâr payı/faiz tahsil edildi mi?"
  info_modal: |
    KVK Geçici Md.14/1-b kapsamında, 370 (dönüşüm kazancı) kapsamındaki KKM hesabı
    vadeye ulaştığında bankadan fiilen alınan kâr payı ve faiz kurumlar vergisinden istisnadır.

    **KRİTİK — 372-373 Mükerrerlik:**
    Yılı aşan vadeli hesaplarda: Net 373 = Vade Toplam − Önceki Yıl 372 Tahakkuku
    Bu kural uygulanmazsa mükerrer istisna → tarhiyat riski.

    **KRİTİK — YİAKV:** Bu istisna KVK 32/C (YİAKV) matrahından DÜŞÜLEMEZ (E.7).
  kapi_sorulari:
    - id: vade_geldi_mi
      soru: "Dönem içinde (01.01–31.12) KKM hesabı vadeye ulaştı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "373, vade sonu tahsilatı kapsar. Hesap hâlâ açıksa → 372 (tahakkuk) uygulanır."
    - id: mukerrerlik_analiz
      soru: "Önceki yıl 372 tahakkuku yapılmış hesap için mükerrerlik analizi yapıldı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Net 373 = Vade Toplam − Önceki Yıl 372. Bu kural uygulanmazsa çifte istisna riski doğar."
    - id: yiakv_dusulemez
      soru: "370-373 arası tüm tutarların YİAKV matrahından DÜŞÜLMEYECEĞI teyit edildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet

parametreler:
  oran: 1.0
  ymm_tasdik_esigi_tl: 500000

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: vade_toplam_karpay_faiz
      etiket: "Vade sonunda bankadan alınan toplam kâr payı/faiz (TL)"
      tip: para
      zorunlu: true
      yardim: "Banka vade bildirimi ile teyit edilen toplam tahsilat tutarı"
    - id: onceki_yil_372_tahakkuk
      etiket: "Önceki yılda yapılan 372 tahakkuku (önceki dönemde beyan edilmişse)"
      tip: para
      zorunlu: false
      yardim: "Yılı aşan vadeli hesaplarda mükerrerlik önlemi için girilmesi zorunludur"
    - id: beyan_edilen_istisna
      etiket: "Beyan edilen 373 istisna tutarı"
      tip: para
      zorunlu: false
  formuller:
    net_istisna_tutari: "vade_toplam_karpay_faiz - onceki_yil_372_tahakkuk"
    istisna_tutari: "max(net_istisna_tutari, 0)"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "vade_toplam_karpay_faiz > 0"
      hata: "Vade sonu kâr payı/faiz tutarı sıfır — 373 istisnası uygulanamaz."

denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Md.14/1-b: 370 kapsamındaki KKM hesabının vade sonunda bankadan fiilen
  tahsil edilen kâr payı ve faiz geliri istisna kapsamındadır.

  ## Kritik Noktalar
  - 373, nakit esaslıdır: Vade bitiminde bankadan alınan kâr payı/faiz
  - Hesap hâlâ açıksa (vade dolmamışsa) → 372 (tahakkuk esaslı) uygulanır
  - 372-373 mükerrerlik kuralı: Net 373 = Vade Toplam − Önceki 372 Tahakkuku
  - Banka vade bildirimi / hesap özeti zorunludur
  - 370+371+372+373 toplamı YİAKV matrahından DÜŞÜLEMEZ (E.7'de dört satır da listede)

  ## Muhasebe Kaydı Mantığı (Vade Sonu)
  102 Bankalar Dr / Kr 181 Gelir Tahakkukları (önceki yıl accrual kapatma)
  102 Bankalar Dr / Kr 642 Faiz Gelirleri (bu yılın yeni kısmı)
  Her iki alacak kalemi de 373 istisna kapsamındadır.

muhasebe_kayitlari: |
  ## Kayıt 1 — Vade Sonu Kâr Payı/Faiz Tahsilatı
  Borç: 102 Bankalar (TL)
  Alacak: 181 Gelir Tahakkukları (önceki yıl 372 kapatma)
  Alacak: 642 Faiz Gelirleri (bu yıla ait kısım)
  Açıklama: KKM vade sonu — 373 istisna kapsamı (Net: Toplam − Önceki 372)

