wizard_agaci:
  tetikleyici_soru: "KVK Geçici Md.14/4 (Paragraf 4) kapsamında bir araçtan kâr payı veya faiz tahsil edildi mi ve bu 383 (dönem sonu tahakkuk) kapsamında değil mi?"
  info_modal: |
    KVK Geçici Madde 14/4 (Paragraf 4) kapsamındaki araçlardan elde edilen genel kâr
    payı ve faiz (vade sonu, dönemsel tahsilat, doğrudan ödeme) kurumlar vergisinden
    istisnadır (Beyanname 384).

    383 ile fark:
    - 383 = 31 Aralık dönem sonu tahakkuk (181/642 muhasebe kaydı)
    - 384 = Genel kâr payı/faiz — dönem sonu sınırı yok (vade sonu, dönemsel, doğrudan)

    383-384 Mükerrerlik Kuralı (KRİTİK): Net 384 = Toplam − Önceki Yıl 383 Tahakkuku.
    Çapraz kontrol: 383 + 384 = Toplam kâr payı/faiz (banka bildirimi).

    YİAKV uyarısı: Bu istisna YİAKV matrahından DÜŞÜLEMEZ (YİAKV E.7 listesi).
  kapi_sorulari:
    - id: paragraf4_kapsam
      soru: "KVK Geçici Md.14/4 kapsamında işlem gerçekleştirildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
    - id: donem_sonu_degil
      soru: "Bu kâr payı/faiz 383 (dönem sonu tahakkuk — 31 Aralık accrual) kapsamında değil mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "383 = 31 Aralık tahakkuk. 384 = Vade sonu / dönemsel / doğrudan tahsilat. Aynı tutarın hem 383 hem 384'e yazılması mükerrerlik oluşturur."
    - id: mukerrerlik_kontrol
      soru: "383-384 mükerrerlik kontrolü yapıldı mı? (Önceki yıl 383 tahakkuku bu yıl 384'ten mahsup edildi mi?)"
      tip: evet_hayir
      zorunlu_cevap: evet

