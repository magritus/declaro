denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Madde 14/4 (Paragraf 4): Paragraf 4 kapsamındaki araçlardan elde edilen
  genel kâr payı ve faiz istisnası (dönem sonu sınırı olmaksızın: vade sonu, dönemsel
  tahsilat, doğrudan ödeme). 7352 Sayılı Kanun kapsamında yürürlüğe girmiştir.

  ## 383 ile Ayrım
  - 383: 31 Aralık dönem sonu tahakkuk (VUK 280/281 esaslı, 181/642 muhasebesi)
  - 384: Genel kâr payı/faiz (102/(181+642) muhasebesi — vade/dönemsel/doğrudan)

  ## 383-384 Mükerrerlik Kuralı (EN KRİTİK)
  Önceki yılda 383 tahakkuku yapılmış araç vadeye giriyorsa:
  Net 384 = Toplam − Önceki Yıl 383 Tahakkuku.
  Çapraz kontrol: 383 + 384 = Toplam kâr payı/faiz (banka bildirimi).
  (372-373, 376-377, 380-381 kuralının Paragraf 4 eşdeğeridir.)

  ## YİAKV Etkisi (KVK Md.32/C)
  KVK Geçici Md.14 kapsamındaki tüm istisnalar YİAKV matrahından DÜŞÜLEMEZ.

  ## Beyanname Bölümü
  "Kazancın Bulunması Halinde İndirilecek" — zarar döneminde uygulanamaz.

muhasebe_kayitlari: |
  ## Kayıt 1 — Vade/Tahsilat: Paragraf 4 Kâr Payı/Faiz Tahsilatı
  Borç:    102 Bankalar                    [Toplam kâr payı/faiz tahsilatı]
  Alacak:  181 Gelir Tahakkukları          [Önceki yıl 383 accrual kapatma — varsa]
  Alacak:  642 Faiz Gelirleri / 644 Kâr Payları [Bu yılın net kısmı = Net 384]
  Açıklama: KVK Geçici Md.14/4 → Beyanname 384
  Not: Net 384 = Toplam − Önceki Yıl 383. Çapraz: 383 + 384 = Banka toplam bildirimi.

  ## Paragraf 4 Tam Paket (383-384-385) Muhasebe
  383 (Dönem sonu): 31.12 / 181/642        — P4: Dönem sonu tahakkuk (accrual)
  384 (Kâr payı/faiz): Tahsilat / 102/(181+642) — P4: Kâr payı/faiz genel (BU)
  385 (Vade diğer): Vade / 646/648/679     — P4: Vade sonu kazanç (kâr payı/faiz dışı)

