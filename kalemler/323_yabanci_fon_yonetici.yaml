wizard_agaci:
  tetikleyici_soru: "SPK'dan portföy yönetim şirketi lisansına sahip misiniz ve yurt dışında kurulu yabancı fon(lar)ı Türkiye'den yönetiyor musunuz?"
  info_modal: |
    ## Genel Çerçeve

    KVK Madde 5/A Fıkra 3 kapsamındaki istisna, **Türkiye'de SPK'dan portföy yönetim şirketi
    lisansı almış kurumların** yurt dışında kurulu yabancı kolektif yatırım kuruluşlarını
    (fonları) Türkiye'den yönetmesi faaliyetinden elde ettikleri kazançların **tamamını (%100)**
    kurumlar vergisinden muaf tutar.

    Bu düzenleme, Türkiye'nin İstanbul Uluslararası Finans Merkezi (İFM) hedefine hizmet eden
    özel politika araçlarından biridir. KVK'nın ayrı bir maddesi olan 5/A, 5/1 bentlerinden
    (302, 304, 308 vb.) ve 5/B'den (patent box) bağımsız bir kategori oluşturur. İstisna
    "Kazancın Bulunması Halinde İndirilecek" bölümünde (323. satır) gösterilir.

    Mekanizma: SPK lisanslı portföy yönetim şirketi (Türkiye'de yerleşik) → Yabancı fonu
    Türkiye'deki ekip ve altyapıyla yönetir → Yönetim ücreti + Performans ücreti kazanır → %100 istisna.

    ## Temel Koşullar

    **1. SPK Portföy Yönetim Şirketi Lisansı:** İstisna kullanan kurumun Sermaye Piyasası
    Kurulu'ndan geçerli **Portföy Yönetim Şirketi lisansına** sahip olması zorunludur. Başka
    tür yatırım kuruluşları (aracı kurum, banka varlık yönetim birimi vb.) bu istisnadan
    yararlanamaz.

    **2. Yabancı (Yurt Dışında Kurulu) Fon:** Yönetilen fonun yurt dışında kurulu ve faaliyette
    olan bir **kolektif yatırım kuruluşu** olması gerekir. Fonun kayıtlı olduğu ülkenin
    finansal otoritesinden lisans veya kayıt belgesi temin edilmelidir (Cayman, Lüksemburg
    SICAV, İrlanda UCITS, BVI, Jersey gibi). **Türk yatırım fonu** yönetimi bu madde
    kapsamında değildir.

    **3. Türkiye'den Yönetim:** Fon yönetim hizmetinin Türkiye'deki şirket çalışanları ve
    altyapısıyla Türkiye'den verilmesi şarttır. Salt aracı sıfatıyla hareket etmek veya
    yönetimi yurt dışından yürütmek kapsam dışıdır. Portföy yönetim sözleşmesinde Türkiye'deki
    şirketi taraf olarak göstermesi ve yönetim kararlarının Türkiye'de alındığının belgelenmesi
    gerekmektedir.

    **4. Kapsam İçi Gelir Ayrıştırması:** Yalnızca yabancı fon yönetiminden kaynaklanan gelirler
    istisna kapsamındadır. Mevduat faizi, yerli fon gelirleri ve diğer faaliyetler kapsam
    dışıdır; gelir ayrıştırması net biçimde yapılmalıdır.

    ## Önemli Sınırlamalar ve Riskler

    **Kapsam İçi / Dışı Karışıklığı:** Portföy yönetim şirketleri çoğunlukla hem yerli hem
    yabancı fonları yönetir; ayrıca mevduat ve diğer finansal gelirler elde eder. İstisna
    yalnızca yabancı fon yönetim gelirlerine uygulanabilir. Gelir kırılımı yapılmadan toplu
    istisna uygulaması tarhiyat riski doğurur.

    **Gider Dağıtımı:** Yalnızca yabancı fon yönetimine doğrudan atfedilen giderler kazanç
    hesabında düşülür. Genel yönetim giderleri (GYG) ise kapsam içi gelirin toplam gelire
    oranıyla dağıtılmalı ve bu yöntem belgelenmelidir.

    **Türkiye'den Yönetim Şartının Kanıtlanması:** Vergi incelemelerinde "Türkiye'den fiilen
    yönetim" şartı sorgulanabilir. Yönetim kararlarının Türkiye'de alındığını gösteren yönetim
    kurulu kararları, e-posta yazışmaları, seyahat kayıtları gibi belgeler saklanmalıdır.

    ## YİAKV İlişkisi

    KVK 5/A Fıkra 3 istisnasının **YİAKV (KVK Madde 32/C) matrahına etkisi tartışmalıdır.**
    323. satırdaki istisna tutarının YİAKV matrahından indirilip indirilemeyeceği konusunda
    mevzuat netlik kazanmamıştır. Bu konuda GİB özelgesi alınması ve YİAKV etkisinin ayrıca
    analiz edilmesi önerilir.

    ## Pratik Notlar

    - SPK Portföy Yönetim Şirketi lisans belgesi (geçerlilik tarihi kontrol edilmeli) dosyaya eklenmelidir.
    - Yabancı fonun kayıtlı olduğu ülkenin otoritesinden alınan lisans/kayıt belgesi zorunludur.
    - Portföy yönetim sözleşmesi, Türkiye'deki şirketi açıkça taraf olarak göstermelidir.
    - Kapsam içi/dışı gelir ayrıştırma tablosu ve gider dağıtım yöntemi belgesi hazırlanmalıdır.
    - AUM (Yönetilen Varlık Büyüklüğü) belgesi saklama kuruluşundan temin edilmelidir.
    - 49 No.lu KV GT kapsamında YMM tasdik raporu eşiği kontrol edilmelidir.
  kapi_sorulari:
    - id: spk_lisansi
      soru: "SPK'dan Portföy Yönetim Şirketi lisansınız var mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "5/A-3 istisnası yalnızca SPK'dan portföy yönetim şirketi lisansı almış kurumlara uygulanır. SPK Portföy Yönetim Şirketi lisans belgesi zorunludur."
    - id: yabanci_fon
      soru: "Yönetilen fon yurt dışında kurulu (yabancı) kolektif yatırım kuruluşu mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "İstisna yalnızca YABANCI fon yönetimi için geçerlidir. Türkiye'de kurulu Türk yatırım fonu yönetimi 5/A-3 kapsamında değildir."
    - id: turkiyeden_yonetim
      soru: "Fon yönetimi Türkiye'deki şirket ve personel tarafından Türkiye'den mi veriliyor?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Salt aracı sıfatıyla veya Türkiye dışından yönetim 5/A-3 kapsamı dışındadır. Yönetim sözleşmesi Türkiye'deki şirketi taraf olarak göstermelidir."
    - id: kapsam_ici_gelir_ayristirma
      soru: "Yabancı fon yönetiminden kaynaklanan gelirler, kapsam dışı gelirlerden (mevduat faizi, yerli fon vb.) ayrıştırıldı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Yalnızca yabancı fon yönetim gelirleri istisna kapsamındadır. Mevduat faizi, yerli fon yönetimi gelirleri kapsam dışıdır."

parametreler:
  istisna_orani: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: yonetim_ucreti
      etiket: "Yönetim ücreti (Management Fee) — yabancı fon"
      tip: para
      zorunlu: true
      yardim: "AUM'un belirli yüzdesi olarak belirlenen yıllık yönetim ücreti. 5/A-3'ün ana kapsam içi geliridir."
    - id: performans_ucreti
      etiket: "Performans ücreti (Performance/Incentive Fee)"
      tip: para
      zorunlu: false
      yardim: "Fon performansına bağlı ücret. Kapsam içi gelirdir."
    - id: danismanlik_ucreti
      etiket: "Danışmanlık/araştırma ücreti (yabancı fon için)"
      tip: para
      zorunlu: false
      yardim: "Yabancı fona yönelik araştırma/danışmanlık/risk yönetimi hizmeti geliri. Kapsam içi."
    - id: dogrudan_giderler
      etiket: "Yabancı fon yönetimine doğrudan atfedilen giderler (personel, yazılım, araştırma, seyahat)"
      tip: para
      zorunlu: true
      yardim: "Yalnızca yabancı fon yönetimine doğrudan bağlı giderler. Genel yönetim giderleri ayrıca dağıtılır."
    - id: gyg_payi
      etiket: "Genel yönetim gideri payı (kapsam içi gelir oranıyla dağıtılan)"
      tip: para
      zorunlu: false
      yardim: "Toplam GYG × (Kapsam içi gelir / Toplam gelir). Dağıtım yöntemi belgelenmeli."
  formuller:
    kapsam_ici_gelir: "yonetim_ucreti + performans_ucreti + danismanlik_ucreti"
    yonetim_kazanci: "max(kapsam_ici_gelir - dogrudan_giderler - gyg_payi, 0)"
    istisna_tutari: "yonetim_kazanci * 1.0"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "kapsam_ici_gelir > 0"
      hata: "Kapsam içi yabancı fon yönetim geliri sıfırsa istisna uygulanamaz"
    - kural: "yonetim_kazanci > 0"
      hata: "Yönetim kazancı sıfır veya zararda — istisna uygulanamaz (Kazancın Bulunması Halinde indirilecek)"

denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/A Fıkra 3: Türkiye'de SPK'dan portföy yönetim şirketi lisansı almış kurumların
  yurt dışında kurulu yabancı kolektif yatırım kuruluşlarını Türkiye'den yönetmesi faaliyetinden
  elde ettikleri kazançların tamamı KV'den istisnadır.

  ## 323'ün Setteki Konumu — KVK 5/A Ayrı Madde
  - KVK Md. 5/1 bentleri (302/304/311/315/354-359 vb.): KVK 5. maddesinin 1. fıkrası
  - 323 → KVK Md. 5/A, Fıkra 3: Türkiye'yi uluslararası finans merkezi yapma politikasına yönelik ayrı madde
  - 311 (TGB) / 315 (TUGS) ile fark: Bunlar özel kanun, 323 KVK içindedir; ama 5/1 değil 5/A

  ## İki Temel Koşul
  1. SPK Portföy Yönetim Şirketi lisansı — kurumun lisans sahibi olduğunu belgeleyen SPK yazısı zorunlu
  2. Fonun yabancı (yurt dışında kurulu) kolektif yatırım kuruluşu olması — fon kurulu olduğu ülkenin
     otoritesinden lisanslı/kayıtlı (Cayman, Lüksemburg SICAV, İrlanda, BVI, Jersey vb.)

  ## Kapsam İçi Gelirler
  - Yönetim ücreti (management fee) — AUM'a dayalı
  - Performans ücreti (performance/incentive fee) — fon performansına bağlı
  - Danışmanlık ücreti (advisory fee) — yabancı fona yönelik araştırma/danışmanlık
  - Risk yönetimi / izleme ücreti — yabancı fona verilen hizmet

  ## Kapsam Dışı Gelirler (İstisna Dışında Kalır)
  - Mevduat faizi ve finansal gelirler
  - Yerli (Türk) fon yönetim ücretleri
  - TGB/TUGS/diğer faaliyet gelirleri (başka istisna kapsamında olabilir)

  ## Gider Dağıtımı
  Doğrudan giderler + Kapsam içi gelir oranıyla dağıtılan GYG payı = Toplam düşülecek gider.
  Dağıtım yöntemi belgelenmeli.

  ## YMM Tasdik
  49 No.lu Tebliğ (30.12.2025): ≥500.000 TL veya ≥1.000.000 TL → YMM raporu.

muhasebe_kayitlari: |
  ## Yönetim Ücreti Gelir Kaydı (Kapsam İçi)
  Borç: 120/102 Alıcılar / Bankalar
  Alacak: 600 Yurt Dışı Satışlar (veya 642 Komisyon Gelirleri)
  Açıklama: Yabancı fon yönetim ücreti geliri — 323 satırında istisna uygulanır

  ## Performans Ücreti Kaydı
  Borç: 120/102 Alıcılar / Bankalar
  Alacak: 649 Diğer Olağandışı Gelirler
  Açıklama: Yabancı fon performans ücreti — 323 satırında istisna

  ## Kapsam Dışı Gelir (Mevduat Faizi vb.)
  Borç: 102 Bankalar
  Alacak: 642 Faiz Gelirleri
  Açıklama: Kapsam dışı finansal gelir — 323 satırında istisna UYGULANMAZ

