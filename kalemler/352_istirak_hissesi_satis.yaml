wizard_agaci:
  tetikleyici_soru: "2 yıldan fazla aktifinde tuttuğunuz iştirak hisselerini (ortaklık paylarını) sattınız mı?"
  info_modal: |
    ## Genel Çerçeve

    **KVK Madde 5/1-e** kapsamında, kurumların en az **2 tam yıl (730 gün)** aktiflerinde
    tuttukları iştirak hisselerinin (A.Ş. payı, Ltd. payı, kooperatif payı, iş ortaklığı payı)
    satışından doğan kazançların belirli bir kısmı kurumlar vergisinden istisnadır. **9160 Sayılı
    Cumhurbaşkanı Kararı (27/11/2024)** ile istisna oranı %75'ten **%50'ye** indirilmiştir;
    27/11/2024 öncesi satışlarda eski oran (%75) geçerliliğini korumaktadır.

    ## Temel Koşullar

    - İştirak hissesinin satış tarihi itibarıyla **en az 2 tam yıl (730 gün)** aktifinde
      bulundurulmuş olması zorunludur; aynı kuruma farklı tarihlerde alınan hisselerde **FIFO
      (ilk giren ilk çıkar)** yöntemi esas alınır ve en eski iktisap tarihi başlangıç kabul edilir.
    - Hisseler **iştirak amaçlı** tutulmalıdır; 24-Mali Duran Varlıklar hesap grubunda (Md.242
      İştirakler veya 245 Bağlı Ortaklıklar) izlenmelidir; 11-Menkul Kıymetler hesabında ticari
      amaçlı izlenen hisseler kapsam dışıdır.
    - **Menkul kıymet ticareti** yapan kurumlar bu istisnadan yararlanamaz; kurumun ana faaliyeti
      ve fiili uğraşı birlikte değerlendirilmelidir.
    - İstisna kazancının **satışı izleyen hesap dönemi başından KV beyan süresine kadar 549 Özel
      Fonlar hesabına alınması** zorunludur; bu koşulun yerine getirilmemesi istisnayı geçersiz kılar.
    - **Satış tarihi kritik:** 27/11/2024 öncesi satışlarda %75, 27/11/2024 ve sonraki satışlarda
      %50 oran uygulanır; satış tarihi olarak hisse devir sözleşmesinin noter/tescil tarihi esas alınır.

    ## Önemli Sınırlamalar ve Riskler

    - **Zarar durumunda KKEG riski (KVK 5/3):** İştirak hissesi satışı zararla sonuçlanırsa,
      zararın **istisna oranına isabet eden kısmı KKEG** sayılır; kalan kısım gider olarak
      indirilebilir. Örnek (%50 oranında): 200.000 TL zarar → 100.000 TL KKEG + 100.000 TL
      indirilebilir zarar. Bu KKEG tutarı beyannamede ayrıca gösterilmelidir.
    - **549 fon hesabı zorunluluğu ve 5 yıl tutma:** Fona alınmayan veya 5 yıl dolmadan çekilen
      tutar çekildiği dönemde matraha eklenerek vergilendirilir.
    - **Varlık türü karışıklığı riski:** Kurucu senetleri, intifa senetleri, rüçhan hakları ve
      GSYF katılma payları bu satıra (352) değil, **353. satıra** girilmelidir.
    - **KDV istisnası (KDVK Md.17/4-r):** İştirak hissesi satışındaki KDV istisnası 15/7/2023
      değişikliğinden etkilenmez; süresiz geçerliliğini korur.
    - **YMM tasdik raporu:** İstisna tutarı ≥500.000 TL ise 49 No.lu KV GT kapsamında YMM
      tasdik raporu zorunludur.

    ## YİAKV İlişkisi

    **KVK 5/1-e iştirak hissesi satış kazancı istisnası YİAKV (KVK 32/C) matrahından düşülemez;**
    istisna tutarı YİAKV matrahında kalır. GİB KV Beyan Rehberi Mart 2026 (No:601) A0.7 kontrolü
    bu pozisyonu açıkça desteklemektedir. YİAKV hesabında bu istisna herhangi bir indirim sağlamaz.

    ## Pratik Notlar

    - **FIFO hesaplama tablosu:** Aynı kuruma ait birden fazla tarihlerde alınan hisseler varsa
      her parti için iktisap tarihi ve maliyet ayrı ayrı tabloya işlenmelidir; hangi partinin
      satıldığı FIFO ile belirlenir ve 2 yıl şartı bu belirlemeye göre test edilir.
    - **Oran tespitinde satış tarihi:** Devir sözleşmesi tarihi mi yoksa MKK/noter tescil tarihi
      mi esas alınacağı hisse türüne göre belirlenmeli; şüpheli durumlarda özelge tavsiye edilir.
    - **Satış giderlerinin dağıtımı (KVK 5/3):** Komisyon, damga vergisi gibi satış giderleri
      vergiye tabi kısma isabet eden payı oranında gider yazılabilir; istisna kısmına isabet eden
      giderler ise KKEG sayılır.
    - **549 hesabı izleme:** 5 yıllık fon tutma süresi her yıl kontrol edilmeli; sermayeye ilave
      kararı verildiğinde muhasebe kaydı ve ilerleyen dönem vergi riski birlikte değerlendirilmelidir.
  kapi_sorulari:
    - id: iki_yil_aktif
      soru: "İştirak hisseleri satış tarihi itibarıyla en az 2 tam yıl (730 gün) aktifinde bulunuyor mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "2 yıl (730 gün) şartı sağlanmadan istisna uygulanamaz. Aynı kuruma farklı tarihlerde alınan hisselerde FIFO uygulanır — en eski iktisap tarihi esas alınır."
    - id: menkul_kiymet_ticareti_yok
      soru: "Kurum menkul kıymet ticareti yapıyor mu? (Hisseler iştirak amaçlı — 24 hesapta — tutuluyor mu?)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Menkul kıymet ticareti kapsamında elde tutulan hisseler kapsam dışıdır. Holding şirketlerinde 24-Mali Duran Varlıklar'daki iştirakler istisna kapsamındadır. 11-Menkul Kıymetler hesabındaki ticari amaçlı hisseler kapsam dışıdır."
    - id: istirak_hissesi_niteligi
      soru: "Satılan varlık gerçek anlamda iştirak hissesi mi? (A.Ş. payı, Ltd. payı, koop. payı, iş ortaklığı payı)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "SPK fonlarının katılma belgeleri iştirak hissesi sayılmaz (352 kapsamı dışıdır). Kurucu senetleri, intifa senetleri, rüçhan hakları ve GSYF katılma payları → 353 beyanname satırını kullanın."
    - id: fon_ayrimi_yapilacak
      soru: "İstisna tutarı 549 Özel Fonlar hesabına alınacak mı? (Zorunlu)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "İstisna kazancının satışı izleyen hesap dönemi başından KV beyan süresine kadar 549 hesabına alınması zorunludur. 5 yıl boyunca tutulacaktır. Aksi halde istisna geçersiz sayılır."

parametreler:
  oran_eski: 0.75
  oran_yeni: 0.50
  oran_kesim_tarihi: "2024-11-27"

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: oran_dilimi
      etiket: "Uygulanacak istisna oranı (satış tarihine göre)"
      tip: secenek
      secenekler:
        - "%75 — 27/11/2024 öncesi satış"
        - "%50 — 27/11/2024 ve sonrası satış (9160 s. CB Kararı)"
      zorunlu: true
      yardim: |
        9160 Sayılı Cumhurbaşkanı Kararı (27/11/2024) ile oran değişimi:
        • %75: Satış tarihi 27/11/2024 öncesi olan tüm iştirak hissesi satışları
        • %50: Satış tarihi 27/11/2024 ve sonrası (bu tarih dahil) olan satışlar
        Satış tarihi olarak hisse devir sözleşmesinin tescil / noter tarihi esas alınır.
    - id: satis_kazanci
      etiket: "İştirak hissesi satış kazancı (net — FIFO bazında, 2 yıl şartını taşıyan kısım)"
      tip: para
      zorunlu: true
      yardim: |
        Satış bedeli eksi FIFO bazında defter değeri (birikmiş maliyetler). Negatif değer girilirse
        zarar durumu için uyarı tetiklenir: Zararın istisna oranına isabet eden kısmı KKEG sayılır.
        Yabancı para cinsinden satışlarda TCMB kuru × miktar kullanın.
  formuller:
    oran_sayisal: "0.75 if oran_dilimi == '%75 — 27/11/2024 öncesi satış' else 0.50"
    istisna_tutari: "max(satis_kazanci * oran_sayisal, 0)"
    kkeg_tutari: "abs(satis_kazanci) * oran_sayisal if satis_kazanci < 0 else 0"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "satis_kazanci >= 0"
      hata: |
        UYARI — ZARAR DURUMU (KVK Md.5/3): İştirak hissesi satışında zarar oluştuysa, zararın istisna
        oranına (%75 veya %50) isabet eden kısmı Kanunen Kabul Edilmeyen Gider (KKEG) sayılır.
        Kalan kısım (zarar × (1 - oran)) ise gider olarak indirilebilir.
        Örnek: 100.000 TL zarar, %50 oran → 50.000 TL KKEG + 50.000 TL indirilebilir zarar.
        KKEG tutarı beyannamede ayrıca gösterilmelidir.

denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-e: En az 2 tam yıl aktifinde tutulan iştirak hisselerinin satışından doğan kazancın
  belirli bir kısmı kurumlar vergisinden istisnadır.
  9160 Sayılı CB Kararı (27/11/2024): İstisna oranı %75'ten %50'ye indirildi.
  GİB KV Beyan Rehberi Mart 2026 (Yayın No:601) esas alınmıştır.

  ## Oran Tablosu
  - %75: Satış tarihi 27/11/2024 öncesi
  - %50: Satış tarihi 27/11/2024 ve sonrası (9160 s. CB Kararı)

  ## Kapsam — Hangi Varlıklar 352'ye Girer
  - A.Ş. ortaklık payları (hisseleri)
  - Ltd. Şti. ortaklık payları
  - Kooperatif ortaklık payları
  - İş ortaklığı payları
  NOT: Kurucu senetleri, intifa senetleri, rüçhan hakları, GSYF katılma payları → 353 beyanname satırı

  ## Kritik Noktalar
  - 2 tam yıl (730 gün) aktifinde bulundurma zorunlu
  - Aynı kuruma farklı tarihlerde alınan hisseler → FIFO uygulanır (GİB Rehberi Md.6)
  - Menkul kıymet ticareti yapanlar kapsam dışı; iştirak amaçlı (24-MDV hesabı) olması şart
  - 549 Özel Fonlar hesabına alınma zorunlu — aksi halde istisna geçersiz
  - 5 yıl boyunca fon hesabında tutulacak; erken çekilirse matraha eklenir
  - Satış giderlerinin vergiye tabi kısma isabet eden payı gider yazılabilir (KVK 5/3)

  ## Zarar Durumu (KVK 5/3)
  Zararlı satışlarda: zarar × oran = KKEG, zarar × (1 - oran) = indirilebilir zarar.
  Örnek (%50 oran): 200.000 TL zarar → 100.000 TL KKEG + 100.000 TL indirilebilir zarar.

  ## KDV İstisnası
  İştirak hissesi satışında KDV istisnası (KDVK Md.17/4-r) 15/7/2023 değişikliğinden
  etkilenmez — süresiz devam eder.

  ## YİAKV Etkisi
  KVK 5/1-e iştirak hissesi satış kazancı istisnası YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.
  İstisna tutarı YİAKV matrahında kalır (GİB Rehberi Mart 2026, A0.7 kontrolü).

  ## YMM Tasdik
  İstisna tutarı ≥ 500.000 TL ise YMM tasdik raporu zorunludur (49 No.lu KV GT).
  KV beyannamesiyle birlikte veya 2 ay içinde elektronik olarak verilir.
  Tam tasdik kapsamındaki mükelleflerde ayrıca rapor düzenlenmez.

muhasebe_kayitlari: |
  ## Kayıt 1 — İştirak Hissesi Satışı (Kazanç Durumu)
  Borç: 102 Bankalar / 120 Alıcılar   [Satış bedeli]
  Alacak: 242/245 İştirakler / Bağlı Ortaklıklar (FIFO bazında defter değeri)
  Alacak: 679 Diğer Olağandışı Gelir ve Kârlar (Satış kazancı)

  ## Kayıt 2 — 549 Fon Hesabına Alma
  Borç: 570 Geçmiş Yıllar Kârları (veya 690 Dönem Net Kârı)
  Alacak: 549 Özel Fonlar
  Açıklama: İstisna kazancının (satis_kazanci × oran) en geç KV beyan süresine kadar 549 hesabına
  alınması zorunludur. 5 yıl süreyle tutulacaktır.

  ## Kayıt 3 — Zarar Durumu (KVK 5/3 KKEG)
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Toplam zarar)
  Alacak: 242/245 İştirakler
  Beyanname düzeltmesi: Zarar × oran kadar kısım KKEG olarak kanunen kabul edilmeyen giderler
  satırına eklenir; geri kalan kısım indirilebilir.

  ## Uyarı
  549 hesabından 5 yıl içinde çekilirse, çekildiği tarihte matraha eklenerek vergilendirilir.

