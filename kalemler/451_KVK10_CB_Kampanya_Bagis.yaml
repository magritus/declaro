wizard_agaci:
  tetikleyici_soru: "Cumhurbaşkanı tarafından resmi olarak başlatılan bir yardım kampanyasına bağış yaptınız mı?"
  info_modal: |
    ## Genel Çerçeve

    **KVK Madde 10/1-e** kapsamında, **Cumhurbaşkanı tarafından başlatılan
    yardım kampanyalarına** makbuz karşılığında yapılan bağış ve yardımların
    **tamamı** kurumlar vergisi matrahından indirilir.

    ## Kritik Koşul — Cumhurbaşkanlığı Kampanyası

    Bağışın geçerli sayılması için yardım kampanyasının **Cumhurbaşkanlığı
    tarafından resmi olarak başlatılmış ve ilan edilmiş** olması şarttır.

    **Kapsam dışı:** Bakanlık kampanyaları, valilik kampanyaları, belediye
    kampanyaları, sivil toplum kampanyaları.

    Örnek geçerli kampanya: 2023 Kahramanmaraş deprem yardım kampanyası
    (Resmî Gazete'de ilan edilmiştir).

    ## Resmi Kampanya Teyidi

    - Resmî Gazete ilanı veya
    - Cumhurbaşkanlığı kararnamesi/duyurusu

    Bu belgelerden biri olmadan 451 kodunun uygulanması tarhiyat riski doğurur.

    ## Ödeme Şekli

    - **Nakdi:** Kampanya için açılan özel banka hesabına EFT/havale
    - **Ayni:** Resmi teslim tutanağı ile teslim

    Üçüncü kişi hesabına ödeme → Kapsam riski.

    ## İndirim Oranı

    İndirim oranı **tamamının indirimi**dir. Matrahı aşan kısım sonraki yıllara
    **devredilemez**.

    ## Alternatif Kodlar

    CB kampanyası olmayan afet/yardım bağışları için:
    - **464** (Aile ve Gençlik Fonu) veya
    - **465** (Afet Yeniden İmar Fonu) veya
    - **402** (Kamu idaresine bağış) kodlarını değerlendirin.

    ## YİAKV İlişkisi

    **KVK Md.10/1-e kapsamındaki bağış indirimi YİAKV (KVK 32/C) matrahından
    DÜŞÜLEMEZ.** YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir.
  kapi_sorulari:
    - id: cb_kampanyasi
      soru: "Bağış CUMHURBAŞKANINCA başlatılan resmi yardım kampanyasına mı yapıldı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Kampanyanın Cumhurbaşkanlığı tarafından resmi olarak başlatıldığı teyit edilmeli. Bakanlık/valilik/belediye kampanyaları → Kapsam dışı."
    - id: resmi_ilan
      soru: "Kampanya Resmî Gazete'de veya resmi Cumhurbaşkanlığı duyurusunda ilan edildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Kampanyanın resmi niteliği RG ilanı veya CB kararnamesi ile teyit edilmeli. Bu belge olmadan 451 uygulanması riski."
    - id: kampanya_hesabina_odeme
      soru: "Ödeme kampanya için açılan resmi banka hesabına yapıldı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Nakdi bağış → Kampanya için açılan özel banka hesabına EFT/havale. Ayni bağış → Resmi teslim tutanağı. Üçüncü kişi hesabına ödeme → Kapsam dışı riski."
    - id: fiili_odeme_yapildi
      soru: "Bağış dönem içinde fiilen gerçekleşti mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "İndirim hakkı fiili ödemenin yapıldığı döneme aittir. Taahhüt → Kapsam dışı."

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: nakdi_bagis_tutari
      etiket: "Nakdi bağış tutarı (TL) — Kampanya hesabına banka yoluyla yapılan ödemeler"
      tip: para
      zorunlu: false
      yardim: "Cumhurbaşkanlığı yardım kampanyası hesabına EFT/havale ile yapılan nakdi bağışların toplamı."
    - id: ayni_bagis_degeri
      etiket: "Ayni bağış değeri (TL) — Teslim edilen mal/hizmetin maliyet/net defter değeri"
      tip: para
      zorunlu: false
      yardim: "Gıda, giyim, ekipman, malzeme gibi ayni bağışların maliyet veya net defter değeri. Piyasa değeri değil maliyet esas."
  formuller:
    toplam_bagis: "nakdi_bagis_tutari + ayni_bagis_degeri"
    istisna_tutari: "nakdi_bagis_tutari + ayni_bagis_degeri"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "nakdi_bagis_tutari >= 0 and ayni_bagis_degeri >= 0"
      hata: "Bağış tutarları negatif olamaz."
    - kural: "nakdi_bagis_tutari + ayni_bagis_degeri > 0"
      hata: "En az bir bağış tutarı girilmelidir."

denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 10/1-e: Cumhurbaşkanı tarafından başlatılan yardım kampanyalarına
  makbuz karşılığında yapılan bağış ve yardımların tamamı matrahtan indirilir.
  GİB KV Beyan Rehberi Mart 2026 (Yayın No:606) esas alınmıştır.

  ## Kampanya Niteliği — En Kritik Koşul
  Kampanyanın Cumhurbaşkanlığı tarafından resmi olarak başlatılmış ve ilan
  edilmiş olması şarttır. Resmî Gazete ilanı veya CB kararnamesi dayanak belge.
  Bakanlık/valilik/belediye/sivil toplum kampanyaları → Kapsam dışı.

  ## İndirim Kuralları
  - Tamamının indirimi — kazanç yüzdesiyle sınırlı değil
  - Matrahı aşan kısım sonraki yıla devredilmez

  ## Kritik Kontroller
  - Kampanyanın resmi CB kampanyası olduğu RG/CB duyurusu ile teyit edilmeli
  - Ödemenin kampanya hesabına yapıldığı banka dekontu ile kanıtlanmalı
  - Kampanya idaresinden resmi makbuz veya bağış teyit belgesi alınmalı
  - Fiili ödeme dönemi içinde gerçekleşmiş olmalı

  ## Alternatif Kodlar
  CB kampanyası olmayan yardımlar için:
  464 (Aile ve Gençlik Fonu — 7474 s.K. Md.6)
  465 (Afet Yeniden İmar Fonu — 7441 s.K. Md.7)
  402 (Kamu idaresine bağış — KVK Md.10/1-c)

  ## YİAKV Etkisi
  451 kampanya bağış indirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir.

  ## YMM Tasdik
  İndirim tutarı ≥500.000 TL ise YMM tasdik raporu zorunludur (49 No.lu KV GT).

muhasebe_kayitlari: |
  ## Nakdi Bağış Kaydı
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Bağış gideri)
  Alacak: 102 Bankalar
  Açıklama: KVK Md.10/1-e — CB yardım kampanyası nakdi bağış.

  ## Ayni Bağış Kaydı (Stoktan)
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Maliyet bedeli)
  Alacak: 150/153 İlk Madde ve Malzeme / Ticari Mallar
  Açıklama: KVK Md.10/1-e — CB yardım kampanyası ayni bağış.

  ## Beyanname
  Hesaplanan toplam bağış tutarı beyanname 451. satırına aktarılır.
  Matrahı aşan kısım devredilemez.

