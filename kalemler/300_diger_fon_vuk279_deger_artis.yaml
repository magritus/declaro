denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-a alt bent 5: "(3) ve (4) numaralı alt bentlerde yer alan istisna
  kazançlarına kaynak oluşturan yatırım fonlarının katılma paylarının VUK'un 279.
  maddesi kapsamında değerlenmesinden kaynaklanan değer artış kazançları" istisnadır.
  7456 s.K. (15.07.2023) ile mülga edilmiştir. Geçiş uygulaması: 15.07.2023 öncesi
  iktisap edilen paylar için değerleme farkı istisnası devam etmektedir.

  ## Kritik Noktalar
  - İktisap tarihi 15.07.2023'ten önce olmalı — kesin sınır
  - GSYF değerleme farkı bu forma DAHİL EDİLMEZ (5/1-a-3 kapsamı → 298 veya 386 satırı)
  - VUK 279: Portföy ≥%51 hisse → alış bedeli (değerleme farkı = 0 → C tablosu boş)
  - VUK 279: Portföy <%51 hisse → borsa rayici/ilan edilen fiyat (değerleme farkı = istisna)
  - Karma tarihli alım: Her alım partisi için ayrı değerleme farkı hesabı zorunlu
  - İstisna yalnızca değer ARTIŞLARI için; düşüşler (659 gider) KKEG mi sorusu ayrıca analiz edilmeli
  - Muhasebe akışı: 649 hesabına gelir kaydı → KKEG tablosuna eklenir → Beyanname 300'de istisna düşülür
  - 3 kademe uyum: 649 hesap toplamı = VERİ GİRİŞİ = Beyanname 300

  ## YİAKV Etkisi
  KVK 5/1-a-5 istisnasının YİAKV matrahını etkileyip etkilemediği dönem mevzuatı
  çerçevesinde analiz edilmeli ve YİAKV çalışma kâğıdına yansıtılmalıdır.
  Tartışmalıdır; dönem tebliğleri ve GİB açıklamalarıyla teyit zorunludur.

  ## Beyanname Konumu
  "Zarar Olsa Dahi İndirilecek İstisna ve İndirimler" bölümü — 300 kodlu satır.
  298 (GSYF/GSYO) ve 299 (diğer fon kâr payı) kodlarıyla karıştırılmamalıdır.

  ## Risk Alanları
  1. İktisap tarihi belgesi eksikliği — en büyük tarhiyat riski
  2. GSYF değerleme farkının bu forma yanlışlıkla dahil edilmesi
  3. VUK 279 %51 kriteri yanlış uygulaması
  4. Dönem sonu değer belgesi eksikliği (31.12 fon ilanı)
  5. Karma tarihli alım ayrıştırması eksikliği
  6. Değerleme düşüşünün KKEG olup olmadığının analiz edilmemesi
  7. 649 hesabı ile beyanname 300 uyumsuzluğu

muhasebe_kayitlari: |
  ## Kayıt 1 — Dönem Sonu VUK 279 Değerleme (Değer Artışı — İstisna Kapsamı)
  Borç: 118 Diğer Menkul Kıymetler (veya 245 Bağlı MK) ← Değer artışı tutarı
  Alacak: 649 Diğer Olağandışı Gelir ← Değer artışı tutarı
  Açıklama: VUK 279 dönem sonu değerleme artışı — KVK 5/1-a-5 istisnası (15.07.2023 öncesi iktisap)

  ## Yıl Sonu Beyanname Döngüsü
  1. Değerleme artışı 649 hesabına gelir kaydedilir → Ticari kâr artar
  2. Yılsonu: KKEG tablosuna eklenir (hesaplama matrahını artırır)
  3. KV Beyannamesi: 300. satırda "Zarar Olsa Dahi İndirilecek" olarak istisna düşülür
  YMM notu: 649 toplamı ile beyanname 300 tutarı uyumlu olmalıdır.

  ## Kayıt 2 — Dönem Sonu VUK 279 Değerleme (Değer Düşüşü — KKEG Değerlendirmesi)
  Borç: 659 Diğer Olağandışı Gider ← Düşüş tutarı
  Alacak: 118 Diğer Menkul Kıymetler ← Düşüş tutarı
  Açıklama: Değerleme düşüşü — KKEG mı? Güncel özelge/muktezaya bakılmalı; KKEG ise beyanname matrahına eklenir.

  ## Kayıt 3 — Fon Satış/İade Kaydi (Elden Çıkarma)
  Borç: 102 Bankalar ← Satış/iade bedeli
  Alacak: 118 Diğer Menkul Kıymetler ← VUK 279 değerleme sonrası bilanço değeri
  Alacak/Borç: 645/659 Menkul Kıymet Satış Kârı/Zararı ← Fark
  Açıklama: Fonun elden çıkarılmasından doğan kazanç 5/1-a-4 kapsamında ayrıca değerlendirilmeli. 300 satırı yalnızca elde tutma süresindeki VUK 279 değerleme artışları içindir.

  ## Beyanname 300 Mutabakat Özeti
  3 KADEME UYUM KONTROLÜ:
  Muhasebe 649 (VUK 279 artış toplamı) = VERİ GİRİŞİ D.1 = KV Beyannamesi 300. Satır
  Bu üç tutarın birebir uyumlu olması YMM tasdik dosyasının tamamlanma koşuludur.

