durum: aktif
yururluk_araligi:
  baslangic: "2022-04-15"
  bitis: null
  not: "15.07.2023 öncesi iktisap şartı ile geçiş uygulaması olarak devam eder. 15.07.2023 sonrası iktisap edilen payların değerleme farkları kapsam dışıdır. GSYF değerleme farkı bu forma dahil edilmez (298 satırı)."

ana_kategori: istirak_kazanc_istisnalari

wizard_agaci:
  tetikleyici_soru: "15.07.2023 öncesi iktisap edilmiş TL esaslı yatırım fonu katılma payı için dönem sonu VUK 279 değerleme artışı var mı?"
  info_modal: |
    ## Genel Çerçeve

    KVK Madde 5/1-a alt bent 5 kapsamında, 3. ve 4. alt bentlerdeki istisna kazançlara kaynak oluşturan yatırım fonlarının **VUK Madde 279 değerlemesinden kaynaklanan değer artış kazançları** kurumlar vergisinden istisnadır. Bu bent de 7456 sayılı Kanun (15.07.2023) ile mülga edilmiş olup yalnızca **15.07.2023 öncesi iktisap edilen** fon katılma paylarının dönem sonu değerleme artışları için geçiş hükmü kapsamında uygulanmaya devam etmektedir. Beyanname **"Zarar Olsa Dahi İndirilecek"** bölümünde 300 numaralı satırda gösterilir.

    ## Temel Koşullar

    - **İktisap tarihi 15.07.2023 öncesi olmalıdır:** Kesin ve belgelenmesi zorunlu koşuldur; her fon için banka alış dekontu veya MKK ekstresi dosyada yer almalıdır.
    - **GSYF değerleme farkı bu forma dahil edilmez:** GSYF (KVK 5/1-a alt bent 3) değerleme farkı 298 veya 386 satırına alınır; bu ayrım kritiktir.
    - **VUK 279 değerleme yöntemi seçimi:** Portföy hisse senedi oranı **≥%51** ise alış bedeli uygulanır ve değerleme farkı oluşmaz; **<%51** ise borsa rayici ya da ilan edilen fiyat esas alınır ve oluşan fark istisna geliri olarak kaydedilir.
    - **Yalnızca değer artışları:** İstisna değer artışları için geçerlidir; değer düşüşü oluşması halinde 659 gider kaydı yapılır ve KKEG olup olmadığı ayrıca analiz edilir.
    - **Muhasebe akışı:** Değerleme artışı 649 hesabına gelir kaydedilir → KKEG tablosuna eklenir → Beyanname 300 satırında istisna olarak düşülür.

    ## Önemli Sınırlamalar ve Riskler

    - İktisap tarihi belgesi eksikliği en büyük tarhiyat riskidir; belgelenemeyen alımlara istisna uygulanamaz.
    - GSYF değerleme farkının bu forma yanlışlıkla dahil edilmesi ciddi kod hatası yaratır.
    - Değerleme düşüşü varsa bunun KKEG sayılıp sayılmadığı güncel özelge/mukteza ile desteklenmelidir.
    - Karma tarihli alımda her alım partisi için ayrı değerleme farkı hesabı zorunludur.
    - 298/299/300 kod karıştırılması sistematik bir risktir; her fon türü kendi koduna yerleştirilmelidir.

    ## YİAKV İlişkisi

    KVK 5/1-a alt bent 5 (300) istisnasının YİAKV matrahına etkisi **tartışmalı** olup dönem mevzuatı ve GİB açıklamaları çerçevesinde ayrıca analiz edilmeli ve YİAKV çalışma kâğıdına yansıtılmalıdır. Otomatik düşüm varsayımına dayanılmamalıdır.

    ## Pratik Notlar

    - 3 kademe uyum kontrolü zorunludur: Muhasebe 649 hesabı toplamı = veri girişi = KV beyannamesi 300 satırı; bu üçlü uyum YMM tasdik dosyasının temel doğrulama adımıdır.
    - Dönem başı değer ile dönem sonu VUK 279 değeri arasındaki farkın net hesaplanabilmesi için 31.12 tarihli fon yöneticisi ilanı veya KAP/borsa verisi dosyaya eklenmelidir.
    - Önceki dönem beyannameleri ile karşılaştırma yapılarak uygulama sürekliliği kontrol edilmelidir.
    - 49 No.lu KV Genel Tebliği kapsamında tek satır ≥500.000 TL ise YMM tasdik raporu eşiği kontrol edilmelidir.
  kapi_sorulari:
    - id: iktisap_tarihi_oncesi
      soru: "İstisna uygulanacak fon(lar)ın iktisap tarihi 15.07.2023'ten ÖNCE mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "KRİTİK: 15.07.2023 sonrası iktisap edilen payların değerleme farkı istisna dışıdır. Karma tarihli alımlarda pay adedi bazında ayrıştırma zorunludur."
    - id: gsyf_degil
      soru: "Fon GSYF DEĞİL mi? (GSYF değerleme farkı 298/386 satırına alınmalıdır)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "5/1-a-5: Sadece 3. ve 4. alt bentlere kaynak teşkil eden diğer fonlar. GSYF (5/1-a-3) değerleme farkı → 298 veya 386 satırı. Bu ayrım kritiktir."
    - id: vuk279_yontemi
      soru: "VUK 279 değerleme yöntemi doğru uygulandı mı? (Portföy bileşimi teyit edildi mi?)"
      tip: evet_hayir
      aciklama: "Portföy %51+ hisse senedi → Alış bedeli (değerleme farkı = 0). Diğer durum → Borsa rayici/ilan edilen fiyat. Fon bilgi formu/izahname ile teyit edilmelidir."
    - id: deger_artisi_var
      soru: "Dönem sonu değer, dönem başı değerinden yüksek mi? (Değer artışı = istisna)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "İstisna yalnızca değer artışları için geçerlidir. Değer düşüşü durumunda istisna uygulanamaz; KKEG değerlendirmesi gerekir."

