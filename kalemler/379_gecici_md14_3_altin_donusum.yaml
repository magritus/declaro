denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Madde 14/3 (Paragraf 3): 31/12/2021 bilançosunda yer alan altın hesaplarının
  Cumhurbaşkanı Kararıyla belirlenen yasal süre içinde TL'ye dönüştürülmesinden doğan
  altın fiyat farkı kazancı istisnası. 7352 Sayılı Kanun kapsamında yürürlüğe girmiştir.

  ## Kapsam Koşulları
  - 31/12/2021 tarihli bilançoda altın hesabı bakiyesi zorunludur
  - Dönüşüm tarihi CB Kararıyla belirlenen yasal süre içinde olmalıdır
  - Kazanç = MAX(Dönüşüm TL − Bilanço TL, 0) — negatif fark sıfırlanır
  - Dönüşüm tutarı 31/12/2021 bilanço bakiyesini aşamaz; aşan kısım kapsam dışıdır
  - Altın fiyat kaynağı: TCMB veya İAB — her iki tarih için tutarlı kaynak zorunludur

  ## Altın Hesabı Türleri
  Gram altın hesabı | Altın mevduatı | Fiziki altın hesabı | Diğer banka altın hesapları

  ## 370 ile Mükerrerlik Riski (KRİTİK)
  Aynı altın hesabı hem 370 (Paragraf 1) hem 379 (Paragraf 3) kapsamında
  değerlendirilemez. Tartışmalı durumlarda GİB özelgesi alınması tavsiye edilir.

  ## YİAKV Etkisi (KVK Md.32/C)
  379 kapsamındaki altın hesabı dönüşüm kazancı YİAKV matrahından DÜŞÜLEMEZ.
  YİAKV E.7 listesinde 370–382 kodlarının tamamı (13 kod) yer almaktadır.

  ## Beyanname Bölümü
  "Kazancın Bulunması Halinde İndirilecek" — zarar döneminde uygulanamaz.

muhasebe_kayitlari: |
  ## Kayıt 1 — Dönüşüm Günü: Altın Hesabı Kapama ve TL Dönüşümü (Md.14/3 — Paragraf 3)
  Örnek: 100 gram × 1.500 TL/gr (31/12/2021 bilanço) = 150.000 TL. Dönüşüm günü 2.200 TL/gr → 220.000 TL. Kazanç = 70.000 TL.

  Borç:    102 Bankalar / 100 Kasa                    [Dönüşüm TL tutarı]
  Alacak:  105 Altın Hesapları / 108 Diğer Hazır      [Bilanço TL değeri]
  Alacak:  646 Kambiyo Kârları / 679 Diğer Olağandışı [Kazanç: Dönüşüm TL − Bilanço TL]
  Açıklama: KVK Geçici Md.14/3 → Beyanname 379

  Not: Muhasebe mekanizması 370 (Paragraf 1) kapsamındaki altın dönüşümüyle aynıdır;
  fark yasal dayanaktır (Paragraf 1-a vs Paragraf 3).

