wizard_agaci:
  tetikleyici_soru: "Önceki yıllarda ayrılan ve bu dönemde matrahı etkileyen finansman fonu var mı?"
  info_modal: |
    ## Önceki Yıl Ayrılan Finansman Fonu

    Geçmiş dönemlerde **GVK Madde 41/9** veya ilgili tebliğler kapsamında ayrılmış finansman
    fonunun, cari dönemde kullanılması veya amacı dışında sarf edilmesi halinde bu tutar
    kurumlar vergisi matrahına **ilave edilir**.

    **Ne zaman gündeme gelir?**
    - Önceki yıllarda yatırım amacıyla finansman fonu ayrılmışsa
    - Bu fon cari yılda amacı dışında kullanıldıysa veya yatırım gerçekleşmeden çözüldüyse
    - 5 yıllık yatırım süresi dolmadan fon dağıtıldıysa

    **Beyanname yansıması:** KV Beyannamesi "İlaveler" bölümü, satır 202.

    **Dikkat:** Bu kalem, mevcut finansman gider kısıtlaması (FGK — KVK Md.11/1-i) ile
    karıştırılmamalıdır. FGK cari dönem gideri kısıtlarken, bu kalem geçmiş yıl ayrılan
    fon rezervinin matrahı etkileyen geri dönüşünü ifade eder.
  kapi_sorulari:
    - id: fon_cozuldu_mu
      soru: "Önceki yıl(larda) finansman fonu ayrıldı ve bu dönemde çözüldü ya da amacı dışında kullanıldı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Fon amacına uygun kullanıldıysa matrah ilavesi gerekmez."

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: fon_tutari
      etiket: "Önceki yıl ayrılan finansman fonu tutarı (TL)"
      tip: para
      zorunlu: true
      yardim: |
        Geçmiş dönem(ler)de ayrılmış finansman fonu rezervinden bu dönem matrahına
        eklenmesi gereken tutar. İlgili hesap hareketleri (549 veya benzeri) dikkate alınmalıdır.
    - id: aciklama_notu
      etiket: "Açıklama / Kaynak dönem"
      tip: metin
      zorunlu: false
      yardim: "Fonun hangi yılda ayrıldığı ve çözülme gerekçesi (isteğe bağlı)."
  formuller:
    istisna_tutari: "fon_tutari"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "fon_tutari >= 0"
      hata: "Finansman fonu tutarı negatif olamaz."

denetci_notlari: |
  ## Önceki Yıl Finansman Fonu — Denetçi Notu

  Bu kalem MATRAH ARTIRICI bir ilavedir — ticari kâra eklenir.

  Fon ayrılma ve çözülme kayıtları muhasebe defterlerinde izlenmelidir.
  Ayrılma yılı, kullanım amacı ve çözülme gerekçesi belgelenmelidir.

  GVK Md.41/9 kapsamı ile KVK Md.11 atfı dikkate alınarak değerlendirme yapılmalıdır.
  Özelge talep edilmesi gereken durumlarda YMM görüşü alınmalıdır.

