    detay: "KVK maddesi metni, özel kanun hükmü, ÇVÖA ilgili maddesi veya GİB özelgesi. Her indirim kalemi için ayrı belge veya referans."
    temin_yeri: Mevzuat / GİB
  - kategori: zorunlu
    "no": 2
    baslik: Her Kalem İçin Destekleyici Belge
    detay: "Fatura, sözleşme, mahkeme kararı, teknik hesaplama, özelge veya diğer kanıtlayıcı belgeler. İndirim kaleminin niteliğine göre değişir."
    temin_yeri: İlgili Kurum / Muhasebe
  - kategori: zorunlu
    "no": 3
    baslik: İndirim Hesaplama Tablosu (Kalem Bazlı)
    detay: "Her indirim kalemi için açıklama, mevzuat dayanağı, tutarı ve YİAKV durumunu gösteren tablo. YMM tasdik dosyasının temel parçasıdır."
    temin_yeri: YMM / Muhasebe
  - kategori: destekleyici
    "no": 4
    baslik: Standart Kod Uygulanamaz Gerekçesi
    detay: "Her kalem için 402–467 standart kodlarının neden uygulanamadığını açıklayan not veya analiz. Özellikle büyük tutarlarda önerilir."
    temin_yeri: YMM

