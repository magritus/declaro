denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Md.14/1-b: 370 kapsamındaki dönüşümden açılan KKM hesabında,
  TL'nin değer kaybettiği dönemlerde bankanın kuruma ödemekle yükümlü olduğu
  kur farkı tazminat ödemeleri (nakit esaslı, dönemsel) istisna kapsamındadır.

  ## Kritik Noktalar
  - 371, yalnızca 370 kapsamındaki 31/12/2021 bilanço dönüşümünden açılan KKM hesapları için geçerlidir
  - Nakit esaslıdır: Bankadan fiilen alınan ödemeler (371) — tahakkuk esaslı dönem sonu değerleme (372) farklı satırdır
  - Banka ekstresi zorunludur; kur farkı satırları faiz ve diğer gelirlerden ayrı gösterilmeli
  - 370 ve 371 toplamı YİAKV matrahından DÜŞÜLEMEZ (E.7'de ikisi de listede)

  ## 371 vs 372 Ayrımı
  371: Bankadan alınan NAKDEN kur farkı tazminat ödemeleri (dönemsel, nakit esaslı)
  372: Dönem sonunda VUK değerlemesiyle TAHAKKUK ettirilen kâr payı ve faiz (tahakkuk esaslı)
  Her biri ayrı beyanname satırı ve ayrı çalışma kâğıdıdır.

muhasebe_kayitlari: |
  ## Kayıt 1 — Bankadan Kur Farkı Tazminat Ödemesi Alınması
  Borç: 102 Bankalar (TL)
  Alacak: 646 Kambiyo Kârları (veya 649 Diğer Olağandışı Gelir)
  Açıklama: KKM hesabından bankadan alınan kur farkı tazminat ödemesi — 371 istisna

