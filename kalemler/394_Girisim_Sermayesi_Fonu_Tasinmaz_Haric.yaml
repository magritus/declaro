      aciklama: "KVK 5/1-d istisnası SPK'ya tescilli GSYF'ler için geçerlidir. Tescil belgesi ve içtüzük dosyada yer almalıdır. Tescil iptali veya askıya alınması durumunda istisna uygulanamaz."
