      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "KRİTİK: Fon yönetim ücreti, performans/başarı primi ve danışmanlık komisyonu portföy işletmeciliği geliri değildir; 394 koduna yazılmamalıdır. Muhasebede ayrı hesap veya dağıtım anahtarı zorunludur."
    - id: tasinmaz_haric_ayrim
