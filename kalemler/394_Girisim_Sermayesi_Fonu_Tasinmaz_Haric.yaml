yururluk_araligi:
  baslangic: "2006-06-21"
  bitis: null
  not: "394 kodu 2025 ve sonraki dönemlerde GSYF portföy işletmeciliği kazancının taşınmaz HARİÇ bileşenini ayrıştırarak göstermek için kullanılır. Beyanname kod ayrımı GİB form güncellemesiyle getirilmiştir."

ana_kategori: portfoy_isletmeciligi

wizard_agaci:
  tetikleyici_soru: "Kurum, SPK'ya tescilli bir Girişim Sermayesi Yatırım Fonu (GSYF) mudur ve portföy işletmeciliğinden (taşınmaz hariç) kazanç elde etti mi?"
  info_modal: |
    ## Genel Çerçeve

    KVK Madde 5/1-d kapsamında Türkiye'de **Sermaye Piyasası Kanunu** çerçevesinde kurulmuş
    **Girişim Sermayesi Yatırım Fonlarının (GSYF)** portföy işletmeciliğinden doğan kazançları
    kurumlar vergisinden %100 tam istisna olarak muaftır. Bu form, söz konusu kazancın
    **taşınmaz dışındaki varlıklardan** (girişim şirketi payları, menkul kıymetler, iştirak kâr payları,
    değerleme artışları vb.) elde edilen bileşenini kapsar.

    ## GSYF Nedir?

    GSYF; portföyünü ağırlıklı olarak **girişim şirketlerine** (startup ve büyüme aşamasındaki
    şirketler) yatırım yaparak oluşturan, SPK III-52.4 Tebliği'ne göre kurulan ve SPK'ya
    tescil ettirilen kolektif yatırım kuruluşudur. Portföyde girişim şirketi payları yanı sıra
    borçlanma araçları, repo/ters repo ve diğer sermaye piyasası araçları yer alabilir.

    **SPK III-52.4 Tebliği'ne göre GSYF portföy kısıtlamaları:**
    - Portföyün en az **%80'i** nitelikli portföy varlıklarından oluşmalıdır (başlıca girişim şirketi
      iştirak payları veya borçlanma araçları).
    - Taşınmaz yatırımı sınırlıdır; taşınmaz yatırımlarına ilişkin ayrı alt limit uygulanır.
    - Fon kuruluş amacı ve yatırım stratejisi SPK'ya bildirilen içtüzük/izahname ile çerçevelenmiştir.

    ## Bu Form Neyi Kapsar?

    Beyanname kodu **394** yalnızca **taşınmaz HARİÇ** portföy işletmeciliği kazancını içerir:

    - Girişim şirketlerine iştirak kâr payları ve temettüler
    - Girişim şirketi paylarının satışından doğan kazançlar
    - Portföydeki tahvil, bono ve diğer borçlanma araçlarından faiz gelirleri
    - Portföy menkul kıymetlerin dönem sonu VUK/SPK değerleme artışları
    - Portföy repo/ters repo gelirleri
    - Girişim şirketi borçlanma araçları ve kısa vadeli araçlardan gelirler

    **Taşınmazdan elde edilen gelirler bu forma dahil EDİLMEZ** (→ 395 kodu).

    ## Temel Koşullar

    - **SPK tescili:** Fonun SPK III-52.4 Tebliği kapsamında tescil edilmiş olması zorunludur;
      güncel tescil belgesi ve içtüzük dosyada yer almalıdır.
    - **Portföy içi/dışı ayrımı:** İstisna yalnızca portföy kapsamındaki varlıklardan elde edilen
      gelirlere uygulanır. Fon yönetim ücreti, performans/başarı primi ve danışmanlık komisyonu
      portföy dışı gelir sayılır ve istisna kapsamında değerlendirilemez.
    - **Taşınmaz hariç ayrıştırma:** Portföyde taşınmaz da varsa bu gelirlerin muhasebede
      ayrıştırılarak 395 koduna taşınması zorunludur; 394 ve 395 toplamı gerçek portföy
      işletmeciliği kazancıyla mutabık olmalıdır.
    - **Muhasebede ayrı hesap takibi:** Portföy içi ve dışı gelirlerin; taşınmaz ve taşınmaz
      dışı portföy gelirlerinin ayrı hesap veya dağıtım anahtarıyla izlenmesi zorunludur.

    ## Önemli Sınırlamalar ve Riskler

    - **Fon yönetim ücreti ve başarı primi:** Portföy işletmeciliği geliri değildir; 394'e
      yazılmamalıdır. Bu gelirler vergi matrahında kalır.
    - **Portföy kapsamı ihlali:** SPK mevzuatı sınırlarını aşan varlıklardan elde edilen
      gelirler portföy işletmeciliği sayılamaz; güncel portföy raporu ile teyit şarttır.
    - **VUK 279 değerleme yöntemi:** Portföydeki hisse oranı ve borçlanma araçlarının
      niteliğine göre değerleme esasları farklılaşır; her araç türü için ayrıca belirlenmeli.
    - **Satış kazancının ayrıştırılması:** Girişim şirketi paylarının üçüncü kişiye satışından
      doğan kazanç için KVK 5/1-e (taşınmaz dışı aktif satışı) kapsamında ayrı analiz
      yapılması gerekip gerekmediği değerlendirilmelidir.

    ## YİAKV İlişkisi

    KVK 5/1-d kapsamındaki GSYF portföy işletmeciliği kazancının YİAKV (KVK Madde 32/C)
    matrahından düşüleceği kural olarak kabul edilmekle birlikte dönem mevzuatı ve GİB
    açıklamaları her yıl için ayrıca teyit edilmelidir.

    ## Pratik Notlar

    - 3 kademe uyum kontrolü zorunludur: Muhasebe portföy hesapları (taşınmaz hariç toplamı)
      = çalışma kâğıdı = KV beyannamesi 394 satırı.
    - 394 + 395 satırları toplamı GSYF toplam portföy işletmeciliği kazancıyla (302 baz toplamı)
      uyumlu olmalıdır.
    - 49 No.lu KV Genel Tebliği kapsamında tek satır ≥500.000 TL ise YMM tasdik raporu
      eşiği kontrol edilmelidir.
