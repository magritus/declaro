      aciklama: "394 kodu YALNIZCA taşınmaz hariç portföy gelirlerini kapsar. Taşınmaz geliri 395 koduna yazılmalıdır. Her iki kodun toplamı toplam portföy işletmeciliği kazancını oluşturur."
    - id: portfoy_kapsami
