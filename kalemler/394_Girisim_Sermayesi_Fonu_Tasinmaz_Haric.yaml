denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-d: Türkiye'de kanunların öngördüğü şekilde kurulan yatırım fon ve
  ortaklıklarının portföy işletmeciliğinden doğan kazançları kurumlar vergisinden istisnadır.
  %100 tam istisna. Bu kalem GSYF'nin taşınmaz HARİÇ portföy işletmeciliği kazancını
  kapsayan 394 beyanname satırı için düzenlenmiştir.

  SPK III-52.4 Tebliği: GSYF portföy yapısını ve yatırım limitlerini belirler. Portföyün
  %80'i nitelikli portföy varlıklarından (başta girişim şirketi payları ve borçlanma araçları)
  oluşmalıdır. Taşınmaz yatırımları sınırlıdır.

  ## Kritik Noktalar — Portföy İçi/Dışı ve Taşınmaz Hariç Ayrımı

  PORTFÖY İÇİ — TAŞINMAZ HARİÇ (394 — İstisna):
  - Girişim şirketi iştirak kâr payları ve temettüler
  - Girişim şirketi pay satış kazançları
  - Portföy borçlanma araçları faiz gelirleri (tahvil, bono vb.)
  - Portföy menkul kıymet ve repo gelirleri
  - Taşınmaz hariç portföy değerleme artışları

  PORTFÖY İÇİ — TAŞINMAZ (395 — Ayrı Kod):
  - GSYF portföyüne dahil taşınmazlardan kira ve satış gelirleri
  - Taşınmaza dayalı varlık değerleme artışları

  PORTFÖY DIŞI (Vergiye Tabi — 394/395'e YAZILMAZ):
  - Fon yönetim ücreti
  - Performans/başarı primi
  - Danışmanlık komisyonu
  - Portföyde kayıtlı olmayan varlıklardan gelirler

  ## GSYF'ye Özgü Riskler
  1. Fon yönetim ücreti veya başarı priminin portföy geliri sayılması en sık tarhiyat nedenidir.
  2. Portföy sınırlarını aşan varlık tutulması ve bu varlıklardan elde edilen gelirin istisna
     kapsamına alınması.
  3. Taşınmaz gelirinin 394'e dahil edilmesi — taşınmaz geliri mutlaka 395'e alınmalıdır.
  4. VUK 279 değerleme yönteminin portföy bileşimine uygun belirlenmemesi.
  5. Karma gider dağıtım anahtarının yokluğu veya tutarsız uygulaması.
  6. 394 + 395 toplamının toplam portföy kazancıyla uyumsuzluğu.

  ## YİAKV Etkisi
  KVK 5/1-d kapsamındaki portföy işletmeciliği kazancı YİAKV matrahından düşülür
  (dusulur). Dönem mevzuatı ve GİB açıklamaları her yıl için ayrıca teyit edilmelidir.

  ## Beyanname Konumu
  "Zarar Olsa Dahi İndirilecek İstisna ve İndirimler" bölümü — 394 kodlu satır.
  394 (taşınmaz hariç) + 395 (taşınmaz dahil) = Toplam GSYF portföy işletmeciliği kazancı.

  ## 3 Kademe Uyum Kontrolü
  Muhasebe portföy hesapları (taşınmaz hariç net tutar) = Çalışma kâğıdı = Beyanname 394.
  394 + 395 toplamı = Fonun toplam portföy işletmeciliği kazancı (ana mutabakat noktası).

muhasebe_kayitlari: |
  ## Kayıt 1 — GSYF Portföy Girişim Şirketi Kâr Payı / Temettü (İstisna)
  Borç: 242 İştirakler / 127 Diğer Alacaklar ← Kâr payı/temettü tahakkuku
  Alacak: 642 İştirak Kazançları / 640 Yurt İçi İştiraklerden Temettüler ← Portföy geliri
  Açıklama: GSYF portföy girişim şirketi kâr payı — KVK 5/1-d istisna kapsamı (394 satırı)

  ## Kayıt 2 — GSYF Portföy Girişim Şirketi Pay Satış Kazancı
  Borç: 102 Bankalar ← Satış bedeli
  Alacak: 242 İştirakler ← Maliyet
  Alacak: 645 Menkul Kıymet Satış Kârı ← Kazanç
  Açıklama: KVK 5/1-d portföy işletmeciliği satış kazancı — 394 satırı

  ## Kayıt 3 — GSYF Portföy Borçlanma Aracı Faiz Tahakkuku
  Borç: 181 Gelir Tahakkukları ← Tahvil/bono faiz alacağı
  Alacak: 641 Faiz Gelirleri ← Portföy borçlanma aracı faizi
  Açıklama: KVK 5/1-d kapsamında — 394 satırına alınır

  ## Kayıt 4 — Portföy Değerleme Artışı (Dönem Sonu — Taşınmaz Hariç)
  Borç: 111-245 İlgili Menkul Kıymet/İştirak Hesabı ← Değer artışı
  Alacak: 644/649 Değerleme Gelirleri ← Portföy değerleme artışı
  Açıklama: SPK değerleme esaslarına uygun; taşınmaz hariç değerleme artışı — 394 satırı

  ## Beyanname 394 Akışı (Mutabakat)
  Portföy içi gelirler (taşınmaz hariç) net tutarı → Beyanname 394 satırı
  Portföy içi gelirler (taşınmaz) net tutarı → Beyanname 395 satırı
  Portföy dışı gelirler (yönetim ücreti vb.) → Matrahta kalır
  3 KADEME UYUM: Muhasebe hesapları = Çalışma kâğıdı 394 = Beyanname 394

