denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Md.14/4: Paragraf 1-3 kapsamına girmeyen belirli TL araç/enstrümanlardan
  VUK Md.280/281 gereği dönem sonunda tahakkuk ettirilen kâr payı ve faiz istisnadır.

  ## Önemli Uyarı — Paragraf 4 Kapsamı
  Paragraf 4'ün tam kapsamı GİB KV Beyan Rehberi (No:606), ilgili tebliğler ve
  Cumhurbaşkanı Kararları çerçevesinde belirlenmesi gereken yeni/tartışmalı bir alandır.
  GİB özelgesi alınması tavsiye edilir.
  YMM paragraf analizi zorunludur ve belgelenmelidir.

  ## 383-384 Ayrımı (Paragraf 4 İçinde)
  383: "Dönem sonu DEĞERLEMESİNDEN DOĞAN kâr payı ve faiz" → 31 Aralık tahakkuk (181/642)
  384: "Kâr payı ve faiz istisnası" → Dönem sonu sınırı YOK — doğrudan ödeme/vade/dönemsel

  ## 383-384 Mükerrerlik Kuralı
  383 tahakkuku yapılan araç için vade/tahsilat döneminde: Net 384 = Toplam − Önceki 383

muhasebe_kayitlari: |
  ## Kayıt — Dönem Sonu Kâr Payı/Faiz Tahakkuku (Paragraf 4)
  Borç: 181 Gelir Tahakkukları
