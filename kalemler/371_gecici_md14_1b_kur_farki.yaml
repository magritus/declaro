wizard_agaci:
  tetikleyici_soru: "370 kapsamında dönüşümden açılmış KKM hesabınızdan dönem içinde bankadan kur farkı tazminat (koruma) ödemesi aldınız mı?"
  info_modal: |
    KVK Geçici Madde 14/1-b kapsamında: KKM hesabı tutulduğu dönem boyunca bankadan alınan
    kur farkı koruma/tazminat ödemeleri kurumlar vergisinden **istisna** edilmiştir.

    **370 ile Fark:**
    - 370 (Md.14/1-a): 31/12/2021 yabancı parasını KKM'ye çevirirken oluşan TEK SEFERLİK değerleme kazancı.
    - 371 (Md.14/1-b): KKM hesabı tutulduğu dönem boyunca BANKADAN ALINAN kur farkı koruma/tazminat ödemeleri (dönemsel, süregelen).

    **Kritik Uyarı:** Bu istisna YİAKV matrahından DÜŞÜLEMEZ. 370 ve 371 her ikisi de E.7 DÜŞÜLEMEZ listesindedir.
  kapi_sorulari:
    - id: kkm_hesabi_var_mi
      soru: "KVK Geçici Md.14/1-a kapsamında açılmış aktif KKM hesabınız var mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "371, mevcut bir KKM hesabından elde edilen kur farkı tazminat ödemeleridir. 370 ile birlikte uygulanır."
    - id: bilanco_kaynakli_mi
      soru: "KKM hesabı 31/12/2021 bilanço bakiyesinden dönüşüm yoluyla açıldı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "371 yalnızca 370 kapsamındaki dönüşümden doğan KKM hesapları için geçerlidir."
    - id: kur_farki_odeme_alindi_mi
      soru: "Dönem içinde bankadan kur farkı tazminat ödemesi/kredisi alındı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "TL zayıfladığında banka kur farkı ödemesi yapar. TL güçlüyse ödeme olmaz — 371 sıfırdır. Banka ekstresiyle teyit zorunludur."
    - id: kur_farki_dogru_ayristirma
      soru: "371 (kur farkı tazminat) ile faiz/kâr payı gelirleri doğru ayrıştırıldı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Kur farkı tazminatı → 371 kapsamında istisna. Faiz/kâr payı → 371 kapsamında DEĞİL, ayrı değerlendirme gerekir."

