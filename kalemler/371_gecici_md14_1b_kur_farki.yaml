denetci_notlari: |
  ## KKM Kur Farkı Koruma Mekanizması (371)
  KKM hesabı açılışında referans kur belirlenir (hesap açılış günü TCMB kuru). Dönem boyunca
  piyasa TCMB kuru referans kurun üstüne çıkarsa banka, hesap sahibine kur farkını tazmin eder.
  Bu tazminat ödemesi KVK Geçici Md.14/1-b kapsamında kurumlar vergisinden istisnadır.
  Beyanname: 371 | Kazancın Bulunması Halinde İndirilecek.
  GİB KV Beyan Rehberi 2026 (No:606) Bölüm 2.2.15 kapsamındadır.

  ## 370 ile 371 Karşılaştırması ve Faiz/Kâr Payı Ayrımı
  Aynı KKM hesabından her ikisi oluşabilir:
  - 370 (tek seferlik değerleme): Yalnızca dönüşüm yılında. Muhasebe: 646/679.
  - 371 (dönemsel banka ödemesi): Her KV döneminde, hesap yaşadığı sürece. Muhasebe: 102/648.
  KKM hesabı aynı zamanda faiz/kâr payı da üretebilir — faiz/kâr payı 371 kapsamında DEĞİLDİR.

  ## YİAKV ile İlişki — 370 ve 371 Her İkisi DÜŞÜLEMEZ
  YİAKV (KVK Md.32/C) matrahında hem 370 hem de 371 DÜŞÜLEMEZ (E.7 listesi).
  En sık yapılan hata: 371 tutarını YİAKV matrahından düşmek.
  YİAKV çalışma kâğıdı E.7: 'KKM Değerleme + Kur Farkı Tazminatı (KVK Geçici Md.14) → DÜŞÜLEMEZ'

  ## Özel Durumlar
  Hesap yenileme (rollover): Orijinal 31/12/2021 kaynaklı bakiyenin devamıysa 371 devam eder.
  Erken kapanma: Kapanma tarihine kadar alınan kur farkı ödemeleri 371 kapsamındadır.
  Banka ayrımı yapmazsa: Kur farkı tazminatı ile faiz satırları yazılı banka teyidiyle ayrıştırılmalı.

  ## 49 No.lu Tebliğ
  İstisna tutarı >= 500.000 TL ise YMM Tasdik Raporu zorunludur.

muhasebe_kayitlari: |
  ## Kayıt 1 — Dönem İçinde Bankadan Alınan Kur Farkı Koruma Ödemesi
  Borç: 102 Bankalar — KKM hesabına bankadan alacak kaydedilen kur farkı tazminat ödemesi
  Alacak: 648 Diğer Olağan Gelirler / 642 Faiz Gelirleri — KKM kur farkı tazminat geliri (Beyanname 371)
  Not: 648 veya 642 hesap seçimi banka uygulaması ve muhasebe politikasına göre değişebilir.

  ## Kayıt 2 — 370 (Tek Seferlik) vs 371 (Dönemsel) Karşılaştırma
  370: [Dönüşüm Tarihi] — 646/679 hesabı — 31/12/2021 bilanço kuru farkı, dönüşüm anında (Beyanname 370)
  371: [Her Ödeme Dönemi] — 648/642 hesabı — Bankadan alınan kur farkı tazminatı (Beyanname 371)
  YİAKV Matrahi: Her iki tutar da çıkarılmaz — asgari vergi matrahında kalır (E.7 DÜŞÜLEMEZ).

