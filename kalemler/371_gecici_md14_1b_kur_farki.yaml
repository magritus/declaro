denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Md.14/1-b (7352 sayılı Kanun, 24/12/2021): 370 kapsamındaki KKM hesabının
  dönem boyunca bankadan fiilen tahsil edilen kur farkı tazminat ödemeleri istisna kapsamındadır.

  ## KKM Kur Farkı Koruma Mekanizması
  KKM hesabı açılışında referans kur (açılış günü TCMB kuru) belirlenir.
  Dönem boyunca piyasa TCMB kuru referans kurun ÜSTÜNE çıkarsa:
  → Banka, hesap sahibine kur farkını tazmin eder (102 Dr / 648 Kr veya 642 Kr).
  → Bu tazminat ödemesi KVK Geçici Md.14/1-b kapsamında kurumlar vergisinden istisnadır.
  TL güçlü dönemlerde (piyasa kuru < referans kur) banka ödeme yapmaz → 371 = 0.

  ## 370 vs 371 Ayrımı
  370 (Geçici Md.14/1-a): Dönüşüm anındaki TEK SEFERLİK kur farkı değerleme kazancı.
  371 (Geçici Md.14/1-b): Hesap süresince bankadan DÖNEMSEL kur farkı koruma ödemeleri.
  Aynı KKM hesabından her ikisi oluşabilir; her biri için ayrı beyanname satırı ve ayrı çalışma kâğıdı.

  ## Faiz/Kâr Payı Ayrımı
  KKM hesabı aynı zamanda faiz ve kâr payı da üretebilir.
  Kur farkı tazminat ödemesi → 371 kapsamında istisna.
  Faiz ve kâr payı geliri → 371 kapsamında DEĞİL; ayrı muhasebe ve vergi değerlendirmesi gerekir.
  Banka ekstresinde bu iki tür gelirin ayrı satırlarda gösterilmesi zorunludur.

  ## Hesap Yenileme (Rollover) ve Erken Kapatma
  Yenileme: Yenilenen hesap için yeni referans kur (yenileme günü TCMB kuru) oluşur.
  Orijinal 31/12/2021 kaynaklı bakiyenin devamı ise 371 kapsam analizi devam edebilir.
  Erken Kapanma: Kapanma tarihine kadar alınan kur farkı ödemeleri 371 kapsamındadır.

  ## YİAKV Etkisi — KRİTİK
  371 kapsamındaki kur farkı tazminat istisnası YİAKV (KVK Md.32/C) matrahından DÜŞÜLEMEZ.
  YİAKV E.7'de hem 370 hem 371 DÜŞÜLEMEZ listesindedir.
  EN SIK YAPILAN HATA: 371 tutarını 370'ten ayrı değerlendirerek YİAKV hesabını hatalı yapmak.
  HER İKİSİ BİRLİKTE DE AYRI AYRI DA DÜŞÜLEMEZ.

  ## YMM Tasdik
  49 No.lu KV Genel Tebliği: Net 371 istisna tutarı ≥ 500.000 TL ise YMM tasdik raporu zorunludur.
  370 tasdik raporu ile koordineli hazırlanması önerilir.

muhasebe_kayitlari: |
  ## Kayıt 1 — Dönem İçinde Bankadan Alınan Kur Farkı Tazminat Ödemesi
  Borç: 102 Bankalar (TL)
  Alacak: 648 Diğer Olağan Gelirler / 642 Faiz Gelirleri
  Açıklama: KKM hesabına bankadan alınan kur farkı tazminat ödemesi — KVK Geçici Md.14/1-b kapsamı

  ## Kayıt 2 — 370 (Tek Seferlik) vs 371 (Dönemsel) Karşılaştırması
  370 [Dönüşüm tarihi]: 646/679 Kr — Dönüşüm kur farkı değerleme kazancı (tek seferlik — Beyanname 370)
  371 [Her ödeme]: 648/642 Kr — Bankadan alınan dönemsel kur farkı tazminatı (Beyanname 371)

  ## Beyanname Akışı (370 + 371 Birlikte)
  1. 646/679 ve 648/642 hesaplarındaki kazançlar ticari kârda yer alır.
  2. KV Beyannamesi: 370. satır (değerleme) + 371. satır (kur farkı tazminat) → Kazancın Bulunması Halinde.
  3. YİAKV MATRAHI: Her iki tutar da çıkarılmaz — asgari vergi matrahında kalır (E.7 DÜŞÜLEMEZ).
  4. Faiz/kâr payı geliri 371 kapsamında değildir; ayrı satırda değerlendirilir.

