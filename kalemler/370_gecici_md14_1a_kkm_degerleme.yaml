    - id: donusum_gun_kuru_tl
      etiket: "Dönüşüm günü TCMB döviz alış kuru (1 birim yabancı para = ? TL)"
      tip: sayi
      zorunlu: true
    - id: bilanco_gun_kuru_tl
      etiket: "31/12/2021 bilanço günü TCMB döviz alış kuru"
      tip: sayi
      zorunlu: true
    - id: doviz_miktari
      etiket: "Dönüştürülen yabancı para miktarı (yabancı para birimi)"
      tip: sayi
      zorunlu: true
    - id: beyan_edilen_istisna
