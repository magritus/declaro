  formuller:
    kur_farki_kazanci: "(donusum_gun_kuru_tl - bilanco_gun_kuru_tl) * doviz_miktari"
    istisna_tutari: "max(kur_farki_kazanci, 0)"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "kur_farki_kazanci >= 0"
      hata: "Kur farkı negatif — değerleme kazancı oluşmamış. 370 istisnası uygulanamaz."

denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Md.14/1-a (7352 sayılı Kanun, 24/12/2021): 31/12/2021 tarihli bilançoda yer alan
  yabancı paralar ile altın hesaplarının Türk lirası mevduat veya katılım hesabına (KKM)
  dönüştürülmesi sırasında oluşan değerleme kazançları istisna kapsamındadır.

  ## Değerleme Kazancı Hesaplama
  Değerleme Kazancı = (Dönüşüm Günü Kuru − 31/12/2021 Bilançosu Kuru) × Döviz Miktarı
  Kazanç pozitif ise 370 istisnası uygulanır; negatif ise 370 = 0 (zarar istisnadan yararlanamaz).
  Kullanılan kurlar: TCMB resmi döviz alış kurları.

  ## 370 vs 371 Ayrımı
  370 (Geçici Md.14/1-a): Dönüşüm anındaki TEK SEFERLİK kur farkı değerleme kazancı.
  371 (Geçici Md.14/1-b): KKM hesabı süresince bankadan DÖNEMSEL olarak alınan kur farkı
  tazminat ödemeleri. Her ikisi için ayrı çalışma kâğıdı ve ayrı beyanname satırı zorunludur.

  ## Kapsam Sınırları
  - YALNIZCA 31/12/2021 bilanço tarihinde mevcut olan yabancı para bakiyeleri kapsam dahilindedir.
  - Sonradan edinilen dövizler veya farklı tarihli dönüşümler kapsam dışıdır.
  - Dönüşüm, Cumhurbaşkanı kararlarıyla belirlenen yasal süre içinde gerçekleşmiş olmalıdır.
  - KKM hesabı TL cinsinden açılmış, bankadan garanti/koruma sağlanan hesap olmalıdır.

  ## YİAKV Etkisi — KRİTİK
  370 kapsamındaki değerleme kazancı istisnası YİAKV (KVK Md.32/C) matrahından DÜŞÜLEMEZ
  (E.7 DÜŞÜLEMEZ listesi). Asgari vergide matrahta kalır.
  Hatalı uygulama → YİAKV tarhiyatı + vergi ziyaı cezası + gecikme faizi riski.
  YİAKV çalışma kâğıdında da çift kontrol yapılmalıdır.

  ## YMM Tasdik
  49 No.lu KV Genel Tebliği: İstisna tutarı ≥ 500.000 TL ise YMM tasdik raporu zorunludur.
  Rapor, KV beyannamesiyle birlikte veya en geç 2 ay içinde elektronik ortamda iletilir.
  Tam tasdik sözleşmesi bulunanlar ayrıca istisna tasdik raporu düzenlemez.

muhasebe_kayitlari: |
  ## Kayıt 1 — Dönüşüm Anında Kur Farkı Kazancı (Md.14/1-a)
  Borç: 102 Bankalar (KKM Hesabı — TL)
  Alacak: 100/101 Kasa/Bankalar (Döviz Hesabı)
  Alacak: 646 Kambiyo Kârları (Kur Farkı Kazancı — 370 İstisna Tutarı)
  Açıklama: 31/12/2021 döviz bakiyesi TL KKM'ye dönüşümü — değerleme kur farkı kazancı

  ## Kayıt 2 — KV Beyannamesi İstisna Akışı
  Not: 646 hesabına alınan kur farkı kazancı beyannamede 370 satırında indirilir.
  YİAKV matrahında bu tutar DÜŞÜLEMEZ (E.7); YİAKV çalışma kâğıdında ayrıca gösterilmelidir.

