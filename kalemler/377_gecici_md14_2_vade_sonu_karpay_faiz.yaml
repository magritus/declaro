wizard_agaci:
  tetikleyici_soru: "375/376 kapsamındaki TL araç dönem içinde vadeye ulaşarak kâr payı/faiz tahsil edildi mi?"
  info_modal: |
    KVK Geçici Md.14/2 (Paragraf 2) kapsamında, yabancı para borç dönüşümü (375) sonrası
    kurulan TL araç vadeye ulaştığında bankadan fiilen alınan kâr payı ve faiz istisnadır.

    **373 vs 377 Fark:**
    373 (Paragraf 1): TL KKM (mevduat/altın dönüşümü) vade sonu tahsilatı
    377 (Paragraf 2): Borç dönüşümü sonrası TL araç vade sonu tahsilatı

    **KRİTİK — 376-377 Mükerrerlik:**
    Net 377 = Vade Toplam − Önceki Yıl 376 Tahakkuku

    **YİAKV:** Bu istisna KVK 32/C (YİAKV) matrahından DÜŞÜLEMEZ (E.7).
  kapi_sorulari:
    - id: borcdonusum_yapildi
      soru: "KVK Geçici Md.14/2 kapsamında borç dönüşümü (375) gerçekleştirildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
    - id: vade_geldi
      soru: "Dönem içinde bu TL araç vadeye ulaştı mı? Kâr payı/faiz tahsil edildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
    - id: mukerrerlik_376
      soru: "Önceki yıl 376 tahakkuku yapılmış araç için Net 377 = Vade − Önceki 376 kuralı uygulandı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
    - id: yiakv_dusulemez
      soru: "377 tutarının YİAKV matrahından DÜŞÜLMEYECEĞI teyit edildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet

