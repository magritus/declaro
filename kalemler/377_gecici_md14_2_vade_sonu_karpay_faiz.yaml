  ## Yasal Dayanak
  KVK Geçici Md.14/2: 375 kapsamındaki borç dönüşümü sonrası kurulan TL araç
  vadeye ulaştığında fiilen tahsil edilen kâr payı ve faiz istisnadır.

  ## Kritik Noktalar
  - 377, 375 (borç dönüşümü) ve 376 (dönem sonu tahakkuk) ile bağlantılıdır
  - 376-377 mükerrerlik kuralı: Net 377 = Vade Toplam − Önceki 376 Tahakkuku
  - Paragraf 1 araçları (KKM) → 373. Paragraf 2 araçları (borç dönüşümü) → 377. Karıştırılmamalı.
  - 370-377 tamamı YİAKV matrahından DÜŞÜLEMEZ (E.7'de sekiz satır listede)

