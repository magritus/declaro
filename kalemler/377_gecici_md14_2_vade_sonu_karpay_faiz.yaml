    - id: mukerrerlik_376
      soru: "Önceki yıl 376 tahakkuku yapılmış araç için Net 377 = Vade − Önceki 376 kuralı uygulandı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
    - id: yiakv_dusulemez
      soru: "377 tutarının YİAKV matrahından DÜŞÜLMEYECEĞI teyit edildi mi?"
