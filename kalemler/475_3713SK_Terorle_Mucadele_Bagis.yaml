wizard_agaci:
  tetikleyici_soru: "3713 sayılı Terörle Mücadele Kanunu kapsamında şehit yakınlarına veya malul gazilere destek amacıyla bağış yaptınız mı?"
  info_modal: |
    ## Genel Çerçeve

    **3713 sayılı Terörle Mücadele Kanunu** kapsamında terörle mücadelede şehit olan
    kişilerin yakınlarına ve bu mücadelede malul ya da engelli hale gelen gazilere
    yapılan yardımlar ile bu kişilere destek sağlayan fon/kurumlara yapılan bağışların
    **tamamı** kurumlar vergisi matrahından indirilir.

    ## Alıcı Niteliği

    - İçişleri Bakanlığı bünyesindeki ilgili birimler
    - 3713 s.K. kapsamında kurulan fon veya program
    - Şehit yakınlarına doğrudan yapılan yardımlar (şehitlik belgesi gerekir)
    - Malul gazilere doğrudan yapılan yardımlar (gazi belgesi gerekir)

    **Not:** Genel güvenlik/savunma bağışları farklı kodlara girer (örn. 474 TSKGV).

    ## İndirim Oranı

    İndirim oranı **tamamının indirimi**dir. Matrahı aşan kısım sonraki yıllara devredilemez.

    ## YİAKV İlişkisi

    **475 kapsamındaki bağış indirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.**
    YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir ancak matraha etki etmez.
  kapi_sorulari:
    - id: kapsam_sehit_gazi
      soru: "Bağış 3713 s.K. kapsamında şehit/gazi desteği için mi yapıldı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "3713 s.K. kapsamında terörle mücadelede şehit olan kişilerin yakınları veya malul/engelli hale gelen gazilere destek amaçlı bağış. Genel güvenlik/savunma bağışları farklı kodlar (474 vb.)."
    - id: fiili_odeme_yapildi
      soru: "Bağış fiilen gerçekleşti mi? (Nakdi: Banka dekontu — Ayni: Teslim belgesi)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Taahhüt aşamasındaki bağış indirime konu edilemez. Nakdi bağışta banka EFT/havale dekontu; ayni bağışta imzalı teslim tutanağı zorunludur."
    - id: makbuz_alindi
      soru: "Resmi makbuz / kabul belgesi alındı mı? (Bakanlık/Fon/Lehdar)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Bakanlık, ilgili fon veya yardım yapılan kişi/aile adına düzenlenen makbuz. Belgesiz bağış 475 kapsamında gösterilemez."
    - id: sehit_gazi_belgesi
      soru: "Yardımın 3713 s.K. şehit/malul gazi kapsamında olduğu belgelendi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Şehit yakınına yapılan doğrudan yardımda şehitlik belgesi, malul gaziye yapılanda gazi belgesi gerekir. Bakanlık/fon kanalıyla ise protokol yeterli."

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: nakdi_bagis_tutari
      etiket: "Nakdi bağış tutarı (TL) — Banka yoluyla yapılan ödemeler"
      tip: para
      zorunlu: false
      yardim: "Banka EFT/havale ile yapılan nakdi bağışların toplamı."
    - id: ayni_bagis_degeri
      etiket: "Ayni bağış değeri (TL) — Ayni yardımın maliyet/net defter değeri"
      tip: para
      zorunlu: false
      yardim: "Ayni yardım varsa maliyet veya net defter değeri. Piyasa değeri değil maliyet esas."
  formuller:
    toplam_bagis: "nakdi_bagis_tutari + ayni_bagis_degeri"
    istisna_tutari: "nakdi_bagis_tutari + ayni_bagis_degeri"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "nakdi_bagis_tutari >= 0 and ayni_bagis_degeri >= 0"
      hata: "Bağış tutarları negatif olamaz."
    - kural: "nakdi_bagis_tutari + ayni_bagis_degeri > 0"
      hata: "En az bir bağış türü (nakdi veya ayni) girilmelidir."

denetci_notlari: |
  ## Yasal Dayanak
  3713 sayılı Terörle Mücadele Kanunu kapsamında şehit yakınlarına, malul ve
  engelli gazilere destek amacıyla yapılan bağışların tamamı kurumlar vergisi
  matrahından indirilir.
  GİB KV Beyan Rehberi Mart 2026 (Yayın No:606) esas alınmıştır.

  ## İndirim Kuralları
  - Tamamının indirimi — kazanç yüzdesiyle sınırlı değil
  - Matrahı aşan kısım sonraki yıla devredilmez

  ## Kritik Kontroller
  - Bağış 3713 s.K. kapsamında şehit/gazi desteği amacı taşımalı
  - Doğrudan kişiye yapılan yardımda şehitlik/gazi belgesi zorunlu
  - Bakanlık/fon kanalıyla yapılan bağışta protokol yeterli
  - Fiili ödeme/teslim (taahhüt değil, gerçekleşmiş bağış)
  - Bakanlık/fon/alıcıdan resmi makbuz

  ## YİAKV Etkisi
  475 bağış indirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir.

  ## YMM Tasdik
  İndirim tutarı ≥500.000 TL ise YMM tasdik raporu zorunludur (49 No.lu KV GT).
  Tam tasdik kapsamındaki mükelleflerde ayrıca rapor düzenlenmez.

muhasebe_kayitlari: |
  ## Nakdi Bağış Kaydı
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Bağış gideri)
  Alacak: 102 Bankalar
  Açıklama: 3713 s.K. kapsamında şehit/gazi desteği için nakdi bağış.

  ## Ayni Bağış Kaydı (Stoktan)
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Maliyet bedeli)
  Alacak: 150/153 İlk Madde ve Malzeme / Ticari Mallar
  Açıklama: 3713 s.K. kapsamında şehit/gazi desteği için ayni yardım.

  ## Beyanname
  Hesaplanan toplam bağış tutarı beyanname 475. satırına aktarılır.
  Matrahı aşan kısım devredilemez.

