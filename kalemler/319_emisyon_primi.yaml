wizard_agaci:
  tetikleyici_soru: "Bu dönem kendi hisselerini itibari değerin üzerinde (primli) ihraç ettin mi?"
  info_modal: |
    ## Genel Çerçeve

    KVK Madde 5/1-ç kapsamındaki emisyon primi istisnası, anonim şirketlerin kuruluşta veya
    sermaye artırımında **kendi paylarını itibari değerin üzerinde (primli)** ihraç etmesinden
    doğan prim tutarının tamamını kurumlar vergisinden muaf tutar. İstisna oranı **%100** olup
    herhangi bir fon hesabı (549) veya elde tutma şartı aranmaz.

    Dikkat edilmesi gereken temel özellik, emisyon priminin muhasebede **gelir tablosuna
    yansıtılmaması**, doğrudan 520 Hisse Senedi İhraç Primleri hesabına alınmasıdır. Bu nedenle
    beyanname tekniğinde çift hamleli bir düzeltme işlemi gerekir: önce 519. satırda **KKEG
    ilavesi**, ardından 319. satırda **istisna uygulaması**. Bu mekanizma anlaşılmadan yapılan
    beyanlar hataya yol açabilir.

    ## Temel Koşullar

    **1. Kurum Türü:** İstisna yalnızca **anonim şirketlere** uygulanır. KVK 5/1-ç'de "anonim
    şirketlerin" ifadesi açıkça yer almaktadır. Limited şirketlerin benzer işlemleri için bu
    madde tartışmalıdır; özelge alınması önerilir.

    **2. Kendi Paylarının Primli İhracı:** Şirketin **kendi paylarını** itibari değerin üzerinde
    ihraç etmesi gerekmektedir. Başkasına ait hisselerin satışı — örneğin mevcut ortakların
    hisselerini satması — 5/1-ç kapsamına girmez; bu durumda KVK 5/1-c veya 5/1-e istisnası
    araştırılmalıdır.

    **3. Kuruluş veya Sermaye Artırımı Kapsamı:** Pay ihracının kuruluş sırasında ya da sermaye
    artırımı kararı çerçevesinde gerçekleşmesi zorunludur. Mevcut hisselerin devri bu şartı
    karşılamaz.

    **4. İtibari Değerin Üzerinde İhraç:** Satış bedelinin itibari değeri aşması ve aradaki farkın
    (prim tutarının) TTK Madde 519/2 uyarınca **kanuni yedek akçe** olarak 520 hesabına aktarılması
    gerekmektedir.

    ## Önemli Sınırlamalar ve Riskler

    **Beyanname Tekniği Hatası:** Emisyon primi, muhasebede gelir tablosuna girmediğinden vergi
    matrahına da zaten dahil değildir. Şayet kurum yanlışlıkla geliri hesaba almışsa (istisnai
    muhasebe hataları), önce 519. satırdan KKEG ilavesi yapılarak matraha eklenmeli; ardından
    319. satırdan istisna olarak düşülmelidir. Bu çift hamleli teknik göz ardı edilirse ya
    istisna yersiz uygulanmış ya da matrah hatalı hesaplanmış olur.

    **SPE / Özel Amaçlı Yapılar:** Yalnızca vergi avantajı sağlamak amacıyla oluşturulan primli
    pay ihraçlarında, işlemin gerçek ticari amacı vergi incelemesinde sorgulanabilir.

    **TTK 519 Yükümlülüğü:** Prim tutarı **kanuni yedek akçe** olarak ayrılmak zorundadır.
    TTK 519 hükmüne aykırılık, hem şirket yönetimi açısından idari yaptırım hem de vergi idaresi
    açısından istisna koşullarını karşılamama riski doğurabilir.

    **Sermaye Azaltımında Geri Ödeme:** Emisyon priminin daha sonra ortaklara iade edilmesi
    durumunda kâr dağıtımı hükümleri ve stopaj uygulaması söz konusu olabilir; GİB görüşleri
    ve mevcut özelgeler takip edilmelidir.

    ## YİAKV İlişkisi

    Emisyon primi istisnası **YİAKV (KVK Madde 32/C) matrahından DÜŞÜLEBİLİR.** 319. satırdaki
    istisna tutarı, YİAKV matrahı hesaplanırken KVK 32/C kapsamında indirim olarak dikkate
    alınabilmektedir. Bu durum, özellikle yüksek tutarlı sermaye artırımı yapan kurumlarda YİAKV
    yükümlülüğünü anlamlı ölçüde azaltabilir.

    Bununla birlikte, emisyon priminin muhasebede zaten gelir tablosuna yansımaması nedeniyle
    "istisna" olarak kabul edilip edilmeyeceği ve YİAKV matrahından düşülebilirliği konusunda
    GİB'in güncel açıklamaları takip edilmelidir.

    ## Pratik Notlar

    - Esas sözleşme ve genel kurul kararının bir kopyası ile Ticaret Sicili tescil belgesi dosyaya eklenmelidir.
    - 520 Hisse Senedi İhraç Primleri hesabının borç ve alacak hareketleri beyanname dönemine ait
      dönem sonu bakiyesiyle mutabık olmalıdır.
    - Primli pay ihracının değerleme raporu (SPK lisanslı değerleme) veya TTK 343 denetçi raporu
      ile desteklenmesi önerilir.
    - 519 (KKEG) + 319 (istisna) çift satır uygulaması yapılırken tutarların birebir eşit olduğu
      teyit edilmelidir; fark olması durumunda matrah hatalı hesaplanır.
    - 49 No.lu KV GT kapsamında YMM tasdik raporu eşiği kontrol edilmelidir.
  kapi_sorulari:
    - id: as_mi
      soru: "İstisna kullanan kurum ANONİM ŞİRKET mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "KVK 5/1-ç'de 'anonim şirketlerin' ifadesi açık hükümdür. Ltd.Şti. için bu madde kapsamında tartışmalıdır."
    - id: kendi_pay_ihraci
      soru: "İstisna şirketin KENDİ paylarının primli ihracından mı? (Başkasına ait hisse satışı değil)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "AŞ'nin başkasına ait hisseleri satması → Bu istisna kullanilamaz. 5/1-c veya 5/1-e değerlendirin."
    - id: sermaye_artirimi_mi
      soru: "Pay ihracı kuruluş veya sermaye artırımı kapsamında mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "KVK 5/1-ç: 'Kuruluşlarında VEYA sermayelerini artırdıkları sırada' ifadesi zorunludur."
    - id: satış_bedeli_itibari_ustunde
      soru: "Satış bedeli itibari değerin ÜSTÜNDE mi? (Gerçek primli ihraç)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Emisyon primi = Satış Bedeli − İtibari Değer > 0 olmalıdır."
    - id: hes_520_kullanildi
      soru: "Emisyon primi 520 (Hisse Senedi İhraç Primleri) hesabına kaydedildi mi? Gelir tablosuna girmedi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "520 yerine 649 veya 679'a kaydedilmişse muhasebe hatası var — düzeltme zorunludur."
    - id: kkeg_ilavesi_yapildi
      soru: "Emisyon primi için KKEG ilavesi (519 satırı) yapıldı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Emisyon primi gelir tablosuna girmediğinden önce KKEG olarak matrah artırılmalı (519 satırı), ardından 319 ile düşülmelidir. KKEG yapılmadan sadece 319 yazılırsa beyanname HATALIDIR."

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: ihrac_edilen_pay_adedi
      etiket: "İhraç edilen pay adedi"
      tip: sayi
      zorunlu: true
      yardim: "GK/YK kararındaki pay adediyle uyumlu olmalıdır."
    - id: pay_basi_itibari_deger
      etiket: "Pay başına itibari değer (TL)"
      tip: para
      zorunlu: true
      yardim: "Hisse senedinin üzerinde yazılı nominal değer (örn: 1 TL). Ticaret sicili tescilindeki nominal değer esas alınır."
    - id: pay_basi_ihrac_fiyati
      etiket: "Pay başına ihraç fiyatı / satış bedeli (TL)"
      tip: para
      zorunlu: true
      yardim: "Primli ihraç fiyatı — itibari değerin ÜSTÜNDE olmalıdır. GK/YK kararında belirlenen fiyat."
  formuller:
    emisyon_primi_tutari: "(pay_basi_ihrac_fiyati - pay_basi_itibari_deger) * ihrac_edilen_pay_adedi"
    istisna_tutari: "emisyon_primi_tutari"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "pay_basi_ihrac_fiyati > pay_basi_itibari_deger"
      hata: "İhraç fiyatı itibari değere eşit veya altında — emisyon primi oluşmamış. İstisna uygulanamaz."

denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-ç: "Anonim şirketlerin kuruluşlarında veya sermayelerini artırdıkları sırada
  çıkardıkları payların bedelinin itibarî değeri aşan kısmı."
  Emisyon Primi = (Satış Bedeli − İtibari Değer) × Pay Adedi

  ## Üç Temel Şart (Kümülatif)
  ① Anonim şirket statüsü (AŞ)
  ② Şirketin KENDİ paylarının primli ihracı (başkasına ait hisse satışı değil)
  ③ Kuruluş veya sermaye artırımı kapsamında ihraç

  ## Kapsam Dışı İşlemler
  - AŞ'nin başkasına ait hisseleri satmasından sağlanan kazanç (→ 5/1-c veya 5/1-e)
  - Sermaye azaltımı sırasında iptal edilen payların bedeli
  - Kâr dağıtımından kaynaklanan işlemler
  - İkincil piyasada hisse senedi alım-satımı

  ## Kritik Beyanname Tekniği — KKEG + 319 Birlikte Zorunlu
  Emisyon primi → 520 hesabına gider → Gelir tablosuna GİRMEZ → Ticari karda YOKTUR.
  DOĞRU BEYANNAME AKIŞI:
  ADIM 1: KKEG ilavesi (519 satırı): 520'ye giden tutar KKEG olarak matrahı artırır
  ADIM 2: 319 istisnası: "Zarar Olsa Dahi İndirilecek" bölümünde AYNI TUTAR düşülür
  ADIM 3: Net etki SIFIR → Emisyon priminde KV ödenmez
  HATA: Sadece 319 yazılır, KKEG yapılmaz → Beyanname HATALI → Tarhiyat riski!

  ## YİAKV Etkisi
  Emisyon primi istisnası (319) YİAKV (KVK 32/C) matrahından DÜŞÜLEBİLİR.
  YİAKV çalışma kâğıdında 319 tutarı matrahtan doğru biçimde düşülmelidir.

  ## NSA İlişkisi
  Emisyon primleri Nakdi Sermaye Artışı İndirimi (NSA/KVK 10/1-ı) hesabına DAHİL EDİLMEZ.
  NSA'ya giren tutar: Ticaret siciline tescil edilen sermaye artışının nakdi kısmı.

  ## TTK 519 Zorunluluğu
  Emisyon primlerinin giderler düşüldükten sonra kalan kısmının TAMAMI kanuni yedek akçeye
  eklenmeli (TTK Md.519/2). Bu KVK istisnasının koşulu olmasa da uyum kontrol edilmelidir.

  ## KVK 5/3 Gider Kısıtlaması
  İhraç giderlerinin emisyon primine isabet eden kısmı KKEG'dir.
  Oran = Emisyon Primi / Toplam Tahsilat.
  İlgili KDV'nin indirimi tartışmalıdır (KDVK 30/d).

  ## Özelge/Danıştay
  İzmir VDB (2011): KKEG + 319 tekniğiyle beyan onaylanmıştır.
  Danıştay: İhraç giderlerinin KKEG sayıldığı teyit edilmiştir.
  Ltd şirketler için emisyon primi istisnasının uygulanabilirliği tartışmalıdır.

muhasebe_kayitlari: |
  ## Kayıt 1 — Primli Pay İhraç Kaydı
  Borç: 102 Bankalar — Toplam tahsil edilen bedel (itibari + prim)
  Alacak: 501 Ödenmemiş Sermaye — Toplam nominal bedel (tescil edilen kısım)
  Alacak: 520 Hisse Senedi İhraç Primleri — Emisyon primi tutarı
  NOT: 520 hesabı öz kaynaklarda yer alır; GELİR TABLOSUNA GİRMEZ.

  ## Kayıt 2 — Beyanname KKEG + 319 Tekniği
  ADIM 1: KV Beyannamesi KKEG Tablosu (519 Satırı)
    → 520'ye giden emisyon primi tutarı KKEG olarak matrahı artırır
  ADIM 2: KV Beyannamesi 319. Satır ("Zarar Olsa Dahi İndirilecek")
    → Aynı tutar istisna olarak matrahtan düşülür
  SONUÇ: Net vergi etkisi SIFIR

  ## Kayıt 3 — TTK 519 Kanuni Yedek Akçe Aktarımı
  Borç: 520 Hisse Senedi İhraç Primleri
  Alacak: 541 Yasal Yedekler — İhraç giderleri düşüldükten sonra kalan kısım
  (TTK Md.519/2 uyarınca genel kurul kararıyla gerçekleştirilir)

