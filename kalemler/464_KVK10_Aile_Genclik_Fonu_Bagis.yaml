wizard_agaci:
  tetikleyici_soru: "Aile ve Gençlik Fonu'na bağış veya yardım yaptınız mı?"
  info_modal: |
    ## Genel Çerçeve

    **7474 sayılı Kanun Madde 6** kapsamında, **Aile ve Gençlik Fonu'na** yapılan
    bağış ve yardımların **tamamı** kurumlar vergisi matrahından indirilir.

    ## Alıcı — Yalnızca Aile ve Gençlik Fonu

    Bu indirim **yalnızca 7474 sayılı Kanunla kurulan Aile ve Gençlik Fonu'na**
    yapılan bağış ve yardımlar için geçerlidir. Başka bir fon, dernek veya vakfa
    yapılan bağışlar bu kod kapsamında değildir.

    ## Bağış Şekli

    - **Nakdi:** Banka transferi (EFT/havale) ile
    - **Ayni:** Mal veya hizmet şeklinde (teslim belgesi + maliyet değeri ile değerleme)

    ## İndirim Oranı

    İndirim oranı **tamamının indirimi**dir. Matrahı aşan kısım sonraki yıllara
    **devredilemez**.

    ## Ayni Bağış Değerleme

    Ayni bağışlarda **maliyet veya net defter değeri** esas alınır (piyasa değeri
    değil). KDV hesaplanmaz — KDVK Md.17 istisna kapsamında.

    ## YİAKV İlişkisi

    **7474 s.K. Md.6 kapsamındaki bağış indirimi YİAKV (KVK 32/C) matrahından
    DÜŞÜLEMEZ.** YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir.
    Diğer bağış/yardım kodlarıyla (402, 460, 461 vb.) aynı E.11 kategorisi.
  kapi_sorulari:
    - id: agf_alici
      soru: "Bağış/yardım Aile ve Gençlik Fonu'na mı yapıldı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "7474 s.K. Md.6 yalnızca Aile ve Gençlik Fonu'na yapılan bağış ve yardımları kapsar. Başka bir fon, dernek veya vakfa yapılan bağışlar bu kod kapsamında değildir."
    - id: fiili_odeme_yapildi
      soru: "Bağış/yardım fiilen gerçekleşti mi? (Nakdi: Banka dekontu — Ayni: Teslim belgesi)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Taahhüt edilen ama henüz yapılmayan bağış indirime konu edilemez. Nakdi: Banka EFT/havale dekontu; Ayni: İmzalı teslim tutanağı."
    - id: makbuz_alindi
      soru: "Aile ve Gençlik Fonu'ndan resmi makbuz veya bağış kabul belgesi alındı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Aile ve Gençlik Fonu'ndan alınan resmi makbuz veya bağış kabul yazısı. Bu belge olmadan 464 indirimi belgelenemiyor."

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: nakdi_bagis_tutari
      etiket: "Nakdi bağış tutarı (TL) — Banka yoluyla Aile ve Gençlik Fonu'na yapılan ödeme"
      tip: para
      zorunlu: false
      yardim: "Banka EFT/havale ile Aile ve Gençlik Fonu'na yapılan nakdi bağışların toplamı."
    - id: ayni_bagis_degeri
      etiket: "Ayni bağış değeri (TL) — Teslim edilen mal/hizmetin maliyet/net defter değeri"
      tip: para
      zorunlu: false
      yardim: "Ayni bağış varsa maliyet veya net defter değeri (piyasa değeri değil). KDV hesaplanmaz — KDVK Md.17 istisna kapsamında."
  formuller:
    toplam_bagis: "nakdi_bagis_tutari + ayni_bagis_degeri"
    istisna_tutari: "nakdi_bagis_tutari + ayni_bagis_degeri"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "nakdi_bagis_tutari >= 0 and ayni_bagis_degeri >= 0"
      hata: "Bağış tutarları negatif olamaz."
    - kural: "nakdi_bagis_tutari + ayni_bagis_degeri > 0"
      hata: "En az bir bağış türü (nakdi veya ayni) girilmelidir."

denetci_notlari: |
  ## Yasal Dayanak
  7474 Sayılı Kanun Madde 6: Aile ve Gençlik Fonu'na yapılan bağış ve yardımların
  tamamı kurumlar vergisi matrahından indirilir.
  GİB KV Beyan Rehberi Mart 2026 (Yayın No:606) esas alınmıştır.

  ## Alıcı Koşulu
  Yalnızca 7474 sayılı Kanunla kurulan Aile ve Gençlik Fonu (AGF) alıcı olabilir.
  Başka fon/dernek/vakıf → Kapsam dışı.

  ## İndirim Kuralları
  - Nakdi + Ayni bağışların tamamı indirilir
  - Tamamının indirimi — kazanç yüzdesiyle sınırlı değil
  - Matrahı aşan kısım sonraki yıla devredilmez

  ## Ayni Bağış Değerleme
  Maliyet veya net defter değeri esas alınır (piyasa değeri değil).
  KDV hesaplanmaz — KDVK Md.17 istisna kapsamı.

  ## Kritik Kontroller
  - Alıcının Aile ve Gençlik Fonu olduğu teyit edilmeli
  - Fiili ödeme/teslim (taahhüt değil)
  - AGF'den resmi makbuz veya bağış kabul yazısı alınmalı
  - Ayni bağışlarda maliyet/defter değeri ile doğru değerleme yapılmalı

  ## YİAKV Etkisi
  464 bağış indirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir.
  Diğer bağış/yardım kodlarıyla (402, 460, 461 vb.) aynı E.11 kategorisi.

  ## YMM Tasdik
  İndirim tutarı ≥500.000 TL ise YMM tasdik raporu zorunludur (49 No.lu KV GT).

muhasebe_kayitlari: |
  ## Nakdi Bağış Kaydı
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Bağış gideri)
  Alacak: 102 Bankalar
  Açıklama: 7474 s.K. Md.6 kapsamında Aile ve Gençlik Fonu nakdi bağış.

  ## Ayni Bağış Kaydı (Stoktan)
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Maliyet bedeli)
  Alacak: 150/153 İlk Madde ve Malzeme / Ticari Mallar
  Açıklama: 7474 s.K. Md.6 kapsamında Aile ve Gençlik Fonu ayni bağış.

  ## Beyanname
  Hesaplanan toplam bağış tutarı beyanname 464. satırına aktarılır.
  Matrahı aşan kısım devredilemez.

