wizard_agaci:
  tetikleyici_soru: "Bir taşınır varlığı (makine, araç, ekipman) finansal kiralama şirketine veya katılım bankasına satıp geri kiralayarak kullanıyorsunuz?"
  info_modal: |
    ## Genel Çerçeve

    **KVK Madde 5/1-j** kapsamında, kurumların taşınır varlıklarını (makine, araç, ekipman,
    teçhizat) **sat-kirala-geri al (sale and leaseback)** işlemi çerçevesinde **6361 Sayılı
    Kanun kapsamında BDDK lisanslı finansal kiralama şirketine** ya da **katılım bankasına /
    kalkınma-yatırım bankasına** satmaları ve finansal kiralama sözleşmesiyle geri kiralamaları
    durumunda doğan satış kazancı **%100 istisnadır.** İstisna tutarı 549 Özel Fonlar hesabına
    alınır ve kira süresi boyunca kira ödemelerine orantılı olarak amortize edilir.

    ## Temel Koşullar

    - Satılan varlık **taşınır** olmalıdır (makine, araç, ekipman, teçhizat); taşınmaz (bina,
      arazi, fabrika) için 355 kodu kullanılmalıdır.
    - Alıcı kurum; **6361 s.K. kapsamında BDDK lisanslı finansal kiralama şirketi**, katılım
      bankası veya kalkınma/yatırım bankası olmalıdır; mevduat bankası kapsam dışıdır.
    - **Satış ve geri kiralama sözleşmeleri** eş zamanlı ya da birbirine bağlı olarak düzenlenmiş
      olmalıdır; bağımsız ayrı işlemler tartışmalı kabul edilir.
    - **Kira süresi sonunda geri alma taahhüdü/opsiyonu** finansal kiralama sözleşmesinde yazılı
      olarak bulunmalıdır; şifahi taahhüt geçersizdir.
    - Satış kazancının tamamı **satış yılında 549 Özel Fonlar hesabına** alınmalıdır; her
      dönem kira payına orantılı olarak fon amortize edilir ve kira süresi sonunda 549 sıfırlanır.

    ## Önemli Sınırlamalar ve Riskler

    - **Geri alım gerçekleşmezse istisna iptal edilir:** Kira süresi sonunda geri alım yapılmadığı
      takdirde istisna geçersiz sayılarak cezalı tarhiyat riski doğar; geri alım planının sözleşme
      aşamasında hukuki güvence altına alınması kritiktir.
    - **549 fon amortizasyonu hatalı hesaplanırsa:** Her dönem azaltılacak fon tutarı = Başlangıç
      Fonu × (Dönem Kira / Toplam Kira); yanlış hesaplama beyanname hatasına yol açar.
    - **Piyasa değerinden uzak satış:** Satış bedelinin emsal piyasa değerinden önemli ölçüde
      sapması **KVK Madde 13 kapsamında örtülü kazanç dağıtımı riskini** tetikler; bağımsız
      değerleme/ekspertiz raporu bu riski azaltır.
    - **Alıcı kurum türü:** SPK lisanslı VKŞ'ye yapılan sat-kirala işlemleri bu satıra (354)
      değil **356 satırına** girilmelidir; yanlış kod kullanımı beyanname hatasıdır.
    - **İstisna yalnızca satış yılında kullanılır:** Sonraki yıllarda 354 satırına tekrar
      yazılmaz; 549 fon amortizasyonu beyanname kalemlerine yansıtılmaz.

    ## YİAKV İlişkisi

    **KVK 5/1-j (354) istisnasının YİAKV (KVK 32/C) matrahına etkisi tartışmalıdır.** Dönem
    mevzuatı ve GİB açıklamaları takip edilerek her dönem ayrıca analiz edilmelidir; kesin bir
    "düşülür" veya "düşülmez" pozisyon alınmadan önce güncel rehber ve özelgeler incelenmelidir.

    ## Pratik Notlar

    - **3 aşamalı döngüsel yapı** izlenmelidir: (1) Satış — varlık FK/bankaya devredilir ve
      satış kazancı %100 istisna kapsamında 549'a alınır; (2) Geri kiralama — FK/banka varlığı
      finansal kiralama sözleşmesiyle kuruma kiralar, kira ödemeleri gider olarak indirilir ve
      fon kira payına orantılı azaltılır; (3) Geri alım — kira süresi sonunda satın alma hakkı
      kullanılır, geri alım bedeli yeni aktif değer olur ve 549 sıfırlanır.
    - **BDDK lisans teyidi:** Alıcı kurumun BDDK lisanslı FK şirketi ya da ilgili banka türünde
      olduğu BDDK resmi web sitesinden dönem başında teyit edilmelidir.
    - **Satış faturası ve teslim-tesellüm tutanağı:** Taşınırın fiziken FK şirketine teslim
      edildiğini belgeler; muhasebede aktiften çıkış kaydıyla uyumlu olmalıdır.
    - **YMM tasdik raporu:** 49 No.lu Tebliğ kapsamında tek satırda ≥500.000 TL veya toplamda
      ≥1.000.000 TL olması halinde YMM tasdik raporu zorunludur.
  kapi_sorulari:
    - id: varlik_tasinir_mi
      soru: "Satılan varlık taşınır mı? (Makine, araç, ekipman, teçhizat — taşınmaz/bina/arazi değil)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Taşınmaz (bina, arazi, fabrika) için 355 kodu kullanılmalıdır. Bu istisna yalnızca taşınır varlıklar içindir."
    - id: alici_lisansli_mi
      soru: "Alıcı kurum; 6361 s.K. kapsamında BDDK lisanslı finansal kiralama şirketi, katılım bankası veya kalkınma/yatırım bankası mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "KVK 5/1-j yalnızca bu kurumlara yapılan satış-geri kiralama işlemleri için geçerlidir. Başka alıcılara satış kapsam dışıdır."
    - id: geri_al_taahhut_var_mi
      soru: "Kira süresi sonunda varlığı geri alma taahhüdü/opsiyonu sözleşmede açıkça yer alıyor mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Geri alma şartı istisnasının özüdür. Geri alım gerçekleşmezse istisna iptal edilir — ceza + vergi riski doğar."
    - id: fon_hesabina_alindi_mi
      soru: "İstisna edilen kazancın 549 Özel Fonlar hesabına alınacak ve kira süresi boyunca amortize edilecek midir?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Fon hesabına alınmayan veya erken çekilen tutar vergiye tabi olur."

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: satis_bedeli
      etiket: "Taşınırın FK Şirketine/Bankaya Satış Bedeli (TL)"
      tip: para
      zorunlu: true
      yardim: "Finansal kiralama şirketine veya bankaya yapılan satışın fatura bedeli. Piyasa değeriyle uyumlu olmalıdır."
    - id: net_defter_degeri
      etiket: "Taşınırın Net Defter Değeri (TL)"
      tip: para
      zorunlu: true
      yardim: "Birikmiş amortisman düşüldükten sonraki net aktif değeri. Muhasebe kartı ile uyumlu olmalıdır."
    - id: satis_giderleri
      etiket: "Satış Giderleri (Komisyon, noter, fatura düzenleme vb.) (TL)"
      tip: para
      zorunlu: false
      yardim: "Satışa ilişkin komisyon, noter ve benzeri giderler."
  formuller:
    satis_kazanci: "satis_bedeli - net_defter_degeri - satis_giderleri"
    istisna_tutari: "max(satis_kazanci * oran, 0)"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "satis_kazanci > 0"
      hata: "Satış kazancı pozitif olmalıdır. Zarar durumunda bu istisna uygulanamaz (Kazancın Bulunması Halinde bölümü)."

denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-j: Finansal kiralama ya da finansman şirketleri, katılım bankaları ile kalkınma
  ve yatırım bankalarına satılıp geri kiralanan varlıklardan doğan satış kazançları %100 istisnadır.

  ## Mekanizma — 3 Aşamalı Döngüsel İşlem
  AŞAMA 1 — SATIŞ: Kurum taşınır varlığı FK şirketine/bankaya satar → Satış kazancı %100 istisna
  → 549 Özel Fon Hesabına alınır.
  AŞAMA 2 — GERİ KİRALAMA: FK/Banka aynı taşınırı kuruma finansal kiralama sözleşmesiyle kiralar
  → Kira ödemeleri gider olarak indirilebilir → 549 Fon her dönem kira payına orantılı azaltılır.
  AŞAMA 3 — GERİ ALMA: Kira süresi sonunda kurum satın alma hakkını kullanır → Geri alım bedeli
  yeni aktif değer → 549 Fon sıfırlanır → İstisna korundu.

  ## Kritik Noktalar
  - Alıcı zorunlu olarak: BDDK lisanslı FK şirketi (6361 s.K.) / Katılım bankası / Kalkınma-yatırım bankası (5411 s.K.)
  - Satış ve geri kiralama sözleşmeleri eş zamanlı veya birbirine bağlı olmalıdır
  - Geri alma taahhüdü sözleşmede yazılı olmalı — şifahi taahhüt geçersiz
  - İstisna sadece satış yılında 354 satırında gösterilir; sonraki yıllarda 354 satırına yazılmaz
  - Kira ödemeleri KV matrahından gider olarak indirilebilir
  - 549 Fon amortizasyonu: Her dönem = Fon × (Dönem Kira / Toplam Kira)
  - Taşınmaz (bina/arazi) işlemleri için 355 kodu kullanılmalıdır

  ## YİAKV Etkisi
  KVK 5/1-j (354) istisnasının YİAKV (KVK 32/C) matrahına etkisi tartışmalıdır; dönem mevzuatı
  ve GİB açıklamalarıyla ayrıca analiz edilmelidir.

  ## YMM Tasdik Raporu
  49 No.lu Tebliğ (30.12.2025): Tek satır ≥500.000 TL veya toplam ≥1.000.000 TL → YMM raporu
  zorunludur. Tam tasdik sözleşmesi olanlar ayrıca rapor düzenlemez.

muhasebe_kayitlari: |
  ## Kayıt 1 — Satış Kaydı (Taşınır Varlığın FK Şirketine/Bankaya Satışı)
  Borç: 102 Bankalar / 120 Alacaklar           [Satış Bedeli]
  Alacak: 253/254 İlgili Taşınır Aktif Hesabı  [Net Defter Değeri]
  Alacak: 258 Birikmiş Amortismanlar           [Birikim]
  Alacak: 679 Diğer Olağandışı Kâr             [Satış Kazancı]
  Açıklama: Taşınırın FK şirketine/bankaya sat-kirala-geri al kapsamında satışı

  ## Kayıt 2 — 549 Özel Fon Hesabına Alma (Satış Yılında)
  Borç: 679 Diğer Olağandışı Kâr / 645 Satış Kârı   [İstisna Tutarı]
  Alacak: 549 Özel Fonlar — KVK 5/1-j 354 İstisnası  [İstisna Tutarı]
  Açıklama: Satış kazancının tamamının KVK 5/1-j kapsamında 549 hesabına alınması

  ## Kayıt 3 — Dönemsel Kira Gideri Kaydı (Her Dönem)
  Borç: 770 Genel Yönetim Giderleri / 760 Pazarlama   [Kira Bedeli + KDV]
  Alacak: 102 Bankalar                                 [Kira Bedeli + KDV]
  Açıklama: FK şirketine ödenen finansal kiralama kira bedeli — gider kabul edilir

  ## Kayıt 4 — Fon Amortizasyonu (Her Dönem — Kira Payına Orantılı)
  Borç: 549 Özel Fonlar                         [Dönem Fon Azalışı]
  Alacak: 549 Özel Fonlar (karşı hesap) / 679   [Dönem Fon Azalışı]
  Açıklama: Fon = Başlangıç Fon × (Dönem Kira / Toplam Kira)
  Not: Kira süresi sonunda 549 hesabı sıfırlanmış olmalıdır.

