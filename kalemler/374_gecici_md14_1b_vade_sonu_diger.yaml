denetci_notlari: |
  ## 374 Vade Sonu Diğer Kazançların Kapsamı
  374 = KKM hesaplarından vade sonu elde edilen kazançların 371+372+373 dışında kalan kısmı.
  Beyanname: 374 | Kazancın Bulunması Halinde İndirilecek.
  GİB KV Beyan Rehberi 2026 (No:606) Bölüm 2.2.15 kapsamındadır.

  Başlıca 374 kalemleri:
  ① Altın KKM vade kazancı: (Vade Sonu Altın Değeri − Dönüşüm TL Bedeli − Faiz/Kâr Payı)
  ② Prim/bonus ödemeleri: Banka tarafından KKM hesabı için ödenen teşvik prim veya bonusu.
  ③ Endeksli KKM kazancı: TÜFE, döviz veya başka bir endekse bağlı getirinin faiz dışı kısmı.
  ④ Diğer özel KKM getirileri: Yukarıdakiler dışında 371/372/373 kapsamına girmeyen kazançlar.

  ## ★ 374 ve 371/372/373 Arasındaki Sınır — Mükerrerlik Önleme
  374 kapsam sınırı: Önce şu üç soru yanıtlanmalı:
  ① Bu kazanç 371 (kur farkı tazminat) midir? → Hayırsa devam.
  ② Bu kazanç 372 (dönem sonu faiz/kâr payı tahakkuku) mudur? → Hayırsa devam.
  ③ Bu kazanç 373 (vade sonu faiz/kâr payı) midir? → Hayırsa → 374.
  YANLIŞ: 50.000 TL vade getirisinin tamamını 373 veya tamamını 374 yazmak.
  DOĞRU: Faiz/kâr payı kısmı → 373 | Altın fiyat farkı getirisi → 374.

  ## Altın KKM Hesaplama Yöntemi
  Dönüşüm: Altın birim × Dönüşüm günü altın kuru = TL KKM başlangıcı (370 kapsamı)
  Vade faiz: KKM faiz/kâr payı = TL KKM × Oran × Gün → 373
  Vade altın farkı: Vade sonu altın değeri − Dönüşüm bedeli − Faiz/kâr payı → 374
  TCMB altın fiyatı veya İstanbul Altın Borsası (İAB) resmi fiyatı esas alınır.

  ## ★★ YİAKV ile İlişki — 370+371+372+373+374 Tamamı DÜŞÜLEMEZ
  YİAKV (KVK Md.32/C) matrahında beş kodun TÜMÜ DÜŞÜLEMEZ (E.7 listesi).
  374'ün 'diğer' niteliği taşıması YİAKV muamelesini değiştirmez.
  YMM, beş kodun tamamının asgari vergi matrahında kaldığını teyit etmelidir.

  ## Tartışmalı Kalemler — Özelge Stratejisi
  374 'diğer' niteliği tartışmaya açık olabilir. Şu durumlarda GİB özelgesi alınması tavsiye edilir:
  - Altın KKM kazancının hesaplama yöntemi farklı yorumlanabiliyorsa
  - Prim/bonus ödemeleri için bankanın nitelendirmesi farklıysa
  - Endeksli KKM ürünlerinde getiri türü belirsizse

muhasebe_kayitlari: |
  ## Kayıt 1 — Altın KKM: Vade Sonu Altın Fiyat Farkı Kazancı (374 — En Yaygın Kalem)
  Borç: 102 Bankalar — Altın KKM vade sonu toplam tahsilat (altın fiyat getirisi + faiz/kâr payı)
  Alacak: 646 Kambiyo Kârları / 679 Diğer Kâr — Altın fiyat farkı kazancı (374 kapsamı → Beyanname 374)
  Alacak: 642 Faiz Gelirleri / 644 Kâr Payları — Vade faiz/kâr payı (373 kapsamı → Beyanname 373)
  Altın KKM vade tahsilatında: Altın fiyat getirisi → 646/679 (374). Faiz/kâr payı → 642/644 (373).

  ## Kayıt 2 — Prim / Bonus Ödemesi (374 — Özel KKM Teşvik Ödemeleri)
  Borç: 102 Bankalar — Bankadan alınan KKM prim/bonus ödemesi (faiz niteliğinde değil)
  Alacak: 648 Diğer Olağan Gelirler / 679 Diğer Olağandışı Kâr — KKM prim/bonus (Beyanname 374)
  Prim/bonus niteliği: Faiz/kâr payı değil, teşvik niteliğinde ödeme → 642 değil 648 veya 679.

  ## Kayıt 3 — 370/371/372/373/374 Tam Muhasebe Tablosu
  370: [Dönüşüm] — 646/679 — Kur farkı değerleme → Tek seferlik → Beyanname 370
  371: [Ödeme] — 102/648 — Bankadan kur farkı koruma ödemesi → Dönemsel nakit → Beyanname 371
  372: [31.12] — 181/642 — Dönem sonu faiz/kâr payı tahakkuku → Beyanname 372
  373: [Vade] — 102/(181+642) — Vade sonu faiz/kâr payı tahsilatı → Beyanname 373
  374: [Vade] — 646/648/679 — Vade sonu diğer kazançlar (altın+prim+endeks) → Beyanname 374
  YİAKV: 370+371+372+373+374 BEŞİ DE YİAKV MATRAHINDA DÜŞÜLEMEZ (E.7).

