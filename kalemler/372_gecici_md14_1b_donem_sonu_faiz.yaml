denetci_notlari: |
  ## 372 Dönem Sonu Değerleme Mekanizması
  KKM hesapları üzerinde dönem sonu (31 Aralık) itibariyle tahakkuk eden faiz ve kâr payı geliri,
  VUK Md.280/281 gereği muhasebe kayıtlarına alınır (Dr 181 Gelir Tahakkukları / Kr 642 Faiz Gelirleri).
  Bu tahakkuk tutarı KVK Geçici Madde 14/1-b kapsamında kurumlar vergisinden istisnadır.
  Beyanname: 372 | Kazancın Bulunması Halinde İndirilecek.

  ## 371 ile 372 Ayrımı
  - 371: Bankadan fiilen ALINAN kur farkı tazminat ödemeleri (nakit esaslı, 102/648).
  - 372: Dönem sonunda TAHAKKUK ettirilen faiz/kâr payı (tahakkuk esaslı, 181/642).
  Karıştırılmamalı — farklı hesaplar, farklı beyanname satırları.

  ## Tahakkuk Hesaplama Yöntemleri
  Banka Bildirimi (Tercih edilen): Banka dönem sonu tahakkuk bildiriminden doğrudan alınır.
  Sözleşme Oranı Hesabı: Hesap Bakiyesi × Yıllık Oran × Geçen Gün / 365.
  Sonraki dönem tahsili: 372 istisnası YALNIZCA dönem sonu tahakkuk anında uygulanır —
  tahsil döneminde (Dr 102 / Kr 181) ikinci bir istisna söz konusu değildir.

  ## YİAKV ile İlişki — 370+371+372 Tamamı DÜŞÜLEMEZ
  YİAKV (KVK Md.32/C) matrahında 370, 371 ve 372 tutarlarının TÜMÜ DÜŞÜLEMEZ (E.7 listesi).
  En sık yapılan hata: 372 tahakkuk tutarını YİAKV matrahından düşmek.
  YMM, üç satırın tamamının asgari vergi matrahında kaldığını teyit etmelidir.

muhasebe_kayitlari: |
  ## Kayıt 1 — Dönem Sonu (31 Aralık): Faiz/Kâr Payı Tahakkuk Kaydı
  Borç: 181 Gelir Tahakkukları — KKM hesabından dönem sonu tahakkuk eden faiz/kâr payı
  Alacak: 642 Faiz Gelirleri / 644 Temettü ve Kâr Payları — KKM faiz/kâr payı tahakkuku (Beyanname 372)
  Hesap seçimi: TL KKM mevduat → 642. TL KKM katılım → 644.
  Bu tahakkuk kaydı KV Beyannamesinde 372 istisnasının muhasebe dayanağıdır.

  ## Kayıt 2 — Tahsil: Sonraki Dönemde Faiz/Kâr Payının Bankadan Alınması
  Borç: 102 Bankalar — KKM hesabından tahsil edilen faiz/kâr payı
  Alacak: 181 Gelir Tahakkukları — Önceki dönem tahakkuk kaydının kapatılması
  Not: 372 istisnası DÖNEM SONU TAHAKKUK anında uygulanır. Tahsil döneminde yeni gelir/istisna yazılmaz.

  ## Kayıt 3 — 370/371/372 Tam Muhasebe Tablosu (Aynı KKM Hesabından)
  370: [Dönüşüm] — 646/679 — Kur farkı değerleme kazancı → Tek seferlik → Beyanname 370
  371: [Ödeme] — 102/648 — Bankadan alınan kur farkı koruma ödemesi → Dönemsel nakit → Beyanname 371
  372: [31.12] — 181/642 — Dönem sonu faiz/kâr payı tahakkuku → Yıl sonu accrual → Beyanname 372
  YİAKV: 370+371+372 HİÇBİRİ YİAKV matrahından çıkarılmaz (E.7 — DÜŞÜLEMEZ).

