  info_modal: |
    KVK Geçici Md.14/1-b kapsamında, 370 kapsamındaki KKM hesabı dönem sonunda
    hâlâ açıkken VUK Md.280/281 gereği tahakkuk ettirilen faiz ve kâr payı istisnadır.

    **371 ile Fark:**
    371 = Bankadan fiilen ALINAN nakit kur farkı tazminat ödemeleri.
    372 = Dönem sonunda TAHAKKUK ettirilen faiz/kâr payı (hesap hâlâ açık).

    **Muhasebe Kaydı Zorunlu:** Dr 181 Gelir Tahakkukları / Kr 642 Faiz Gelirleri
    Kayıt olmadan 372 istisnasının muhasebe dayanağı bulunmaz.

    **KRİTİK — YİAKV:** Bu istisna KVK 32/C (YİAKV) matrahından DÜŞÜLEMEZ (E.7).
    370+371+372 tamamı E.7 DÜŞÜLEMEZ listesindedir.
