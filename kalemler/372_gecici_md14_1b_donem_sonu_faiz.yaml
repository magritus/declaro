denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Md.14/1-b (7352 sayılı Kanun, 24/12/2021): 370 kapsamındaki KKM hesabı dönem
  sonunda açıkken VUK Md.280/281 gereği tahakkuk ettirilen faiz ve kâr payı istisna kapsamındadır.

  ## VUK Değerleme Mekanizması
  VUK Md.281: Mevduat ve katılım hesaplarında dönem sonu (31 Aralık) itibariyle tahakkuk eden
  faiz/kâr payı geliri muhasebe kayıtlarına alınır.
  Muhasebe kaydı: Dr 181 Gelir Tahakkukları / Kr 642 Faiz Gelirleri (veya 644 Kâr Payları)
  TL KKM mevduat → 642 Faiz Gelirleri. TL KKM katılım → 644 Temettü ve Kâr Payları.
  Bu kayıt olmadan 372 istisnasının muhasebe dayanağı yoktur — KAYIT ZORUNLUDUR.

  ## 371 vs 372 Ayrımı
  371 (Md.14/1-b): Bankadan fiilen ALINAN nakit kur farkı tazminat ödemeleri (102/648).
  372 (Md.14/1-b): Dönem sonunda TAHAKKUK ettirilen faiz/kâr payı (181/642).
  Aynı KKM hesabından her ikisi de oluşabilir; farklı hesaplar, farklı beyanname satırları.
  371 (648) ve 372 (642) tutarlarının aynı muhasebe hesabına yazılmaması gerekir.

  ## Tahakkuk Hesaplama Yöntemleri
  Tercih Edilen: Banka dönem sonu bildirimi — doğrudan 181/642 kaydına alınır.
  Alternatif (Banka Bildirimi Yoksa): Hesap Bakiyesi × Yıllık Oran × Geçen Gün / 365
  Her iki yöntemde de banka ekstresiyle çapraz kontrol yapılmalıdır.

  ## Sonraki Dönemde Tahsil
  372 istisnası YALNIZCA dönem sonu tahakkuk anında uygulanır.
  Sonraki dönemde tahsilat gerçekleştiğinde (102 Dr / 181 Kr) ikinci bir istisna söz konusu değildir.
  Tahsil döneminde yeni 372 uygulanmaz; yalnızca 181 hesabı kapatılır.
  Vadede tahsilat → 373 kapsamında değerlendirilir (ayrı çalışma kâğıdı).

  ## 370–371–372 Tam Uyum
  Aynı KKM hesabından üç farklı türde istisna geliri oluşabilir:
  370 (Md.14/1-a): Dönüşüm kur farkı değerleme kazancı (646/679)
  371 (Md.14/1-b): Bankadan alınan kur farkı koruma ödemesi (102/648)
  372 (Md.14/1-b): Dönem sonu faiz/kâr payı tahakkuku (181/642) ← BU KALEM
  Üç dosya çapraz mutabık olmalıdır.

  ## YİAKV Etkisi — KRİTİK
  370+371+372 tamamı YİAKV (KVK Md.32/C) matrahından DÜŞÜLEMEZ (E.7 DÜŞÜLEMEZ listesi).
  YİAKV çalışma kâğıdında E.7'deki üç satır da kontrol edilmelidir.
  Hatalı uygulama → YİAKV tarhiyatı + vergi ziyaı cezası + gecikme faizi riski.

  ## YMM Tasdik
  49 No.lu KV Genel Tebliği: Net 372 istisna tutarı ≥ 500.000 TL ise YMM tasdik raporu zorunludur.
  370 ve 371 tasdik raporlarıyla koordineli hazırlanması önerilir.

muhasebe_kayitlari: |
  ## Kayıt 1 — Dönem Sonu (31 Aralık): Faiz/Kâr Payı Tahakkuk Kaydı
  Borç: 181 Gelir Tahakkukları
  Alacak: 642 Faiz Gelirleri / 644 Temettü ve Kâr Payları
  Açıklama: KKM hesabı dönem sonu tahakkuku — KVK Geçici Md.14/1-b kapsamı → Beyanname 372
  Not: TL mevduat → 642. TL katılım → 644.

  ## Kayıt 2 — Tahsil (Sonraki Dönemde veya Vadede)
  Borç: 102 Bankalar
  Alacak: 181 Gelir Tahakkukları
  Açıklama: Önceki dönem 372 tahakkuklarının tahsil edilmesi (181 kapatma)
  Not: Tahsil döneminde yeni istisna uygulanmaz. Vadede tahsilat → 373 kapsamı.

  ## Kayıt 3 — 370 / 371 / 372 Tam Muhasebe Tablosu
  370 [Dönüşüm]: 646/679 Kr — Kur farkı değerleme kazancı (tek seferlik — Beyanname 370)
  371 [Ödeme]: 102 Dr / 648 Kr — Bankadan alınan kur farkı koruma ödemesi (Beyanname 371)
  372 [31.12]: 181 Dr / 642 Kr — Dönem sonu faiz/kâr payı tahakkuku (Beyanname 372)
  Ticari kârda her üçü de yer alır; YİAKV matrahından üçü de çıkarılmaz (E.7).

