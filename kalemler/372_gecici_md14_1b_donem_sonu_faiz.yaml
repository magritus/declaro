  info_modal: |
    KVK Geçici Madde 14/1-b kapsamında: VUK Md.280/281 gereği dönem sonunda (31 Aralık)
    KKM hesabında tahakkuk ettirilen faiz ve kâr payı geliri kurumlar vergisinden **istisna** edilmiştir.

    **KVK Geçici Md.14 Üç İstisna Kodu:**
    - 370 (1-a): Dönüşüm anındaki kur farkı değerleme kazancı (tek seferlik, dönüşüm yılı)
    - 371 (1-b): Bankadan alınan kur farkı tazminat ödemeleri (nakit esaslı, dönemsel)
    - 372 (1-b): Dönem sonu VUK değerlemesiyle tahakkuk ettirilen kâr payı ve faiz (tahakkuk esaslı — bu kalem)

    Muhasebe kaydı (181/642) 372 istisnasının zorunlu dayanağıdır.
    **Kritik Uyarı:** Bu istisna YİAKV matrahından DÜŞÜLEMEZ (E.7 — Üçü birlikte).
