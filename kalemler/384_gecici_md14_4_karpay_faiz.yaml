  info_modal: |
    KVK Geçici Md.14/4 (Paragraf 4) — Genel kâr payı/faiz istisnası.
    383'ten farkı: Dönem sonu sınırı yoktur.
    Kapsam: Vade sonu tahsilat + Dönemsel tahsilat + Doğrudan ödeme

    **383 vs 384 Ayrımı:**
    383: 31 Aralık değerleme tahakkuku (181/642)
    384: Doğrudan ödeme/vade/dönemsel kâr payı/faiz (102/642)

    **383-384 Mükerrerlik:**
    383 tahakkuku yapılan araç vadeye giriyorsa: Net 384 = Toplam − Önceki 383

    **YİAKV:** Bu istisna KVK 32/C (YİAKV) matrahından DÜŞÜLEMEZ (E.7).
  kapi_sorulari:
    - id: paragraf4_kapsami
      soru: "KVK Geçici Md.14/4 kapsamında işlem gerçekleştirildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
    - id: diger_paragraf_degil
      soru: "Bu kâr payı/faiz 383 (dönem sonu tahakkuk) kapsamında DEĞİL mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "383: 31 Aralık tahakkuku. 384: Doğrudan ödeme/vade/dönemsel. Aynı tutarın ikisine birden yazılması mükerrerlik."
    - id: mukerrerlik_383
      soru: "Önceki yıl 383 tahakkuku yapılan araç için Net 384 = Toplam − Önceki 383 kuralı uygulandı mı?"
      tip: evet_hayir
