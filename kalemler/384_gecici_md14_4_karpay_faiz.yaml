denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Md.14/4: Paragraf 4 kapsamındaki araçlardan elde edilen kâr payı ve faiz
  (383 dönem sonu tahakkuku dışındaki) istisna kapsamındadır.

  ## 383-384 Ayrımı (Kritik)
  383: "Dönem sonu DEĞERLEMESİNDEN DOĞAN kâr payı ve faiz" = 31 Aralık tahakkuku (181/642)
  384: Genel kâr payı ve faiz = Doğrudan ödeme + Vade sonu tahsilat + Dönemsel tahsilat (102/642)
  Aynı tutarın hem 383 hem 384'e yazılması kesinlikle mükerrerlik oluşturur.

  ## 383-384 Mükerrerlik Kuralı
  Önceki yıl 383 tahakkuku yapılmış araç vadeye giriyorsa:
  Net 384 = Toplam Tahsilat − Önceki Yıl 383 Tahakkuku
  (372-373, 376-377, 380-381 kurallarının Paragraf 4 eşdeğeri)

muhasebe_kayitlari: |
  ## Kayıt — Vade Sonu / Dönemsel Kâr Payı/Faiz Tahsilatı (Paragraf 4)
  Borç: 102 Bankalar (TL)
  Alacak: 181 Gelir Tahakkukları (önceki yıl 383 kapatma — varsa)
  Alacak: 642 Faiz Gelirleri (bu yılın kısmı)
  Açıklama: Paragraf 4 araç vade/dönemsel tahsilat — 384 istisna (Net: Toplam − Önceki 383)

