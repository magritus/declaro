      yardim: "Dönem sonu SPK/VUK değerlemesinde oluşan artışlar (borsa rayici, gerçeğe uygun değer vb.). Değerleme kaybı bu alana girilmez."
    - id: portfoy_repo_gelirleri
      etiket: "Portföy repo / ters repo faiz gelirleri"
      tip: para
      zorunlu: false
      yardim: "Portföy kapsamındaki repo işlemlerinden elde edilen faiz gelirleri."
    - id: portfoy_diger_gelirler
      etiket: "Diğer portföy işletmeciliği gelirleri (varant, sertifika, fon katılma payı vb.)"
      tip: para
      zorunlu: false
      yardim: "MKYF portföyündeki diğer menkul kıymet araçlarından elde edilen gelirler. Taşınmaz geliri burada gösterilemez."
    - id: portfoy_giderleri
      etiket: "Portföy işletme giderleri (−) — Net kazanç hesabı için"
      tip: para
      zorunlu: false
      yardim: "Portföy işletmeciliğiyle doğrudan ilişkili giderler. Karma giderler için belgelenmiş dağıtım anahtarıyla portföy payı ayrıştırılmalı."
    - id: istisna_tutari_beyan
      etiket: "Net portföy işletmeciliği kazancı — Beyan edilecek istisna tutarı (Beyanname Satır 389)"
      tip: para
      zorunlu: true
  formuller:
    portfoy_toplam_gelir: "portfoy_faiz_gelirleri + portfoy_temettu_gelirleri + portfoy_satis_kazanci + portfoy_deger_artisi + portfoy_repo_gelirleri + portfoy_diger_gelirler"
    net_portfoy_kazanci: "portfoy_toplam_gelir - portfoy_giderleri"
    istisna_tutari: "istisna_tutari_beyan"
