# KVK 5/1-d (389) menkul kıymetler yatırım fonu portföy işletmeciliği kazancı
# YİAKV matrahından DÜŞÜLEBİLİR. Fon, taşınmaz geliri elde etmediğinden
# taşınmaz kaynaklı gelir ayrımı gerekmez. Bu kalem yalnızca taşınmaz dışı
# (menkul kıymet, repo, faiz, temettü vb.) portföy gelirlerini kapsar.
durum: aktif
yururluk_araligi:
  baslangic: "2006-06-21"
  bitis: null
  not: "2025 beyanname döneminden itibaren ayrı satır kodu (389) ile gösterilmektedir. Önceki dönemlerde 302 kodlu genel portföy işletmeciliği satırı kullanılıyordu."

ana_kategori: portfoy_isletmeciligi

wizard_agaci:
  tetikleyici_soru: "Kurum bir Menkul Kıymetler Yatırım Fonu (MKYF) mu ve portföy işletmeciliğinden (taşınmaz hariç) kazanç elde etti mi?"
  info_modal: |
    ## Genel Çerçeve

    KVK Madde 5/1-d kapsamında Türkiye'de kanunların öngördüğü şekilde kurulan **Menkul Kıymetler Yatırım Fonlarının (MKYF)** portföy işletmeciliğinden doğan kazançları kurumlar vergisinden **%100 tam istisna** olarak muaftır. Beyanname **"Zarar Olsa Dahi İndirilecek"** bölümünde **389** numaralı satırda gösterilir.

    Bu kalem (389) yalnızca **taşınmaz dışı** portföy gelirlerini kapsar: hisse senedi, tahvil, bono, eurobond, repo, ters repo, varant, sertifika ve benzeri menkul kıymetlerden elde edilen faiz, temettü, satış kazancı ve değerleme artışları. Portföyünde taşınmazdan elde edilen gelir bulunuyorsa **390** kodlu satır kullanılır.

    ## Temel Koşullar

    - **SPK Lisansı:** Fonun SPK tarafından kuruluşuna izin verilmiş ve tescil edilmiş MKYF statüsünde olması zorunludur; güncel kuruluş izni ve Kamuyu Aydınlatma Platformu (KAP) kaydı dosyada yer almalıdır.
    - **Türkiye'de kurulu tam mükellef:** Fonun Türkiye'de kurulu ve tam mükellef statüsünde olması gerekir; yabancı fonlar veya serbest bölgede kurulan yapılar kapsam dışıdır.
    - **Portföy içi/dışı ayrımı:** İstisna **yalnızca** portföy kapsamındaki menkul kıymet varlıklardan elde edilen gelirlere uygulanır. Yönetim ücreti, performans/başarı primi, portföyde kayıtlı olmayan varlıklardan gelirler vergiye tabidir.
    - **Taşınmaz geliri olmadığının teyidi:** Bu satırda (389) taşınmazdan elde edilen herhangi bir portföy geliri bulunmamalıdır. Taşınmaz varlık satışı veya kirası varsa 390 satırı kullanılır.
    - **Muhasebede ayrı hesap:** Portföy içi ve portföy dışı gelirlerin muhasebede ayrı hesap veya belgelenmiş dağıtım anahtarıyla izlenmesi zorunludur.

    ## Portföy İçi / Dışı Gelir Ayrımı

    **PORTFÖY İÇİ (İstisna — 389):**
    - Portföydeki tahvil, bono, eurobond faiz gelirleri
    - Portföydeki hisse senedi temettü/kâr payı gelirleri
    - Portföy menkul kıymet satış kazançları (hisse, tahvil, bono vb.)
    - Portföy varlıklarının dönem sonu VUK/SPK değerleme artışları
    - Repo, ters repo faiz gelirleri (portföy kapsamında)
    - Varant, sertifika, fon katılma payı değer artışları

    **PORTFÖY DIŞI (Vergiye Tabi):**
    - Yönetim ücreti, performans/başarı primi, danışmanlık komisyonu
    - Portföyde kayıtlı olmayan varlıklardan elde edilen her türlü gelir
    - Faaliyetle ilgili olmayan finansman gelirleri

    ## GVK Geçici Madde 67 — Fon Düzeyinde Stopaj

    MKYF'ler GVK Geçici Madde 67 kapsamında **fon düzeyinde stopaja** tabidir. Fon, menkul kıymet alım-satım kazançları ve faiz gelirleri üzerinden stopaj keser; bu stopaj nihai vergidir. KV beyannamesi düzeyinde 389 satırı ile kurumlar vergisi istisnası uygulanırken fon portföyünden elde edilen gelirlerin zaten fon düzeyinde stopaja tabi tutulduğu göz önünde bulundurulmalıdır. Fon ve fona yatırım yapan kurum vergilendirmesi karıştırılmamalıdır.

    ## YİAKV İlişkisi

    KVK 5/1-d (389) portföy işletmeciliği kazancı **YİAKV matrahından düşülebilir**. MKYF'nin bu satırda gösterdiği istisna tutarı, YİAKV (KVK Madde 32/C) matrahından düşülmelidir. YİAKV çalışma kâğıdında 389 tutarı matrahtan doğru biçimde düşülmelidir.

    ## Pratik Notlar

    - 3 kademe uyum kontrolü: Muhasebe portföy hesapları = çalışma kâğıdı = KV beyannamesi 389 satırı. Bu üçlü uyum YMM tasdik dosyasının temel doğrulama adımıdır.
    - Portföy yöneticisi tarafından hazırlanan dönem sonu portföy değerleme raporu dosyaya eklenmelidir.
    - Portföy işletme giderleri için karma gider dağıtımı gerekiyorsa dağıtım anahtarı yazılı ve tutarlı biçimde belgelenmelidir.
    - Aynı fon hem 389 hem 390 satırını kullanamaz; taşınmaz geliri varsa yalnızca 390 kullanılır.
    - 49 No.lu KV Genel Tebliği kapsamında tek satır ≥500.000 TL ise YMM tasdik raporu eşiği kontrol edilmelidir.
  kapi_sorulari:
    - id: mkyf_statüsü
      soru: "Kurum SPK lisanslı Menkul Kıymetler Yatırım Fonu (MKYF) mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "KVK 5/1-d: MKYF statüsü SPK kuruluş izni ve KAP kaydıyla belgelenmeli. Lisans belgesi güncel ve geçerli olmalı."
    - id: tasinmaz_geliri_yok
      soru: "Portföyde taşınmazdan (kira, satış kazancı vb.) elde edilen GELİR YOK mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "KRİTİK: 389 satırı YALNIZCA taşınmaz dışı portföy gelirleri içindir. Portföyde taşınmaz geliri varsa 390 satırı kullanılmalıdır. Her ikisi birden kullanılamaz."
    - id: portfoy_ici_disi_ayrim
      soru: "Portföy işletmeciliği kazancı, portföy DIŞI gelirlerden ayrıştırıldı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "İstisna YALNIZCA portföy kapsamındaki varlıklardan elde edilen gelirler için geçerlidir. Yönetim ücreti, danışmanlık komisyonu, başarı primi portföy dışıdır ve vergiye tabidir."
    - id: portfoy_kapsami_mevzuat
      soru: "Portföy kapsamı SPK mevzuatına (III-52.1 Tebliği) uygun tanımlandı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "MKYF portföy kapsamı SPK III-52.1 Tebliği'ne uygun olmalıdır. Portföy dışına çıkan varlıklardan elde edilen gelir istisna değildir."

