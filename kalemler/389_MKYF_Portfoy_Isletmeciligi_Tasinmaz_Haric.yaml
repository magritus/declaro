      tip: para
      zorunlu: false
      yardim: "MKYF'nin portföyündeki tahvil, Devlet İç Borçlanma Senedi (DİBS), eurobond vb. menkul kıymetlerden elde edilen faiz ve kupon gelirleri. Portföy listesiyle mutabık olmalı."
    - id: portfoy_temettu_gelirleri
      etiket: "Portföy hisse senedi temettü / kâr payı gelirleri"
      tip: para
      zorunlu: false
      yardim: "MKYF portföyündeki yerli ve yabancı hisse senetlerinden elde edilen temettü ve kâr payı gelirleri (brüt)."
    - id: portfoy_satis_kazanci
      etiket: "Portföy menkul kıymet satış kazançları (hisse, tahvil, bono, eurobond vb.)"
      tip: para
