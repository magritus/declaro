denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-d: Türkiye'de kanunların öngördüğü şekilde kurulan menkul kıymetler
  yatırım fonlarının portföy işletmeciliğinden doğan kazançları kurumlar vergisinden
  istisnadır. %100 tam istisna. 2025 beyanname döneminden itibaren 389 numaralı
  ayrı satırla gösterilmektedir (önceki dönemde 302 genel satırında yer alıyordu).

  ## Bu Satırın Kapsamı — Taşınmaz Hariç Ayrımı
  389 satırı YALNIZCA taşınmaz dışı portföy gelirlerini kapsar:
  - Hisse senedi, tahvil, bono, eurobond faiz/temettü gelirleri
  - Menkul kıymet satış kazançları
  - Repo, ters repo faiz gelirleri
  - Portföy varlıkları dönem sonu değerleme artışları
  - Varant, sertifika, fon katılma payı gelirleri

  TAŞINMAZ GELİRİ VARSA: 390 satırı kullanılır (389 ve 390 birlikte kullanılamaz).

  ## Kritik Noktalar — Portföy İçi / Dışı Ayrımı
  İstisna YALNIZCA portföy işletmeciliğinden doğan kazançlara uygulanır.

  PORTFÖY İÇİ (İstisna — 389):
  - Portföydeki menkul kıymetlerden elde edilen faiz, temettü
  - Portföy menkul kıymet satış kazançları
  - Portföy varlıkları dönem sonu değerleme artışları (VUK/SPK esasları)
  - Repo ve ters repo faiz gelirleri

  PORTFÖY DIŞI (Vergiye Tabi):
  - Yönetim ücreti, performans/başarı primi, danışmanlık komisyonu
  - Portföyde kayıtlı olmayan varlıklardan elde edilen gelirler
  - Faaliyetle ilgili olmayan finansman gelirleri

  ## GVK Geçici Madde 67 İlişkisi
  MKYF'ler GVK Geçici Madde 67 kapsamında fon düzeyinde stopaja tabidir.
  Bu stopaj, fon portföyündeki menkul kıymet alım-satım kazançları ve faiz
  gelirleri üzerinden uygulanır ve nihai vergi niteliğindedir.
  KV beyannamesi 389 satırında kurumlar vergisi düzeyindeki istisna ayrıca
  gösterilir. Fon düzeyindeki stopaj ile KV beyannamedeki istisna birbirini
  dışlamaz; her biri kendi mevzuat çerçevesinde değerlendirilir.

  ## YİAKV Etkisi
  KVK 5/1-d (389) portföy işletmeciliği kazancı YİAKV matrahından
  DÜŞÜLEBİLİR. Bu husus 302 döneminden farklı değildir; istisna tutarı
  YİAKV çalışma kâğıdında matrahtan doğru şekilde düşülmelidir.

  ## Beyanname Konumu
  "Zarar Olsa Dahi İndirilecek İstisna ve İndirimler" bölümü — 389 kodlu satır.
  2025 öncesi dönemlerde bu gelir türü 302 genel portföy işletmeciliği satırında
  gösteriliyordu. Dönem ayrımı önceki dönem karşılaştırmasında not edilmelidir.

  ## Risk Alanları
  1. Portföy dışı gelirin (yönetim ücreti vb.) 389 satırına dahil edilmesi
  2. Muhasebe portföy içi/dışı ayrımının kurulmamış olması
  3. Portföyde taşınmaz geliri varken 389 kullanılması (390 yerine)
  4. Portföy satış kazancında maliyet yöntemi tutarsızlığı (FIFO/ortalama)
  5. GVK Geçici 67 stopaj ile KV istisnası arasındaki ilişkinin yanlış kurulması
  6. Değerleme artışlarının SPK/VUK esaslarına uygun hesaplanmaması
  7. Karma gider dağıtım anahtarının belgelenmemesi

muhasebe_kayitlari: |
  ## Kayıt 1 — Portföy Menkul Kıymet Faiz Geliri Tahakkuku
  Borç: 127 Diğer Ticari Alacaklar ← Portföy MK faiz alacağı
  Alacak: 642 Faiz Gelirleri ← Portföy menkul kıymet faiz geliri
  Açıklama: KVK 5/1-d istisna kapsamı — 389 satırı. GVK Geçici 67 stopajı ayrıca kaydedilir.

  ## Kayıt 2 — Portföy Hisse Senedi Temettü Geliri
  Borç: 102 Bankalar ← Brüt temettü
  Alacak: 640 İştiraklerden Temettü Gelirleri ← Portföy hisse temettüsü
  Açıklama: KVK 5/1-d istisna — portföy hisse senedi kâr payı; 389 satırına alınır.

  ## Kayıt 3 — Portföy Menkul Kıymet Satış Kazancı
  Borç: 102 Bankalar ← Satış bedeli
  Alacak: 111-118 Menkul Kıymetler ← Maliyet (FIFO veya ağırlıklı ortalama)
  Alacak: 645 Menkul Kıymet Satış Kârı ← Satış kazancı
  Açıklama: KVK 5/1-d istisna — portföy MK satış kazancı; FIFO veya ortalama maliyet tutarlı uygulanmalı.

  ## Kayıt 4 — Portföy Varlıkları Dönem Sonu Değerleme Artışı
  Borç: 111-118 Menkul Kıymetler ← Değerleme artışı
  Alacak: 649 Diğer Olağandışı Gelir ← Portföy değerleme artışı
  Açıklama: SPK/VUK esaslarına uygun dönem sonu değerleme — KVK 5/1-d istisna (389 satırı).

  ## Kayıt 5 — Portföy Dışı Gelir (Yönetim Ücreti — Vergiye Tabi)
  Borç: 136 Diğer Çeşitli Alacaklar ← Yönetim ücreti alacağı
  Alacak: 649 Diğer Olağandışı Gelir ← Yönetim/performans ücreti
  Açıklama: PORTFÖY DIŞI — 389 satırına YAZILMAZ. Matrahta kalır; ayrı hesapta izlenmeli.

  ## Beyanname 389 Akışı (Mutabakat)
  1. Portföy içi gelirler (640, 642, 645, 649 portföy kısmı) → Net portföy kazancı
  2. Portföy dışı gelirler (yönetim ücreti vb.) → Matrahta kalır (389'e yazılmaz)
  3. KV Beyannamesi 389 Satırı: Net portföy kazancı → "Zarar Olsa Dahi İndirilecek"
  3 KADEME UYUM: Muhasebe portföy hesapları = VERİ GİRİŞİ toplamı = Beyanname 389
  KRİTİK: Taşınmaz geliri yoksa 390 yerine 389 kullanılır; her iki satır aynı anda kullanılamaz.

