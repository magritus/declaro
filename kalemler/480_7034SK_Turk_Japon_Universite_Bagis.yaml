wizard_agaci:
  tetikleyici_soru: "7034 sayılı Kanun kapsamında Türk-Japon Bilim ve Teknoloji Üniversitesi'ne (TJBTÜ) bağış yaptınız mı?"
  info_modal: |
    ## Genel Çerçeve

    **7034 sayılı Türk-Japon Bilim ve Teknoloji Üniversitesinin Kuruluşu Hakkında Kanun**
    kapsamında Türk-Japon Bilim ve Teknoloji Üniversitesi'ne (TJBTÜ) yapılan bağış ve
    yardımların **tamamı** kurumlar vergisi matrahından indirilir.

    TJBTÜ, Türkiye ile Japonya arasındaki bilimsel ve teknolojik işbirliğini geliştirmek
    amacıyla 7034 sayılı Kanunla kurulan üniversitedir.

    ## 470 (2547 s.K.) ile Fark

    - 470 (2547 s.K.): Genel yükseköğretim kurumları — tüm üniversiteler
    - 480 (7034 s.K.): TJBTÜ'ye özgü ayrı beyanname kodu

    **Kapsam dışı:** Diğer üniversitelere yapılan bağışlar → 470 kapsamına girer.

    ## İndirim Oranı

    İndirim oranı **tamamının indirimi**dir. Matrahı aşan kısım sonraki yıllara devredilemez.

    ## YİAKV İlişkisi

    **480 kapsamındaki bağış indirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.**
    YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir ancak matraha etki etmez.
  kapi_sorulari:
    - id: alici_tjbtu
      soru: "Bağış 7034 s.K. kapsamında TJBTÜ'ye mi yapıldı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Türk-Japon Bilim ve Teknoloji Üniversitesi (TJBTÜ) veya bünyesindeki birim. Diğer üniversitelere bağış → 470 (2547 s.K.). TJBTÜ'ye bağış özelinde 7034 s.K. kapsamı → 480."
    - id: fiili_odeme_yapildi
      soru: "Bağış fiilen gerçekleşti mi? (Nakdi: Banka dekontu — Ayni: Teslim belgesi)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Taahhüt aşamasındaki bağış indirime konu edilemez. Nakdi bağışta banka EFT/havale dekontu; ayni bağışta imzalı teslim tutanağı zorunludur."
    - id: makbuz_alindi
      soru: "TJBTÜ'den resmi bağış makbuzu / kabul belgesi alındı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "TJBTÜ tarafından düzenlenen resmi makbuz veya bağış kabul yazısı zorunludur."

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: nakdi_bagis_tutari
      etiket: "Nakdi bağış tutarı (TL) — Banka yoluyla TJBTÜ'ye yapılan ödemeler"
      tip: para
      zorunlu: false
      yardim: "Banka EFT/havale ile TJBTÜ'ye yapılan nakdi bağışların toplamı."
    - id: ayni_bagis_degeri
      etiket: "Ayni bağış değeri (TL) — Cihaz/ekipman/bilimsel materyalin maliyet/net defter değeri"
      tip: para
      zorunlu: false
      yardim: "Bilimsel cihaz, ekipman, kütüphane materyali gibi ayni bağışların maliyet veya net defter değeri. Piyasa değeri değil maliyet esas."
  formuller:
    toplam_bagis: "nakdi_bagis_tutari + ayni_bagis_degeri"
    istisna_tutari: "nakdi_bagis_tutari + ayni_bagis_degeri"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "nakdi_bagis_tutari >= 0 and ayni_bagis_degeri >= 0"
      hata: "Bağış tutarları negatif olamaz."
    - kural: "nakdi_bagis_tutari + ayni_bagis_degeri > 0"
      hata: "En az bir bağış türü (nakdi veya ayni) girilmelidir."

denetci_notlari: |
  ## Yasal Dayanak
  7034 sayılı Türk-Japon Bilim ve Teknoloji Üniversitesinin Kuruluşu Hakkında Kanun
  kapsamında TJBTÜ'ye yapılan bağış ve yardımların tamamı kurumlar vergisi
  matrahından indirilir.
  GİB KV Beyan Rehberi Mart 2026 (Yayın No:606) esas alınmıştır.

  ## 470 ile Fark
  470 (2547 s.K.): Genel yükseköğretim kurumları.
  480 (7034 s.K.): TJBTÜ'ye özgü ayrı beyanname kodu.
  TJBTÜ'ye bağış hem 470 hem 480'e girmez; doğru kod 480'dir.

  ## İndirim Kuralları
  - Tamamının indirimi — kazanç yüzdesiyle sınırlı değil
  - Matrahı aşan kısım sonraki yıla devredilmez

  ## Kritik Kontroller
  - Alıcı TJBTÜ (7034 s.K.) mi?
  - 470 ile mükerrer indirim riski değerlendirildi mi?
  - Fiili ödeme/teslim (taahhüt değil, gerçekleşmiş bağış)
  - TJBTÜ'den resmi makbuz/kabul yazısı

  ## YİAKV Etkisi
  480 bağış indirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir.

  ## YMM Tasdik
  İndirim tutarı ≥500.000 TL ise YMM tasdik raporu zorunludur (49 No.lu KV GT).
  Tam tasdik kapsamındaki mükelleflerde ayrıca rapor düzenlenmez.

muhasebe_kayitlari: |
  ## Nakdi Bağış Kaydı
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Bağış gideri)
  Alacak: 102 Bankalar
  Açıklama: 7034 s.K. kapsamında TJBTÜ'ye nakdi bağış.

  ## Ayni Bağış Kaydı (Stoktan)
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Maliyet bedeli)
  Alacak: 150/153 İlk Madde ve Malzeme / Ticari Mallar
  Açıklama: 7034 s.K. kapsamında TJBTÜ'ye ayni bağış.

  ## Beyanname
  Hesaplanan toplam bağış tutarı beyanname 480. satırına aktarılır.
  Matrahı aşan kısım devredilemez.

