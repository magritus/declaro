wizard_agaci:
  tetikleyici_soru: "2690 sayılı Kanun kapsamında Türkiye Nükleer Enerji Kurumu'na (TENMAK) nakdi bağış veya yardım yaptınız mı?"
  info_modal: |
    ## 2690 s.K. — TENMAK'a Bağış ve Yardım İndirimi

    2690 sayılı Türkiye Nükleer Enerji Kurumu Kanunu kapsamında **TENMAK'a** yapılan
    nakdi bağış ve yardımların **tamamı** (beyan edilen kazancı aşmamak üzere)
    kurumlar vergisi matrahından indirilir.

    ### Temel Kurallar

    - Bağış **NAKDEN** yapılmış olmalıdır (banka havalesi veya çek zorunlu).
    - Ayni bağışlar (mal, hizmet vb.) bu kalem kapsamında **değildir**.
    - İndirim **beyan edilen kazanç** ile sınırlıdır; kazancı aşan kısım ileriki dönemlere **devredilmez**.
    - TENMAK'ın **resmi makbuzu** zorunludur.

    ### Alıcı Niteliği

    Sadece **Türkiye Nükleer Enerji Kurumu (TENMAK)** bu kapsamda geçerlidir.
    TENMAK'a bağlı veya benzer isimli başka kuruluşlara yapılan bağışlar bu kalem kapsamına girmez.

    ### YİAKV İlişkisi

    484 kapsamındaki TENMAK bağış indirimi **YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ**.
    YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir ancak matraha etki etmez.
  kapi_sorulari:
    - id: alici_tenmak
      soru: "Bağış doğrudan TENMAK'a (Türkiye Nükleer Enerji Kurumu) mı yapıldı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Sadece TENMAK'a yapılan bağışlar bu kapsamdadır. TENMAK'a bağlı birimler veya benzer isimli diğer kuruluşlara yapılan bağışlar kapsam dışıdır."
    - id: nakdi_odeme
      soru: "Bağış banka havalesi veya çek ile nakden gerçekleşti mi? (Ayni bağış değil)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Mal, hizmet veya diğer ayni değerler bu kalem kapsamında değildir. Ödeme TENMAK'ın resmi banka hesabına yapılmış olmalıdır."
    - id: makbuz_alindi
      soru: "TENMAK'tan resmi bağış makbuzu veya alındı belgesi alındı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "TENMAK tarafından düzenlenen resmi makbuz veya alındı belgesi olmadan indirim uygulanamaz."
    - id: banka_dekontu_var_mi
      soru: "Ödemeye ait banka dekontu mevcut mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Banka EFT/havale dekontu veya çek ödemesine ilişkin belge zorunludur."

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: bagis_tutari
      etiket: "TENMAK'a yapılan nakdi bağış tutarı (TL)"
      tip: para
      zorunlu: true
      yardim: |
        Banka EFT/havale veya çek ile TENMAK'a yapılan nakdi bağışın toplam tutarı.
        Birden fazla ödeme varsa dönem toplamı girilir.
    - id: beyan_edilen_kazanc
      etiket: "Beyan edilen kazanç (TL) — İndirim üst sınırı kontrolü için"
      tip: para
      zorunlu: false
      yardim: |
        Bağış indirimi uygulanmadan önceki beyan edilen kazanç. Bağış bu tutarı aşamaz.
        Boş bırakılırsa sistem uyarı verir; indirimin kazanç sınırını aşmadığı YMM tarafından doğrulanmalıdır.
  formuller:
    sinirli_indirim: "min(bagis_tutari, beyan_edilen_kazanc) if beyan_edilen_kazanc else bagis_tutari"
    istisna_tutari: "sinirli_indirim"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "bagis_tutari > 0"
      hata: "Bağış tutarı sıfırdan büyük olmalıdır."
    - kural: "bagis_tutari >= 0"
      hata: "Bağış tutarı negatif olamaz."
    - kural: "beyan_edilen_kazanc >= bagis_tutari if beyan_edilen_kazanc else true"
      hata: "Uyarı: Bağış tutarı beyan edilen kazancı aşıyor. İndirim beyan edilen kazanç ile sınırlıdır; aşan kısım devredilemez."

denetci_notlari: |
  ## Yasal Dayanak

  2690 sayılı Türkiye Nükleer Enerji Kurumu Kanunu kapsamında TENMAK'a yapılan
  nakdi bağış ve yardımların TAMAMI kurumlar vergisi matrahından indirilir
  (beyan edilen kazancı aşmamak üzere).
  GİB KV Beyan Rehberi Mart 2026 (Yayın No:606) esas alınmıştır.

  ## İndirim Kuralları

  - İndirim oranı: Tamamının indirimi (KVK 10/1-c benzeri mekanizma)
  - Kazanç sınırı: Beyan edilen kazancı aşamaz
  - Devir yasağı: Kazancı aşan kısım sonraki yıla DEVREDİLEMEZ

  ## Kritik Kontroller

  NAKDİ ŞART: Bağış mutlaka banka havalesi veya çek ile nakden yapılmış olmalı.
  Ayni bağışlar (mal, hizmet, taşınmaz vb.) bu kalem kapsamında geçerli değildir.

  ALICI TEYİDİ: Sadece TENMAK (Türkiye Nükleer Enerji Kurumu) geçerlidir.
  Benzer isimli veya TENMAK'a bağlı diğer kuruluşlara yapılan bağışlar ayrıca
  değerlendirilmelidir.

  MAKBUZ ZORUNLULUĞU: TENMAK tarafından düzenlenen resmi makbuz / alındı belgesi
  olmadan indirim uygulanamaz. Banka dekontu tek başına yeterli değildir.

  FİİLİ ÖDEME: Taahhüt aşamasındaki bağış indirime konu edilemez.
  Dönemde fiilen ödenmiş bağışlar dikkate alınır.

  ## YİAKV Etkisi

  484 TENMAK bağış indirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir; matraha etki etmez.

  ## YMM Tasdik

  İndirim tutarı ≥500.000 TL ise YMM tasdik raporu zorunludur (49 No.lu KV GT).
  Tam tasdik kapsamındaki mükelleflerde ayrıca rapor düzenlenmez.

muhasebe_kayitlari: |
  ## Nakdi Bağış Kaydı
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Bağış gideri)
  Alacak: 102 Bankalar
  Açıklama: 2690 s.K. kapsamında TENMAK'a nakdi bağış.

  ## Beyanname
  Hesaplanan bağış tutarı beyanname 484. satırına aktarılır.
  Kazancı aşan kısım devredilemez; kazanç tutarı kontrol edilmeli.

