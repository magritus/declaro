wizard_agaci:
  tetikleyici_soru: "Yurt dışındaki bir iştirakın hisselerini sattın mı?"
  info_modal: |
    ## Genel Çerçeve

    KVK Madde 5/1-c kapsamındaki yurt dışı iştirak hissesi satış kazancı istisnası, Türk kurumlar
    vergisi sisteminin en seçici istisnalarından biridir. **Yalnızca tam mükellef anonim şirketler**
    tarafından kullanılabilir; limited şirketler, kooperatifler ve diğer kurum türleri bu istisnadan
    yararlanamaz. Satış kazancının tamamı (%100) kurumlar vergisinden istisnadır ve 5/1-e'nin
    aksine herhangi bir fon hesabına (549 Özel Fonlar) alınma zorunluluğu **bulunmamaktadır**.

    İstisna "Kazancın Bulunması Halinde İndirilecek" bölümünde (318. satır) gösterilir. Bu
    düzenleme, Türk anonim şirketlerinin uluslararası operasyonlarını verimli biçimde yönetmesini
    ve grup yeniden yapılandırmalarını kolaylaştırmayı amaçlamaktadır.

    ## Temel Koşullar

    KVK 5/1-c istisnasının uygulanabilmesi için **dört şartın tamamının eş zamanlı sağlanması**
    zorunludur:

    **1. Satıcı Kurum Şartı:** İstisna kullanan Türk kurum tam mükellef anonim şirket olmalıdır.
    Limited şirketler veya yabancı ortaklı yapılar bu istisnadan yararlanamaz; o kurumlar için
    KVK 5/1-e (beyanname 361 kodu, %50 oran) değerlendirilmelidir.

    **2. İştirak Niteliği:** Satılan yurt dışı iştirak, Türkiye'de tam mükellef olmayan ve yurt
    dışında kanuni ile iş merkezi bulunan bir anonim şirket ya da limited şirket niteliğinde
    olmalıdır. Partnership, trust, vakıf gibi hibrit yapılar kapsam dışındadır.

    **3. Holding Aktif Oranı (≥%75):** Satışın yapıldığı tarihten geriye doğru **1 yıl boyunca
    kesintisiz olarak** Türk şirketin nakit dışı aktifinin en az %75'inin yurt dışı iştirak
    hisselerinden oluşması gerekir. Her bir iştirak için **en az %10 sermaye payı** eşiği aranır.
    Tek bir çeyrekte bile bu oran %75'in altına düşerse şart bozulur.

    **4. Elde Tutma Süresi (730 Gün):** Satılan hisseler iktisap tarihinden itibaren aralıksız
    **en az 730 gün (2 tam yıl)** elde tutulmuş olmalıdır. 729 gün dahi bu şartı sağlamaz.
    Bölünme veya devir yoluyla elde edilen hisselerde kaynak kurumun elde tutma süresi esas
    alınabilir.

    ## Önemli Sınırlamalar ve Riskler

    **5/1-e ile Karşılaştırma:** KVK 5/1-c yalnızca AŞ'lere ve yurt dışı iştirak hisselerine
    özgüdür; %100 tam istisna sağlar ve fon hesabı gerektirmez. KVK 5/1-e ise hem AŞ hem Ltd
    kapsar, %50 istisna verir ve 549 fon zorunluluğu içerir.

    **Holding Aktif Oranı İhlali:** Satış tarihinden geriye 1 yıllık döneme bakılır; şirketin
    nakit dışı aktiflerinin ağırlıklı ortalaması değil, **her tarihteki anlık durumu** kontrol
    edilir. Dönem içinde yapılan nakde dönüşümler bu oranı bozabilir.

    **KVK 13 Transfer Fiyatlandırması:** Yurt dışı iştirak hisselerinin ilişkili kişilere (diğer
    grup şirketlerine) satışında emsal bedel analizi zorunludur. Gerçeği yansıtmayan satış bedeli
    tarhiyat riski yaratır.

    **KVK 33 Mahsup Yapılamaz:** KVK 5/1-c istisnasında yurt dışında ödenen vergiler mahsup
    edilemez; istisna tam ve nihai olduğundan bu mekanizma uygulanamaz.

    ## YİAKV İlişkisi

    KVK 5/1-c istisnası **YİAKV (KVK Madde 32/C) matrahından DÜŞÜLEMEZ.** KVK 32/C'nin (b)
    bendi kapsamında "indirim ve istisnalar" listesine dahil olmakla birlikte, yurt dışı iştirak
    hissesi satış kazancı özelinde GİB'in yorumuna göre YİAKV matrahından indirim yapılması
    mümkün değildir. Bu durum özellikle yüksek tutarlı grup yeniden yapılandırmalarında ciddi
    vergi etkisi doğurabilir.

    YİAKV hesaplaması yapılırken 318. satırdaki istisna tutarı KV matrahına **geri eklenmez**
    ancak YİAKV matrahı hesaplanırken ayrı bir kısıtlama mekanizması devreye girer. Döneminize
    ait GİB açıklamalarını ve özelgelerini mutlaka takip ediniz.

    ## Pratik Notlar

    - Satış sözleşmesi + tapu/tescil belgesi + yurt dışı ülke tescil belgesi dosyaya eklenmelidir.
    - 730 gün hesabında **takvim günü** esas alınır; iktisap ve satış tarihleri dahil sayılmaz.
    - Holding aktif oranı için dönem başı ve sonu bilançosu ile ara dönem bilançolarından yararlanılabilir.
    - Satış bedelinin tamamının aynı dönemde tahsil edilmesine gerek yoktur; ancak kazancın doğduğu
      dönem esas alınır.
    - 49 No.lu KV GT (30.12.2025) kapsamında ≥500.000 TL veya ≥1.000.000 TL istisna tutarında
      YMM tasdik raporu zorunluluğu kontrol edilmelidir.
  kapi_sorulari:
    - id: satici_as_mi
      soru: "İstisna kullanan kurum YALNIZCA tam mükellef ANONİM ŞİRKET mi? (KRİTİK)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "5/1-c'nin en kritik şartı: SADECE tam mükellef anonim şirketler kullanabilir. Ltd.Şti. için 5/1-e (361 kodu) değerlendirilmelidir."
    - id: istirak_yurtdisi_mi
      soru: "Satılan iştirakın kanuni ve iş merkezi yurt dışında mı? AŞ veya Ltd niteliğinde mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Türkiye'de tam mükellef olmamalıdır. Partnership, trust vb. yapılar kapsam dışıdır."
    - id: holding_aktif_orani
      soru: "Nakit dışı aktifinizin ≥%75'i yurt dışı iştirak hisselerinden mi oluşuyor? (Satış tarihinden geriye 1 yıl aralıksız)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Her bir iştirak için ≥%10 sermaye payı eşiği gereklidir. Tek çeyrek bile <%75 ise şart bozulur."
    - id: elde_tutma_730_gun
      soru: "Satılan hisseler en az 730 gün (2 tam yıl) elde tutuldu mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "730 güne 1 gün eksik olsa bile şart sağlanmaz. Devir/bölünmede kaynak kurum süresi esas alınabilir."
    - id: mk_ticareti_degil
      soru: "Kurumun ana faaliyet konusu menkul kıymet ticareti değil mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Ana faaliyet konusu menkul kıymet ticareti olan kurumlar bu istisnadan yararlanamaz."

parametreler:
  oran: 1.0
  min_holding_aktif_orani: 0.75
  min_elde_tutma_gun: 730

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: satis_bedeli_tl
      etiket: "Satış bedeli (TL)"
      tip: para
      zorunlu: true
      yardim: "Hissenin elden çıkarılması karşılığında alınan toplam bedel. Yabancı para ise satış tarihi TCMB kuru ile TL'ye çevirin."
    - id: defter_degeri_tl
      etiket: "Defter değeri / maliyet (TL)"
      tip: para
      zorunlu: true
      yardim: "Hissenin bilançoda kayıtlı değeri (maliyet bedeli veya düzeltilmiş tutar)."
    - id: satis_giderleri_tl
      etiket: "Satış giderleri (TL)"
      tip: para
      zorunlu: false
      yardim: "Aracılık komisyonu, noter, tescil, avukat vb. satışa özgü giderler. KVK 5/3: Bu giderlerin KKEG analizi zorunludur."
  formuller:
    satis_kazanci: "max(satis_bedeli_tl - defter_degeri_tl - satis_giderleri_tl, 0)"
    istisna_tutari: "satis_kazanci * oran"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "satis_bedeli_tl > defter_degeri_tl"
      hata: "Satış kazancı negatif veya sıfır — istisna uygulanamaz. Zarar aktarımı ayrıca değerlendirilebilir."

denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-c kapsamında yurt dışı iştirak hissesi satış kazancı istisnası.
  YALNIZCA tam mükellef anonim şirketlere uygulanır — bu 5/1-e'den temel farktır.

  ## Temel Şartlar (Kümülatif)
  ① Satıcı kurum: SADECE tam mükellef anonim şirket (AŞ)
  ② Satılan iştirak: Kanuni/iş merkezi yurt dışında olan AŞ/Ltd
  ③ Holding aktif oranı: Nakit dışı aktifin ≥%75'i yurt dışı iştirak hissesi — satış tarihinden geriye 1 yıl aralıksız
  ④ Her iştirak için ≥%10 sermaye payı
  ⑤ En az 730 gün (2 tam yıl) elde tutma
  ⑥ Ana faaliyet konusu menkul kıymet ticareti olmama

  ## Kritik Noktalar
  - 5/1-c'de 549 Özel Fonlar hesabına kayıt YAPILMAZ (5/1-e'den temel fark)
  - Satış giderleri için KVK 5/3 KKEG analizi zorunludur
  - Aktif oranı tüm dönem boyunca (sadece dönem sonu değil) sağlanmış olmalıdır
  - Devir/bölünmede elde tutma süresi kaynak kurumdaki tarihten hesaplanabilir

  ## YİAKV Etkisi
  KVK 5/1-c (318) istisnası YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdında 318 tutarı matrahtan çıkarılmamalıdır.

  ## 5/1-c (318) vs 5/1-e (361) Karşılaştırma
  318 (5/1-c): Sadece tam mükellef AŞ | Yurt dışı iştirak | %100 tam istisna | Fon hesabı GEREKMİYOR
  361 (5/1-e): Tüm tam mükellef kurumlar | %50 istisna | 549 Özel Fonlar hesabı + 5 yıl tutma ZORUNLU
  AŞ ise 5/1-c daha avantajlıdır. Ltd ise 5/1-e kullanılabilir.

  ## KVK 5/3 Gider Kısıtlaması
  İstisna kapsamındaki kazanca ilişkin satış giderleri (aracılık, noter, tescil vb.) KKEG olabilir.
  Her gider kalemi için istisna/gider ilişkisi analiz edilmeli ve belgelenmelidir.

muhasebe_kayitlari: |
  ## Kayıt 1 — Yurt Dışı İştirak Hissesi Satış Kaydı
  Borç: 102 Bankalar / 101 Alınan Çekler — Satış bedelinin tahsilatı
  Alacak: 245 Bağlı Ortaklıklar — İştirakin kayıtlı defter değerinin düşülmesi
  Borç: 631/689 Satış Giderleri — KVK 5/3 KKEG analizi zorunlu
  Alacak: 679 Diğer Olağandışı Gelir — Satış kazancı (318. satır ile eşleşmeli)

  ## Kayıt 2 — Fon Hesabına Alma GEREKMEZ (5/1-c'nin 5/1-e'den Temel Farkı)
  5/1-c (318): İstisna tutarı için 549 Özel Fonlar hesabına kayıt YAPILMAZ.
  5/1-e (361): 549 hesabı zorunludur ve en az 5 yıl tutulması şarttır.
  5/1-c kullanan kurumda 549 hesabına kayıt yapılırsa muhasebe hatasıdır.

  ## Beyanname Akışı
  1. 679 hesabındaki satış kazancı ticari kâra dahildir.
  2. KKEG tablosu: Satış giderleri KKEG olarak eklenebilir (KVK 5/3 analizi).
  3. KV Beyannamesi 318. Satır: "Zarar Olsa Dahi İndirilecek" bölümünde istisna tutarı.
  KRİTİK: 318 tutarı YİAKV matrahından ÇIKARILMAMALIDIR.

