denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Madde 14/2 (Paragraf 2): Yabancı para borç dönüşümü (375) sonrası TL araçlardan
  vade sonunda elde edilen 375+376+377 dışındaki diğer kazançlar istisnası.
  GİB KV Beyan Rehberi Mart 2026 (No:606). KVK Geçici Md.14 paketi tamamlanmıştır (370–378).

  ## 374 ile Fark (Paragraf Ayrımı)
  - 374 (Md.14/1-b, Paragraf 1): Aktif — TL KKM (mevduat/altın) diğer kazançları (altın, prim, endeks vb.)
  - 378 (Md.14/2, Paragraf 2): Pasif — Borç dönüşümü TL araç diğer kazançları
  374 ve 378 birlikte uygulanabilir — kurum her iki dönüşümü de yaptıysa ve ayrı enstrümanlarsa.

  ## Başlıca 378 Kalemleri
  ① BORÇ DÖNÜŞÜMÜ TL AVANTAJI (En tipik 378 kalemi): Yabancı para borç TL'ye dönüştürüldüğünde
  TL araç üzerinden elde edilen faiz/kâr payı (376/377) dışındaki finansal fayda.
  ② ÖZEL TL ARAÇ GETİRİSİ: Paragraf 2 dönüşümü sonrası kurulan TL araçlardan faiz/kâr payı
  dışında oluşan ek getiri (sermaye artışı, değer artış kazancı vb.).
  ③ PRİM/TEŞVİK ÖDEMESİ: Borç dönüşümü kapsamında banka/alacaklı tarafından ödenen teşvik.
  ④ DİĞER: 375/376/377 kapsamına girmediği açık olan her türlü Paragraf 2 vade sonu kazancı.

  ## 375–376–377 ile Mükerrerlik Önleme
  378 kapsamındaki kazancın 375/376/377'den farklı kalem olduğu teyit edilmeli.
  374 ile de mükerrerlik kontrolü: Paragraf 1 araçları → 374. Paragraf 2 araçları → 378.

  ## Özelge Tavsiyesi
  378'in 'diğer' niteliği 374'e göre daha tartışmalıdır. Özellikle borç avantajının
  nasıl hesaplanacağı ve belgeleneceği konusunda GİB özelgesi alınması tavsiye edilir.
  İlk uygulama döneminde risk yönetimi için öncelikli aksiyon.

  ## ★★ YİAKV ile İlişki — KVK Geçici Md.14 Dokuz Kod Tamamlandı
  378 istisnası YİAKV (KVK Md.32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdı E.7: 370–378 DOKUZ KODUN TAMAMININ DÜŞÜLEMEZ listesinde yer alması gerekir.
  Mevcut E.7 metni 370–374 veya 370–377 ile sınırlıysa 378 eklenerek güncellenmelidir.
  Güncel E.7 önerilen metin: "KKM Aktif+Pasif Kur Farkı + Faiz/Kâr Payı + Vade Kazançları
  (KVK Geçici Md.14) → DÜŞÜLEMEZ ✗ | Beyanname 370/371/372/373/374/375/376/377/378"
  YMM müteselsil sorumluluk: SM-SMMM-YMM Kanunu Md.12.

  ## Kritik Riskler
  1. 378'i YİAKV matrahından düşmek.
  2. YİAKV E.7'de 378'i unutmak (9 kod tamamı listede olmalı).
  3. 377 (kâr payı/faiz) ile 378 (diğer) ayrımını yapmamak.
  4. Paragraf 1 araçlarını (374) Paragraf 2'ye (378) yazmak.
  5. 'Diğer' niteliği tartışmalı kalemlerde özelge almaksızın istisna uygulamak.

muhasebe_kayitlari: |
  ## Kayıt 1 — Vade Sonu: Paragraf 2 Diğer Kazanç Tasfiyesi (Borç Dönüşümü TL Avantajı)
  Borç: 102 Bankalar / 300-320 Borçlar (Paragraf 2 diğer kazanç tahsilatı veya hesaplaması)
  Alacak: 646 Kambiyo Kârları / 679 Diğer Kâr / 648 Diğer Gelir (Paragraf 2 vade sonu diğer kazanç → Beyanname 378)
  Açıklama: 642 (faiz) ile karışmamalı — 378 = faiz/kâr payı dışındaki kazanç.

  ## 370–378 Tam Muhasebe Tablosu (Dokuz Kod)
  370: P1-AKT → 646/679 | Dönüşüm anı | KV 370
  371: P1-AKT → 102/648 | Ödeme dönemleri | KV 371
  372: P1-AKT → 181/642 | 31 Aralık | KV 372
  373: P1-AKT → 102/(181+642) | Vade tarihi | KV 373
  374: P1-AKT → 646/648/679 | Vade tarihi | KV 374
  375: P2-PAS → 646/679 | Dönüşüm anı | KV 375
  376: P2-PAS → 181/642 | 31 Aralık | KV 376
  377: P2-PAS → 102/(181+642) | Vade tarihi | KV 377
  378: P2-PAS → 646/648/679 | Vade tarihi | KV 378 (BU)

  ★★ KVK GEÇİCİ MD.14 PAKETİ TAMAMLANDI (370–378 DOKUZ KOD):
  Paragraf 1 (5 kod 370–374): Aktif taraf yabancı para mevduat/altın → TL KKM.
  Paragraf 2 (4 kod 375–378): Pasif taraf yabancı para borç → TL dönüşümü.
  TÜME DOKUZ KODUN TAMAMININ GELİRİ YİAKV MATRAHINDA DÜŞÜLEMEZ (E.7).

