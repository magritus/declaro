wizard_agaci:
  tetikleyici_soru: "Türkiye'de gerçekleştirilen Ar-Ge faaliyetleri sonucu elde edilen patent veya faydalı model belgeli buluşunuz var mı?"
  info_modal: |
    ## Genel Çerçeve

    KVK Madde 5/B kapsamındaki Patent Box istisnası, Türkiye'de gerçekleştirilen Ar-Ge
    faaliyetleri sonucunda elde edilen **patent veya faydalı model belgeli buluşlardan**
    kazanılan gelirlerin belirli bir kısmını kurumlar vergisinden muaf tutar. İstisna oranı
    **%50** olup bu özelliğiyle setimizin diğer istisnalarından (%100 tam istisna) köklü
    biçimde ayrışır.

    İstisna tutarı yalnızca kazancın %50'si üzerinden değil; aynı zamanda **NEXUS oranı** ile
    ağırlıklandırılarak hesaplanır. NEXUS oranı, buluşun gerçek anlamda Türkiye'deki nitelikli
    Ar-Ge faaliyetiyle ne ölçüde bağlantılı olduğunu ölçen bir filtredir.

    Bu istisna "Kazancın Bulunması Halinde İndirilecek" bölümünde (324. satır) gösterilir.
    KVK 5/B, KVK 5/1 bentlerinden ve 5/A'dan bağımsız üçüncü bir özel madde kategorisidir.

    ## Temel Koşullar

    **1. Patent veya Faydalı Model Belgesi:** Türk Patent ve Marka Kurumu (TPMK) veya yabancı
    ülke patent ofisinden (EPO, USPTO vb.) alınmış geçerli bir **patent belgesi (20 yıl)** veya
    **faydalı model belgesi (10 yıl)** zorunludur. Süresi dolan belgeler kapsam dışıdır. Tescilsiz
    buluşlar, markalar ve tasarımlar bu madde kapsamında değildir.

    **2. Türkiye'de Ar-Ge:** Buluşun Türkiye'de gerçekleştirilen Ar-Ge veya tasarım faaliyeti
    sonucunda ortaya çıkmış olması gerekmektedir. Tamamen yurt dışından satın alınan buluşlarda
    NEXUS oranı sıfır olabileceğinden istisna fiilen uygulanamaz.

    **3. %50 İstisna Oranının Teyidi:** İstisna oranı %50'dir; %100 değildir. Bu hata en sık
    karşılaşılan beyanname hatasıdır. Yanlışlıkla %100 uygulanması, tarhiyat ve vergi ziyaı
    cezası riskini doğurur.

    **4. NARGe ve TARGe Ayrıştırması:** NEXUS formülünün hesaplanabilmesi için **nitelikli Ar-Ge
    harcaması (NARGe)** ve **toplam Ar-Ge harcaması (TARGe)** ayrı ayrı tespit edilmelidir.

    ## NEXUS Formülü

    İstisna tutarı şu formülle hesaplanır:

    **İstisna Tutarı = Buluş Kazancı × min[(NARGe × 1.3) / TARGe, 1] × %50**

    - **NARGe (Nitelikli Ar-Ge):** Kurumun kendi bünyesinde Türkiye'de yaptığı harcamalar +
      ilişkisiz yurt içi taraflara (üniversiteler, bağımsız kurumlar) ödenenler + ilişkisiz
      yurt dışı taraflara ödenenler. **İlişkili kuruluşlara ödenen Ar-Ge ve satın alınan buluş
      bedeli NARGe'ye dahil edilmez.**
    - **TARGe (Toplam Ar-Ge):** NARGe + İlişkili kuruluşlara ödenen Ar-Ge + Satın alınan buluş
      bedeli. TARGe her zaman NARGe'ye eşit veya daha büyüktür.
    - **1.3 Katsayısı:** Türkiye'deki Ar-Ge'yi teşvik eder; NEXUS oranı 1'i aşamaz.
    - Kazanç türleri: Satış/Devir (C bölümü) + Lisans/Royalty (D bölümü) + İmalat Katkısı (E
      bölümü) — her biri ayrı hesaplanır ve toplanır.

    ## Önemli Sınırlamalar ve Riskler

    **%50 Oran Hatası:** Setimizin diğer istisnalarından farklı olarak bu istisna %50 ile
    sınırlıdır. %100 beyanı durumunda matrah yetersiz hesaplanmış olur.

    **NEXUS Oranının Düşüklüğü:** İlişkili taraflarla fazla Ar-Ge çalışması yapılan veya
    yüksek bedelle buluş satın alınan durumlarda NARGe/TARGe oranı düşer ve istisna tutarı
    azalır. Transfer fiyatlandırması belgesi gerekebilir.

    **Çoklu Kazanç Türü Karmaşası:** Satış, lisans ve imalat katkısı kazançları ayrı ayrı
    hesaplanmalı; aynı NEXUS oranı her birine uygulandıktan sonra toplanmalıdır.

    ## YİAKV İlişkisi

    KVK 5/B istisnası **YİAKV (KVK Madde 32/C) matrahından DÜŞÜLEBİLİR.** GİB 2026
    açıklamalarına göre 324. satırdaki istisna tutarı YİAKV matrahından indirilebilmektedir.
    Bu, özellikle yüksek buluş kazancı olan Ar-Ge yoğun şirketler için YİAKV yükümlülüğünü
    anlamlı ölçüde azaltabilir.

    ## Pratik Notlar

    - TPMK veya yabancı patent ofisi belgesi (belge no, tescil tarihi ve geçerlilik süresi görünmeli) dosyaya eklenmelidir.
    - NARGe ve TARGe ayrıştırma tablosu ilişkili/ilişkisiz taraf ayrımıyla hazırlanmalıdır.
    - Her kazanç türü (satış, lisans, imalat) ayrı hesaplanmalı ve NEXUS uygulandıktan sonra toplanmalıdır.
    - Transfer fiyatlandırması belgesi ilişkili taraf Ar-Ge ödemeleri için zorunlu olabilir.
    - 49 No.lu KV GT (30.12.2025): ≥500.000 TL veya ≥1.000.000 TL → YMM tasdik raporu zorunludur.
  kapi_sorulari:
    - id: patent_belgesi
      soru: "Türk Patent ve Marka Kurumu'ndan (veya yabancı ülke patent ofisinden) alınmış geçerli patent veya faydalı model belgeniz var mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Tescilsiz buluş, marka, tasarım kapsam dışıdır. Patent: 20 yıl, Faydalı model: 10 yıl geçerlilik."
    - id: turkiye_arge
      soru: "Buluş Türkiye'de gerçekleştirilen Ar-Ge/tasarım faaliyeti sonucu mu ortaya çıktı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Tamamen yurt dışından satın alınan buluşlarda NEXUS oranı sıfır olabilir — istisna uygulanamaz."
    - id: istisna_oran_50
      soru: "İstisna oranının %50 olduğu teyit edildi mi? (%100 değil)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "KVK 5/B istisnası %50 oranındadır. Yanlışlıkla %100 uygulanması tarhiyat riski doğurur. Bu istisna setimizin geri kalanından bu açıdan ayrışır."
    - id: nexus_hesaplandi
      soru: "NEXUS oranı için nitelikli (NARGe) ve toplam (TARGe) Ar-Ge harcamaları ayrıştırıldı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "NARGe: Türkiye'de yapılan + ilişkili kuruluş dışı taraflara ödenen Ar-Ge harcamaları. TARGe: Tüm Ar-Ge harcamaları (ilişkili + satın alınan buluş bedeli dahil)."

parametreler:
  istisna_orani: 0.50
  nexus_carpani: 1.3

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: bulus_kazanci
      etiket: "Buluştan elde edilen kazanç (satış/devir + lisans/royalty + imalat katkısı toplamı)"
      tip: para
      zorunlu: true
      yardim: "Patent veya faydalı model belgeli buluşun satışı, devri, lisansı veya imalata katkısından elde edilen toplam kazanç. Her kazanç türü (satış, lisans, imalat katkısı) ayrı hesaplanıp toplanır."
    - id: nargehy
      etiket: "Nitelikli Ar-Ge Harcaması (NARGe) — Türkiye'de yapılan ve ilişkili kuruluş dışı"
      tip: para
      zorunlu: true
      yardim: |
        NARGe üç bileşenden oluşur:
        (1) Kurumun kendi bünyesinde Türkiye'de yaptığı Ar-Ge/tasarım harcamaları (personel, malzeme, amortisman)
        (2) İlişkisiz yurt içi taraflara ödenen Ar-Ge harcamaları (üniversiteler, bağımsız araştırma kurumları)
        (3) İlişkisiz yurt dışı taraflara ödenen Ar-Ge harcamaları (yabancı bağımsız araştırma kuruluşları)
        KAPSAM DIŞI: İlişkili kuruluşlara ödenen Ar-Ge, satın alınan buluş bedeli.
    - id: targehy
      etiket: "Toplam Ar-Ge Harcaması (TARGe)"
      tip: para
      zorunlu: true
      yardim: |
        TARGe = NARGe + İlişkili kuruluşlara ödenen Ar-Ge harcamaları + Satın alınan buluş bedeli.
        TARGe her zaman NARGe'den büyük veya eşittir.
  formuller:
    narge_carpili: "nargehy * 1.3"
    nexus_orani: "min((nargehy * 1.3) / targehy, 1)"
    istisna_tutari: "max(bulus_kazanci * min((nargehy * 1.3) / targehy, 1) * 0.50, 0)"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "bulus_kazanci > 0"
      hata: "Buluş kazancı pozitif olmalıdır — kazanç yoksa istisna uygulanamaz"
    - kural: "targehy > 0"
      hata: "Toplam Ar-Ge harcaması (TARGe) sıfır olamaz"
    - kural: "nargehy <= targehy"
      hata: "Nitelikli Ar-Ge harcaması (NARGe) toplam Ar-Ge harcamasını (TARGe) aşamaz"
    - kural: "nargehy >= 0"
      hata: "Nitelikli Ar-Ge harcaması negatif olamaz"

denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/B: Türkiye'de yapılan Ar-Ge faaliyetleri sonucu elde edilen patent/faydalı model
  belgeli buluşlardan elde edilen kazançların %50'si KV'den istisnadır.

  ## 324'ün Setteki 3 Temel Farkı
  (1) %50 İSTİSNA: Setimizin geri kalanı %100 tam istisna; 324'te istisna %50 ile sınırlıdır.
  (2) NEXUS ORANI: İstisna tutarı Türkiye'deki nitelikli Ar-Ge harcaması / Toplam Ar-Ge harcaması
      oranına göre ağırlıklandırılır — setimizin tek formüllü istisna hesabı.
  (3) ÇOKLU KAZANÇ TÜRÜ: Satış/Devir + Lisans/Royalty + İmalat Katkısı — her biri ayrı hesaplanır.
  KVK 5/B: 5/1 bentleri değil, 5/A değil — üçüncü özel madde kategorisi.

  ## NEXUS Formülü (Tam)
  İstisna Tutarı = Buluş Kazancı × min[(NARGe × 1.3) / TARGe, 1] × %50
  - NARGe: Nitelikli Ar-Ge (Türkiye'de + ilişkisiz yurt dışı)
  - TARGe: Toplam Ar-Ge (hepsi dahil — ilişkili + satın alınan buluş bedeli)
  - 1.3 katsayısı: Türkiye'deki Ar-Ge'yi teşvik eder, NEXUS 1'i aşamaz
  - NEXUS %100 ise istisna doğrudan buluş kazancının %50'sidir

  ## Kritik Noktalar
  - %50 oranı (setimizin diğer istisnalarından farklı) — %100 uygulanması tarhiyat riski
  - NEXUS oranı buluşun Türkiye bağlantısını ölçer
  - Satış/Devir (C bölümü) + Lisans/Royalty (D bölümü) + İmalat Katkısı (E bölümü) — ayrı hesaplanır
  - Türk Patent ve Marka Kurumu belgesi zorunlu (veya yabancı ülke patent ofisi)
  - Patent: 20 yıl, Faydalı model: 10 yıl — süresi dolan belge kapsam dışı
  - YİAKV matrahından düşülebilir (GİB 2026 açıklamalarına göre)
  - 49 No.lu Tebliğ (30.12.2025): ≥500.000 TL veya ≥1.000.000 TL → YMM raporu zorunlu

  ## Belge Zorunluluğu
  Patent/Faydalı Model Belgesi + NARGe/TARGe ayrıştırma tablosu + Kazanç türü ayrımı (satış/lisans/imalat)

muhasebe_kayitlari: |
  ## İstisna Kaydı
  Muhasebe kaydı yapılmaz — KV beyannamesinde 324. satıra istisna tutarı yazılır.

  ## Royalty/Lisans Geliri
  Borç: 120/102 Alıcılar / Bankalar
  Alacak: 642 Faiz Gelirleri (veya 600 Satışlar)
  Açıklama: Lisans/royalty geliri — 324 satırında istisna uygulanır

  ## Patent/Faydalı Model Satış Geliri
  Borç: 120/102 Alıcılar / Bankalar
  Alacak: 679 Diğer Olağandışı Gelir (veya 600)
  Açıklama: Patent satış/devir kazancı — 324 satırında %50 istisna uygulanır

