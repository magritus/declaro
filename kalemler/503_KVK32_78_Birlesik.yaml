      tip: uzlastirma
      kaynak_alan: ara_donem_kari
      yardim: >
        Gelir tablosunun alt satırındaki Dönem Kârı ile sisteme girilen
        Ticari Bilanço Kârını karşılaştırır. Fark varsa kayıt dışı kalemler,
        KKEG ya da geçici farklar nedeniyle oluşuyor olabilir. Hesaplama
        doğruluğu için mümkün olduğunca uyumlu olması önerilir.

    # ── BÖLÜM 8: KV MATRAHI VE UYGULAMA SEÇENEKLERİ ────────────────────────
    - id: bolum_indirim_uygulama
      etiket: "KV MATRAHI VE 32/7 – 32/8 UYGULAMA SEÇENEKLERİ"
      tip: bolum

    - id: imalat_32_7_uygulansin_mi
      etiket: "32/7 İmalat İndirimi uygulanacak mı?"
      tip: evet_hayir
      zorunlu: true
      yardim: "Güncel sanayi sicil belgesi olan ve imalat faaliyeti yürüten kurumlar için Evet seçin."

    - id: ihracat_32_8_uygulansin_mi
      etiket: "32/8 İhracat İndirimi uygulanacak mı?"
      tip: evet_hayir
      zorunlu: true
      yardim: "İhracat hasılatı olan kurumlar için Evet seçin."

    - id: normal_kv_orani
      etiket: "Normal KV Oranı (%)"
      tip: sayi
      zorunlu: true
      varsayilan: 25
      yardim: "2024 ve 2025 için %25. Finans kurumları %30 uygular."

  formuller:
    # ── A: Brüt Satışlar (toplam = ihracat + imalat + diger, form tarafından otomatik hesaplanır)
    brut_satis_ihracat: "yurtici_satis_ihracat + yurtdisi_satis_ihracat + diger_gelirler_ihracat"
    brut_satis_imalat: "yurtici_satis_imalat + yurtdisi_satis_imalat + diger_gelirler_imalat"
    brut_satis_toplam: "yurtici_satis_toplam + yurtdisi_satis_toplam + diger_gelirler_toplam"

    # ── B: Satış İndirimleri (-)
    satis_indirimleri_ihracat: "satis_iadeleri_ihracat + satis_iskontolari_ihracat + diger_indirimler_ihracat"
    satis_indirimleri_imalat: "satis_iadeleri_imalat + satis_iskontolari_imalat + diger_indirimler_imalat"
    satis_indirimleri_toplam: "satis_iadeleri_toplam + satis_iskontolari_toplam + diger_indirimler_toplam"

    # ── C: Net Satışlar — hasılat oranlarının kaynağı
    net_satis_ihracat: "brut_satis_ihracat - satis_indirimleri_ihracat"
    net_satis_imalat: "brut_satis_imalat - satis_indirimleri_imalat"
    net_satis_toplam: "brut_satis_toplam - satis_indirimleri_toplam"

    # ── Hasılat Dağılım Oranları (matrah ayrıştırması için)
    ihracat_hasilat_orani: "net_satis_ihracat / net_satis_toplam"
    imalat_hasilat_orani: "net_satis_imalat / net_satis_toplam"

    # ── D: Satışların Maliyeti (-)
    satislarin_maliyeti_toplam: "satilan_mamul_toplam + satilan_ticari_mal_toplam + satilan_hizmet_toplam"

    # ── Brüt Satış Kârı
    brut_satis_kari: "net_satis_toplam - satislarin_maliyeti_toplam"

    # ── E: Faaliyet Giderleri (-)
    faaliyet_giderleri_toplam: "arge_giderleri_toplam + pazarlama_satis_toplam + genel_yonetim_toplam"

    # ── Faaliyet Kârı
    faaliyet_kari: "brut_satis_kari - faaliyet_giderleri_toplam"

    # ── Dönem Kârı (yalnızca görsel ara hesaplama; matrah için kv_matrahi_giris kullanılır)
    donem_kari: "faaliyet_kari + diger_faaliyet_gelirleri_toplam - diger_faaliyet_giderleri_toplam - finansman_giderleri_toplam + olaganidisi_gelirler_toplam - olaganidisi_giderler_toplam"

    # ── Faaliyet Bazında Matrah Dağılımı (kv_matrahi_giris oransal yöntemle bölünür)
    ihracat_matrahi: "kv_matrahi_giris * ihracat_hasilat_orani"
    imalat_matrahi: "kv_matrahi_giris * imalat_hasilat_orani"
    diger_matrahi: "kv_matrahi_giris - ihracat_matrahi - imalat_matrahi"

    # ── KV Tasarrufları
    kv_tasarrufu_32_7: "imalat_matrahi * 1 / 100"
    kv_tasarrufu_32_8: "ihracat_matrahi * 5 / 100"
    istisna_tutari: "kv_tasarrufu_32_7 + kv_tasarrufu_32_8"

  sonuc_alan: istisna_tutari

  ek_sonuc_alanlari:
    - kv_tasarrufu_32_7
    - kv_tasarrufu_32_8
    - ihracat_matrahi
    - imalat_matrahi
    - diger_matrahi
    - ihracat_hasilat_orani
    - imalat_hasilat_orani
    - donem_kari

  validasyonlar:
    - kural: "net_satis_toplam > 0"
      hata: "Net satışlar toplamı sıfırdan büyük olmalıdır."
    - kural: "kv_matrahi_giris > 0"
      hata: "KV matrahı pozitif olmalıdır. Zarar durumunda 32/7 ve 32/8 uygulanamaz."
    - kural: "ihracat_hasilat_orani + imalat_hasilat_orani <= 1"
      hata: "İhracat + imalat hasılat oranları toplamı 1'i (100%) aşamaz."

denetci_notlari: |
  ## Yasal Dayanak

  **KVK Madde 32/7** kapsamında sanayi sicil belgesi sahibi imalatçılara imalat
  faaliyetinden elde edilen kazanç üzerinden 1 puan (%24 efektif) indirim uygulanır.
  6772 sayılı Kanun ile 01.01.2022 tarihinden itibaren yürürlüktedir.

  **KVK Madde 32/8** kapsamında ihracatçılara ihracat faaliyetinden elde edilen
  kazanç üzerinden 5 puan (%20 efektif) indirim uygulanır. 7491 sayılı Kanun ile
  01.01.2023 tarihinden itibaren yürürlüktedir.

  Bu kalem her iki indirimi tek bir gelir tablosu üzerinden birlikte hesaplar;
  matrah dağılımı net satışlar içindeki faaliyet payına (oransal yöntem) göre yapılır.

  ## Hesaplama Özeti

  1. Gelir tablosu tek seferinde girilir (brüt satışlar faaliyet bazında ayrıştırılır)
  2. Net satışlar içindeki ihracat ve imalat payları → hasılat oranları hesaplanır
  3. KV matrahı (safi kurum kazancı) bu oranlarla faaliyet paylarına bölünür
  4. 32/7: imalat matrahına 1 puan → tasarruf = imalat matrahı × %1
  5. 32/8: ihracat matrahına 5 puan → tasarruf = ihracat matrahı × %5
  6. Toplam KV tasarrufu = 32/7 tasarrufu + 32/8 tasarrufu

  ## Gerçek Usul ile Oransal Yöntem Farkı

  - **Oransal yöntem (varsayılan):** Gelir/gider dağılımı net satışlar içindeki
    hasılat payına göre matematiksel olarak yapılır.
  - **Gerçek usul:** Gelir ve giderlerin doğrudan faaliyet bazında izlendiği
    durumlarda faaliyet payları doğrudan girilebilir; kalan 'Diğer' payı
    formül tarafından otomatik hesaplanır.

  ## 32/A YTB ile Çakışma Riski

  KVK 32/A YTB (Yatırım Teşvik Belgesi) indirimi ile birlikte uygulanacaksa
  32/7 imalat matrahı + 32/8 ihracat matrahı + 32/A matrahı toplamı KV matrahını
  aşmamalıdır. Matrah çakışması durumunda öncelik sırası mükellef tercihine
  bırakılmış olup içtihat incelenmelidir.

  ## Beyanname Satırları

  - KVK 32/7 matrahı → Beyanname 730. satır
  - KVK 32/8 matrahı → Beyanname 740. satır
  - Her iki satır birlikte doldurulabilir; matrahlar birbirini dışlamaz.

  ## YİAKV Etkisi

  Bu kalem YİAKV (KVK 32/C) matrahından düşülmez (yiakv_etkisi: dusulmez).
  32/7 ve 32/8 indirimleri gelir tablosuna yansıtılmaz; yalnızca KV beyannamesi
  üzerinde etkilidir.

muhasebe_kayitlari: |
  ## Gelir Tablosu Kaydı

  32/7 ve 32/8 indirimleri finansal tablolara yansıtılmaz. Vergisel indirim
  yalnızca KV beyannamesinde ve vergi gideri hesaplamasında etkilidir.

  ## Ertelenmiş Vergi Etkisi (TMS 12 / TFRS Kapsamındaki Şirketler)

  İndirimli KV oranının uygulandığı faaliyetlere ilişkin geçici farklar için
  ertelenmiş vergi hesaplanırken ilgili faaliyet matrahına uygulanan efektif
  oran kullanılmalıdır (%24 imalat, %20 ihracat, %25 diğer).

  ## Beyanname

  32/7: Kurumlar vergisi hesaplanırken imalat matrahına %24 oran uygulanır;
  normal oran (%25) ile fark (1 puan) tasarruf olarak hesaplanır.
  Beyanname 730. satırına imalat matrahı aktarılır.

  32/8: İhracat matrahına %20 oran uygulanır; normal oran (%25) ile fark
  (5 puan) tasarruf olarak hesaplanır.
  Beyanname 740. satırına ihracat matrahı aktarılır.

