        - id: olaganidisi_gelirler
          etiket: "  Olağandışı Gelirler (670-679)"
        - id: bolum_j
          etiket: "J — OLAĞANDIŞI GİDERLER (-)"
          tip: bolum
        - id: olaganidisi_giderler
          etiket: "  Olağandışı Giderler (680-689)"
        - id: ara_donem_kari
          etiket: "= DÖNEM KÂRI / ZARARI (Faaliyet Kârı + F − G − H + I − J)"
          tip: ara_toplam
          bilesenler:
            - { satir: yurtici_satis, isaret: 1 }
            - { satir: yurtdisi_satis, isaret: 1 }
            - { satir: diger_gelirler, isaret: 1 }
            - { satir: satis_iadeleri, isaret: -1 }
            - { satir: satis_iskontolari, isaret: -1 }
            - { satir: diger_indirimler, isaret: -1 }
            - { satir: satilan_mamul, isaret: -1 }
            - { satir: satilan_ticari_mal, isaret: -1 }
            - { satir: satilan_hizmet, isaret: -1 }
