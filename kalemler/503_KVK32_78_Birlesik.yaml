wizard_agaci:
  tetikleyici_soru: "Dönem içinde imalat faaliyeti veya ihracat geliri var mı?"
  info_modal: |
    ## Genel Çerçeve

    **KVK Md.32/7** sanayi sicil belgesi sahibi imalatçılara imalat faaliyetinden
    elde edilen kazanç üzerinden **1 puan indirim (%24 efektif)** uygular.

    **KVK Md.32/8** ihracat faaliyetinden gelir elde eden kurumlara ihracat
    kazancı üzerinden **5 puan indirim (%20 efektif)** uygular.

    ## Birlikte Uygulama

    Aynı dönemde her iki indirim birlikte uygulanabilir. Bu kalem gelir tablosunu
    **tek seferinde** alır ve her iki hesaplamayı otomatik olarak yapar.
    Matrah dağılımı net satışlar içindeki faaliyet payına (oransal yöntem) göre
    belirlenir; gerçek usul takip edilen durumlarda doğrudan girilebilir.

    ## Faaliyet Bazında Matrah Ayrıştırması

    | Faaliyet | KV Oranı | İndirim Puanı | Efektif Oran |
    |----------|----------|---------------|--------------|
    | İmalat (32/7) | %25 | 1 puan | %24 |
    | İhracat (32/8) | %25 | 5 puan | %20 |
    | Diğer | %25 | — | %25 |

    ## 32/A YTB ile Birlikte Uygulama

    32/A YTB indirimi ile birlikte uygulanacaksa matrahların toplamı KV matrahını
    aşmamalıdır. Matrah çakışması riski yüksek; K6 kontrol kalemi ile doğrulayın.

    ## Yürürlük

    - 32/7: 6772 sayılı Kanun ile 01.01.2022'den itibaren
    - 32/8: 7491 sayılı Kanun ile 01.01.2023'ten itibaren
  kapi_sorulari:
    - id: imalat_veya_ihracat_var_mi
      soru: "İmalat faaliyeti (32/7) veya ihracat geliri (32/8) var mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "En az biri uygulanabilir olmalıdır. Sanayi sicil belgesi olmasa bile ihracat faaliyeti tek başına 32/8'i açar."
    - id: kv_matrahi_pozitif_mi
      soru: "Dönem kurumlar vergisi matrahı pozitif mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "32/7 ve 32/8 yalnızca pozitif matrahta uygulanır. Zarar durumunda indirim uygulanamaz ve devretmez."
    - id: sanayi_sicil_var_mi
      soru: "32/7 için: Güncel sanayi sicil belgeniz var mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Yalnızca 32/8 uygulayacaksanız (imalat faaliyeti yoksa) Hayır seçebilirsiniz; sistem 32/7 hesabını devre dışı bırakır."

parametreler:
  imalat_indirim_puani: 1
  ihracat_indirim_puani: 5
  normal_kv_orani_varsayilan: 25
  imalat_efektif_oran: 24
  ihracat_efektif_oran: 20
  pipeline_matrah: true

