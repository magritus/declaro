denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 10/1-f: Türkiye Kızılay Derneğine makbuz karşılığında yapılan
  nakdi bağış ve yardımların tamamı matrahtan indirilir.
  GİB KV Beyan Rehberi Mart 2026 (Yayın No:606) esas alınmıştır.

  ## !! AYNİ BAĞIŞ UYARISI — KRİTİK !!
  Kızılay'a yapılan AYNİ bağış (gıda, giyim, ilaç, ekipman, malzeme vb.)
  KVK Md.10/1-f kapsamında İNDİRİLEMEZ — kapsam dışıdır.
  Ayni bağış KKEG'e alınır ve matrahtan düşülemez → Net KV yükü doğurur.
  Kızılay'a yardım planlanıyorsa nakdi bağış tercih edilmeli.

  ## İndirim Kuralları
  - YALNIZCA NAKDİ bağış indirim konusu
  - Tamamının indirimi — kazanç yüzdesiyle sınırlı değil
  - Matrahı aşan kısım sonraki yıla devredilmez

  ## Kritik Kontroller
  - Alıcının Türkiye Kızılay Derneği olduğu teyit edilmeli
  - Ödemenin banka yoluyla (EFT/havale) yapıldığı dekontla kanıtlanmalı
  - Kızılay'dan resmi makbuz alınmalı
  - Ayni bağış yapılmışsa ayrı KKEG kaydı — beyanname 462'ye dahil edilmez

  ## YİAKV Etkisi
  462 nakdi bağış indirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir.

  ## YMM Tasdik
  İndirim tutarı ≥500.000 TL ise YMM tasdik raporu zorunludur (49 No.lu KV GT).

  ## 462 ile 463 Farkı
  462: Türkiye Kızılay Derneği (KVK Md.10/1-f)
  463: Türkiye Yeşilay Cemiyeti (KVK Md.10/1-f)
  Her iki kod için de aynı bent ve aynı kısıtlama (yalnızca nakdi) geçerlidir.

muhasebe_kayitlari: |
  ## Nakdi Bağış Kaydı
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (Bağış gideri)
  Alacak: 102 Bankalar
  Açıklama: KVK Md.10/1-f kapsamında Kızılay nakdi bağış.

  ## Ayni Bağış Varsa (Kapsam Dışı — KKEG)
  Borç: 689 Diğer Olağandışı Gider ve Zararlar (KKEG — Maliyet bedeli)
  Alacak: 150/153 İlk Madde ve Malzeme / Ticari Mallar
  Açıklama: Kızılay'a ayni bağış — KVK Md.10/1-f kapsamı dışı, KKEG.
  NOT: Ayni bağış beyanname 462'ye dahil edilmez.

  ## Beyanname
  Yalnızca nakdi bağış tutarı beyanname 462. satırına aktarılır.
  Matrahı aşan kısım devredilemez.

