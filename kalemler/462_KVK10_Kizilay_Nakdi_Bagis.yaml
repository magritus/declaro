wizard_agaci:
  tetikleyici_soru: "Türkiye Kızılay Derneğine banka yoluyla nakdi bağış yaptınız mı?"
  info_modal: |
    ## Genel Çerçeve

    **KVK Madde 10/1-f** kapsamında, **Türkiye Kızılay Derneğine** makbuz
    karşılığında yapılan **nakdi bağış ve yardımların tamamı** kurumlar vergisi
    matrahından indirilir.

    ## !! KRİTİK UYARI — YALNIZCA NAKDİ BAĞIŞ !!

    **KVK Md.10/1-f kapsamında YALNIZCA NAKDİ bağış indirim konusu olabilir.**

    Kızılay'a yapılan **AYNİ bağış ve yardımlar** (gıda, giyim, ilaç, ekipman,
    malzeme vb.) **KVK Md.10/1-f kapsamında İNDİRİLEMEZ** — kapsam dışıdır.

    Ayni bağış yapıldıysa bu tutar KKEG'e alınır ve kurumlar vergisi matrahından
    düşülemez → Net KV yükü doğurur.

    **Kızılay'a yardım planlanıyorsa nakdi bağış tercih edilmeli.**

    ## Ödeme Koşulu

    Nakdi bağış, **Türkiye Kızılay Derneğinin resmi banka hesabına doğrudan**
    EFT/havale ile yapılmalıdır. Üçüncü kişi hesabına ödeme → kapsam riski.

    ## İndirim Oranı

    İndirim oranı **tamamının indirimi**dir. Matrahı aşan kısım sonraki yıllara
    **devredilemez**.

    ## YİAKV İlişkisi

    **KVK Md.10/1-f kapsamındaki bağış indirimi YİAKV (KVK 32/C) matrahından
    DÜŞÜLEMEZ.** YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir.
  kapi_sorulari:
    - id: kizilay_alici
      soru: "Bağış Türkiye Kızılay Derneğine mi yapıldı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Alıcı: Türkiye Kızılay Derneği. Türk Kızılay'ın yurt dışı birimleri, bağlı vakıf veya şirketler → Teyit gerekli. Başka yardım kuruluşu (Kızılhaç, UNICEF vb.) → Kapsam dışı."
    - id: nakdi_mi
      soru: "Bağış NAKDİ mi? (Ayni bağış = Kapsam dışı — KKEG!)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "★ EN KRİTİK KONTROL: Nakdi bağış → 462 kapsamı. Ayni bağış (gıda/giyim/ilaç/ekipman) → KVK Md.10/1-f KAPSAMI DIŞI. Ayni bağış KKEG'e alınır, matrahtan düşülemez."
    - id: kizilay_hesabina_odeme
      soru: "Ödeme Kızılay'ın resmi banka hesabına doğrudan yapıldı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Kızılay'ın resmi banka hesabına EFT/havale. Üçüncü şahıs hesabına ödeme → Kapsam riski. Nakit ödeme → Banka kaydı olmadan risk."
    - id: makbuz_alindi
      soru: "Türkiye Kızılay Derneğinden resmi bağış makbuzu alındı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Türkiye Kızılay Derneği tarafından düzenlenen resmi makbuz zorunludur. Makbuz olmadan 462 uygulanması riski."

