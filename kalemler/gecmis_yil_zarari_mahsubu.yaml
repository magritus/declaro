denetci_notlari: |
  ## Yasal Dayanak — KVK Madde 9 Özeti

  KVK Madde 9/1: Kurumlar vergisi beyannamesinde her yıla ilişkin tutarlar ayrı ayrı gösterilmek ve beş yıldan fazla nakledilmemek koşuluyla, önceki dönemlere ait geçmiş yıl zararları kurum kazancından mahsup edilebilir.
  KVK Madde 9/2: Yurt dışı faaliyetlerden doğan zararların mahsubunda ilave şartlar geçerlidir (tam beyan, yurt dışında kapatılmamış olma ve belgeleme).
  KVK Madde 12: Örtülü sermaye faiz/kur farkı giderleri KKEG → Bu giderlerden doğan zarar kısmı mahsup kapsamı dışında.
  KVK Madde 13: TF uyumsuzluğundan doğan örtülü kazanç dağıtımı → KKEG eklenmesi sonrası kalan zarar mahsup edilebilir.
  1 Seri No.lu KV GT: 9. madde uygulamasına ilişkin ayrıntılı açıklamalar ve örnekler.

  ## Tip 1 vs Tip 2 Ayrımı

  Beyannamede gecmisYilZararTipleri XML bloğunda iki farklı tip kodu kullanılır:
  - Tip 1 — Diğer Zararlar: Normal ticari faaliyet sonucunda oluşan, örtülü sermaye ve TF düzeltmeleri sonrası kalan zarar.
  - Tip 2 — İstisnadan Kaynaklanan Zararlar: KVK 5/1-e (taşınmaz/hisse satışı), TGB, AR-GE gibi istisna kapsamındaki faaliyetlerde dönem zararı oluşmuşsa bu tutarlar. 7456 sayılı Kanun sonrasında bazı istisna kazançlarının oransal değişimiyle birlikte Tip 2 zararlar önem kazanmıştır.
  Her iki tip de beyannamede ayrı satırlarda gösterilmeli; muhasebede de yıl ve tip bazında izlenmelidir.

  ## 5 Yıl Zamanaşımı Tablosu (2025 Beyannamesi)

  | Zarar Yılı | Durum            | Mahsup Edilebilir mi? |
  |------------|------------------|-----------------------|
  | 2019       | Zamanaşımı doldu | HAYIR                 |
  | 2020       | 5. yıl (son)     | EVET — Son yıl        |
  | 2021       | 4. yıl           | EVET                  |
  | 2022       | 3. yıl           | EVET                  |
  | 2023       | 2. yıl           | EVET                  |
  | 2024       | 1. yıl (en yeni) | EVET                  |

  2026 beyannamesi için: 2020 zararı zamanaşımına uğrar; tablo 2021–2025 olarak güncellenir.

  ## FIFO Uygulaması

  Mahsup sırası yasa gereği sabittir: En eski yıl önce. Mükellefin tercih hakkı yoktur.
  Örnek: 2025 matrahı 1.000.000 TL; 2020'de 600.000 TL, 2021'de 800.000 TL zarar varsa:
  → Önce 2020'nin 600.000 TL'sinin tamamı mahsup edilir.
  → Kalan 400.000 TL için 2021 zararından mahsup yapılır.
  → 2021'den 400.000 TL mahsup edilir; geriye 400.000 TL 2021 zararı bir sonraki yıla devreder.

  ## Örtülü Sermaye (KVK 12) Kısıtlaması

  Şirketin ilişkili kişilerden yüksek tutarda borç kullandığı durumlarda, bu borçlanmadan kaynaklanan faiz giderleri ve kur farkı giderleri KVK 12 uyarınca KKEG sayılabilir. Bu durumda:
  - Zararlı dönemde KKEG düzeltmesi yapılarak "düzeltilmiş zarar" hesaplanmalıdır.
  - Düzeltme yapılmamış ham zarar rakamları beyannamede kullanılamaz.
  - Denetçi, zararlı her dönem için KVK 12 değerlendirmesi yapıldığını teyit etmelidir.

  ## Transfer Fiyatlandırması (KVK 13) Kısıtlaması

  İlişkili taraflarla gerçekleştirilen emsalsiz işlemlerden örtülü kazanç dağıtımı yapıldığı saptanırsa, dağıtılan kazanç KKEG olarak eklenir. Bu düzeltme geçmiş dönemlere ait zarar rakamlarını da etkiler. TF analizi tamamlanmadan hesaplanan zarar tutarlarının kullanılması vergi riski doğurur.

  ## Yurt Dışı Zarar — KVK Madde 9/2 Özel Şartları

  Yurt dışı şube veya daimi temsilci faaliyetlerinden kaynaklanan zararların Türkiye'de mahsup edilebilmesi için şu koşulların tamamı sağlanmalıdır:
  1. Yurt dışı faaliyet Türkiye'de tam konsolidasyon usulünde beyan edilmiş olmalı (yurt dışı gelirler ve giderler Türkiye beyannamesine dahil).
  2. Faaliyet ülkesi mevzuatına göre söz konusu zararın mahsup imkânı tüketilmiş olmalı (yani yurt dışında henüz kapatılabilir zarar varsa önce orada kapatılmalı).
  3. Denetimden geçmiş yurt dışı mali tablolar ve vergi beyannameleri dosyada bulunmalı.
  4. Türkiye'de mahsup edilen yurt dışı zarar, ilerleyen yıllarda yurt dışında da kâra dönüşürse bu kâr Türkiye beyannamesine eklenerek düzeltme yapılmalıdır.

  ## YİAKV Etkisi — Kritik Ayrım

  Geçmiş yıl zararları mahsubu, KVK 32/C kapsamındaki YİAKV (Yurt İçi Asgari Kurumlar Vergisi) matrahından DÜŞÜLEMEZ.
  - Normal KV matrahı akışı: Dönem mali kârı → GYZ mahsubu → KVI istisnalar → Matrah
  - YİAKV matrahı: Ticari kâr + KKEG − belirli istisnalar (GYZ mahsubu YİAKV'dan çıkarılmaz)
  YİAKV çalışma kâğıdında GYZ mahsubu satırı yer almamalıdır. Bu hatanın gözden kaçırılması, YİAKV matrahının düşük hesaplanmasına ve eksik tarhiyata yol açar.

  ## Pipeline İçindeki Yeri — Hesaplama Adım Sırası

  Adım 1: Ticari Kâr (muhasebe tabanlı)
  Adım 2: + KKEG eklemeleri
  Adım 3: + Diğer eklemeler (finansman fonu vb.)
  Adım 4: − ZDI istisnalar (zarar olsa dahi indirilecek — örn. iştirak kâr payları)
  Adım 5: = Dönem Mali Kârı
  Adım 6: − GYZ Mahsubu (Tip 1 + Tip 2; dönem mali kârını aşamaz)  ◄── BU KALEM
  Adım 7: − KVI istisnalar (kazanç varsa indirilecek — örn. taşınmaz, TGB)
  Adım 8: − Diğer indirimler (Ar-Ge, nakdi sermaye, sponsorluk)
  Adım 9: = Kurumlar Vergisi Matrahı

  GYZ mahsubu ZDI'dan sonra, KVI'den önce gelir. Dönem mali kârı sıfır veya negatifse GYZ mahsup edilemez; zarar miktarı ertesi döneme taşınmaz (o yılın zararı olarak kalır, 5 yıl sayacı işlemeye devam eder).

muhasebe_kayitlari: |
  ## Kayıt 1 — Zararın Oluştuğu Dönemde Yıl Sonu Kapanış

  Dönem sonunda net zarar oluştuğunda:
  Borç: 590 Dönem Net Zararı — Dönem ticari zararı tutarı
  Alacak: 580 Geçmiş Yıllar Zararları — Geçen yıla devir (ya da aynı hesapta biriktirilir)
  NOT: Her yılın zararı ayrı alt hesap veya kayıt düzeyinde takip edilmelidir. 580 hesabı yıl bazlı izlenebilir (örn. 580.2020, 580.2021 vb.) ya da muhasebe dışında ayrı tablo tutulmalıdır.

  ## Kayıt 2 — Cari Dönemde GYZ Mahsup Kararı (Dönem Sonunda)

  GYZ mahsubu vergi beyannamesi aşamasında hesaplanır; muhasebe kaydı dönem kârıyla karşılaştırma esasına göre yapılır.
  Mahsup edilen tutarın muhasebe kaydı:
  Borç: 580 Geçmiş Yıllar Zararları — Mahsup edilen geçmiş yıl zarar tutarı
  Alacak: 570 Geçmiş Yıllar Kârları / 590 Dönem Net Kârı — Dönem kârıyla kapatma
  NOT: Vergi matrahında yapılan GYZ mahsubu, gelir tablosunu etkilemez; sadece vergi matrahı hesaplamasını düşürür. 580 ve 570/590 arasındaki kayıt özkaynak dengesini düzeltir.

  ## Beyanname Akışı (Vergi Boyutu)

  1. Muhasebe kayıtlarından gelen ticari kâr KV beyannamesine aktarılır.
  2. KKEG ve diğer eklemeler yapılarak dönem mali kârına ulaşılır.
  3. ZDI istisnalar dönem mali kârından düşülür.
  4. Kalan dönem mali kârı pozitifse, GYZ mahsup tutarı (Tip 1 + Tip 2, yıl sırasıyla FIFO) dönem mali kârını aşmayacak biçimde beyannamede gösterilir.
  5. GYZ mahsuptan sonra kalan tutardan KVI istisnalar ve diğer indirimler düşülür; sonuç matrah olarak tarhiyata esas alınır.
  6. Mahsup edilen zarar tutarları 580 hesabından silinir; kalan bakiye (kullanılmayan zarar) bir sonraki döneme devrolur.

