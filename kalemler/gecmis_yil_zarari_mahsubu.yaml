wizard_agaci:
  tetikleyici_soru: "Önceki 5 takvim yılına ait mahsup edilmemiş geçmiş yıl zararın var mı?"
  info_modal: |
    ## KVK Madde 9 — Genel Çerçeve

    Kurumlar vergisi mükellefleri, beş (5) takvim yılını aşmamak koşuluyla geçmiş yıllara ait **beyannamede gösterilen** ticari zararlarını cari yıl matrahından mahsup edebilir. 2025 yılı beyannamesinde en geriye 2020 yılı zararları mahsup edilebilir; 2019 ve öncesine ait zararlar 5 yıl süresini doldurduğundan artık mahsup edilemez.

    ### İki Zarar Tipi — Beyannamede Ayrı Satırlar

    Geçmiş yıl zararları beyannamede iki tip halinde ayrı gösterilir:
    - **Tip 1 — Diğer Zararlar:** Normal ticari faaliyetten kaynaklanan geçmiş yıl zararları. Örtülü sermaye (KVK 12) veya transfer fiyatlandırması (KVK 13) kısıtı uygulanmış sonraki tutarlar bu tipte yer alır.
    - **Tip 2 — İstisnadan Kaynaklanan Zararlar:** Kurumlar vergisinden istisna olan bir faaliyetten (örneğin taşınmaz satış istisnası, iştirak hissesi satış istisnası) kaynaklanan dönem zararı. Bu tür zararlar da mahsup edilebilir; ancak beyannamede Tip 1'den ayrı biçimde gösterilmesi zorunludur.

    ### Mahsup Sırası — FIFO Zorunluluğu

    Geçmiş yıl zararları en eski yıldan başlayarak sırayla (FIFO — First In, First Out) mahsup edilir; mükellefin sıra seçme serbestisi yoktur. 2025 beyannamesinde önce 2020 zararı, sonra 2021, 2022, 2023 ve son olarak 2024 zararı mahsup edilir.

    ### Beyanname Yerleşimi ve Hesaplama Akışı

    KV Beyannamesi Section D — Matrah Tespitine İlişkin Bildirim içindeki yerleşim şöyledir:

    ```
    Ticari Kâr (Muhasebe Kârı)
    + KKEG (Kanunen Kabul Edilmeyen Giderler)
    + Finansman Fonu ve Diğer Eklemeler
    ─────────────────────────────────────────
    = Düzeltilmiş Ticari Kâr
    − ZDI (Zarar Olsa Dahi İndirilecek İstisnalar — Örn. İştirak kâr payları, yurt dışı iştirak)
    ─────────────────────────────────────────
    = Dönem Mali Kârı   ◄── GYZ mahsubu BURADAN yapılır
    − GYZ Mahsubu (Tip 1 + Tip 2; en fazla dönem mali kârı kadar)
    − KVI (Kazanç Varsa İndirilecek İstisnalar — Örn. Taşınmaz satışı, TGB)
    − Diğer İndirimler (Ar-Ge, sponsorluk vb.)
    ─────────────────────────────────────────
    = Kurumlar Vergisi Matrahı
    ```

    **Kritik kural:** Mahsup tutarı, dönem mali kârını aşamaz; "vergi kaybı" oluşturmaz. Dönem mali kârı sıfır veya negatifse GYZ mahsubu yapılamaz.

    ### Önemli Kısıtlamalar ve Özel Durumlar

    **1. 5 yıl zamanaşımı:**
    2025 beyannamesi için mahsup edilebilir en eski yıl 2020'dir (2019 ve öncesi mahsup edilemez, süre dolmuştur).

    **2. Sadece beyannamedeki zararlar:**
    Vergi incelemesi sonucunda tespit edilen (tarhiyatla ortaya çıkan) zararlar mahsup kapsamına girmez; yalnızca döneminde verilmiş beyannamesinde gösterilen ticari zararlar esas alınır.

    **3. Örtülü sermaye (KVK Madde 12) kısıtı:**
    Örtülü sermaye sayılan borçlanmalardan kaynaklanan faiz giderleri ve kur farkı giderlerinin KKEG olarak eklenmesiyle oluşan zarar kısıtlaması, geçmiş yıl zararı hesabına yansıtılmış olmalıdır. Örtülü sermaye tespiti yapılmadan hesaplanan zarar tutarları hatalı olabilir.

    **4. Transfer fiyatlandırması (KVK Madde 13) kısıtı:**
    Emsale aykırı işlemlerden örtülü kazanç dağıtımı yapıldığı tespit edilen dönemlerde, bu işlemlerden kaynaklanan giderlerin KKEG olarak eklenmesi gerekir; bu düzeltme yapılmadan hesaplanan zararlar kullanılamaz.

    **5. Yurt dışı zarar — KVK Madde 9/2:**
    Yurt dışı şube veya daimi temsilci faaliyetlerinden kaynaklanan zararların mahsubu için özel şartlar mevcuttur:
    - Yurt dışı faaliyetler Türkiye'de tam konsolidasyon usulünde beyan edilmiş olmalı
    - Söz konusu ülke kanunlarına göre mahsup imkânı tüketilmiş (zarar kapatılmamış) olmalı
    - Belgeleme zorunluluğu: Yurt dışı beyanname, denetimden geçmiş mali tablolar
    - Faaliyet ülkesindeki vergi yükü Türkiye'deki kurumlar vergisi oranından düşükse ilave kısıtlamalar geçerli olabilir

    **6. İstisna kaynaklı zarar — Tip 2:**
    Örneğin bir taşınmazı satarken uygulanan KVK 5/1-e istisnasına konu işlemden dönem zararı doğmuşsa, bu zarar Tip 2 olarak beyannamede ayrıca gösterilir ve mahsup edilebilir. 7456 sayılı Kanun'la değişen oran uygulamalarında oluşan zararlar da bu kapsama girebilir.

    ### YİAKV İlişkisi

    Geçmiş yıl zararları mahsubu **YİAKV (Yurt İçi Asgari Kurumlar Vergisi — KVK 32/C) matrahından DÜŞÜLEMEZ.** YİAKV hesabı, KVK 32/C kapsamında bağımsız bir paralel hesaptır. GYZ mahsubu normal matrah akışında yer alırken YİAKV matrahında bu indirim söz konusu değildir. YİAKV çalışma kâğıdında GYZ mahsubu hiçbir zaman matrahtan çıkarılmamalıdır.

    ### Devir ve Birleşme Durumları

    KVK Madde 18-20 kapsamında gerçekleşen devir ve birleşmelerde, devreden kurumun geçmiş yıl zararları belirli koşullar altında devralan kurum tarafından mahsup edilebilir. Bu durum ayrıca değerlendirilmeli ve 1 Seri No.lu KV Genel Tebliği'nin ilgili bölümündeki şartlar sağlanmalıdır.

    ### Pratik Notlar

    - Her yılın zararı bağımsız kayıt ve takip gerektirdiğinden 5 yıllık izleme tablosu tutulması önerilir.
    - Mahsup sonrası kalan zarar bakiyesi, bir sonraki döneme taşınmaz; 5 yıl içinde kullanılmayan zarar zamanaşımına uğrar.
    - Yurt dışı şube/daimi temsilci zararları için ayrı belgeleme dosyası oluşturulması zorunludur.
    - YMM tasdik raporu eşiği varsa (≥500.000 TL satır veya ≥1.000.000 TL toplam) rapor düzenlenmeden mahsup risklidir.
