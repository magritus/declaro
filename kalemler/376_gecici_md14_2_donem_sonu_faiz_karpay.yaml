  info_modal: |
    KVK Geçici Md.14/2 (Paragraf 2) kapsamında, yabancı para borç dönüşümü (375) sonrası
    kurulan TL araçtan VUK Md.280/281 gereği dönem sonunda (31 Aralık) tahakkuk ettirilen
    kâr payı ve faiz kurumlar vergisinden istisnadır.

    **372 vs 376 Fark:**
    372 (Paragraf 1): Aktif taraf — Mevduat/altın → TL KKM dönüşümü sonrası araç
    376 (Paragraf 2): Pasif taraf — Borç → TL dönüşümü sonrası araç

    **KRİTİK — YİAKV:** Bu istisna KVK 32/C (YİAKV) matrahından DÜŞÜLEMEZ (E.7).
    370-376 tamamı E.7 DÜŞÜLEMEZ listesindedir.
