denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Md.14/2: 375 kapsamındaki borç dönüşümü sonrası kurulan TL araçtan
  VUK Md.280/281 gereği dönem sonunda tahakkuk ettirilen kâr payı ve faiz istisnadır.

  ## Paragraf 1 (372) ile Temel Fark
  Tahakkuk mekanizması aynı (VUK Md.280/281), ancak yasal dayanak ve bağlantılı dönüşüm farklı:
  372: Paragraf 1 (mevduat/altın → KKM) ile ilgili araç
  376: Paragraf 2 (yabancı para borç → TL) ile ilgili araç

  ## 376-377 Mükerrerlik Kuralı
  Yılı aşan vadeli araçlarda: Net 377 = Vade Toplam − Önceki Yıl 376 Tahakkuku
  (372-373 kuralının Paragraf 2 karşılığıdır)

muhasebe_kayitlari: |
  ## Kayıt — Dönem Sonu Kâr Payı/Faiz Tahakkuku (31 Aralık — Paragraf 2)
  Borç: 181 Gelir Tahakkukları
  Alacak: 642 Faiz Gelirleri (veya 644)
  Açıklama: Borç dönüşümü sonrası TL araç — Paragraf 2 dönem sonu tahakkuku — 376 istisna

