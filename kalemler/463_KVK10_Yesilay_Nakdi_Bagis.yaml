wizard_agaci:
  tetikleyici_soru: "Türkiye Yeşilay Cemiyetine banka yoluyla nakdi bağış yaptınız mı?"
  info_modal: |
    ## Genel Çerçeve

    **KVK Madde 10/1-f** kapsamında, **Türkiye Yeşilay Cemiyetine** makbuz
    karşılığında yapılan **nakdi bağış ve yardımların tamamı** kurumlar vergisi
    matrahından indirilir.

    Yeşilay; alkol, sigara ve madde bağımlılığıyla mücadele eden, bağımlılık
    önleme, eğitim, rehabilitasyon ve toplumsal farkındalık faaliyetleri yürüten
    sivil toplum kuruluşudur.

    ## !! KRİTİK UYARI — YALNIZCA NAKDİ BAĞIŞ !! (462 Kızılay ile Aynı Kısıtlama)

    **KVK Md.10/1-f kapsamında YALNIZCA NAKDİ bağış indirim konusu olabilir.**

    Yeşilay'a yapılan **AYNİ bağış ve yardımlar** (malzeme, ekipman, broşür,
    tanıtım materyali vb.) **KVK Md.10/1-f kapsamında İNDİRİLEMEZ** — kapsam dışıdır.

    Ayni bağış yapıldıysa bu tutar KKEG'e alınır ve kurumlar vergisi matrahından
    düşülemez → Net KV yükü doğurur.

    **Yeşilay'a yardım planlanıyorsa nakdi bağış tercih edilmeli.**

    ## Ödeme Koşulu

    Nakdi bağış, **Türkiye Yeşilay Cemiyetinin resmi banka hesabına doğrudan**
    EFT/havale ile yapılmalıdır. Üçüncü kişi hesabına ödeme → kapsam riski.

    ## İndirim Oranı

    İndirim oranı **tamamının indirimi**dir. Matrahı aşan kısım sonraki yıllara
    **devredilemez**.

    ## 462 Kızılay ile Fark

    Her iki kod da KVK Md.10/1-f altında yer alır. Kızılay için 462, Yeşilay için 463.
    Her ikisinde de yalnızca nakdi bağış indirilebilir — ayni bağış kapsam dışıdır.

    ## YİAKV İlişkisi

    **KVK Md.10/1-f kapsamındaki bağış indirimi YİAKV (KVK 32/C) matrahından
    DÜŞÜLEMEZ.** YİAKV çalışma kâğıdı E.11 bilgi satırında gösterilir.
  kapi_sorulari:
    - id: yesilay_alici
      soru: "Bağış Türkiye Yeşilay Cemiyetine mi yapıldı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Alıcı: Türkiye Yeşilay Cemiyeti (resmi unvan). Yeşilay'ın bağlı kuruluşları → Teyit gerekli. Başka bağımlılıkla mücadele derneği → Kapsam dışı."
    - id: nakdi_mi
      soru: "Bağış NAKDİ mi? (Ayni bağış = Kapsam dışı — KKEG!)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "★ EN KRİTİK KONTROL — 462 ile aynı kısıtlama: Nakdi bağış → 463 kapsamı. Ayni bağış → KVK Md.10/1-f KAPSAMI DIŞI. Ayni bağış KKEG'e alınır → Net KV yükü."
    - id: yesilay_hesabina_odeme
      soru: "Ödeme Yeşilay'ın resmi banka hesabına doğrudan yapıldı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Yeşilay'ın resmi banka hesabına EFT/havale. Nakit ödeme veya üçüncü şahıs hesabı → Risk."
    - id: makbuz_alindi
      soru: "Türkiye Yeşilay Cemiyetinden resmi bağış makbuzu alındı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Türkiye Yeşilay Cemiyeti tarafından düzenlenen resmi makbuz zorunludur."

