denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-d: Türkiye'de kanunların öngördüğü şekilde kurulan yatırım fon ve
  ortaklıklarının portföy işletmeciliğinden doğan kazançları kurumlar vergisinden istisnadır.
  Bu kalem GYF'nin taşınmaz HARİÇ portföy işletmeciliği kazancını kapsayan 396
  beyanname satırı için düzenlenmiştir.

  SPK III-52.3 Tebliği: GYF portföy yapısını belirler. Portföyün en az %51'i taşınmaz
  ve taşınmaza dayalı varlıklardan oluşmak zorundadır. Kalan %49'a kadar kısımda
  menkul kıymetler ve likit araçlar bulunabilir.

  ## Kritik Noktalar — Taşınmaz Hariç / Dahil Ayrımı

  PORTFÖY İÇİ — TAŞINMAZ HARİÇ (396 — İstisna):
  - DİBS, tahvil, bono faiz gelirleri
  - Repo/ters repo gelirleri
  - Menkul kıymet satış kazançları (taşınmaz dışı)
  - Taşınmaz dışı menkul kıymet değerleme artışları
  - Para piyasası aracı gelirleri

  PORTFÖY İÇİ — TAŞINMAZ (397 — Ayrı Kod):
  - Portföy taşınmazlarından kira gelirleri
  - Portföy taşınmaz satış kazançları
  - Taşınmaza dayalı varlık değerleme artışları

  PORTFÖY DIŞI (Vergiye Tabi — 396/397'ye YAZILMAZ):
  - Fon yönetim ücreti
  - Performans/başarı primi
  - Portföyde kayıtlı olmayan varlıklardan gelirler

  ## GYF'ye Özgü Riskler
  1. GYF portföyünün %51 taşınmaz koşulunun altına düşmesi halinde GYF statüsü
     tartışmalı hale gelir ve KVK 5/1-d istisnası uygulanamaz.
  2. Fon yönetim ücretinin portföy geliri sayılması tarhiyat riski yaratır.
  3. Taşınmaz dışı portföy gelirinin 397 koduna yazılması veya taşınmaz gelirinin
     396'ya dahil edilmesi.
  4. 396 + 397 toplamının GYF toplam portföy kazancıyla uyumsuzluğu.
  5. GYF ile GYO karıştırılması — GYF fon, GYO anonim şirket; beyanname kodları farklı.
  6. 7524 s.K. kâr dağıtım şartının GYF'nin kendi istisnası ile yatırımcı kurumun
     kâr payı istisnasının karıştırılması.

  ## YİAKV Etkisi
  KVK 5/1-d GYF portföy işletmeciliği kazancı (taşınmaz hariç — 396) YİAKV matrahından
  düşülür. Dönem mevzuatı ve GİB açıklamaları her yıl için teyit edilmelidir.

  ## Beyanname Konumu
  "Zarar Olsa Dahi İndirilecek İstisna ve İndirimler" bölümü — 396 kodlu satır.
  396 (taşınmaz hariç) + 397 (taşınmaz dahil) = GYF toplam portföy işletmeciliği kazancı.

  ## 3 Kademe Uyum Kontrolü
  Muhasebe taşınmaz dışı portföy hesapları (net tutar) = Çalışma kâğıdı 396 = Beyanname 396.
  396 + 397 = Toplam GYF portföy işletmeciliği kazancı (ana mutabakat noktası).

muhasebe_kayitlari: |
  ## Kayıt 1 — GYF Portföy DİBS/Tahvil Faiz Tahakkuku (Taşınmaz Dışı — İstisna)
  Borç: 181 Gelir Tahakkukları ← DİBS/tahvil faiz alacağı
  Alacak: 641 Faiz Gelirleri ← GYF portföy taşınmaz dışı faiz geliri
  Açıklama: KVK 5/1-d istisna kapsamı — 396 satırı

  ## Kayıt 2 — GYF Portföy Repo Geliri
  Borç: 102 Bankalar / 111 Menkul Kıymetler ← Repo anaparası + faizi
  Alacak: 641 Faiz Gelirleri ← Repo faiz geliri
  Açıklama: GYF portföy repo geliri — KVK 5/1-d (396 satırı)

  ## Kayıt 3 — GYF Portföy Menkul Kıymet Satış Kazancı (Taşınmaz Dışı)
  Borç: 102 Bankalar ← Satış bedeli
  Alacak: 111 Menkul Kıymetler ← Maliyet
  Alacak: 645 Menkul Kıymet Satış Kârı ← Kazanç
  Açıklama: KVK 5/1-d portföy işletmeciliği satış kazancı — 396 satırı

  ## Kayıt 4 — Portföy Değerleme Artışı (Dönem Sonu — Taşınmaz Dışı Kısım)
  Borç: 111-118 İlgili Menkul Kıymet Hesabı ← Değer artışı
  Alacak: 644/649 Değerleme Gelirleri ← Değerleme artışı
  Açıklama: SPK/VUK değerleme esaslarına uygun — 396 satırı

  ## Beyanname 396 Akışı (Mutabakat)
  Taşınmaz dışı portföy gelirleri net tutarı → Beyanname 396
  Taşınmaz portföy gelirleri net tutarı → Beyanname 397
  Portföy dışı (yönetim ücreti vb.) → Matrahta kalır
  3 KADEME UYUM: Muhasebe = Çalışma kâğıdı 396 = Beyanname 396
  ANA KONTROL: 396 + 397 = Toplam GYF portföy işletmeciliği kazancı

