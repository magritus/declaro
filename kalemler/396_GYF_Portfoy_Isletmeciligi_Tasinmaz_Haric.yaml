ic_kod: gyf_portfoy_tasinmaz_haric
baslik: Gayrimenkul Yatırım Fonu (GYF) Portföy İşletmeciliği Kazancı (Taşınmaz Hariç)
ust_kalem: null

beyanname_kodlari:
  - { donem: 2025, kod: 396 }
  - { donem: 2026, kod: 396 }

mevzuat_dayanagi:
  - KVK Madde 5/1-d
  - 1 Seri No.lu KV Genel Tebliği Bölüm 5.4
  - SPK III-52.3 Tebliği (Gayrimenkul Yatırım Fonlarına İlişkin Esaslar Tebliği)
  - Sermaye Piyasası Kanunu Madde 54 (Kolektif Yatırım Kuruluşları)
  - 6362 Sayılı Sermaye Piyasası Kanunu
  - 7524 Sayılı Kanun Madde — (02.08.2024 — GYF/GYO kâr dağıtım şartı)

beyanname_bolumu: zarar_olsa_dahi
yiakv_etkisi: dusulur
durum: aktif
yururluk_araligi:
  baslangic: "2006-06-21"
  bitis: null
  not: "396 kodu 2025 ve sonraki dönemlerde GYF portföy işletmeciliği kazancının taşınmaz HARİÇ bileşenini ayrıştırarak göstermek için kullanılır. GYF portföyünün en az %51'i taşınmaz ve taşınmaza dayalı varlıklardan oluşmak zorundadır; ancak portföyde taşınmaz dışı varlıklar da bulunabilir ve bu varlıklardan elde edilen gelirler 396 kodunda gösterilir."

ana_kategori: portfoy_isletmeciligi

wizard_agaci:
  tetikleyici_soru: "Kurum, SPK'ya tescilli bir Gayrimenkul Yatırım Fonu (GYF) mudur ve portföyündeki taşınmaz DIŞI varlıklardan (menkul kıymetler, repo, nakit vb.) portföy işletmeciliği kazancı elde etti mi?"
  info_modal: |
    ## Genel Çerçeve

    KVK Madde 5/1-d kapsamında Türkiye'de **Sermaye Piyasası Kanunu** çerçevesinde kurulmuş
    **Gayrimenkul Yatırım Fonlarının (GYF)** portföy işletmeciliğinden doğan kazançların
    tamamı kurumlar vergisinden %100 tam istisna olarak muaftır. Bu form, söz konusu kazancın
    **taşınmaz ve taşınmaza dayalı varlıklar dışındaki** portföy bileşeninden (menkul kıymetler,
    tahvil, bono, repo, nakit yönetimi gelirleri vb.) elde edilen kısmını kapsar.

    ## GYF Nedir?

    GYF; portföyünü ağırlıklı olarak **gayrimenkul ve gayrimenkule dayalı varlıklara**
    yatırım yaparak oluşturan, SPK III-52.3 Tebliği'ne göre kurulan ve SPK'ya tescil
    ettirilen kolektif yatırım kuruluşudur.

    **SPK III-52.3 Tebliği'ne göre GYF portföy yapısı:**
    - Portföyün en az **%51'i** taşınmaz ve taşınmaza dayalı varlıklardan oluşmalıdır.
    - Kalan %49'luk kısım menkul kıymetler (tahvil, bono, devlet iç borçlanma senetleri),
      repo/ters repo, para piyasası araçları ve benzeri likit varlıklardan oluşabilir.
    - GYF SPK'ya tescil ettirilerek ve içtüzük çerçevesinde faaliyet göstererek kurulur.

    **GYF ile GSYF'nin farkı:**
    GYF'nin ana yatırım konusu gayrimenkullerdir (%51+ zorunlu); GSYF'nin ana
    yatırım konusu girişim şirketleri ve menkul kıymetlerdir. Bu nedenle 396 (GYF
    taşınmaz hariç) ve 394 (GSYF taşınmaz hariç) ayrı kodlardır.

    ## Bu Form Neyi Kapsar?

    Beyanname kodu **396** yalnızca GYF portföyündeki **taşınmaz DIŞI varlıklardan**
    elde edilen portföy işletmeciliği kazancını içerir:

    - Portföydeki devlet iç borçlanma senetleri (DİBS), tahvil, bono faiz gelirleri
    - Portföy repo/ters repo gelirleri
    - Portföy para piyasası araçları gelirleri
    - Portföy menkul kıymet satış kazançları (taşınmaz dışı)
    - Portföy menkul kıymet dönem sonu değerleme artışları (taşınmaz dışı)
    - Taşınmaz dışı diğer portföy varlıklarından gelirler

    **Taşınmaz ve taşınmaza dayalı varlıklardan elde edilen gelirler bu forma
    dahil EDİLMEZ** (→ 397 kodu).

    ## Temel Koşullar

    - **SPK tescili:** Fonun SPK III-52.3 Tebliği kapsamında tescil edilmiş ve
      güncel SPK kaydının bulunması zorunludur.
    - **%51 taşınmaz zorunluluğuna uyum:** GYF portföyünün en az %51'inin
      taşınmaz ve taşınmaza dayalı varlıklardan oluştuğu dönem portföy raporuyla
      teyit edilmelidir. Bu şart sağlanmazsa portföy yapısı GYF tanımıyla uyumsuz
      hale gelir ve istisna riski doğar.
    - **Portföy içi/dışı ayrımı:** Portföy işletmeciliği geliri ile fon yönetim ücreti,
      performans/başarı primi ayrıştırılmalıdır. Yönetim ücreti ve başarı primi portföy
      dışı gelirdir ve istisna kapsamına girmez.
    - **Taşınmaz hariç/dahil ayrıştırması:** Taşınmaz dışı portföy gelirleri 396'ya,
      taşınmaz portföy gelirleri 397'ye alınmalı; her iki kodun toplamı GYF toplam
      portföy işletmeciliği kazancıyla mutabık olmalıdır.
    - **7524 sayılı Kanun (01.01.2025) kâr dağıtım şartı:** GYF katılımcılarının
      GYF'den elde ettikleri kâr payını KVK 5/1-a kapsamında istisna olarak
      kullanabilmeleri için GYF'nin kâr dağıtım şartını (%80 dağıtım) yerine
      getirmesi gerekir. Bu şart GYF'nin kendi istisna uygulamasını değil, yatırımcı
      kurumların GYF'den alacağı kâr payı istisnasını etkiler.

    ## Önemli Sınırlamalar ve Riskler

    - **GYF portföyündeki %51 taşınmaz koşulunun altına düşülmesi:** Portföy yapısı
      bozulursa GYF tanımından çıkılır ve istisna tehlikeye girer. Dönemsel portföy
      uyum raporu zorunludur.
    - **Fon yönetim ücreti portföy dışıdır:** Taşınmaz veya taşınmaz dışı portföy
      gelirleriyle ilgili bile olsa yönetim ücreti istisna kapsamına alınamaz.
    - **GYF ile GYO karıştırılmaması:** GYF bir fondur (tüzel kişiliği yoktur);
      GYO bir anonim şirkettir. Vergisel uygulama ve beyanname kodları farklıdır.
    - **Nakit yönetimi gelirleri:** GYF portföyündeki nakit ve likit araçların
      repo/DİBS gelirlerinin portföy kapsamında değerlendirilip değerlendirilemeyeceği
      hukuki nitelik bazında analiz edilmelidir.

    ## YİAKV İlişkisi

    KVK 5/1-d kapsamındaki GYF portföy işletmeciliği kazancının (taşınmaz hariç)
    YİAKV matrahından düşüleceği kabul edilir. Dönem mevzuatı ve GİB açıklamaları
    her yıl için ayrıca teyit edilmelidir.

    ## Pratik Notlar

    - 396 (taşınmaz hariç) + 397 (taşınmaz dahil) toplamı GYF toplam portföy
      işletmeciliği kazancıyla mutabık olmalıdır.
    - Taşınmaz dışı portföy gelirleri ile taşınmaz portföy gelirlerinin ayrı hesaplarda
      izlenmesi hem SPK raporlama hem de vergi ayrıştırması açısından zorunludur.
    - 49 No.lu KV Genel Tebliği kapsamında tek satır ≥500.000 TL ise YMM tasdik
      raporu eşiği kontrol edilmelidir.
