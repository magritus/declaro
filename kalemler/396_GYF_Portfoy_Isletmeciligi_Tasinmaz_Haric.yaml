      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "KVK 5/1-d istisnası SPK'ya tescilli GYF'ler için geçerlidir. SPK III-52.3 Tebliği kapsamında tescil belgesi ve içtüzük dosyada yer almalıdır."
    - id: gyf_yuzde51_uyum
      soru: "GYF portföyünün en az %51'i taşınmaz ve taşınmaza dayalı varlıklardan oluşuyor mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "KRİTİK: SPK III-52.3 gereği GYF portföyünün %51+ kısmı taşınmaz ve taşınmaza dayalı varlıklardan oluşmalıdır. Bu şartın sağlanmaması GYF statüsünü ve dolayısıyla KVK 5/1-d istisnasını tehlikeye atar. Dönem portföy raporu ile kontrol edilmeli."
    - id: tasinmaz_disi_gelir_var
      soru: "Portföyde taşınmaz DIŞI varlıklar (menkul kıymet, repo, DİBS vb.) var ve bu varlıklardan gelir elde edildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Portföyde yalnızca taşınmaz varsa 396 satırı doldurulmaz. Taşınmaz dışı portföy geliri yoksa bu form ilgili değildir."
    - id: tasinmaz_haric_ayrim
      soru: "Taşınmaz dışı portföy geliri, taşınmaz portföy gelirinden muhasebede ayrıştırıldı mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Gelir ayrıştırması zorunludur. 396 + 397 toplamının doğru oluşturulabilmesi için taşınmaz dışı ve taşınmaz portföy gelirlerinin ayrı hesaplarda izlenmesi şarttır."

