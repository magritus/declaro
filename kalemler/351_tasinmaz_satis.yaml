    detay: "İstisna tutarının 549 Özel Fonlar hesabına alındığını gösteren yevmiye kaydı. Zorunlu koşul — eksikliği istisnayı geçersiz kılar."
    temin_yeri: Muhasebe / Yevmiye defteri
  - kategori: destekleyici
    "no": 6
