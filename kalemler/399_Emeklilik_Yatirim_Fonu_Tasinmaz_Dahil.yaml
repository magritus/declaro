    - id: tasinmaz_geliri_var
      soru: "EYF portföyünde taşınmaz veya taşınmaza dayalı araçlardan elde edilen kazanç var mı? (GYO/GYF katılma payı, gayrimenkule dayalı kira sertifikası vb.)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Bu satır YALNIZCA taşınmaz kaynaklı portföy kazancı olan EYF'ler için doldurulur. Taşınmaz geliri yoksa 399 satırı boş bırakılır."
    - id: spk_tasinmaz_limit
      soru: "EYF portföyündeki taşınmaz araç yatırımları SPK Tebliği III-52.1 kapsamındaki limitlere uygun mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "EYF'lerin taşınmaz araç yatırım limitleri SPK tebliği ile sınırlanmıştır. Portföy dağılımının dönem boyunca limit dahilinde kalıp kalmadığı kontrol edilmelidir."
    - id: portfoy_398_ayrim
      soru: "Taşınmazdan elde edilen portföy kazançları 398 satırındaki (taşınmaz hariç) kazançlardan muhasebede ayrı izleniyor mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "398 ve 399 satırlarının toplamı EYF toplam portföy kazancına eşit olmalıdır. İki satır arasındaki ayrım muhasebe kayıtlarıyla belgelenmelidir."

parametreler:
  oran: 1.0

hesaplama_sablonu:
  veri_girisi_alanlari:
    - id: gyo_katilma_payi_kira
      etiket: "GYO katılma payı kira ve kâr payı gelirleri (TL)"
      tip: para
      zorunlu: false
      yardim: |
        EYF portföyündeki Gayrimenkul Yatırım Ortaklığı (GYO) katılma paylarından alınan
        kira geliri ve kâr payı dağıtımları. GYO'nun portföy içi işletmeciliğinden kaynaklanan
        kazanç payı bu alana girilir.
    - id: gyf_katilma_payi_geliri
      etiket: "GYF (Gayrimenkul Yatırım Fonu) katılma payı gelirleri (TL)"
      tip: para
      zorunlu: false
      yardim: |
        EYF portföyündeki Gayrimenkul Yatırım Fonu (GYF) katılma paylarından elde edilen
        kira geliri, değerleme artışı ve diğer portföy gelirleri.
    - id: kira_sertifikasi_tasinmaz
      etiket: "Gayrimenkule dayalı kira sertifikası faiz/geliri (TL)"
      tip: para
      zorunlu: false
      yardim: |
        EYF portföyündeki gayrimenkule dayalı (icare) kira sertifikalarından elde edilen faiz
        ve değerleme gelirleri. Kira sertifikasının dayandığı varlık taşınmaz ise bu alana girilir.
    - id: tasinmaz_diger_gelir
      etiket: "Diğer taşınmaz araçlarından portföy gelirleri (TL)"
      tip: para
      zorunlu: false
      yardim: |
        SPK mevzuatı çerçevesinde taşınmaz niteliğinde sayılan ancak yukarıda ayrıca
        sayılmayan diğer portföy araçlarından elde edilen gelirler.
    - id: tasinmaz_portfoy_giderleri
      etiket: "Taşınmaz gelirlerine ilişkin portföy giderleri (eksi) (TL)"
      tip: para
      zorunlu: false
      yardim: |
        Taşınmaz araçlarına özgü portföy yönetim, saklama ve diğer işletme giderleri.
        Karma giderler için taşınmaz payına düşen tutar dağıtım anahtarıyla belirlenmeli.
    - id: fon_portfoy_kazanci
      etiket: "Net EYF taşınmaz dahil portföy işletmeciliği kazancı (TL)"
      tip: para
      zorunlu: true
      yardim: |
        Taşınmaz kaynaklı portföy gelirlerinin toplamından taşınmaza ilişkin portföy giderleri
        düşüldükten sonra kalan net kazanç. Bu tutar beyanname 399 satırına yazılır.
        398 satırıyla birlikte EYF toplam portföy kazancına ulaşılır.
  formuller:
    tasinmaz_gelir_toplam: "gyo_katilma_payi_kira + gyf_katilma_payi_geliri + kira_sertifikasi_tasinmaz + tasinmaz_diger_gelir"
    net_tasinmaz_portfoy_kazanci_kontrol: "tasinmaz_gelir_toplam - tasinmaz_portfoy_giderleri"
    istisna_tutari: "fon_portfoy_kazanci"
  sonuc_alan: istisna_tutari
  validasyonlar:
    - kural: "fon_portfoy_kazanci != 0"
      hata: "İstisna tutarı sıfır olamaz."
    - kural: "tasinmaz_portfoy_giderleri >= 0"
      hata: "Portföy giderleri negatif girilemez."

denetci_notlari: |
  ## I. Yasal Dayanak — KVK Md.5/1-d

  KVK Madde 5/1-d kapsamında 4632 Sayılı Kanun çerçevesinde kurulan EYF'lerin portföy
  işletmeciliğinden doğan kazançları kurumlar vergisinden %100 tam istisna olarak muaftır.
  Bu satır (399) taşınmaz dahil portföy kazancını kapsar; beyanname "Zarar Olsa Dahi
  İndirilecek" bölümünde 399 numaralı satırda gösterilir.

  ## II. EYF'de Taşınmaz Yatırımının Hukuki Çerçevesi

  EYF'ler SPK Tebliği III-52.1 kapsamında DOĞRUDAN taşınmaz iktisap edemez.
  Taşınmaz maruziyeti yalnızca aşağıdaki DOLAYLI araçlar üzerinden sağlanabilir:
  - GYO katılma payları (Gayrimenkul Yatırım Ortaklığı)
  - GYF katılma payları (Gayrimenkul Yatırım Fonu)
  - Gayrimenkule dayalı kira sertifikaları (icare sukuku)

  Bu araçların portföy ağırlığı SPK tebliği limitlerini aşamaz. Limit aşımı hem idari
  yaptırıma hem de portföy içi/dışı sınıflandırma hatasına yol açabilir.

  ## III. 398 ve 399 Satırları Arası Ayrım (KRİTİK)

  BU SATIRA (399) YAZILACAKLAR:
  - GYO katılma payı kira ve kâr payı gelirleri
  - GYF katılma payı kira/değerleme gelirleri
  - Gayrimenkule dayalı kira sertifikası faiz/gelirleri
  - Taşınmaz niteliğindeki diğer SPK onaylı araçlardan gelirler

  398 SATIRINA YAZILACAKLAR (bu satırda YER ALMAZ):
  - Tahvil, bono, eurobond, pay senedi, repo, altın ve taşınmaz dışı portföy gelirleri

  TOPLAMLAR: 398 + 399 = EYF toplam portföy işletmeciliği kazancı.
  Muhasebede iki satır arasındaki ayrım ayrı hesaplarla belgelenmelidir.

  ## IV. GVK Geçici Md.67 Stopaj İlişkisi

  Taşınmaza dayalı gelirler dahil tüm EYF portföy gelirleri üzerinden fon bünyesinde
  GVK Geçici Md.67 stopajı uygulanır. Emeklilik şirketinin elinde kalan kazanç
  KVK 5/1-d istisnasına tabidir. Stopaj-istisna mutabakatı 399 satırı için ayrıca
  yapılmalı; 398 satırı stopaj mutabakatından bağımsız izlenmelidir.

  ## V. YİAKV (KVK Md.32/C) Etkisi

  KVK 5/1-d kapsamındaki EYF taşınmaz dahil portföy işletmeciliği kazancı YİAKV
  matrahından DÜŞÜLEBİLİR. Dönem tebliğleri ve GİB açıklamaları ile teyit edilmelidir.

  ## VI. Risk Alanları

  1. EYF'nin doğrudan taşınmaz iktisap etmesi ve bu gelirin 399'a yazılması (SPK ihlali)
  2. SPK taşınmaz limiti aşımının portföy içi/dışı sınıflandırmaya etkisi
  3. GYO katılma payı üzerinden alınan gelirin niteliğinin (kira/kâr payı) yanlış ayrımı
  4. 398 ve 399 satırlarının toplamının EYF toplam kazancından sapması
  5. Taşınmaz giderlerinin taşınmaz hariç portföy giderleriyle karıştırılması

