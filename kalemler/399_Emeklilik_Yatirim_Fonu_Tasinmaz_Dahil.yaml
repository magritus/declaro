wizard_agaci:
  tetikleyici_soru: "EYF portföyünde taşınmaz veya taşınmaza dayalı araçlardan (GYO katılma payı kira/kâr gelirleri, gayrimenkule dayalı kira sertifikası vb.) elde edilen kazanç var mı?"
  info_modal: |
    ## Emeklilik Yatırım Fonu Portföy İşletmeciliği Kazancı (Taşınmaz Dahil)

    **KVK Madde 5/1-d** kapsamında kurulan **Emeklilik Yatırım Fonlarının (EYF)** portföy işletmeciliğinden doğan kazançları kurumlar vergisinden %100 tam istisna olarak muaftır.

    **Bu satır (399): Taşınmaz GELİRİ DAHİL portföy işletmeciliği kazancını kapsar.**
    Taşınmaz geliri HARİÇ portföy kazancı için 398 numaralı satır ayrıca doldurulur.

    ### Bu Satırın Kapsamı

    399 numaralı satır, EYF portföyünün **taşınmaz veya taşınmaza dayalı araçlardan elde ettiği kazançları** kapsar:

    - Portföydeki GYO katılma paylarından alınan kira ve kâr payı gelirleri
    - Gayrimenkule dayalı kira sertifikası faiz/değerleme gelirleri
    - Taşınmaza dayalı GYF (Gayrimenkul Yatırım Fonu) katılma payı gelirleri
    - SPK mevzuatı çerçevesinde taşınmaz niteliğinde sayılan diğer araçlardan gelirler

    ### EYF'de Taşınmaz Yatırım Limitleri

    SPK Tebliği III-52.1 kapsamında EYF'lerin **doğrudan taşınmaz yatırımı yapma yetkisi** bulunmamaktadır. Taşınmaz maruziyeti yalnızca dolaylı yollarla (GYO katılma payı, GYF katılma payı, gayrimenkule dayalı kira sertifikası gibi araçlar) sağlanabilir.

    - **Taşınmaz yatırım limiti:** SPK tebliği ile her EYF türü için ayrı ayrı belirlenmiştir. Limit yüzdeleri değişebileceğinden güncel tebliğ kontrol edilmelidir.
    - **Limit aşımı riski:** Portföy dağılımının dönem boyunca limit dahilinde kalıp kalmadığı kontrol edilmelidir. Limit aşımı hem SPK idari yaptırımına hem de portföy içi/dışı sınıflandırma hatasına yol açabilir.

    ### 398 ve 399 Satırlarının İlişkisi

    - **398 satırı:** EYF taşınmaz hariç portföy işletmeciliği kazancı
    - **399 satırı:** EYF taşınmaz dahil (taşınmazdan elde edilen) portföy işletmeciliği kazancı
    - İki satırın toplamı EYF toplam portföy kazancına eşit olmalıdır.
    - Taşınmaz geliri yoksa (EYF portföyünde hiç taşınmaz/taşınmaz araç yoksa) 399 satırı doldurulmaz.

    ### GVK Geçici Md.67 Stopaj İlişkisi

    Taşınmaz gelirleri de dahil olmak üzere EYF bünyesinde GVK Geçici Md.67 kapsamında stopaj uygulanır. Fon düzeyinde kesilen stopaj, emeklilik şirketinin elinde KVK 5/1-d istisnasına tabi tutulan kazançla ilişkilidir. Stopaj tutarı ile istisna tutarı arasındaki bağlantı muhasebe kayıtlarında şeffaf biçimde gösterilmelidir.
