    "no": 1
    baslik: Yatırım Teşvik Belgesi (YTB) Aslı veya Noter Onaylı Sureti
    detay: "YTB ve ekleri: yatırım yeri, yatırım tutarı, yatırıma katkı oranı, vergi indirim oranı, yatırım bölgesi ve geçerlilik süresi bilgilerini içermelidir. Revize edilmişse en güncel versiyon alınmalıdır."
    temin_yeri: Sanayi ve Teknoloji Bakanlığı / e-TUYS
  - kategori: zorunlu
    "no": 2
    baslik: Tamamlama Vizesi (İşletme Dönemi İçin)
    detay: "Tamamlama vizesi alınmışsa (işletme dönemi) vize tarihi ve kapsamını gösteren belge. Bu belge, yatırım/işletme dönemi ayrımını ispatlar ve indirimli matrah yöntemini belirler."
    temin_yeri: Sanayi ve Teknoloji Bakanlığı / e-TUYS
  - kategori: zorunlu
    "no": 3
    baslik: Yatırım Harcamaları Tablosu ve Destekleyici Belgeler
    detay: "YTB kapsamında gerçekleştirilen yatırım harcamalarının döneme ait özeti. Kümülatif harcama tutarı, fatura/makbuz bazında muhasebe kayıtlarıyla uyumlu olmalıdır."
    temin_yeri: Muhasebe / Mali İşler
  - kategori: zorunlu
    "no": 4
    baslik: Kazanç Ayrıştırma Tablosu (Tevsi Yatırımları İçin)
    detay: "Tevsi yatırımlarında, toplam kurum kazancının yatırıma isabet eden payının hesaplandığı tablo. Tevsi yatırım tutarı / toplam sabit kıymet oranı ile indirimli matrahın belirlenmesi. Komple yeni yatırımlar için gerekmez."
    temin_yeri: Muhasebe / YMM
  - kategori: zorunlu
    "no": 5
    baslik: YMM Raporu (49 No.lu Sirkülere Göre)
    detay: "KV tasarrufu tutarı ≥500.000 TL veya toplam ≥1.000.000 TL ise 49 No.lu KV GT kapsamında YMM tasdik raporu. Yatırım döneminde gerçekleşen harcamaların belgelenmesi ve indirimli KV hesabının teyidi içermelidir."
    temin_yeri: YMM
  - kategori: destekleyici
    "no": 6
    baslik: Önceki Dönemler KV Beyannameleri (Kümülatif YKT Kullanımı İspat)
    detay: "Bu YTB kapsamında önceki dönemlerde kullanılan kümülatif YKT tutarlarını gösteren beyanname kayıtları. Önceki dönem kümülatif giriş değeriyle mutabık olmalıdır."
    temin_yeri: Beyanname Arşivi / Muhasebe
  - kategori: destekleyici
    "no": 7
    baslik: Yatırım Dönemine Ait Diğer Faaliyetler Kazanç Belgesi
    detay: "Yatırım döneminde diğer faaliyetlerden elde edilen kazancı gösteren belge. İndirimli matrah bu kazançla sınırlı olduğundan tutarın izah edilebilir olması gerekir."
    temin_yeri: Muhasebe / KV Beyannamesi Taslağı

