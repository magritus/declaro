      tip: tarih
      zorunlu: true
      yardim: "YTB'nin Sanayi ve Teknoloji Bakanlığı tarafından düzenlendiği tarih."
    - id: yatirim_bolgesi
      etiket: "Yatırım Bölgesi"
      tip: secenek
      secenekler:
        - deger: "1"
          etiket: "1. Bölge"
        - deger: "2"
          etiket: "2. Bölge"
        - deger: "3"
          etiket: "3. Bölge"
        - deger: "4"
          etiket: "4. Bölge"
        - deger: "5"
          etiket: "5. Bölge"
        - deger: "6"
          etiket: "6. Bölge"
      zorunlu: true
      yardim: "YTB'de belirtilen yatırım bölgesi. Bölge, hem yatırıma katkı oranını hem de yatırım döneminde uygulanabilecek bölge limitini belirler."
    - id: yatirim_turu
      etiket: "Yatırım Türü"
      tip: secenek
      secenekler:
        - deger: "Komple Yeni"
          etiket: "Komple Yeni"
        - deger: "Tevsi"
          etiket: "Tevsi"
        - deger: "Modernizasyon"
          etiket: "Modernizasyon"
        - deger: "Diger"
          etiket: "Diğer"
      zorunlu: true
      yardim: "YTB'de belirtilen yatırım türü. Tevsi yatırımlarında orantılama yöntemi uygulanması gerekebilir; bu durumda denetçi notlarına bakınız."
    - id: yatirim_tutari
      etiket: "YTB Yatırım Tutarı (TL)"
      tip: para
      zorunlu: true
      yardim: "YTB'de belirtilen toplam sabit yatırım tutarı. YKT hesabında esas alınır."
    - id: ykt_orani
      etiket: "Yatırıma Katkı Oranı (%) — YTB'den"
      tip: sayi
      zorunlu: true
      yardim: "YTB'de kayıtlı yatırıma katkı oranı (örn. 20, 30, 40, 55). Bölgeye ve sektöre göre değişir. Bu oran yüzde değer olarak girilir (örn. 40 → %40)."
    - id: vergi_indirim_orani
      etiket: "Vergi İndirim Oranı (%) — YTB'den"
      tip: sayi
      zorunlu: true
      yardim: "YTB'de kayıtlı vergi indirim oranı (örn. 50, 60, 80, 100). Normal KV oranına uygulanacak indirim yüzdesidir. Bu oran yüzde değer olarak girilir (örn. 80 → %80)."
    - id: normal_kv_orani
      etiket: "Normal KV Oranı (%)"
      tip: sayi
      zorunlu: false
      varsayilan: 25
      yardim: "Kurumlar vergisi normal oranı. 2024 ve sonrası için %25; önceki dönemler için farklılaşabilir. Değiştirilmediği takdirde %25 varsayılan olarak uygulanır."
    - id: donem_durumu
      etiket: "YTB Dönem Durumu"
      tip: secenek
      secenekler:
        - deger: "Yatirim Doneminde"
          etiket: "Yatırım Döneminde (Tamamlama Vizesi Alınmamış)"
        - deger: "Isletme Doneminde"
          etiket: "İşletme Döneminde (Tamamlama Vizesi Alınmış)"
      zorunlu: true
      yardim: "Tamamlama vizesi alınmışsa İşletme Dönemi, alınmamışsa Yatırım Dönemi seçilir. Dönem tespiti, hem indirimli matrah yöntemi hem de uygulama şekli açısından kritik önem taşır."
    - id: bolge_yuzde_limiti
      etiket: "Bölge Yüzde Limiti (%) — Yatırım Döneminde Geçerli"
      tip: sayi
      zorunlu: false
      varsayilan: 10
      yardim: |
        Yatırım döneminde diğer faaliyetlerden elde edilen kazançlara indirimli KV
        uygulanabilecek YKT payını sınırlayan oran.
        Bölgeye göre varsayılan değerler:
        1. Bölge → %10 | 2. Bölge → %10 | 3. Bölge → %20
        4. Bölge → %30 | 5. Bölge → %50 | 6. Bölge → %80
        İşletme döneminde bu alan kullanılmaz.
    - id: kumulatif_yatirim_harcamasi
      etiket: "Kümülatif Yatırım Harcaması (TL) — Yatırım Döneminde"
      tip: para
      zorunlu: false
      varsayilan: 0
      yardim: "YTB kapsamında dönem sonuna kadar gerçekleştirilen toplam yatırım harcaması. Yatırım döneminde kullanılan YKT tavanını belirler. İşletme döneminde bu alan kullanılmaz."
    - id: onceki_donem_kumulatif_ykt
      etiket: "Önceki Dönem Kümülatif YKT Kullanımı (TL)"
      tip: para
      zorunlu: false
      varsayilan: 0
      yardim: "Bu YTB kapsamında önceki dönemlerde toplam olarak kullanılan YKT (birikimli KV tasarrufu) tutarı. İlk dönende 0 girilir. Sonraki dönemlerde, önceki tüm dönemlerdeki KV tasarrufu toplamını yansıtmalıdır."
    - id: beyan_edilen_diger_kazanc
      etiket: "Beyan Edilen Diğer Faaliyetler Kazancı (TL) — Yatırım Döneminde"
      tip: para
      zorunlu: false
      varsayilan: 0
      yardim: "Yatırım döneminde, bu YTB kapsamındaki yatırımdan elde edilen kazanç dışında kalan diğer faaliyetlerden elde edilen kurum kazancı. Yatırım döneminde indirimli KV uygulanabilecek matrahın üst sınırını belirler. İşletme döneminde bu alan kullanılmaz."
    - id: beyan_edilen_yatirim_kazanci
      etiket: "Beyan Edilen Yatırım Kazancı (TL) — İşletme Döneminde"
      tip: para
      zorunlu: false
      varsayilan: 0
      yardim: "İşletme döneminde bu YTB kapsamındaki yatırımdan elde edilen kazanç. Bu tutar doğrudan indirimli KV matrahı olarak alınır. Yatırım döneminde bu alan kullanılmaz."
  formuller:
    ykt: "yatirim_tutari * ykt_orani / 100"
    indirimsiz_oran: "normal_kv_orani / 100"
    indirimli_oran: "normal_kv_orani * (1 - vergi_indirim_orani / 100) / 100"
    ykt_limiti_yatirim: "ykt * bolge_yuzde_limiti / 100"
    kumulatif_azami_kullanim: "min(ykt_limiti_yatirim, kumulatif_yatirim_harcamasi)"
    kullanilabilir_ykt: "max(0, kumulatif_azami_kullanim - onceki_donem_kumulatif_ykt)"
    indirimli_matrah_yatirim: "min(beyan_edilen_diger_kazanc, kullanilabilir_ykt / (normal_kv_orani / 100))"
    indirimli_matrah_isletme: "beyan_edilen_yatirim_kazanci"
    indirimli_matrah: "if(donem_durumu == 'Yatirim Doneminde', indirimli_matrah_yatirim, indirimli_matrah_isletme)"
    kv_tasarrufu: "indirimli_matrah * (indirimsiz_oran - indirimli_oran)"
    devreden_ykt: "max(0, (ykt - onceki_donem_kumulatif_ykt) - kv_tasarrufu)"
  sonuc_alan: kv_tasarrufu
  ek_sonuc_alanlari:
    - devreden_ykt
    - indirimli_matrah
    - ykt
  validasyonlar:
    - kural: "yatirim_tutari > 0"
      hata: "Yatırım tutarı sıfırdan büyük olmalıdır."
    - kural: "ykt_orani > 0 and ykt_orani <= 100"
      hata: "Yatırıma katkı oranı 0 ile 100 arasında olmalıdır."
    - kural: "vergi_indirim_orani > 0 and vergi_indirim_orani <= 100"
      hata: "Vergi indirim oranı 0 ile 100 arasında olmalıdır."
    - kural: "normal_kv_orani > 0 and normal_kv_orani <= 100"
      hata: "Normal KV oranı 0 ile 100 arasında olmalıdır."
    - kural: "bolge_yuzde_limiti >= 0 and bolge_yuzde_limiti <= 100"
      hata: "Bölge yüzde limiti 0 ile 100 arasında olmalıdır."
    - kural: "kumulatif_yatirim_harcamasi >= 0"
      hata: "Kümülatif yatırım harcaması negatif olamaz."
    - kural: "onceki_donem_kumulatif_ykt >= 0"
      hata: "Önceki dönem kümülatif YKT kullanımı negatif olamaz."
    - kural: "beyan_edilen_diger_kazanc >= 0"
      hata: "Beyan edilen diğer faaliyetler kazancı negatif olamaz."
    - kural: "beyan_edilen_yatirim_kazanci >= 0"
      hata: "Beyan edilen yatırım kazancı negatif olamaz."

denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 32/A: Yatırım Teşvik Belgesi (YTB) kapsamındaki yatırımlara, devlet
  desteği niteliğinde yatırıma katkı tutarına (YKT) ulaşılıncaya kadar indirimli
  kurumlar vergisi uygulanır. 2012/3305 ve 2016/9495 Sayılı Cumhurbaşkanlığı
  Kararları ve 1 No.lu KV GT hükümleri esas alınmıştır.

  ## Önemli Uyarı — Çoklu YTB
  Bu kalem her YTB için AYRI AYRI eklenir. Birden fazla YTB varsa her biri için
  ayrı kalem satırı oluşturun. Konsolidasyon pipeline adım 8'de yapılır.

  ## Temel Kavramlar ve Formül Özeti

  YKT = Yatırım Tutarı × Yatırıma Katkı Oranı
  İndirimsiz Oran = Normal KV Oranı / 100
  İndirimli Oran = Normal KV Oranı × (1 − Vergi İndirim Oranı/100) / 100

  ### Yatırım Döneminde İndirimli Matrah Hesabı
  1. YKT Limiti = YKT × Bölge Yüzde Limiti / 100
  2. Kümülatif Azami Kullanım = MIN(YKT Limiti, Kümülatif Yatırım Harcaması)
  3. Kullanılabilir YKT = MAX(0, Kümülatif Azami Kullanım − Önceki Dönem Kümülatif YKT)
  4. İndirimli Matrah = MIN(Diğer Faaliyetler Kazancı, Kullanılabilir YKT ÷ (Normal KV Oranı/100))

  ### İşletme Döneminde İndirimli Matrah Hesabı
  İndirimli Matrah = Beyan Edilen Yatırım Kazancı (bu YTB'ye özgü kazanç)

  ### KV Tasarrufu ve Devreden YKT
  KV Tasarrufu = İndirimli Matrah × (İndirimsiz Oran − İndirimli Oran)
  Devreden YKT = MAX(0, (YKT − Önceki Dönem Kümülatif YKT) − KV Tasarrufu)

  NOT: Sonuç alanı (kv_tasarrufu), standart bir indirim tutarı değildir. Bu kalem,
  hesaplama pipeline'ında matrah hesaplaması tamamlandıktan sonra, kurumlar
  vergisinden doğrudan düşülen bir tutar olarak işlenir.

  ## Bölge Yüzde Limitleri (Yatırım Dönemi)

  1. Bölge → %10
  2. Bölge → %10
  3. Bölge → %20
  4. Bölge → %30
  5. Bölge → %50
  6. Bölge → %80

  ## Tevsi Yatırımlarında Orantılama

  Tevsi yatırımlarında indirimli KV, yalnızca tevsi yatırımına isabet eden
  kazanç payı üzerinden uygulanır. Hesaplama yöntemi:
  Tevsi Oranı = Tevsi Yatırım Tutarı / Toplam Sabit Kıymet Tutarı
  İndirimli Matrah = Toplam Kurum Kazancı × Tevsi Oranı
  (1 No.lu KV GT ve ilgili sirkülere göre)

  ## YİAKV Etkisi
  KVK 32/A indirimli KV uygulaması, YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.
  YİAKV hesabı bağımsız olarak devam eder. Beyanname 500. satırı YİAKV
  çalışma kâğıdında bilgi satırı olarak gösterilir.

  ## YMM Tasdik Yükümlülüğü
  - Tek satır ≥500.000 TL veya toplam ≥1.000.000 TL → YMM raporu zorunludur (49 No.lu KV GT).
  - Yatırım döneminde yararlanmak için YTB kapsamındaki yatırım harcamalarını
    destekleyen belgelerin YMM tarafından tasdik edilmesi gerekir.
  - Tam tasdik kapsamındaki mükelleflerde ayrıca rapor düzenlenmeyebilir.

  ## Dikkat Edilmesi Gereken Riskler

  1. YTB geçerlilik süresi: Süresi dolmuş ve uzatılmamış YTB ile indirimli KV uygulanamaz.
  2. Tamamlama vizesi: Tamamlama vizesi alınıp alınmadığı dönem tespitini etkiler.
  3. Asgari yatırım tutarı: Gerçekleşen harcama YTB'deki asgari tutara ulaşmamışsa hak kaybı riski.
  4. Önceki dönem kümülatif kullanım: Hatalı giriş YKT bakiyesini bozar; önceki beyannamelerle mutabakat zorunludur.
  5. Çapraz uygulama: Aynı kazanç için hem 32/A hem de farklı istisna uygulanması (çifte avantaj) mevzuata aykırıdır.

muhasebe_kayitlari: |
  ## İndirimli KV Kaydı
  İndirimli KV uygulaması nedeniyle oluşan KV tasarrufu, muhasebe kayıtlarına
  doğrudan gelir olarak alınmaz. Hesaplanan KV tutarı aşağıdaki şekilde kaydedilir:

  Borç: 370 Dönem Kârı Vergi ve Diğer Yük. Karşılıkları (Hesaplanan gerçek KV)
  Alacak: 371 Dönem Kârı Vergi ve Diğer Yük. Karşılıkları (KV tahakkuku)
  Açıklama: İndirimli oran uygulandıktan sonra hesaplanan nihai KV tutarı.

  ## Ertelenmiş Vergi (TMS 12 Uygulaması — Gerekiyorsa)
  TMS/TFRS uygulayan mükellefler için, YKT kullanımına bağlı olarak ertelenmiş
  vergi varlığı/yükümlülüğü değerlendirmesi yapılmalıdır.

  ## Beyanname
  Her YTB için hesaplanan KV tasarrufu ayrı ayrı beyanname 500. satırına aktarılır.
  Konsolidasyondan sonra toplam tutar KV'den mahsup edilir.
  Devreden YKT bakiyesi, izleyen dönem beyannamesinin başlangıç değeri olarak
  kullanılmak üzere kayıt altına alınır.

