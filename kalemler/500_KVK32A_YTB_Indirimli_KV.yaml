wizard_agaci:
  tetikleyici_soru: "Sanayi ve Teknoloji Bakanlığı'ndan alınmış geçerli bir Yatırım Teşvik Belgesi (YTB) kapsamında yatırım veya üretim/işletme faaliyetiniz var mı?"
  info_modal: |
    ## Genel Çerçeve

    **KVK Madde 32/A** kapsamında, Sanayi ve Teknoloji Bakanlığı tarafından
    düzenlenen **Yatırım Teşvik Belgesi (YTB)** sahiplerine, belgede öngörülen
    yatırıma katkı tutarına (YKT) ulaşılıncaya kadar **indirimli oranda kurumlar
    vergisi** uygulanır.

    Bu kalem her YTB için **ayrı ayrı** eklenir. Birden fazla YTB varsa her biri
    için ayrı kalem satırı oluşturulur.

    ## Temel Kavramlar

    **Yatırıma Katkı Tutarı (YKT):** Devletin hibe ettiği vergi desteğinin üst sınırı.
    YKT = Yatırım Tutarı × Yatırıma Katkı Oranı (%si).

    **Vergi İndirim Oranı:** Normal KV oranına uygulanacak indirim yüzdesi.
    Örn. %80 vergi indirimi → indirimli oran = %25 × (1 − %80) = %5.

    **Yatırım Dönemi:** YTB onayından tamamlama vizesine kadar olan süre.
    Yatırım döneminde diğer faaliyetlerden elde edilen kazançlara, bölge limitiyle
    sınırlı olmak üzere indirimli KV uygulanabilir.

    **İşletme Dönemi:** Tamamlama vizesinden sonra; bu YTB'den elde edilen
    yatırım kazancına doğrudan indirimli KV uygulanır.

    ## Dönem Durumuna Göre İndirimli Matrah Belirlenmesi

    ### Yatırım Döneminde
    1. YKT Limiti = YKT × Bölge Yüzde Limiti / 100
    2. Kümülatif Azami Kullanım = MIN(YKT Limiti, Kümülatif Yatırım Harcaması)
    3. Kullanılabilir YKT = MAX(0, Kümülatif Azami Kullanım − Önceki Dönem Kümülatif Kullanım)
    4. İndirimli Matrah = MIN(Diğer Faaliyetler Kazancı, Kullanılabilir YKT ÷ Normal KV Oranı)

    ### İşletme Döneminde
    İndirimli matrah = Beyan Edilen Yatırım Kazancı (bu YTB'den elde edilen kazanç)

    ## KV Tasarrufu (Fiili YKT Kullanımı)

    KV Tasarrufu = İndirimli Matrah × (İndirimsiz Oran − İndirimli Oran)
    Bu tutar, pipeline'da matrah sonrası KV'den doğrudan düşülür.

    ## Bölge Yüzde Limitleri (Yatırım Dönemi)

    | Bölge | Yatırım Döneminde Limit |
    |-------|------------------------|
    | 1. Bölge | %10 |
    | 2. Bölge | %10 |
    | 3. Bölge | %20 |
    | 4. Bölge | %30 |
    | 5. Bölge | %50 |
    | 6. Bölge | %80 |

    ## Devreden YKT

    Cari dönemde kullanılamayan YKT bakiyesi sonraki dönemlere devredilir:
    Devreden YKT = MAX(0, (YKT − Önceki Dönem Kümülatif Kullanım) − KV Tasarrufu)

    ## Tevsi Yatırımlarında Oran Belirlenmesi

    Tevsi yatırımında indirimli KV oranı, tevsi yatırım tutarı / toplam sabit kıymet
    oranı esas alınarak hesaplanır (orantılama). Bu oran beyanname hazırlanırken
    ayrıca dikkate alınmalıdır.

    ## YİAKV İlişkisi

    **KVK 32/A kapsamındaki indirimli KV, YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.**
    YİAKV uygulaması KVK 32/A'dan bağımsız olarak hesaplanır.
  kapi_sorulari:
    - id: ytb_gecerli
      soru: "Sanayi ve Teknoloji Bakanlığı tarafından düzenlenmiş geçerli bir Yatırım Teşvik Belgeniz (YTB) var mı?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "KVK 32/A uygulaması için YTB zorunludur. Teşvik belgesi olmadan indirimli KV uygulanamaz. Belge geçerlilik süresi ve iptal/revize durumu mutlaka kontrol edilmelidir."
    - id: sektor_uygun
      soru: "Yatırım konusu, indirimli KV uygulamasından yararlanabilecek sektörler arasında mı? (Finansal kiralama, sağlık amaçlı mülk edinimi vb. istisnalar hariç)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Teşvik mevzuatında bazı sektörler ve yatırım konuları desteksiz yatırımlar kapsamındadır. YTB'nin kapsadığı yatırım konusunun indirimli KV'den yararlanıp yararlanamayacağı teyit edilmelidir."
    - id: ytb_suresi_gecmemis
      soru: "YTB'nin geçerlilik süresi dolmamış mı ve tamamlama vizesi için gerekli şartlar devam ediyor mu?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Süresi dolan ve uzatılmayan YTB'ler kapsamında gerçekleştirilemeyen yatırımlar için indirimli KV avantajı ortadan kalkar. Belge geçerlilik süresi takip edilmelidir."
    - id: donem_durumu_net
      soru: "YTB'nin mevcut dönem için yatırım döneminde mi yoksa işletme döneminde mi (tamamlama vizesi alınmış) olduğu netleştirildi mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "İndirimli matrah hesaplama yöntemi dönem durumuna göre farklılaşır. Tamamlama vizesi tarihi, yatırım/işletme dönemi ayrımının temel kriteridir."

