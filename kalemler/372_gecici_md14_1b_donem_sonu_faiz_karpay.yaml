denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Md.14/1-b: VUK Md.280/281 gereği dönem sonu itibarıyla KKM hesabında
  tahakkuk ettirilen kâr payı ve faiz geliri istisna kapsamındadır.

  ## Kritik Noktalar
  - 372, 370 kapsamındaki KKM hesabına ait dönem sonu tahakkuktur; 370 olmadan oluşamaz
  - Tahakkuk muhasebe kaydı (Dr 181 / Kr 642) yapılmadan 372 istisnasının dayanağı yoktur
  - 371 (nakit kur farkı tazminat) ile 372 (tahakkuk esaslı faiz/kâr payı) karıştırılmamalıdır
  - 370+371+372 toplamı YİAKV matrahından DÜŞÜLEMEZ (E.7'de üç satır da listede)

  ## 372-373 Mükerrerlik Kuralı
  Yılı aşan vadeli KKM hesaplarında:
  Net 373 = Toplam Vade Kâr Payı/Faiz − Önceki Yıl 372 Tahakkuku
  Bu kural uygulanmazsa mükerrer istisna → Tarhiyat riski.

muhasebe_kayitlari: |
  ## Kayıt 1 — Dönem Sonu Kâr Payı/Faiz Tahakkuku (31 Aralık)
  Borç: 181 Gelir Tahakkukları
  Alacak: 642 Faiz Gelirleri (veya 644 Temettü Gelirleri)
  Açıklama: KKM hesabı dönem sonu VUK değerleme tahakkuku — 372 istisna kapsamı

