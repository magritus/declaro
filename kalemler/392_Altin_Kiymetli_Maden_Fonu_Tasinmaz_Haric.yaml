denetci_notlari: |
  ## Yasal Dayanak
  KVK Madde 5/1-d: Türkiye'de kanunların öngördüğü şekilde kurulan ve portföyü
  Türkiye'de kurulu borsalarda işlem gören altın ve kıymetli madenlere dayalı yatırım
  fonlarının portföy işletmeciliğinden doğan kazançları kurumlar vergisinden istisnadır.
  %100 tam istisna. 2025 beyanname döneminden itibaren ayrı satır kodu (392) ile
  gösterilmektedir (önceki dönemlerde 302 genel satırına alınıyordu).

  ## Bu Satırın Kapsamı
  392 satırı YALNIZCA taşınmaz dışı portföy gelirleri içindir:
  - Portföy altın / gümüş / platin / paladyum alım-satım kazançları
  - Portföy kıymetli maden araçları dönem sonu değerleme artışları
  - BİAŞ'ta işlem gören kıymetli maden ETF değer kazançları
  - Portföy kıymetli maden vadeli sözleşme kazançları (VOB)
  - Portföy tamamlayıcı sabit getirili MK faiz gelirleri

  TAŞINMAZ GELİRİ VARSA: 393 satırı kullanılır (392 ve 393 birlikte kullanılamaz).

  ## Türkiye'de Kurulu Borsa Şartı
  KVK 5/1-d metni "portföyü Türkiye'de kurulu borsalarda işlem gören altın ve
  kıymetli madenlere dayalı" ifadesini içerir. Bu koşulun değerlendirilmesinde:
  - BİAŞ Kıymetli Madenler Piyasası araçları → Şartı sağlar
  - BİAŞ Vadeli İşlemler Piyasası kıymetli maden sözleşmeleri → Şartı sağlar
  - Yurt dışı borsalarda işlem gören araçlar → Ayrıca analiz gerekir
  Fon izahnamesinin SPK onayı ve portföy kapsamı bu analizin başlangıç belgesidir.

  ## Kritik Noktalar
  - Fon portföyü BİAŞ veya Türkiye'de kurulu diğer borsalarda işlem gören araçları kapsamalı
  - Portföyde taşınmaz geliri YOK (392 şartı); taşınmaz geliri varsa → 393
  - Portföy dışı gelir (yönetim ücreti, başarı primi vb.) 392'ye yazılmaz
  - Kıymetli maden değerlemesinde kullanılan fiyat kaynağı tutarlı ve belgelenmiş olmalı
  - GVK Geçici 67 stopaj rejimi araç türüne göre değişir; ayrıca analiz zorunludur
  - 3 kademe uyum: Muhasebe portföy hesapları = çalışma kâğıdı = beyanname 392

  ## YİAKV Etkisi
  KVK 5/1-d (392) altın/kıymetli maden fonu portföy işletmeciliği kazancı
  YİAKV matrahından DÜŞÜLEBİLİR. YİAKV çalışma kâğıdında 392 tutarı
  matrahtan doğru düşülmelidir.

  ## Beyanname Konumu
  "Zarar Olsa Dahi İndirilecek İstisna ve İndirimler" bölümü — 392 kodlu satır.
  393 (taşınmaz dahil) ile karıştırılmamalıdır. Her iki satır aynı anda kullanılamaz.

  ## Risk Alanları
  1. Portföy araçlarının Türkiye'de kurulu borsa kapsamında olmadığının belgelenmemesi
  2. Portföy dışı gelirin (yönetim ücreti vb.) 392'ye dahil edilmesi
  3. Muhasebe portföy içi/dışı ayrımının kurulmamış olması
  4. Portföyde taşınmaz geliri varken 392 kullanılması (393 yerine)
  5. Kıymetli maden değerleme fiyat kaynağı tutarsızlığı
  6. GVK Geçici 67 stopaj durumunun araç türüne göre analiz edilmemesi
  7. Maliyet yöntemi (FIFO / ağırlıklı ortalama) tutarsız uygulaması

muhasebe_kayitlari: |
  ## Kayıt 1 — Portföy Altın / Kıymetli Maden Satış Kazancı
  Borç: 102 Bankalar ← Satış bedeli
  Alacak: 111-118 Menkul Kıymetler (Kıymetli Maden) ← Maliyet değeri
  Alacak: 645 Menkul Kıymet Satış Kârı ← Satış kazancı
  Açıklama: KVK 5/1-d istisna — portföy kıymetli maden satış kazancı; FIFO veya ağırlıklı ortalama maliyet.

  ## Kayıt 2 — Portföy Kıymetli Maden Değerleme Artışı (Dönem Sonu)
  Borç: 111-118 Menkul Kıymetler (Kıymetli Maden) ← Değerleme artışı
  Alacak: 649 Diğer Olağandışı Gelir ← Kıymetli maden değerleme artışı
  Açıklama: BİAŞ kapanış fiyatı veya LBMA referans fiyatıyla hesaplanan değerleme artışı — KVK 5/1-d istisna (392 satırı).

  ## Kayıt 3 — Portföy Vadeli İşlem Sözleşme Kazancı
  Borç: 102 Bankalar ← Vadeli işlem uzlaşı bedeli
  Alacak: 649 Diğer Olağandışı Gelir ← Vadeli işlem kazancı
  Açıklama: BİAŞ Vadeli İşlemler Piyasası kıymetli maden sözleşmesi kazancı — KVK 5/1-d istisna (392 satırı).

  ## Kayıt 4 — Portföy Tamamlayıcı Sabit Getirili MK Faiz Geliri
  Borç: 127 Diğer Ticari Alacaklar ← Faiz alacağı
  Alacak: 642 Faiz Gelirleri ← Portföy MK faiz geliri
  Açıklama: KVK 5/1-d istisna kapsamı — portföy tamamlayıcı sabit getirili MK faizi; 392 satırına alınır.

  ## Kayıt 5 — Portföy Dışı Gelir (Yönetim Ücreti — Vergiye Tabi)
  Borç: 136 Diğer Çeşitli Alacaklar ← Yönetim ücreti alacağı
  Alacak: 649 Diğer Olağandışı Gelir ← Yönetim/performans ücreti
  Açıklama: PORTFÖY DIŞI — 392 satırına YAZILMAZ. Matrahta kalır; ayrı hesapta izlenmeli.

  ## Beyanname 392 Akışı (Mutabakat)
  1. Portföy içi gelirler (645, 649 kıymetli maden kısmı + 642 tamamlayıcı MK) → Net portföy kazancı
  2. Portföy dışı gelirler (yönetim ücreti vb.) → Matrahta kalır (392'ye yazılmaz)
  3. KV Beyannamesi 392 Satırı: Net portföy kazancı → "Zarar Olsa Dahi İndirilecek"
  3 KADEME UYUM: Muhasebe portföy hesapları = VERİ GİRİŞİ toplamı = Beyanname 392

