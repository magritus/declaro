# KVK 5/1-d (392) altın ve kıymetli maden yatırım fonu portföy işletmeciliği kazancı
# YİAKV matrahından DÜŞÜLEBİLİR. Bu satır YALNIZCA taşınmaz dışı portföy gelirlerini
# (altın, gümüş, platin, paladyum ve bunlara dayalı borsa araçları dahil) kapsar.
# Fon portföyünün Türkiye'de kurulu borsalarda işlem gören araçlardan oluşması
# ve taşınmazdan gelir elde edilmemesi şarttır.
durum: aktif
yururluk_araligi:
  baslangic: "2006-06-21"
  bitis: null
  not: "2025 beyanname döneminden itibaren ayrı satır kodu (392) ile gösterilmektedir. Önceki dönemlerde 302 kodlu genel portföy işletmeciliği satırı kullanılıyordu. Portföyde taşınmaz geliri varsa 393 satırı kullanılır."

ana_kategori: portfoy_isletmeciligi

wizard_agaci:
  tetikleyici_soru: "Kurum, portföyü ağırlıklı olarak Türkiye'de kurulu borsalarda işlem gören altın ve kıymetli madenlere dayalı araçlardan oluşan bir yatırım fonu mu ve portföy işletmeciliğinden (taşınmaz hariç) kazanç elde etti mi?"
  info_modal: |
    ## Genel Çerçeve

    KVK Madde 5/1-d kapsamında **portföyü Türkiye'de kurulu borsalarda işlem gören altın ve kıymetli madenlere dayalı** yatırım fonlarının portföy işletmeciliğinden doğan kazançları kurumlar vergisinden **%100 tam istisna** olarak muaftır. Beyanname **"Zarar Olsa Dahi İndirilecek"** bölümünde **392** numaralı satırda gösterilir.

    Bu kalem (392) **taşınmaz dışı** portföy gelirlerini kapsar. Portföy araçları arasında: Borsa İstanbul Kıymetli Madenler ve Kıymetli Taşlar Piyasası'nda işlem gören altın, gümüş, platin, paladyum, fiziksel kıymetli maden senetleri, kıymetli maden endeksi fonları ve benzeri araçlar yer alabilir. Portföyde taşınmaz bulunuyor ve taşınmazdan gelir elde ediliyorsa **393** satırı kullanılır.

    ## Temel Koşullar

    - **SPK Lisansı:** Fonun SPK tarafından kuruluşuna izin verilmiş ve tescil edilmiş olması zorunludur; güncel kuruluş izni ve KAP kaydı dosyada yer almalıdır.
    - **Türkiye'de kurulu borsalarda işlem gören araçlar:** Portföyün ağırlıklı bileşenini Borsa İstanbul veya Türkiye'de kurulu diğer borsalarda işlem gören kıymetli maden araçlarının oluşturması gerekir. Yurt dışı borsalarda işlem gören altın araçlarının dahil edilip edilemeyeceği mevzuat kapsamında ayrıca değerlendirilmelidir.
    - **Taşınmaz geliri olmadığının teyidi:** Bu satırda (392) portföy kaynaklı taşınmaz geliri bulunmamalıdır. Taşınmaz geliri varsa 393 satırı kullanılır.
    - **Portföy içi/dışı ayrımı:** İstisna YALNIZCA portföy kapsamındaki kıymetli maden varlıklardan elde edilen gelirlere uygulanır. Yönetim ücreti, performans/başarı primi, portföyde kayıtlı olmayan araçlardan elde edilen gelirler vergiye tabidir.
    - **Muhasebede ayrı hesap:** Portföy içi ve portföy dışı gelirlerin ayrı hesapta veya belgelenmiş dağıtım anahtarıyla izlenmesi zorunludur.

    ## Fon Portföy Kapsamı — Kıymetli Maden Araçları

    Kapsama girebilecek portföy araçları:
    - **Fiziksel altın / gümüş / platin / paladyum:** BİAŞ Kıymetli Madenler Piyasası veya eşdeğer platformda işlem gören saf altın, sertifikalı altın vb.
    - **Kıymetli maden senetleri (borsa işlemli):** BİAŞ'ta kota edilmiş ve işlem gören altın senetleri
    - **Altın ve kıymetli maden endeksi borsa yatırım fonları (ETF):** BİAŞ'ta kota edilen kıymetli maden ETF'leri
    - **Döviz / kıymetli maden vadeli sözleşmeleri (VOB):** BİAŞ Vadeli İşlemler Piyasası'nda işlem gören sözleşmeler
    - **Sabit getirili menkul kıymetler (portföy tamamlayıcı bileşeni):** SPK mevzuatı çerçevesinde portföy yönetimi gereklerini karşılamak amacıyla tutulan tahvil, bono

    ## Portföy İçi Gelirler — İstisna (392)

    - Portföy kıymetli maden alım-satım kazançları (altın, gümüş, platin vb.)
    - Portföy kıymetli maden araçları dönem sonu değerleme artışları (VUK/SPK esasları)
    - Portföy kıymetli maden ETF fiyat kazancı
    - Portföy tamamlayıcı sabit getirili MK faiz ve kupon gelirleri
    - Portföy vadeli işlem sözleşme kazançları

    ## YİAKV İlişkisi

    KVK 5/1-d (392) altın ve kıymetli maden fonu portföy işletmeciliği kazancı **YİAKV matrahından düşülebilir**. YİAKV çalışma kâğıdında 392 tutarı matrahtan doğru biçimde düşülmelidir.

    ## GVK Geçici Madde 67 — Fon Düzeyinde Stopaj

    Kıymetli maden yatırım fonları GVK Geçici Madde 67 kapsamında fon düzeyinde stopaja tabi olabilir; araç türüne ve fon yapısına göre stopaj rejimi değişir. Kıymetli maden alım-satım kazançlarının stopaj durumu dönem mevzuatı çerçevesinde ayrıca analiz edilmelidir. GVK Geçici 67 kapsamındaki fon düzeyi stopaj ile KV beyannamesi 392 istisnası birbirini dışlamaz.

    ## Pratik Notlar

    - Portföy değerleme raporunda kullanılan kıymetli maden fiyat kaynağı (BİAŞ kapanış fiyatı, LBMA referans fiyatı vb.) belirtilmeli ve tutarlı biçimde uygulanmalıdır.
    - 3 kademe uyum kontrolü: Muhasebe portföy hesapları = çalışma kâğıdı = KV beyannamesi 392 satırı.
    - 49 No.lu KV Genel Tebliği kapsamında tek satır ≥500.000 TL ise YMM tasdik raporu eşiği kontrol edilmelidir.
