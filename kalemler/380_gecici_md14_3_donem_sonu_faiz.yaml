denetci_notlari: |
  ## Yasal Dayanak
  KVK Geçici Madde 14/3 (Paragraf 3): Altın hesabı dönüşümü (379) sonrası kurulan TL
  araçtan dönem sonu VUK değerlemesiyle tahakkuk eden faiz ve kâr payı istisnası.
  7352 Sayılı Kanun kapsamında yürürlüğe girmiştir.

  ## Zincirleme Bağlantı
  380 yalnızca 379 kapsamında altın hesabı dönüştürülmüş TL araçlara uygulanır.
  379 çalışma kâğıdı referansı zorunludur.

  ## Muhasebe Mekanizması
  - Dönem sonu (31.12): Borç 181 Gelir Tahakkukları / Alacak 642 Faiz Gelirleri
  - 372 (P1), 376 (P2) ile aynı mekanizma — fark yasal dayanaktır
  - Tahsil döneminde 181 kapatılır; bu dönem tekrar 380 uygulanmaz

  ## 372/376 ile Mükerrerlik
  372: P1 araçlar (döviz/altın → KKM), 376: P2 araçlar (borç → TL), 380: P3 araçlar
  (altın hesabı → TL). Aynı TL araç için yalnızca biri uygulanabilir.

  ## YİAKV Etkisi (KVK Md.32/C)
  370–380 (11 kod) tamamı YİAKV matrahından DÜŞÜLEMEZ. YİAKV E.7'de kontrol zorunludur.

  ## Beyanname Bölümü
  "Kazancın Bulunması Halinde İndirilecek" — zarar döneminde uygulanamaz.

muhasebe_kayitlari: |
  ## Kayıt 1 — Dönem Sonu (31 Aralık): Paragraf 3 TL Araç Faiz/Kâr Payı Tahakkuku
  Borç:    181 Gelir Tahakkukları   [Tahakkuk eden faiz/kâr payı tutarı]
  Alacak:  642 Faiz Gelirleri / 644 Kâr Payları [Aynı tutar]
  Açıklama: KVK Geçici Md.14/3 altın dönüşümü (379) sonrası TL araç → Beyanname 380
  Kaynak: Banka dönem sonu bildirimi — VUK Md.280/281

  ## Kayıt 2 — Tahsil (İzleyen Dönem): 181 Kapatma
  Borç:    102 Bankalar             [Faiz/kâr payı tahsilatı]
  Alacak:  181 Gelir Tahakkukları   [Önceki dönem 380 tahakkuku kapatma]
  Not: Tahsil döneminde tekrar 380 uygulanmaz. Vade sonu 381 kapsamında (önceki 380
  mahsubu yapılarak) gösterilir.

