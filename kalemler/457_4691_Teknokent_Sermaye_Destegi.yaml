denetci_notlari: |
  ## Yasal Dayanak
  4691 sayılı Teknoloji Geliştirme Bölgeleri Kanunu Geçici Madde 4: TGB bünyesindeki
  firmalara STB veya TGB Yönetici Şirketi aracılığıyla sağlanan sermaye desteği hibe geliri,
  kurumlar vergisi matrahından indirilir.
  GİB KV Beyan Rehberi Mart 2026 (Yayın No:606) esas alınmıştır.

  ## İndirim Mekanizması

  Teknokent desteği iki adımlı mekanizma ile beyannamede yer alır:
  - ADIM 1: Destek alındığında → Gelir kaydedilir (679/649) → KV matrahına girer
  - ADIM 2: Beyanname 457 → Destek tutarı matrahtan DÜŞÜLÜR → Net vergi yükü = 0

  ## Kritik Ön Koşullar

  A0.1 ★ TGB tescili: 4691 s.K. kapsamında STB lisanslı TGB bünyesinde tescil zorunlu
  A0.2 ★ 4691 kapsamı: Protokolde 4691 Geçici Md.4 referansı bulunmalı
  A0.3 ★ Fiili tahsilat: Banka yoluyla fiilen alınmış kısım esas
  A0.4 ★ Gelir kaydı: 679/649 gelir kaydı olmadan 457 uygulanamaz
  A0.5 STB/TGB destek kararı veya TGB Yönetici Şirketi protokolü mevcut olmalı

  ## 456 ile 457 Ayrımı
  456 (5746 Md.3/5): Teknogirişim desteği — STB kaynaklı, TGB dışı girişimciler de dahil
  457 (4691 Geç.Md.4): Teknokent desteği — 4691 s.K. kapsamında TGB bünyesi zorunlu
  Mekanizma aynıdır; aynı destek her iki kodla çift sayılmamalıdır.

  ## YİAKV Etkisi
  457 Teknokent Sermaye Desteği İndirimi YİAKV (KVK 32/C) matrahından DÜŞÜLEMEZ.
  YİAKV çalışma kâğıdı E.13 bilgi satırında gösterilir — matrahı etkilemez.
  Hem 456 hem 457 varsa E.13'e her ikisinin toplamı yazılır.

  ## YMM Tasdik
  İndirim tutarı ≥500.000 TL ise YMM tasdik raporu zorunludur.
  Tam tasdik kapsamındaki mükelleflerde ayrıca rapor düzenlenmez.

muhasebe_kayitlari: |
  ## Destek Tahsilat Kaydı
  Borç: 102 Bankalar
  Alacak: 679 Diğer Olağandışı Gelirler (veya 649 Diğer Gelirler)
  Açıklama: 4691 s.K. Geçici Md.4 kapsamında TGB Yönetici Şirketi/STB'den alınan sermaye desteği.

  NOT: Bu gelir kaydı olmadan beyanname 457 uygulanamaz.
  Tahsil edilen destek önce gelir hesabına alınır, ardından beyanname 457 ile matrahtan düşülür.

  ## Beyanname
  Fiilen tahsil edilen destek tutarı beyanname 457. satırına aktarılır.
  İndirim tutarı = Tahsil edilen hibe tutarı (gelir kaydı şartıyla).

