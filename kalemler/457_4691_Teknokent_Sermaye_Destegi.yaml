wizard_agaci:
  tetikleyici_soru: "4691 s.K. kapsamında bir Teknoloji Geliştirme Bölgesi'nde (TGB/Teknokent) faaliyette bulunuyor musunuz ve TGB Yönetici Şirketi ya da STB aracılığıyla sermaye desteği aldınız mı?"
  info_modal: |
    ## Genel Çerçeve

    **4691 sayılı Teknoloji Geliştirme Bölgeleri Kanunu Geçici Madde 4** kapsamında
    STB veya TGB Yönetici Şirketi aracılığıyla teknokent bünyesindeki firmalara
    sağlanan sermaye/hibe destek gelirinin kurumlar vergisi matrahından indirilmesidir.

    ## Muhasebe-Beyanname Mekanizması

    **456 Teknogirişim desteği ile mekanizması aynıdır; yasal dayanak ve kapsam farklıdır:**

    **①** Destek alındığında → **GELİR kaydedilir** (679/649 hesabı) → KV matrahına girer.
    **②** Beyanname 457 → Alınan destek tutarı matrahtan **DÜŞÜLÜR** → Net vergi yükü = 0.

    **SONUÇ:** Teknokent sermaye desteği üzerinden kurumlar vergisi ödenmez.

    ## TGB Tescili — Zorunlu Ön Koşul

    **4691 Geçici Md.4 yalnızca STB lisanslı Teknoloji Geliştirme Bölgesi (TGB/Teknokent)
    bünyesinde tescilli firmalar için geçerlidir.**

    TGB dışında faaliyet gösteren girişimciler için → 456 (5746 Md.3/5) uygulanır.

    ## Kapsam — Alıcı Niteliği

    - 4691 s.K. kapsamında tescilli TGB/Teknokent bünyesindeki firmalar
    - Destek kanalı: STB doğrudan veya TGB Yönetici Şirketi aracılığıyla

    ## Önemli Ön Koşullar

    - **TGB Tescil Belgesi:** Firmayı TGB bünyesinde tescil eden STB/TGB belgesi zorunludur.
    - **4691 Kapsamı Teyidi:** Destek kararı/protokolü 4691 Geçici Md.4'e dayanmalıdır.
    - **Fiili tahsilat:** Protokol tutarı değil, banka havalesiyle alınan kısım esastır.
    - **Gelir kaydı zorunluluğu:** Destek alındığında **önce gelir hesabına alınmalı** (679/649).
      Gelir kaydedilmemişse beyanname 457 ile matrahtan çıkarılamaz.

    ## YİAKV İlişkisi

    **4691 Geçici Md.4 kapsamındaki Teknokent Sermaye Desteği İndirimi YİAKV (KVK 32/C)
    matrahından DÜŞÜLEMEZ.** YİAKV çalışma kâğıdı E.13 bilgi satırında gösterilir ancak
    matrahı etkilemez. Hem 456 hem 457 varsa E.13'e toplam yazılır.

    ## 456 ile 457 Farkı

    | | 456 | 457 |
    |---|---|---|
    | Yasal Dayanak | 5746 s.K. Md.3/5 | 4691 s.K. Geçici Md.4 |
    | Kapsam | STB onaylı girişimciler (TGB dışı dahil) | TGB bünyesindeki firmalar |
    | Destek Kanalı | STB direkt | STB veya TGB Yönetici Şirketi |

    Mekanizma (Gelir Kaydı → Beyanname İndirimi) her iki kodda aynıdır.
  kapi_sorulari:
    - id: tgb_tescilli
      soru: "Kurum 4691 s.K. kapsamında bir TGB/Teknokent'te tescilli mi?"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "4691 Geçici Md.4 yalnızca STB lisanslı TGB bünyesindeki firmalara yöneliktir. TGB dışında faaliyet gösteren girişimciler için 456 (5746 Md.3/5) uygulanır."
    - id: destek_4691_kapsaminda
      soru: "Destek 4691 s.K. Geçici Md.4 kapsamında mı? (Protokolde referans var mı?)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Destek kararı/protokolü 4691 Geçici Md.4'e dayanmalıdır. 5746 Md.3/5 kapsamındaysa → 456 uygulanır."
    - id: fiilen_tahsil_edildi
      soru: "Destek fiilen tahsil edildi mi? (Banka yoluyla)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "Protokol tutarı değil — banka havalesiyle alınan kısım esastır. Yalnızca dönem içinde fiilen alınan kısım indirim konusu yapılabilir."
    - id: gelir_kaydedildi
      soru: "Tahsil edilen destek gelir olarak kaydedildi mi? (679/649 — Zorunlu Ön Adım)"
      tip: evet_hayir
      zorunlu_cevap: evet
      aciklama: "ZORUNLU ADIM: Önce 679/649 gelir kaydı → Sonra beyanname 457. Gelir kaydı olmadan 457 uygulanamaz — hatalı beyan ve tarhiyat riski doğar."

